<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>个人主页 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <link rel="stylesheet" href="/css/zhuye.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Inter', sans-serif;
            color: #eef2ff;
            padding-bottom: 80px;
        }
        .top-nav {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #F0B90B, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 16px;
        }
        .user-nav-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sync-notice {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981cc;
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 200;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        .sync-notice.show { transform: translateX(0); }
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 32px;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #facc15;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .profile-banner {
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
            border-radius: 32px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px 20px;
            margin-bottom: 24px;
        }
        .banner-content {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .avatar-container {
            cursor: pointer;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-placeholder {
            font-size: 3rem;
            font-weight: bold;
            color: white;
        }
        .user-info {
            flex: 1;
        }
        .username-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .username {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .username-edit, .edit-bio {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .register-days, .active-points {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .shop-button {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .user-email, .user-bio, .user-role {
            margin-top: 6px;
            font-size: 0.85rem;
            opacity: 0.9;
        }
        .checkin-card {
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
        }
        .streak-box {
            text-align: center;
        }
        .streak-number {
            font-size: 2rem;
            font-weight: bold;
            color: #facc15;
        }
        .checkin-btn {
            background: #3b82f6;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .section-header {
            margin: 28px 0 12px;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            border-left: 4px solid #facc15;
            padding-left: 12px;
        }
        .settings-section {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 8px 0;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .danger-zone {
            padding: 16px 20px;
            border-top: 1px solid rgba(248,113,113,0.3);
            margin-top: 8px;
        }
        .danger-btn {
            background: #f87171;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
        }
        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1e293b;
            border-radius: 32px;
            max-width: 90%;
            width: 400px;
            padding: 24px;
            color: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .form-group { margin-bottom: 16px; }
        .form-input, .form-textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 20px;
            color: white;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-primary, .btn-cancel {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-cancel { background: #334155; color: white; }
        .balance-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .balance-item {
            background: #0f172a;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .balance-item:hover { background: #1e293b; }
        .frame-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .btn-buy, .btn-equip, .btn-owned {
            background: #f59e0b;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .btn-owned { background: #475569; cursor: default; }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #facc15;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: none;
            cursor: pointer;
            z-index: 99;
        }
        @media (max-width: 600px) {
            .banner-content { flex-direction: column; text-align: center; }
            .username-wrapper { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-title">六哥荣耀WIKI</div>
        <a href="./admin.html" id="adminLink" class="nav-link" style="display: none;">管理后台</a>
        <div class="user-nav-section" id="userNavSection"></div>
    </nav>
    <div class="sync-notice" id="syncNotice"><i class="fas fa-sync-alt"></i><span>已同步</span></div>
    <div class="profile-container">
        <div class="loading" id="loading"><div class="loading-spinner"></div><p>加载个人资料中...</p></div>
        <div id="profileContent" style="display: none;">
            <div class="profile-banner">
                <div class="banner-content">
                    <div class="avatar-container" id="avatarContainer">
                        <div class="avatar" id="userAvatar"><div class="avatar-placeholder">U</div></div>
                    </div>
                    <div class="user-info">
                        <div class="username-wrapper">
                            <span class="username" id="displayUsername">加载中...</span>
                            <button class="username-edit" onclick="openUsernameModal()"><i class="fas fa-edit"></i></button>
                            <div class="register-days"><i class="fas fa-calendar-alt"></i><span id="userDaysText">已来到 0 天</span></div>
                            <div class="active-points"><i class="fas fa-bolt"></i>活跃度: <span id="activePointsValue">0</span></div>
                            <button class="shop-button" id="openShopBtn"><i class="fas fa-store"></i> 商店</button>
                        </div>
                        <div class="user-email" id="userEmail">加载中...</div>
                        <div class="user-bio"><span id="userBio"></span><button class="edit-bio" onclick="openBioModal()">编辑</button></div>
                        <div class="user-role" id="userRoleDisplay"></div>
                    </div>
                </div>
            </div>
            <div class="checkin-card">
                <div class="checkin-info"><div class="streak-box"><div class="streak-number" id="streakDays">0</div><div class="streak-label">连续签到</div></div><div class="reward-preview" id="rewardPreview">明日奖励: --</div></div>
                <button class="checkin-btn" id="checkinBtn"><i class="fas fa-calendar-check"></i> 签到</button>
            </div>
            <div class="section-header"><div class="section-title"><i class="fas fa-cog"></i>账号设置</div></div>
            <div class="settings-section">
                <div class="settings-item"><div><div class="settings-label">修改密码</div><div class="settings-desc">提高安全性</div></div><button class="btn" onclick="openPasswordModal()"><i class="fas fa-key"></i>修改密码</button></div>
                <div class="settings-item"><div><div class="settings-label">账号创建时间</div><div class="settings-desc" id="createdAt">--</div></div></div>
                <div class="settings-item"><div><div class="settings-label">最后登录时间</div><div class="settings-desc" id="lastLogin">--</div></div></div>
                <div class="danger-zone"><div class="danger-title"><i class="fas fa-exclamation-triangle"></i>危险操作</div><button class="danger-btn" onclick="openDeleteAccountModal()"><i class="fas fa-trash"></i>注销账号</button><div class="danger-note">不可逆操作</div></div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="cropModal"><div class="modal"><div class="modal-header"><div class="modal-title">裁剪头像</div><button class="modal-close" id="closeCropModalBtn">&times;</button></div><div><img id="cropImage" style="max-width:100%;"></div><div class="crop-buttons" style="display:flex; gap:12px; margin-top:16px;"><button class="btn-cancel" id="cancelCropBtn">取消</button><button class="btn-primary" id="confirmCropBtn">确认上传</button></div></div></div>
    <div class="modal-overlay" id="shopModal"><div class="modal"><div class="modal-header"><div class="modal-title">商店</div><button class="modal-close" id="closeShopModalBtn">&times;</button></div><div id="shopContentContainer"><div style="text-align:center;padding:20px;">加载中...</div></div></div></div>
    <div class="modal-overlay" id="usernameModal"><div class="modal"><div class="modal-header"><div class="modal-title">修改用户名</div><button class="modal-close close-modal-btn" data-modal="usernameModal">&times;</button></div><div class="form-group"><input type="text" class="form-input" id="newUsername" maxlength="20" placeholder="新用户名"></div><div class="form-actions"><button class="btn-cancel close-modal-btn" data-modal="usernameModal">取消</button><button class="btn-primary" id="saveUsername">保存</button></div></div></div>
    <div class="modal-overlay" id="bioModal"><div class="modal"><div class="modal-header"><div class="modal-title">个人简介</div><button class="modal-close close-modal-btn" data-modal="bioModal">&times;</button></div><div class="form-group"><textarea class="form-textarea" id="newBio" rows="3" maxlength="200"></textarea></div><div class="form-actions"><button class="btn-cancel close-modal-btn" data-modal="bioModal">取消</button><button class="btn-primary" id="saveBio">保存</button></div></div></div>
    <div class="modal-overlay" id="passwordModal"><div class="modal"><div class="modal-header"><div class="modal-title">修改密码</div><button class="modal-close close-modal-btn" data-modal="passwordModal">&times;</button></div><div class="form-group"><input type="password" class="form-input" id="currentPassword" placeholder="当前密码"></div><div class="form-group"><input type="password" class="form-input" id="newPassword" placeholder="新密码（至少6位）"></div><div class="form-group"><input type="password" class="form-input" id="confirmPassword" placeholder="确认新密码"></div><div class="form-actions"><button class="btn-cancel close-modal-btn" data-modal="passwordModal">取消</button><button class="btn-primary" id="savePassword">更新密码</button></div></div></div>
    <div class="modal-overlay" id="deleteAccountModal"><div class="modal"><div class="modal-header"><div class="modal-title" style="color:#f87171;">注销账号</div><button class="modal-close close-modal-btn" data-modal="deleteAccountModal">&times;</button></div><p>输入邮箱确认：</p><div class="form-group"><input type="email" class="form-input" id="confirmEmail" placeholder="邮箱地址"></div><div class="form-actions"><button class="btn-cancel close-modal-btn" data-modal="deleteAccountModal">取消</button><button class="danger-btn" id="confirmDeleteAccount">确认注销</button></div></div></div>
    <div class="modal-overlay" id="logoutConfirmModal"><div class="modal"><div class="modal-header"><div class="modal-title">退出登录</div><button class="modal-close" id="closeLogoutModalBtn">&times;</button></div><p>确定退出吗？</p><div class="confirm-buttons" style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;"><button class="btn-cancel" id="cancelLogoutBtn">取消</button><button class="btn-primary" id="confirmLogoutBtn">退出</button></div></div></div>
    <div class="modal-overlay" id="avatarConfirmModal"><div class="modal"><div class="modal-header"><div class="modal-title">更换头像</div><button class="modal-close" id="closeAvatarConfirmBtn">&times;</button></div><p>确定要更换头像吗？</p><div class="confirm-buttons" style="display: flex; gap: 12px; justify-content: center;"><button class="btn-cancel" id="cancelAvatarBtn">取消</button><button class="btn-primary" id="confirmAvatarBtn">确定</button></div></div></div>

    <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-chevron-up"></i></button>

    <script>
        // ========== 配置 ==========
        const ROLE_CONFIG = {
            owner: { name: '站长', color: '#f97316' },
            admin: { name: '管理员', color: '#60a5fa' },
            user:  { name: '普通用户', color: '#9ca3af' }
        };
        function getRoleDisplay(role) { return ROLE_CONFIG[role] || ROLE_CONFIG.user; }

        let supabaseClient = null, currentUser = null, targetUserId = null, userProfile = null, userStats = null;
        let isViewingSelf = true;
        let cropper = null;
        let hasAutoSignCard = false;
        let autoSignAttempted = false;
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';

        // 辅助函数
        function getLocalDateString(date = new Date()) { return date.toLocaleDateString('sv-SE'); }
        function safeSetText(id, text) { let e = document.getElementById(id); if(e) e.textContent = text || '--'; }
        let notificationTimeout = null;
        function showNotification(msg, type = 'info') {
            let n = document.getElementById('notification');
            if (!n) {
                n = document.createElement('div');
                n.id = 'notification';
                n.style.position = 'fixed';
                n.style.bottom = '80px';
                n.style.left = '50%';
                n.style.transform = 'translateX(-50%)';
                n.style.backgroundColor = type === 'error' ? '#f87171' : (type === 'success' ? '#10b981' : '#3b82f6');
                n.style.color = '#fff';
                n.style.padding = '10px 20px';
                n.style.borderRadius = '40px';
                n.style.zIndex = '1001';
                n.style.fontSize = '0.9rem';
                n.style.whiteSpace = 'nowrap';
                document.body.appendChild(n);
            }
            n.textContent = msg;
            n.style.backgroundColor = type === 'error' ? '#f87171' : (type === 'success' ? '#10b981' : '#3b82f6');
            n.style.opacity = '1';
            if (notificationTimeout) clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => { n.style.opacity = '0'; }, 3000);
        }
        function showSyncNotice() { let sn = document.getElementById('syncNotice'); if(sn){ sn.classList.add('show'); setTimeout(()=>sn.classList.remove('show'),2000); } }
        function refreshLocalCache() {
            if (!isViewingSelf) return;
            if (userProfile) localStorage.setItem('cachedUserProfile', JSON.stringify(userProfile));
            if (userStats) localStorage.setItem('cachedUserStats', JSON.stringify(userStats));
            localStorage.setItem('profileLastUpdated', Date.now());
        }
        function updateActivePointsDisplay() { let span = document.getElementById('activePointsValue'); if(span) span.innerText = userStats?.active_points || 0; }
        function updateShopBalanceDisplay() {
            if(!isViewingSelf) return;
            let candySpan = document.getElementById('shopCandyBalance');
            let rainSpan = document.getElementById('shopRainbowBalance');
            if(candySpan) candySpan.innerText = userStats?.candy_crumbles || 0;
            if(rainSpan) rainSpan.innerText = userStats?.rainbow_lollipops || 0;
        }
        function openModal(id) { let m = document.getElementById(id); if(m) m.classList.add('show'); document.body.style.overflow = 'hidden'; }
        function closeModal(id) { let m = document.getElementById(id); if(m) m.classList.remove('show'); document.body.style.overflow = ''; }
        window.openUsernameModal = () => { if(!isViewingSelf) return; document.getElementById('newUsername').value = userProfile?.username || ''; openModal('usernameModal'); };
        window.openBioModal = () => { if(!isViewingSelf) return; document.getElementById('newBio').value = userProfile?.bio || ''; openModal('bioModal'); };
        window.openPasswordModal = () => { if(!isViewingSelf) return; openModal('passwordModal'); };
        window.openDeleteAccountModal = () => { if(!isViewingSelf) return; document.getElementById('confirmEmail').value = currentUser?.email || ''; openModal('deleteAccountModal'); };

        // 头像框系统（简化版，保留原有逻辑）
        window.FrameSystem = (function() {
            const FRAMES = [
                { id: 'frame_default', name: '默认头像框', cssClass: '' },
                { id: 'frame_gold', name: '黄金边框', price_candy: 50, cssClass: 'frame-gold' }
            ];
            async function loadUserFrames(userId) {
                const { data, error } = await supabaseClient.from('user_frames').select('frame_id, equipped').eq('user_id', userId);
                if (error) return { owned: ['frame_default'], equipped: 'frame_default' };
                let owned = data.map(item => item.frame_id);
                if (!owned.includes('frame_default')) owned.push('frame_default');
                let equipped = data.find(item => item.equipped === true)?.frame_id || 'frame_default';
                return { owned, equipped };
            }
            async function equipFrame(frameId) {
                await supabaseClient.from('user_frames').update({ equipped: false }).eq('user_id', currentUser.id).eq('equipped', true);
                await supabaseClient.from('user_frames').update({ equipped: true }).eq('user_id', currentUser.id).eq('frame_id', frameId);
                applyFrameClass(frameId);
            }
            async function applyFrameClass(frameId) {
                const avatarDiv = document.getElementById('userAvatar');
                if(!avatarDiv) return;
                avatarDiv.classList.remove('frame-gold');
                if(frameId === 'frame_gold') avatarDiv.classList.add('frame-gold');
            }
            async function initFrameForUser(userId) {
                let { equipped } = await loadUserFrames(userId);
                await applyFrameClass(equipped);
            }
            return { FRAMES, loadUserFrames, equipFrame, initFrameForUser };
        })();

        // 签到奖励规则
        function getCheckinRewards(streak) {
            if(streak === 1) return { candy:3, rainbow:0, active:2 };
            if(streak === 2) return { candy:5, rainbow:0, active:2 };
            if(streak === 3) return { candy:7, rainbow:0, active:2 };
            if(streak === 4) return { candy:9, rainbow:0, active:2 };
            if(streak === 5) return { candy:10, rainbow:0, active:2 };
            if(streak === 6) return { candy:12, rainbow:0, active:2 };
            if(streak === 7) return { candy:15, rainbow:1, active:5 };
            if(streak >=8 && streak <=14) return { candy:10+(streak-8)*2, rainbow:2, active:8 };
            if(streak === 15) return { candy:30, rainbow:5, active:15 };
            if(streak >=16 && streak <=29) return { candy:50, rainbow:10, active:10 };
            if(streak === 30) return { candy:100, rainbow:20, active:50 };
            return { candy:80, rainbow:15, active:20 };
        }
        function updateRewardPreview() {
            if(!isViewingSelf) return;
            let streak = userStats?.checkin_streak || 0;
            let rewards = getCheckinRewards(streak+1);
            let preview = document.getElementById('rewardPreview');
            if(preview) preview.innerHTML = `明日奖励: 🍬${rewards.candy} ${rewards.rainbow>0?`🌈+${rewards.rainbow} `:''}⚡+${rewards.active}`;
        }

        // 核心签到函数
        async function executeCheckin(autoTriggered = false) {
            if (!isViewingSelf) return false;
            const today = getLocalDateString();
            if (userStats.last_checkin_date === today) {
                if (!autoTriggered) showNotification('今日已签到', 'warning');
                return false;
            }
            let newStreak = 1;
            const last = userStats.last_checkin_date;
            if (last) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (last === getLocalDateString(yesterday)) newStreak = (userStats.checkin_streak || 0) + 1;
            }
            const rewards = getCheckinRewards(newStreak);
            const newCandy = userStats.candy_crumbles + rewards.candy;
            const newRainbow = userStats.rainbow_lollipops + rewards.rainbow;
            const newActive = userStats.active_points + rewards.active;
            const { error } = await supabaseClient.from('user_stats').update({
                candy_crumbles: newCandy, rainbow_lollipops: newRainbow, active_points: newActive,
                last_checkin_date: today, checkin_streak: newStreak
            }).eq('user_id', currentUser.id);
            if (error) { showNotification('签到失败', 'error'); return false; }
            userStats = { ...userStats, candy_crumbles: newCandy, rainbow_lollipops: newRainbow, active_points: newActive, last_checkin_date: today, checkin_streak: newStreak };
            refreshLocalCache();
            updateActivePointsDisplay();
            if (isViewingSelf) updateShopBalanceDisplay();
            document.getElementById('streakDays').innerText = newStreak;
            updateRewardPreview();
            const btn = document.getElementById('checkinBtn');
            if(btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-check-circle"></i> 已签到'; }
            showNotification(autoTriggered ? `✨ 自动签到卡已为您签到 +${rewards.candy}🍬` : `签到 +${rewards.candy}🍬`, 'success');
            return true;
        }
        async function performCheckin() { await executeCheckin(false); }

        // 自动签到卡状态
        async function loadAutoSignCardStatus() {
            if (!isViewingSelf) return false;
            const { data, error } = await supabaseClient.from('user_auto_sign_card').select('owned').eq('user_id', currentUser.id).single();
            if (error && error.code !== 'PGRST116') return false;
            return data?.owned === true;
        }

        // 商店渲染（包含点击余额/卡片弹窗）
        async function renderShop() {
            let container = document.getElementById('shopContentContainer');
            if(!container) return;
            container.innerHTML = `<div class="shop-panel">
                <div class="balance-row">
                    <div class="balance-item" data-currency="candy"><img src="https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/props/Crushed_sugar.webp" style="width:20px;height:20px;object-fit:contain;"> 糖果碎: <span id="shopCandyBalance">0</span></div>
                    <div class="balance-item" data-currency="rainbow"><img src="https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/props/Super_Sweet.webp" style="width:20px;height:20px;object-fit:contain;"> 超级棒糖: <span id="shopRainbowBalance">0</span></div>
                </div>
                <div class="shop-section"><h3>📦 自动签到卡</h3><div id="autoSignCardItem"></div></div>
                <div class="shop-section"><h3>🖼️ 头像框</h3><div id="framesList">⏳ 加载中...</div></div>
            </div>`;
            // 绑定余额点击弹窗
            document.querySelectorAll('.balance-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    let currency = el.dataset.currency;
                    if(currency === 'candy') showNotification('🍬 糖果碎：可用于购买道具，通过签到和活动获得', 'info');
                    else showNotification('🌈 彩虹棒糖：稀有货币，高级商品兑换', 'info');
                });
            });
            updateShopBalanceDisplay();
            await loadAutoSignCardUI();
            await loadFramesList();
        }
        async function loadAutoSignCardUI() {
            let container = document.getElementById('autoSignCardItem');
            if(!container) return;
            const hasCard = await loadAutoSignCardStatus();
            const priceCandy = 50;
            if(hasCard) {
                container.innerHTML = `<div class="frame-item"><div><strong>✅ 自动签到卡</strong><div style="font-size:0.75rem;">永久有效，每日自动签到，每个用户最多持有1张。</div></div><button class="btn-owned" disabled>已拥有</button></div>`;
            } else {
                container.innerHTML = `<div class="frame-item"><div><strong>📅 自动签到卡</strong><div style="font-size:0.75rem;">每天00:00自动签到，永不漏签</div><div>价格: 🍬 ${priceCandy}</div></div><button class="btn-buy" id="buyAutoSignBtn">购买</button></div>`;
                document.getElementById('buyAutoSignBtn')?.addEventListener('click', async () => {
                    if(userStats.candy_crumbles < priceCandy) { showNotification(`糖果碎不足，需要 ${priceCandy}`, 'error'); return; }
                    const newCandy = userStats.candy_crumbles - priceCandy;
                    await supabaseClient.from('user_stats').update({ candy_crumbles: newCandy }).eq('user_id', currentUser.id);
                    await supabaseClient.from('user_auto_sign_card').upsert({ user_id: currentUser.id, owned: true });
                    userStats.candy_crumbles = newCandy;
                    updateShopBalanceDisplay();
                    showNotification('购买自动签到卡成功！明天起每日自动签到', 'success');
                    loadAutoSignCardUI();
                    refreshLocalCache();
                });
            }
        }
        async function loadFramesList() {
            let container = document.getElementById('framesList');
            if(!container) return;
            let { owned, equipped } = await window.FrameSystem.loadUserFrames(currentUser.id);
            let frames = window.FrameSystem.FRAMES;
            let html = '';
            for(let frame of frames) {
                let isOwned = owned.includes(frame.id);
                let isEquipped = (equipped === frame.id);
                let priceHtml = frame.price_candy ? `🍬 ${frame.price_candy}` : '免费';
                let action = isOwned ? (isEquipped ? '<button class="btn-owned" disabled>已装备</button>' : `<button class="btn-equip" data-id="${frame.id}">装备</button>`) : `<button class="btn-buy" data-id="${frame.id}">购买 (${priceHtml})</button>`;
                html += `<div class="frame-item"><div><strong>${frame.name}</strong><div style="font-size:0.7rem;">${frame.description||''}</div></div>${action}</div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.btn-buy').forEach(btn => btn.addEventListener('click', async (e) => {
                let fid = btn.dataset.id;
                let frame = window.FrameSystem.FRAMES.find(f=>f.id===fid);
                if(userStats.candy_crumbles < frame.price_candy) { showNotification('糖果碎不足', 'error'); return; }
                let newCandy = userStats.candy_crumbles - frame.price_candy;
                await supabaseClient.from('user_stats').update({ candy_crumbles: newCandy }).eq('user_id', currentUser.id);
                await supabaseClient.from('user_frames').upsert({ user_id: currentUser.id, frame_id: fid, equipped: false });
                userStats.candy_crumbles = newCandy;
                updateShopBalanceDisplay();
                showNotification('购买成功', 'success');
                loadFramesList();
                refreshLocalCache();
            }));
            document.querySelectorAll('.btn-equip').forEach(btn => btn.addEventListener('click', async (e) => {
                let fid = btn.dataset.id;
                await window.FrameSystem.equipFrame(fid);
                showNotification('已装备', 'success');
                loadFramesList();
            }));
        }

        // 修改密码（修复）
        async function updatePassword() {
            if(!isViewingSelf) return;
            let cur = document.getElementById('currentPassword').value;
            let np = document.getElementById('newPassword').value;
            let cp = document.getElementById('confirmPassword').value;
            if(!cur || !np || !cp) { showNotification('请填写完整', 'error'); return; }
            if(np.length < 6) { showNotification('新密码至少6位', 'error'); return; }
            if(np !== cp) { showNotification('两次密码不一致', 'error'); return; }
            // 验证当前密码
            const { error: signErr } = await supabaseClient.auth.signInWithPassword({ email: currentUser.email, password: cur });
            if(signErr) { showNotification('当前密码错误', 'error'); return; }
            const { error } = await supabaseClient.auth.updateUser({ password: np });
            if(error) { showNotification('修改失败: '+error.message, 'error'); return; }
            showNotification('密码已更新，请重新登录', 'success');
            setTimeout(() => { supabaseClient.auth.signOut(); localStorage.clear(); window.location.href = 'login-real.html'; }, 1500);
            closeModal('passwordModal');
        }

        // 其他操作（用户名/简介/注销等保持原有）
        async function updateUsername() {
            if(!isViewingSelf) return;
            let newName = document.getElementById('newUsername').value.trim();
            if(!newName || newName.length<2 || newName.length>20) return showNotification('用户名2-20字符','error');
            await supabaseClient.from('user_profiles').update({ username: newName }).eq('id', currentUser.id);
            await supabaseClient.auth.updateUser({ data: { username: newName } });
            userProfile.username = newName;
            let roleInfo = getRoleDisplay(userProfile.role);
            document.getElementById('displayUsername').innerHTML = `${newName} <span style="font-size:0.8rem;color:${roleInfo.color};">(${roleInfo.name})</span>`;
            cacheUserProfile(newName, userProfile.avatar_url);
            refreshLocalCache();
            updateNavbar();
            closeModal('usernameModal');
            showNotification('用户名已更新','success');
        }
        async function updateBio() {
            if(!isViewingSelf) return;
            let newBio = document.getElementById('newBio').value.trim() || '';
            await supabaseClient.from('user_profiles').update({ bio: newBio }).eq('id', currentUser.id);
            userProfile.bio = newBio;
            safeSetText('userBio', newBio);
            closeModal('bioModal');
            showNotification('简介已更新','success');
        }
        async function deleteAccount() {
            if(!isViewingSelf) return;
            let confirmEmail = document.getElementById('confirmEmail').value;
            if(confirmEmail !== currentUser.email) return showNotification('邮箱不匹配','error');
            showNotification('账号删除需联系管理员','warning');
            closeModal('deleteAccountModal');
        }
        async function performLogout() {
            closeModal('logoutConfirmModal');
            await supabaseClient.auth.signOut();
            localStorage.clear();
            window.location.href = 'index.html';
        }
        function cacheUserProfile(username, avatarUrl) {
            if(!isViewingSelf) return;
            if(username) localStorage.setItem('cachedUsername', username);
            if(avatarUrl) localStorage.setItem('cachedAvatar', avatarUrl);
            localStorage.setItem('profileLastUpdated', Date.now());
            showSyncNotice();
        }
        function updateAvatarDisplay(imageUrl) {
            const avatarDiv = document.getElementById('userAvatar');
            if(!avatarDiv) return;
            if(imageUrl) {
                avatarDiv.innerHTML = `<img src="${imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">`;
                let placeholder = document.createElement('div');
                placeholder.className = 'avatar-placeholder';
                placeholder.style.display = 'none';
                placeholder.textContent = (userProfile?.username || 'U').charAt(0).toUpperCase();
                avatarDiv.appendChild(placeholder);
            } else {
                let letter = (userProfile?.username || 'U').charAt(0).toUpperCase();
                avatarDiv.innerHTML = `<div class="avatar-placeholder">${letter}</div>`;
            }
        }
        function updateNavbar() {
            let navDiv = document.getElementById('userNavSection');
            if(!navDiv) return;
            if (!currentUser) { navDiv.innerHTML = '<a href="login-real.html">登录</a>'; return; }
            if (!isViewingSelf) {
                navDiv.innerHTML = `<div><span>🔍 查看对方主页中</span></div>`;
            } else {
                let username = userProfile?.username || currentUser?.email?.split('@')[0];
                let roleInfo = getRoleDisplay(userProfile?.role);
                let avatarUrl = userProfile?.avatar_url;
                let avatarHtml = avatarUrl ? `<img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;">` : `<div style="width:32px;height:32px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;">${username.charAt(0)}</div>`;
                navDiv.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">${avatarHtml}<span style="color:${roleInfo.color};">${username}</span><button id="logoutBtn" style="background:transparent;color:#f87171;border:1px solid rgba(248,113,113,0.3);padding:4px 12px;border-radius:20px;">退出</button></div>`;
                document.getElementById('logoutBtn')?.addEventListener('click', () => openModal('logoutConfirmModal'));
            }
            let adminLink = document.getElementById('adminLink');
            if(adminLink && currentUser && (userProfile?.role === 'owner' || userProfile?.role === 'admin')) adminLink.style.display = 'inline-block';
            else if(adminLink) adminLink.style.display = 'none';
        }

        // 头像上传等（保持原样）
        window.openAvatarUpload = function() { /* 略，保持原有逻辑 */ alert('请长按头像更换'); };
        // 数据加载
        async function loadTargetProfile(targetId) {
            let { data, error } = await supabaseClient.from('user_profiles').select('*').eq('id', targetId).single();
            if(error) throw error;
            return data;
        }
        async function loadTargetStats(targetId) {
            let { data, error } = await supabaseClient.from('user_stats').select('*').eq('user_id', targetId).single();
            if(error && error.code === 'PGRST116') return { candy_crumbles:100, rainbow_lollipops:5, active_points:0, last_checkin_date:null, checkin_streak:0 };
            return { candy_crumbles: data?.candy_crumbles??100, rainbow_lollipops: data?.rainbow_lollipops??5, active_points: data?.active_points??0, last_checkin_date: data?.last_checkin_date, checkin_streak: data?.checkin_streak??0 };
        }
        async function renderProfile() {
            const container = document.getElementById('profileContent');
            if (isViewingSelf) container.classList.remove('readonly-mode');
            else container.classList.add('readonly-mode');
            let roleInfo = getRoleDisplay(userProfile.role);
            document.getElementById('displayUsername').innerHTML = `${userProfile.username} <span style="font-size:0.8rem;color:${roleInfo.color};">(${roleInfo.name})</span>`;
            safeSetText('userEmail', isViewingSelf ? currentUser.email : (userProfile.email || '未公开'));
            safeSetText('userBio', userProfile.bio || '');
            safeSetText('createdAt', new Date(userProfile.created_at || currentUser?.created_at).toLocaleString());
            let days = Math.floor((new Date() - new Date(userProfile.created_at || currentUser?.created_at)) / 86400000);
            document.getElementById('userDaysText').innerText = `已来到 ${days} 天`;
            if(userProfile.avatar_url) updateAvatarDisplay(userProfile.avatar_url);
            else updateAvatarDisplay(null);
            document.getElementById('userRoleDisplay').innerHTML = `<span style="color:${roleInfo.color};">身份：${roleInfo.name}</span>`;
            if(userStats) {
                updateActivePointsDisplay();
                if(isViewingSelf) updateShopBalanceDisplay();
                document.getElementById('streakDays').innerText = userStats.checkin_streak;
                if(isViewingSelf) updateRewardPreview();
                let today = getLocalDateString();
                let btn = document.getElementById('checkinBtn');
                if(btn && isViewingSelf) {
                    let checked = (userStats.last_checkin_date === today);
                    btn.disabled = checked;
                    btn.innerHTML = checked ? '<i class="fas fa-check-circle"></i> 已签到' : '<i class="fas fa-calendar-check"></i> 签到';
                } else if(btn) btn.style.display = 'none';
            }
            if(isViewingSelf) {
                cacheUserProfile(userProfile.username, userProfile.avatar_url);
                refreshLocalCache();
            }
            updateNavbar();
            // 自动签到检测
            if(isViewingSelf && !autoSignAttempted) {
                autoSignAttempted = true;
                const today = getLocalDateString();
                hasAutoSignCard = await loadAutoSignCardStatus();
                if(hasAutoSignCard && userStats.last_checkin_date !== today) {
                    showNotification('🃏 自动签到卡生效，正在签到...', 'info');
                    await executeCheckin(true);
                }
            }
        }
        async function loadUserProfileWithCache() {
            const { data: { user }, error: userErr } = await supabaseClient.auth.getUser();
            if(userErr || !user) { window.location.href = 'login-real.html'; return; }
            currentUser = user;
            const urlParams = new URLSearchParams(window.location.search);
            let uid = urlParams.get('uid');
            if (uid && uid !== currentUser.id) {
                isViewingSelf = false;
                targetUserId = uid;
                userProfile = await loadTargetProfile(targetUserId);
                userStats = await loadTargetStats(targetUserId);
            } else {
                isViewingSelf = true;
                targetUserId = currentUser.id;
                let cachedProfile = localStorage.getItem('cachedUserProfile');
                let cachedStats = localStorage.getItem('cachedUserStats');
                let lastUpdated = localStorage.getItem('profileLastUpdated');
                if (cachedProfile && cachedStats && lastUpdated && (Date.now() - parseInt(lastUpdated) < 86400000)) {
                    userProfile = JSON.parse(cachedProfile);
                    userStats = JSON.parse(cachedStats);
                } else {
                    userProfile = await loadTargetProfile(currentUser.id);
                    userStats = await loadTargetStats(currentUser.id);
                }
            }
            await renderProfile();
            if (isViewingSelf && window.FrameSystem) await window.FrameSystem.initFrameForUser(currentUser.id);
            if(isViewingSelf) {
                await supabaseClient.from('user_stats').upsert({ user_id: currentUser.id, last_login: new Date().toISOString() }, { onConflict: 'user_id' });
                safeSetText('lastLogin', new Date().toLocaleString());
            } else safeSetText('lastLogin', '--');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
        }
        function bindEventListeners() {
            document.getElementById('saveUsername')?.addEventListener('click', updateUsername);
            document.getElementById('saveBio')?.addEventListener('click', updateBio);
            document.getElementById('savePassword')?.addEventListener('click', updatePassword);
            document.getElementById('confirmDeleteAccount')?.addEventListener('click', deleteAccount);
            document.getElementById('openShopBtn')?.addEventListener('click', async () => { await renderShop(); openModal('shopModal'); });
            document.getElementById('closeShopModalBtn')?.addEventListener('click', () => closeModal('shopModal'));
            document.getElementById('closeLogoutModalBtn')?.addEventListener('click', () => closeModal('logoutConfirmModal'));
            document.getElementById('cancelLogoutBtn')?.addEventListener('click', () => closeModal('logoutConfirmModal'));
            document.getElementById('confirmLogoutBtn')?.addEventListener('click', performLogout);
            document.getElementById('checkinBtn')?.addEventListener('click', performCheckin);
            document.querySelectorAll('.close-modal-btn').forEach(btn => btn.addEventListener('click', (e) => { let mid = btn.getAttribute('data-modal'); if(mid) closeModal(mid); }));
            document.querySelectorAll('.modal-overlay').forEach(overlay => overlay.addEventListener('click', function(e) { if(e.target === this) closeModal(this.id); }));
            window.addEventListener('scroll', () => { let btn = document.querySelector('.back-to-top'); if(btn) btn.style.display = window.scrollY>300?'flex':'none'; });
        }
        async function initializeProfile() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.supabaseClient = supabaseClient;
            try {
                await loadUserProfileWithCache();
                bindEventListeners();
            } catch(err) { showNotification('初始化失败', 'error'); }
        }
        document.addEventListener('DOMContentLoaded', () => setTimeout(initializeProfile, 100));
    </script>
</body>
</html>
