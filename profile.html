    <script>
        // ========== 配置 ==========
        const ROLE_CONFIG = {
            owner: { name: '站长', color: '#f97316' },
            admin: { name: '管理员', color: '#60a5fa' },
            user:  { name: '普通用户', color: '#9ca3af' }
        };
        function getRoleDisplay(role) { return ROLE_CONFIG[role] || ROLE_CONFIG.user; }

        let supabaseClient = null, currentUser = null, userProfile = null;
        let userStats = { candy_crumbles: 0, rainbow_lollipops: 0, active_points: 0, last_checkin_date: null, checkin_streak: 0 };
        let cropper = null, isUploading = false;
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';

        // ========== 本地缓存同步 ==========
        function refreshLocalCache() {
            if (userProfile) localStorage.setItem('cachedUserProfile', JSON.stringify(userProfile));
            if (userStats) localStorage.setItem('cachedUserStats', JSON.stringify(userStats));
            localStorage.setItem('profileLastUpdated', Date.now());
        }

        function getLocalDateString(date = new Date()) {
            return date.toLocaleDateString('sv-SE');
        }

        // ========== 头像框系统（使用类名） ==========
        window.FrameSystem = (function() {
            const FRAMES = [
                { id: 'frame_default', name: '默认头像框', description: '初始边框', price_candy: 0, price_rainbow: 0, cssClass: '' },
                { id: 'frame_gold', name: '黄金边框', description: '闪耀质感', price_candy: 50, price_rainbow: 0, cssClass: 'frame-gold' },
                { id: 'frame_rainbow', name: '彩虹炫光', description: '七彩流光', price_candy: 30, price_rainbow: 3, cssClass: 'frame-rainbow' },
                { id: 'frame_diamond', name: '钻石星辰', description: '璀璨光环', price_candy: 100, price_rainbow: 5, cssClass: 'frame-diamond' },
                { id: 'frame_legend', name: '传奇霸主', description: '至尊传说', price_candy: 200, price_rainbow: 10, cssClass: 'frame-legend' }
            ];
            function getFrameById(id) { return FRAMES.find(f => f.id === id); }
            async function loadUserFrames(userId) {
                const { data, error } = await supabaseClient.from('user_frames').select('frame_id, equipped').eq('user_id', userId);
                if (error) return { owned: ['frame_default'], equipped: null };
                let owned = data.map(item => item.frame_id);
                if (!owned.includes('frame_default')) owned.push('frame_default');
                let equipped = data.find(item => item.equipped === true)?.frame_id || 'frame_default';
                return { owned, equipped };
            }
            async function ensureUserFrameFields(userId) {
                await supabaseClient.from('user_frames').upsert({ user_id: userId, frame_id: 'frame_default', equipped: true, purchased_at: new Date().toISOString() }, { onConflict: 'user_id, frame_id', ignoreDuplicates: true });
                let { data: equipData } = await supabaseClient.from('user_frames').select('equipped').eq('user_id', userId).eq('equipped', true).maybeSingle();
                if (!equipData) await supabaseClient.from('user_frames').update({ equipped: true }).eq('user_id', userId).eq('frame_id', 'frame_default');
            }
            async function purchaseFrame(frameId, stats, onSuccess) {
                let frame = getFrameById(frameId);
                if (!frame || (frame.price_candy===0 && frame.price_rainbow===0)) throw new Error('无效头像框');
                let { owned } = await loadUserFrames(currentUser.id);
                if (owned.includes(frameId)) throw new Error('已拥有');
                if (stats.candy_crumbles < frame.price_candy) throw new Error(`糖果碎不足，需 ${frame.price_candy}`);
                if (stats.rainbow_lollipops < frame.price_rainbow) throw new Error(`棒糖不足，需 ${frame.price_rainbow}`);
                let newCandy = stats.candy_crumbles - frame.price_candy;
                let newRainbow = stats.rainbow_lollipops - frame.price_rainbow;
                await supabaseClient.from('user_stats').update({ candy_crumbles: newCandy, rainbow_lollipops: newRainbow }).eq('user_id', currentUser.id);
                await supabaseClient.from('user_frames').upsert({ user_id: currentUser.id, frame_id: frameId, equipped: false, purchased_at: new Date().toISOString() }, { onConflict: 'user_id, frame_id', ignoreDuplicates: true });
                if (window.userStats) { window.userStats.candy_crumbles = newCandy; window.userStats.rainbow_lollipops = newRainbow; }
                refreshLocalCache();
                if (onSuccess) onSuccess(newCandy, newRainbow);
                if (window.updateShopBalanceDisplay) window.updateShopBalanceDisplay();
            }
            async function equipFrame(frameId) {
                let { owned } = await loadUserFrames(currentUser.id);
                if (!owned.includes(frameId)) throw new Error('未拥有');
                await supabaseClient.from('user_frames').update({ equipped: false }).eq('user_id', currentUser.id).eq('equipped', true);
                await supabaseClient.from('user_frames').update({ equipped: true }).eq('user_id', currentUser.id).eq('frame_id', frameId);
                await applyFrameClassByFrameId(frameId);
            }
            async function applyFrameClassByFrameId(frameId) {
                const avatarDiv = document.getElementById('userAvatar');
                if (!avatarDiv) return;
                const classes = avatarDiv.className.split(' ');
                const newClasses = classes.filter(c => !c.startsWith('frame-'));
                if (frameId && frameId !== 'frame_default') {
                    const frame = getFrameById(frameId);
                    if (frame && frame.cssClass) {
                        newClasses.push(frame.cssClass);
                    }
                }
                avatarDiv.className = newClasses.join(' ').trim();
                if (!avatarDiv.classList.contains('avatar')) avatarDiv.classList.add('avatar');
            }
            async function initFrameForUser(userId) {
                await ensureUserFrameFields(userId);
                let { equipped } = await loadUserFrames(userId);
                await applyFrameClassByFrameId(equipped);
            }
            return { FRAMES, getFrameById, loadUserFrames, purchaseFrame, equipFrame, initFrameForUser, applyFrameClassByFrameId };
        })();

        // ========== 通用辅助 ==========
        function safeSetText(id, text) { let e = document.getElementById(id); if(e) e.textContent = text || '--'; }
        let notificationTimeout = null;
        // 修复后的通知函数（使用类名控制，右上角滑入滑出）
        function showNotification(msg, type = 'info') {
            let n = document.getElementById('notification');
            if (!n) {
                n = document.createElement('div');
                n.id = 'notification';
                document.body.appendChild(n);
            }
            n.textContent = msg;
            n.style.background = type === 'error' ? '#f87171' : (type === 'success' ? '#10b981' : '#3b82f6');
            n.style.color = '#fff';
            n.classList.remove('show');
            void n.offsetWidth;
            n.classList.add('show');
            if (notificationTimeout) clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => {
                if (n) n.classList.remove('show');
            }, 3000);
        }
        function showSyncNotice() { let sn = document.getElementById('syncNotice'); if(sn){ sn.classList.add('show'); setTimeout(()=>sn.classList.remove('show'),2000); } }
        function cacheUserProfile(username, avatarUrl) { 
            if(username) localStorage.setItem('cachedUsername', username);
            if(avatarUrl) localStorage.setItem('cachedAvatar', avatarUrl);
            localStorage.setItem('profileLastUpdated', Date.now());
            localStorage.setItem('forceRefreshUserState', Date.now().toString());
            showSyncNotice();
        }

        function updateAvatarDisplay(imageUrl) {
            const avatarDiv = document.getElementById('userAvatar');
            if(!avatarDiv) return;
            const currentFrameClass = Array.from(avatarDiv.classList).find(c => c.startsWith('frame-')) || '';
            if(imageUrl) {
                avatarDiv.innerHTML = `<img src="${imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">`;
                let placeholder = document.createElement('div');
                placeholder.className = 'avatar-placeholder';
                placeholder.style.display = 'none';
                placeholder.textContent = (userProfile?.username || currentUser?.email?.charAt(0) || 'U').charAt(0).toUpperCase();
                avatarDiv.appendChild(placeholder);
            } else {
                let letter = (userProfile?.username || currentUser?.email?.charAt(0) || 'U').charAt(0).toUpperCase();
                avatarDiv.innerHTML = `<div class="avatar-placeholder">${letter}</div>`;
            }
            avatarDiv.classList.add('avatar');
            if (currentFrameClass) {
                avatarDiv.classList.add(currentFrameClass);
            } else {
                if (window.FrameSystem && currentUser) {
                    window.FrameSystem.loadUserFrames(currentUser.id).then(({ equipped }) => {
                        window.FrameSystem.applyFrameClassByFrameId(equipped);
                    });
                }
            }
        }

        function updateNavbar() {
            let navDiv = document.getElementById('userNavSection');
            if(!navDiv) return;
            let username = userProfile?.username || currentUser?.email?.split('@')[0] || '用户';
            let roleInfo = getRoleDisplay(userProfile?.role);
            let avatarUrl = userProfile?.avatar_url || localStorage.getItem('userAvatar');
            let avatarHtml = avatarUrl ? `<img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;">` : `<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3ecf8e,#8a4baf);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;">${username.charAt(0).toUpperCase()}</div>`;
            navDiv.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">${avatarHtml}<span style="color:${roleInfo.color};">${username} (${roleInfo.name})</span><button id="logoutBtn" style="background:transparent;color:#f87171;border:1px solid rgba(248,113,113,0.3);padding:4px 12px;border-radius:20px;cursor:pointer;"><i class="fas fa-sign-out-alt"></i> 退出</button></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', () => openModal('logoutConfirmModal'));
            let adminLink = document.getElementById('adminLink');
            if(adminLink) adminLink.style.display = (userProfile?.role === 'owner' || userProfile?.role === 'admin') ? 'inline-block' : 'none';
        }
        function openModal(id) { let m = document.getElementById(id); if(m) m.classList.add('show'); document.body.style.overflow = 'hidden'; }
        function closeModal(id) { let m = document.getElementById(id); if(m) m.classList.remove('show'); document.body.style.overflow = ''; }
        window.openUsernameModal = () => { document.getElementById('newUsername').value = userProfile?.username || ''; openModal('usernameModal'); };
        window.openBioModal = () => { document.getElementById('newBio').value = userProfile?.bio || ''; openModal('bioModal'); };
        window.openPasswordModal = () => openModal('passwordModal');
        window.openDeleteAccountModal = () => { document.getElementById('confirmEmail').value = currentUser?.email || ''; openModal('deleteAccountModal'); };

        // ========== 长按更换头像（使用自定义模态框） ==========
        let longPressTimer = null;
        function onAvatarLongPressStart(e) {
            e.preventDefault();
            longPressTimer = setTimeout(() => {
                // 显示自定义确认框
                openModal('avatarConfirmModal');
                longPressTimer = null;
            }, 500);
        }
        function onAvatarLongPressEnd(e) {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }
        function attachLongPressToAvatar() {
            const avatarContainer = document.getElementById('avatarContainer');
            if (!avatarContainer) return;
            avatarContainer.addEventListener('touchstart', onAvatarLongPressStart, { passive: false });
            avatarContainer.addEventListener('touchend', onAvatarLongPressEnd);
            avatarContainer.addEventListener('touchcancel', onAvatarLongPressEnd);
            avatarContainer.addEventListener('mousedown', onAvatarLongPressStart);
            avatarContainer.addEventListener('mouseup', onAvatarLongPressEnd);
            avatarContainer.addEventListener('mouseleave', onAvatarLongPressEnd);
        }

        // 修复：打开文件选择器，确保 input 不可见且不会残留
        window.openAvatarUpload = function() {
            // 先移除可能残留的旧 input
            const oldInput = document.getElementById('tempFileInput');
            if (oldInput) oldInput.remove();
            const input = document.createElement('input');
            input.id = 'tempFileInput';
            input.type = 'file';
            input.accept = 'image/jpeg,image/png';
            input.style.position = 'fixed';
            input.style.top = '-100px';
            input.style.left = '-100px';
            input.style.opacity = '0';
            input.style.pointerEvents = 'none';
            document.body.appendChild(input);
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 5 * 1024 * 1024) {
                    initCropperModal(file);
                } else if (file) {
                    showNotification('文件过大（最大5MB）', 'error');
                }
                // 移除 input 元素
                input.remove();
            };
            // 触发点击
            input.click();
        };

        // 确认更换头像
        function confirmChangeAvatar() {
            closeModal('avatarConfirmModal');
            openAvatarUpload();
        }
        function cancelChangeAvatar() {
            closeModal('avatarConfirmModal');
        }

        // ========== 用户操作 ==========
        async function updateUsername() {
            let newName = document.getElementById('newUsername').value.trim();
            if(!newName || newName.length<2 || newName.length>20) return showNotification('用户名2-20字符','error');
            await supabaseClient.from('user_profiles').update({ username: newName }).eq('id', currentUser.id);
            await supabaseClient.auth.updateUser({ data: { username: newName } });
            userProfile.username = newName;
            let roleInfo = getRoleDisplay(userProfile.role);
            let usernameSpan = document.getElementById('displayUsername');
            if(usernameSpan) usernameSpan.innerHTML = `${newName} <span style="font-size:0.8rem;color:${roleInfo.color};">(${roleInfo.name})</span>`;
            cacheUserProfile(newName, userProfile.avatar_url);
            refreshLocalCache();
            updateNavbar();
            closeModal('usernameModal');
            showNotification('用户名已更新','success');
            showSyncNotice();
        }
        async function updateBio() {
            let newBio = document.getElementById('newBio').value.trim() || '';
            await supabaseClient.from('user_profiles').update({ bio: newBio }).eq('id', currentUser.id);
            userProfile.bio = newBio;
            safeSetText('userBio', newBio);
            refreshLocalCache();
            closeModal('bioModal');
            showNotification('简介已更新','success');
            showSyncNotice();
        }
        async function updatePassword() {
            let cur = document.getElementById('currentPassword').value;
            let np = document.getElementById('newPassword').value;
            let cp = document.getElementById('confirmPassword').value;
            if(!cur || !np || !cp) return showNotification('请填写完整','error');
            if(np.length<6) return showNotification('密码至少6位','error');
            if(np!==cp) return showNotification('两次密码不一致','error');
            let { error: signErr } = await supabaseClient.auth.signInWithPassword({ email: currentUser.email, password: cur });
            if(signErr) return showNotification('当前密码错误','error');
            let { error } = await supabaseClient.auth.updateUser({ password: np });
            if(error) showNotification('修改失败','error');
            else {
                showNotification('密码已更新，请重新登录','success');
                setTimeout(() => {
                    supabaseClient.auth.signOut();
                    localStorage.clear();
                    window.location.href = 'login-real.html';
                }, 1500);
            }
            closeModal('passwordModal');
        }
        async function deleteAccount() {
            let confirmEmail = document.getElementById('confirmEmail').value;
            if(confirmEmail !== currentUser.email) return showNotification('邮箱不匹配','error');
            showNotification('账号删除需联系管理员','warning');
            closeModal('deleteAccountModal');
        }
        async function performLogout() {
            closeModal('logoutConfirmModal');
            await supabaseClient.auth.signOut();
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // ========== 签到及统计 ==========
        function getCheckinRewards(streak) {
            if(streak === 1) return { candy:3, rainbow:0, active:2 };
            if(streak === 2) return { candy:5, rainbow:0, active:2 };
            if(streak === 3) return { candy:7, rainbow:0, active:2 };
            if(streak === 4) return { candy:9, rainbow:0, active:2 };
            if(streak === 5) return { candy:10, rainbow:0, active:2 };
            if(streak === 6) return { candy:12, rainbow:0, active:2 };
            if(streak === 7) return { candy:15, rainbow:1, active:5 };
            if(streak >=8 && streak <=14) return { candy:10+Math.floor((streak-8)*2), rainbow:2, active:8 };
            if(streak === 15) return { candy:30, rainbow:5, active:15 };
            if(streak >=16 && streak <=29) return { candy:50, rainbow:10, active:10 };
            if(streak === 30) return { candy:100, rainbow:20, active:50 };
            return { candy:80, rainbow:15, active:20 };
        }
        function updateRewardPreview() {
            let streak = userStats.checkin_streak || 0;
            let rewards = getCheckinRewards(streak+1);
            let preview = document.getElementById('rewardPreview');
            if(preview) preview.innerHTML = `明日奖励: 🍬${rewards.candy} ${rewards.rainbow>0?`🌈+${rewards.rainbow} `:''}⚡+${rewards.active}`;
        }
        function updateActivePointsDisplay() { let span = document.getElementById('activePointsValue'); if(span) span.innerText = userStats.active_points; }
        function updateShopBalanceDisplay() {
            let candySpan = document.getElementById('shopCandyBalance');
            let rainSpan = document.getElementById('shopRainbowBalance');
            if(candySpan) candySpan.innerText = userStats.candy_crumbles;
            if(rainSpan) rainSpan.innerText = userStats.rainbow_lollipops;
        }
        async function performCheckin() {
            let btn = document.getElementById('checkinBtn');
            if(btn.disabled) return showNotification('今日已签到','warning');
            let today = getLocalDateString();
            let last = userStats.last_checkin_date;
            let newStreak = 1;
            if(last) {
                let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
                let yesterdayStr = getLocalDateString(yesterday);
                if(last === yesterdayStr) newStreak = (userStats.checkin_streak||0)+1;
                else if(last !== today) newStreak = 1;
                else return;
            }
            let rewards = getCheckinRewards(newStreak);
            let newCandy = userStats.candy_crumbles + rewards.candy;
            let newRainbow = userStats.rainbow_lollipops + rewards.rainbow;
            let newActive = userStats.active_points + rewards.active;
            let { error } = await supabaseClient.from('user_stats').update({
                candy_crumbles: newCandy, rainbow_lollipops: newRainbow, active_points: newActive,
                last_checkin_date: today, checkin_streak: newStreak
            }).eq('user_id', currentUser.id);
            if(error) return showNotification('签到失败','error');
            userStats = {...userStats, candy_crumbles:newCandy, rainbow_lollipops:newRainbow, active_points:newActive, last_checkin_date:today, checkin_streak:newStreak};
            refreshLocalCache();
            updateActivePointsDisplay();
            updateShopBalanceDisplay();
            document.getElementById('streakDays').innerText = newStreak;
            updateRewardPreview();
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> 已签到';
            showNotification(`签到 +${rewards.candy}🍬 ${rewards.rainbow>0?`+${rewards.rainbow}🌈 `:''}+${rewards.active}⚡`,'success');
        }

        // ========== 商店渲染 ==========
        async function renderShop() {
            let container = document.getElementById('shopContentContainer');
            if(!container) return;
            container.innerHTML = `<div class="shop-panel">
                <div class="balance-row">
                    <div class="balance-item" data-currency="candy"><img src="https://xiaochen1235789.github.io/images/Crushed_sugar.webp" style="width:20px;height:20px;object-fit:contain;">糖果碎: <span id="shopCandyBalance">0</span></div>
                    <div class="balance-item" data-currency="rainbow"><img src="https://xiaochen1235789.github.io/images/Super_Sweet.webp" style="width:20px;height:20px;object-fit:contain;">棒糖: <span id="shopRainbowBalance">0</span></div>
                </div>
                <div class="shop-section"><h3>头像框</h3><div id="framesList">⏳ 加载中...</div></div>
            </div>`;
            document.querySelectorAll('.balance-item').forEach(el => el.addEventListener('click', () => showNotification('点击货币查看介绍','info')));
            await loadFramesList();
            updateShopBalanceDisplay();
        }
        async function loadFramesList() {
            let container = document.getElementById('framesList');
            if(!container) return;
            let userId = currentUser.id;
            let { owned, equipped } = await window.FrameSystem.loadUserFrames(userId);
            let frames = window.FrameSystem.FRAMES;
            let html = '';
            for(let frame of frames) {
                let isOwned = owned.includes(frame.id);
                let isEquipped = (equipped === frame.id);
                let priceHtml = (frame.price_candy>0 || frame.price_rainbow>0) ? `<span><img src="https://xiaochen1235789.github.io/images/Crushed_sugar.webp" width="14" height="14" style="object-fit:contain;"> ${frame.price_candy} ${frame.price_rainbow>0?`<img src="https://xiaochen1235789.github.io/images/Super_Sweet.webp" width="14" height="14" style="object-fit:contain;"> ${frame.price_rainbow}`:''}</span>` : '免费';
                let action = '';
                if(isOwned) {
                    action = isEquipped ? '<button class="btn-owned" disabled>已装备</button>' : `<button class="btn-equip" data-id="${frame.id}">装备</button>`;
                } else {
                    action = `<button class="btn-buy" data-id="${frame.id}">购买</button>`;
                }
                html += `<div class="frame-item"><div class="frame-info"><div class="frame-name">${frame.name}</div><div class="frame-desc">${frame.description}</div><div class="frame-price">${priceHtml}</div></div>${action}</div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.btn-buy').forEach(btn => btn.addEventListener('click', async (e) => {
                let fid = btn.dataset.id;
                try {
                    await window.FrameSystem.purchaseFrame(fid, userStats, (c, r) => { userStats.candy_crumbles = c; userStats.rainbow_lollipops = r; updateShopBalanceDisplay(); showNotification('购买成功','success'); loadFramesList(); refreshLocalCache(); });
                } catch(err) { showNotification(err.message,'error'); }
            }));
            // 恢复装备成功通知
            document.querySelectorAll('.btn-equip').forEach(btn => btn.addEventListener('click', async (e) => {
                let fid = btn.dataset.id;
                try {
                    await window.FrameSystem.equipFrame(fid);
                    showNotification('装备成功', 'success');
                    loadFramesList();
                } catch(err) { showNotification(err.message,'error'); }
            }));
        }

        // ========== 头像上传裁剪 ==========
        async function deleteOldAvatarFiles(userId) {
            try {
                const { data: files, error: listErr } = await supabaseClient.storage.from('avatars').list(userId);
                if (listErr && listErr.statusCode === 404) return;
                if(files && files.length) {
                    let paths = files.map(f => `${userId}/${f.name}`);
                    await supabaseClient.storage.from('avatars').remove(paths);
                }
            } catch(e) { console.warn('删除旧头像文件失败:', e); }
        }
        async function uploadCroppedImage(blob) {
            if(!currentUser || isUploading) return false;
            isUploading = true;
            try {
                await deleteOldAvatarFiles(currentUser.id);
                let filePath = `${currentUser.id}/avatar_${Date.now()}.png`;
                let { error: uploadErr } = await supabaseClient.storage.from('avatars').upload(filePath, blob, { contentType: 'image/png' });
                if(uploadErr) throw uploadErr;
                let { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
                await supabaseClient.from('user_profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
                if(userProfile) userProfile.avatar_url = publicUrl;
                localStorage.setItem('userAvatar', publicUrl);
                updateAvatarDisplay(publicUrl);
                cacheUserProfile(userProfile?.username, publicUrl);
                refreshLocalCache();
                updateNavbar();
                showNotification('头像已更新','success');
                return true;
            } catch(err) { showNotification('上传失败: '+err.message,'error'); return false; }
            finally { isUploading = false; }
        }
        function initCropperModal(file) {
            let img = document.getElementById('cropImage');
            let reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
                if(cropper) cropper.destroy();
                img.onload = () => { cropper = new Cropper(img, { aspectRatio:1, viewMode:1, autoCropArea:0.8 }); openModal('cropModal'); };
            };
            reader.readAsDataURL(file);
        }
        async function confirmCropAndUpload() {
            if(!cropper) return;
            let canvas = cropper.getCroppedCanvas({ width:500, height:500 });
            canvas.toBlob(async (blob)=> {
                if(blob) await uploadCroppedImage(blob);
                closeModal('cropModal');
                if(cropper){ cropper.destroy(); cropper=null; }
                document.getElementById('cropImage').removeAttribute('src');
            },'image/png');
        }
        function cancelCrop() { 
            if(cropper){ cropper.destroy(); cropper=null; } 
            closeModal('cropModal');
            document.getElementById('cropImage').removeAttribute('src');
        }

        // ========== 资料加载（含缓存） ==========
        async function loadUserProfile() {
            let { data: profile, error } = await supabaseClient.from('user_profiles').select('*').eq('id', currentUser.id).single();
            if(error && error.code === 'PGRST116') {
                await supabaseClient.from('user_profiles').insert({ id: currentUser.id, username: currentUser.email.split('@')[0], bio: '', role: 'user' });
                return loadUserProfile();
            }
            userProfile = profile;
            let username = userProfile.username || currentUser.email.split('@')[0];
            let roleInfo = getRoleDisplay(userProfile.role);
            let usernameSpan = document.getElementById('displayUsername');
            if(usernameSpan) usernameSpan.innerHTML = `${username} <span style="font-size:0.8rem;color:${roleInfo.color};">(${roleInfo.name})</span>`;
            safeSetText('userEmail', currentUser.email);
            safeSetText('userBio', userProfile.bio || '');
            safeSetText('createdAt', new Date(currentUser.created_at).toLocaleString());
            let days = Math.floor((new Date() - new Date(currentUser.created_at)) / 86400000);
            document.getElementById('userDaysText').innerText = `已来到 ${days} 天`;
            if(userProfile.avatar_url) updateAvatarDisplay(userProfile.avatar_url);
            else updateAvatarDisplay(null);
            let roleRow = document.getElementById('userRoleDisplay');
            if(roleRow) roleRow.innerHTML = `<span style="color:${roleInfo.color};">身份：${roleInfo.name}</span>`;
            cacheUserProfile(username, userProfile.avatar_url);
            refreshLocalCache();
        }
        async function loadUserStats() {
            let { data, error } = await supabaseClient.from('user_stats').select('*').eq('user_id', currentUser.id).single();
            if(error && error.code === 'PGRST116') {
                await supabaseClient.from('user_stats').upsert({ user_id: currentUser.id, candy_crumbles:100, rainbow_lollipops:5, active_points:0, last_checkin_date:null, checkin_streak:0 });
                return loadUserStats();
            }
            userStats = { candy_crumbles: data.candy_crumbles??100, rainbow_lollipops: data.rainbow_lollipops??5, active_points: data.active_points??0, last_checkin_date: data.last_checkin_date, checkin_streak: data.checkin_streak??0 };
            updateActivePointsDisplay();
            updateShopBalanceDisplay();
            document.getElementById('streakDays').innerText = userStats.checkin_streak;
            updateRewardPreview();
            let today = getLocalDateString();
            let btn = document.getElementById('checkinBtn');
            if(btn) {
                let checked = (userStats.last_checkin_date === today);
                btn.disabled = checked;
                btn.innerHTML = checked ? '<i class="fas fa-check-circle"></i> 已签到' : '<i class="fas fa-calendar-check"></i> 签到';
            }
            refreshLocalCache();
        }
        async function updateLastLogin() {
            await supabaseClient.from('user_stats').upsert({ user_id: currentUser.id, last_login: new Date().toISOString() }, { onConflict: 'user_id' });
            safeSetText('lastLogin', new Date().toLocaleString());
        }
        function hasTodayCachedLogin(userId) {
            let today = getLocalDateString();
            return localStorage.getItem('lastLoginDate') === today && localStorage.getItem('lastLoginUserId') === userId;
        }
        function setTodayCachedLogin(userId) {
            let today = getLocalDateString();
            localStorage.setItem('lastLoginDate', today);
            localStorage.setItem('lastLoginUserId', userId);
        }
        async function loadUserProfileWithCache() {
            let { data: { user }, error } = await supabaseClient.auth.getUser();
            if(error || !user) throw new Error('未登录');
            currentUser = user;
            window.currentUser = currentUser;
            if(hasTodayCachedLogin(currentUser.id)) {
                let cachedProfile = localStorage.getItem('cachedUserProfile');
                let cachedStats = localStorage.getItem('cachedUserStats');
                if(cachedProfile && cachedStats) {
                    userProfile = JSON.parse(cachedProfile);
                    userStats = JSON.parse(cachedStats);
                    let username = userProfile.username || currentUser.email.split('@')[0];
                    let roleInfo = getRoleDisplay(userProfile.role);
                    document.getElementById('displayUsername').innerHTML = `${username} <span style="font-size:0.8rem;color:${roleInfo.color};">(${roleInfo.name})</span>`;
                    safeSetText('userEmail', currentUser.email);
                    safeSetText('userBio', userProfile.bio || '');
                    safeSetText('createdAt', new Date(currentUser.created_at).toLocaleString());
                    let days = Math.floor((new Date() - new Date(currentUser.created_at)) / 86400000);
                    document.getElementById('userDaysText').innerText = `已来到 ${days} 天`;
                    if(userProfile.avatar_url) updateAvatarDisplay(userProfile.avatar_url);
                    else updateAvatarDisplay(null);
                    if(document.getElementById('userRoleDisplay')) document.getElementById('userRoleDisplay').innerHTML = `<span style="color:${roleInfo.color};">身份：${roleInfo.name}</span>`;
                    updateActivePointsDisplay();
                    updateShopBalanceDisplay();
                    document.getElementById('streakDays').innerText = userStats.checkin_streak;
                    updateRewardPreview();
                    let today = getLocalDateString();
                    let btn = document.getElementById('checkinBtn');
                    if(btn) { btn.disabled = (userStats.last_checkin_date === today); btn.innerHTML = btn.disabled ? '<i class="fas fa-check-circle"></i> 已签到' : '<i class="fas fa-calendar-check"></i> 签到'; }
                    updateNavbar();
                    if(window.FrameSystem) await window.FrameSystem.initFrameForUser(currentUser.id);
                    updateLastLogin();
                    return true;
                }
            }
            await loadUserProfile();
            await loadUserStats();
            await updateLastLogin();
            if(window.FrameSystem) await window.FrameSystem.initFrameForUser(currentUser.id);
            setTodayCachedLogin(currentUser.id);
            return false;
        }

        // ========== 初始化与事件绑定 ==========
        function bindEventListeners() {
            document.getElementById('saveUsername')?.addEventListener('click', updateUsername);
            document.getElementById('saveBio')?.addEventListener('click', updateBio);
            document.getElementById('savePassword')?.addEventListener('click', updatePassword);
            document.getElementById('confirmDeleteAccount')?.addEventListener('click', deleteAccount);
            document.getElementById('confirmCropBtn')?.addEventListener('click', confirmCropAndUpload);
            document.getElementById('cancelCropBtn')?.addEventListener('click', cancelCrop);
            document.getElementById('closeCropModalBtn')?.addEventListener('click', cancelCrop);
            document.getElementById('openShopBtn')?.addEventListener('click', async () => { await renderShop(); openModal('shopModal'); });
            document.getElementById('closeShopModalBtn')?.addEventListener('click', () => closeModal('shopModal'));
            document.getElementById('closeLogoutModalBtn')?.addEventListener('click', () => closeModal('logoutConfirmModal'));
            document.getElementById('cancelLogoutBtn')?.addEventListener('click', () => closeModal('logoutConfirmModal'));
            document.getElementById('confirmLogoutBtn')?.addEventListener('click', performLogout);
            // 头像确认模态框按钮
            document.getElementById('closeAvatarConfirmBtn')?.addEventListener('click', cancelChangeAvatar);
            document.getElementById('cancelAvatarBtn')?.addEventListener('click', cancelChangeAvatar);
            document.getElementById('confirmAvatarBtn')?.addEventListener('click', confirmChangeAvatar);
            document.querySelectorAll('.close-modal-btn').forEach(btn => btn.addEventListener('click', (e) => { let mid = btn.getAttribute('data-modal'); if(mid) closeModal(mid); }));
            document.querySelectorAll('.modal-overlay').forEach(overlay => overlay.addEventListener('click', function(e) { if(e.target === this) closeModal(this.id); }));
            document.getElementById('checkinBtn')?.addEventListener('click', performCheckin);
            window.addEventListener('scroll', () => { let btn = document.querySelector('.back-to-top'); if(btn) btn.style.display = window.scrollY>300?'flex':'none'; });
            attachLongPressToAvatar();
        }

        async function initializeProfile() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.supabaseClient = supabaseClient;
            try {
                await loadUserProfileWithCache();
                updateNavbar();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';
                bindEventListeners();
            } catch(err) {
                showNotification('请先登录','error');
                setTimeout(()=>window.location.href='login-real.html',1500);
            }
        }
        document.addEventListener('DOMContentLoaded', () => setTimeout(initializeProfile, 100));
    </script>
