<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>个人主页 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <link rel="stylesheet" href="/css/zhuye.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
    <style>
        /* 头像上移微调 */
        .profile-banner .banner-content {
            padding-top: 20px !important;
        }
        /* 身份徽章样式 */
        .role-badge-box {
            display: inline-block;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 8px;
            vertical-align: middle;
        }
        /* 管理后台按钮样式 */
        .admin-link {
            background: rgba(59,130,246,0.2);
            color: #60a5fa;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.85rem;
            transition: 0.2s;
            margin-left: 12px;
            text-decoration: none;
        }
        .admin-link:hover {
            background: rgba(59,130,246,0.4);
            color: #93c5fd;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-title">六哥荣耀WIKI</div>
        <a href="./index.html" class="nav-link">首页</a>
        <a href="./friend.html" class="nav-link">好友</a>
        <div class="user-nav-section" id="userNavSection"></div>
    </nav>
    <div class="sync-notice" id="syncNotice"><i class="fas fa-sync-alt"></i><span>已同步到主页</span></div>
    <div class="profile-container">
        <div class="loading" id="loading"><div class="loading-spinner"></div><p>加载个人资料中...</p></div>
        <div id="profileContent" style="display: none;">
            <div class="profile-banner">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <div class="avatar-section">
                        <div class="avatar-container">
                            <div class="avatar" id="userAvatar"><div class="avatar-placeholder" id="avatarPlaceholder">U</div></div>
                            <div class="avatar-upload" onclick="openAvatarUpload()" title="上传头像（支持裁剪）"><i class="fas fa-camera"></i></div>
                        </div>
                    </div>
                    <div class="user-info">
                        <div class="username">
                            <span id="displayUsername">加载中...</span>
                            <span id="roleBadge" class="role-badge-box" style="display: none;"></span>
                            <button class="username-edit" onclick="openUsernameModal()"><i class="fas fa-edit"></i></button>
                            <div class="register-days" id="registerDaysWrapper">
                                <i class="fas fa-calendar-alt"></i>
                                <span id="userDaysText">已来到六哥荣耀 0 天</span>
                            </div>
                            <div class="active-points" id="activePointsDisplay">
                                <i class="fas fa-bolt"></i> 活跃度: <span id="activePointsValue">0</span>
                            </div>
                            <button class="shop-button" id="openShopBtn"><i class="fas fa-store"></i> 商店</button>
                        </div>
                        <div class="user-email" id="userEmail">加载中...</div>
                        <div class="user-bio"><span id="userBio">这个人很懒，什么都没有写...</span><button class="edit-bio" onclick="openBioModal()">编辑</button></div>
                    </div>
                </div>
            </div>
            <!-- 签到卡片 -->
            <div class="checkin-card">
                <div class="checkin-info">
                    <div class="streak-box">
                        <div class="streak-number" id="streakDays">0</div>
                        <div class="streak-label">连续签到</div>
                    </div>
                    <div class="reward-preview" id="rewardPreview">明日签到奖励: --</div>
                </div>
                <button class="checkin-btn" id="checkinBtn">
                    <i class="fas fa-calendar-check"></i> 签到
                </button>
            </div>
            <!-- 账号设置区域 -->
            <div class="section-header"><div class="section-title"><i class="fas fa-cog"></i><span>账号设置</span></div></div>
            <div class="settings-section">
                <div class="settings-item"><div><div class="settings-label">修改密码</div><div class="settings-desc">定期修改密码可以提高账号安全性</div></div><button class="btn" onclick="openPasswordModal()"><i class="fas fa-key"></i>修改密码</button></div>
                <div class="settings-item"><div><div class="settings-label">账号创建时间</div><div class="settings-desc" id="createdAt">加载中...</div></div></div>
                <div class="settings-item"><div><div class="settings-label">最后登录时间</div><div class="settings-desc" id="lastLogin">加载中...</div></div></div>
                <div class="danger-zone"><div class="danger-title"><i class="fas fa-exclamation-triangle"></i>危险操作</div><button class="danger-btn" onclick="openDeleteAccountModal()"><i class="fas fa-trash"></i>注销账号</button><div style="font-size: 0.85rem; color: #fca5a5; margin-top: 15px;"><i class="fas fa-exclamation-circle"></i>注意：此操作不可逆，将永久删除您的账号和所有数据</div></div>
            </div>
        </div>
    </div>

    <!-- 裁剪头像模态框 -->
    <div class="modal-overlay" id="cropModal">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header"><div class="modal-title"><i class="fas fa-crop-alt"></i> 裁剪头像</div><button class="modal-close" id="closeCropModalBtn">&times;</button></div>
            <div class="form-group"><div style="background: #1a1f2e; border-radius: 8px; overflow: hidden;"><img id="cropImage" style="max-width: 100%; display: block;" alt="裁剪预览"></div></div>
            <div class="crop-buttons"><button class="btn btn-cancel" id="cancelCropBtn">取消</button><button class="btn btn-primary" id="confirmCropBtn"><i class="fas fa-check"></i> 确认裁剪并上传</button></div>
        </div>
    </div>

    <!-- 商店模态框 -->
    <div class="modal-overlay" id="shopModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <div class="modal-title"><i class="fas fa-store"></i> 商店</div>
                <button class="modal-close" id="closeShopModalBtn">&times;</button>
            </div>
            <div id="shopContentContainer" style="min-height: 200px;">
                <div style="text-align: center; padding: 20px;">加载商店中...</div>
            </div>
        </div>
    </div>

    <!-- 其他模态框 -->
    <div class="modal-overlay" id="usernameModal"><div class="modal"><div class="modal-header"><div class="modal-title">修改用户名</div><button class="modal-close close-modal-btn" data-modal="usernameModal">&times;</button></div><div class="form-group"><label class="form-label">新用户名</label><input type="text" class="form-input" id="newUsername" maxlength="20"></div><div class="form-actions"><button class="btn btn-cancel close-modal-btn" data-modal="usernameModal">取消</button><button class="btn btn-save" id="saveUsername">保存</button></div></div></div>
    <div class="modal-overlay" id="bioModal"><div class="modal"><div class="modal-header"><div class="modal-title">修改个人简介</div><button class="modal-close close-modal-btn" data-modal="bioModal">&times;</button></div><div class="form-group"><label class="form-label">个人简介</label><textarea class="form-textarea" id="newBio" maxlength="200"></textarea></div><div class="form-actions"><button class="btn btn-cancel close-modal-btn" data-modal="bioModal">取消</button><button class="btn btn-save" id="saveBio">保存</button></div></div></div>
    <div class="modal-overlay" id="passwordModal"><div class="modal"><div class="modal-header"><div class="modal-title">修改密码</div><button class="modal-close close-modal-btn" data-modal="passwordModal">&times;</button></div><div class="form-group"><label class="form-label">当前密码</label><input type="password" class="form-input" id="currentPassword"></div><div class="form-group"><label class="form-label">新密码</label><input type="password" class="form-input" id="newPassword"></div><div class="form-group"><label class="form-label">确认新密码</label><input type="password" class="form-input" id="confirmPassword"></div><div class="form-actions"><button class="btn btn-cancel close-modal-btn" data-modal="passwordModal">取消</button><button class="btn btn-save" id="savePassword">更新密码</button></div></div></div>
    <div class="modal-overlay" id="deleteAccountModal"><div class="modal"><div class="modal-header"><div class="modal-title" style="color:#f87171;"><i class="fas fa-exclamation-triangle"></i>确认注销账号</div><button class="modal-close close-modal-btn" data-modal="deleteAccountModal">&times;</button></div><div><p>请输入您的邮箱地址以确认：</p></div><div class="form-group"><input type="email" class="form-input" id="confirmEmail" placeholder="输入您的邮箱地址"></div><div class="form-actions"><button class="btn btn-cancel close-modal-btn" data-modal="deleteAccountModal">取消</button><button class="btn danger-btn" id="confirmDeleteAccount">确认注销</button></div></div></div>
    <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-chevron-up"></i></button>

    <script>
        // ========== 角色配置（纯文字颜色 + 背景徽章） ==========
        const ROLE_CONFIG = {
            owner: { name: '站长', color: '#f97316', bg: 'rgba(249,115,22,0.2)' },
            admin: { name: '管理员', color: '#60a5fa', bg: 'rgba(96,165,250,0.2)' },
            user:  { name: '普通用户', color: '#9ca3af', bg: 'rgba(156,163,175,0.2)' }
        };
        function getRoleDisplay(role) {
            const safeRole = (role && ROLE_CONFIG[role]) ? role : 'user';
            return ROLE_CONFIG[safeRole];
        }

        let supabaseClient = null, currentUser = null, userProfile = null;
        let cropper = null, selectedFile = null, isUploading = false;
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
        
        // 通用函数
        function safeSetText(id, text, def='') { let e=document.getElementById(id); if(e) e.textContent=text||def; }
        function safeGetElement(id) { return document.getElementById(id); }
        let notificationTimeout = null;
        function showNotification(msg, type='info') {
            let n = safeGetElement('notification');
            if(!n) { n = document.createElement('div'); n.id='notification'; document.body.appendChild(n); }
            n.textContent = msg;
            n.style.background = type==='error'?'#f87171':(type==='success'?'#10b981':'#3b82f6');
            n.style.color='#fff';
            n.style.transform='translateX(0)';
            if(notificationTimeout) clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(()=>{ if(n) n.style.transform='translateX(120%)'; },3000);
        }
        function showSyncNotice() { let sn=safeGetElement('syncNotice'); if(sn){ sn.classList.add('show'); setTimeout(()=>sn.classList.remove('show'),3000); } }
        function cacheUserProfile(username, avatarUrl) { 
            if(username) localStorage.setItem('cachedUsername', username); 
            if(avatarUrl) localStorage.setItem('cachedAvatar', avatarUrl); 
            localStorage.setItem('profileLastUpdated', Date.now()); 
            if(window.opener && !window.opener.closed) window.opener.postMessage({type:'PROFILE_UPDATED', username, avatarUrl}, '*'); 
            showSyncNotice(); 
        }
        
        // 头像显示
        function updateAvatarDisplay(imageUrl) {
            const avatarDiv = safeGetElement('userAvatar');
            if(!avatarDiv) return;
            if(imageUrl && imageUrl.trim() !== '') {
                avatarDiv.innerHTML = `<img src="${imageUrl}" alt="头像" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">`;
                const newPlaceholder = document.createElement('div');
                newPlaceholder.className = 'avatar-placeholder';
                newPlaceholder.id = 'avatarPlaceholder';
                newPlaceholder.style.display = 'none';
                newPlaceholder.textContent = (userProfile?.username || currentUser?.email?.charAt(0) || 'U').charAt(0).toUpperCase();
                avatarDiv.appendChild(newPlaceholder);
            } else {
                const letter = (userProfile?.username || currentUser?.email?.charAt(0) || 'U').charAt(0).toUpperCase();
                avatarDiv.innerHTML = `<div class="avatar-placeholder" id="avatarPlaceholder" style="display:flex;">${letter}</div>`;
            }
        }
        
        // 更新导航栏（包含管理后台按钮）
        function updateNavbar() {
            const navDiv = safeGetElement('userNavSection'); 
            if(!navDiv) return;
            const username = userProfile?.username || currentUser?.email?.split('@')[0] || '用户';
            const roleInfo = getRoleDisplay(userProfile?.role);
            const avatarUrl = userProfile?.avatar_url || localStorage.getItem('userAvatar');
            const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">` : `<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--supabase-blue),var(--supabase-purple));display:flex;align-items:center;justify-content:center;color:white;font-weight:600;">${username.charAt(0).toUpperCase()}</div>`;
            const usernameHtml = `<span style="color:${roleInfo.color};">${username}</span> <span style="font-size:0.75rem; color:${roleInfo.color};">(${roleInfo.name})</span>`;
            
            // 管理后台按钮（仅站长和管理员可见）
            let adminBtnHtml = '';
            if (userProfile && (userProfile.role === 'owner' || userProfile.role === 'admin')) {
                adminBtnHtml = `<a href="./admin.html" class="admin-link"><i class="fas fa-cog"></i> 管理后台</a>`;
            }
            
            navDiv.innerHTML = `<div style="display:flex;align-items:center;gap:10px;">${avatarHtml}${usernameHtml}${adminBtnHtml}<button id="logoutBtn" style="background:transparent;color:#f87171;border:1px solid rgba(248,113,113,0.3);padding:4px 12px;border-radius:var(--radius);cursor:pointer;"><i class="fas fa-sign-out-alt"></i> 退出</button></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', async() => { await supabaseClient.auth.signOut(); localStorage.removeItem('cachedUsername'); localStorage.removeItem('cachedAvatar'); window.location.href = 'index.html'; });
        }
        
        // 头像上传裁剪（与原有逻辑一致）
        async function deleteOldAvatarFiles(userId) {
            try {
                const { data: files, error } = await supabaseClient.storage.from('avatars').list(userId);
                if(error || !files || files.length === 0) return;
                const paths = files.map(f => `${userId}/${f.name}`);
                if(paths.length) await supabaseClient.storage.from('avatars').remove(paths);
            } catch(e) { console.warn('删除旧头像失败', e); }
        }
        async function uploadCroppedImage(blob) {
            if(!currentUser) { showNotification('用户未登录','error'); return false; }
            if(isUploading) { showNotification('正在上传中，请稍后','error'); return false; }
            isUploading = true;
            const confirmBtn = document.getElementById('confirmCropBtn');
            if(confirmBtn) confirmBtn.disabled = true;
            const fileName = `avatar_${Date.now()}.png`;
            const filePath = `${currentUser.id}/${fileName}`;
            try {
                showNotification('正在上传新头像...','info');
                await deleteOldAvatarFiles(currentUser.id);
                const { error: uploadErr } = await supabaseClient.storage.from('avatars').upload(filePath, blob, { contentType: 'image/png' });
                if(uploadErr) throw uploadErr;
                const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
                const { error: updateErr } = await supabaseClient.from('user_profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
                if(updateErr) throw updateErr;
                if(userProfile) userProfile.avatar_url = publicUrl;
                localStorage.setItem('userAvatar', publicUrl);
                updateAvatarDisplay(publicUrl);
                cacheUserProfile(userProfile?.username || currentUser.email.split('@')[0], publicUrl);
                updateNavbar();
                showNotification('头像上传成功','success');
                return true;
            } catch(err) {
                console.error(err);
                showNotification('上传失败: '+err.message,'error');
                return false;
            } finally {
                isUploading = false;
                if(confirmBtn) confirmBtn.disabled = false;
            }
        }
        function initCropperModal(file) {
            const img = document.getElementById('cropImage');
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
                if(cropper) cropper.destroy();
                img.onload = () => {
                    cropper = new Cropper(img, { aspectRatio:1, viewMode:1, dragMode:'move', cropBoxMovable:true, cropBoxResizable:true, background:false, autoCropArea:0.8, responsive:true });
                    openModal('cropModal');
                };
            };
            reader.readAsDataURL(file);
        }
        window.openAvatarUpload = function() {
            const input = document.createElement('input');
            input.type='file'; input.accept='image/jpeg,image/png,image/gif,image/webp';
            input.onchange=(e)=>{
                const file=e.target.files[0];
                if(!file) return;
                if(file.size>5*1024*1024){ showNotification('图片大小不能超过5MB','error'); return; }
                const validTypes=['image/jpeg','image/png','image/gif','image/webp'];
                if(!validTypes.includes(file.type)){ showNotification('仅支持JPG/PNG/GIF/WEBP格式','error'); return; }
                selectedFile=file; initCropperModal(file); input.remove();
            };
            input.oncancel=()=>{ input.remove(); };
            document.body.appendChild(input); input.click();
        };
        async function confirmCropAndUpload() {
            if(!cropper){ showNotification('裁剪器未初始化','error'); return; }
            const canvas = cropper.getCroppedCanvas({ width:500, height:500, imageSmoothingEnabled:true, imageSmoothingQuality:'high' });
            if(!canvas){ showNotification('无法获取裁剪区域','error'); return; }
            canvas.toBlob(async (blob)=>{
                if(!blob){ showNotification('生成图片失败','error'); return; }
                closeModal('cropModal');
                await uploadCroppedImage(blob);
                if(cropper){ cropper.destroy(); cropper=null; }
            },'image/png',0.92);
        }
        function cancelCrop() { if(cropper){ cropper.destroy(); cropper=null; } closeModal('cropModal'); }
        
        // 加载用户资料（含角色信息）
        async function loadUserProfile(retryCount = 0) {
            const { data: profile, error } = await supabaseClient.from('user_profiles').select('*').eq('id', currentUser.id).single();
            if(error && error.code === 'PGRST116') {
                const { error: insertError } = await supabaseClient.from('user_profiles').insert({ id: currentUser.id, username: currentUser.email.split('@')[0], bio: '这个人很懒，什么都没有写...', role: 'user' });
                if(insertError && retryCount < 2) { setTimeout(() => loadUserProfile(retryCount + 1), 500); return; }
                else if(insertError) { showNotification('创建用户资料失败，请刷新重试', 'error'); return; }
                return loadUserProfile(retryCount + 1);
            }
            if(profile) {
                userProfile = profile;
                const username = profile.username || currentUser.email.split('@')[0];
                const roleInfo = getRoleDisplay(profile.role);
                
                // 显示用户名 + 颜色
                const usernameSpan = document.getElementById('displayUsername');
                if(usernameSpan) {
                    usernameSpan.innerHTML = username;
                    usernameSpan.style.color = roleInfo.color;
                }
                // 显示身份徽章（带背景的小框）
                const roleBadge = document.getElementById('roleBadge');
                if(roleBadge) {
                    roleBadge.style.display = 'inline-block';
                    roleBadge.style.backgroundColor = roleInfo.bg;
                    roleBadge.style.color = roleInfo.color;
                    roleBadge.textContent = roleInfo.name;
                }
                
                safeSetText('userEmail', currentUser.email);
                safeSetText('userBio', profile.bio || '这个人很懒，什么都没有写...');
                safeSetText('createdAt', new Date(currentUser.created_at).toLocaleString('zh-CN'));
                const days = Math.floor((new Date() - new Date(currentUser.created_at)) / (1000*3600*24));
                const daysSpan = document.getElementById('userDaysText');
                if(daysSpan) daysSpan.textContent = `已来到六哥荣耀 ${days} 天`;
                if(profile.avatar_url && profile.avatar_url.trim() !== '') {
                    localStorage.setItem('userAvatar', profile.avatar_url);
                    updateAvatarDisplay(profile.avatar_url);
                } else { localStorage.removeItem('userAvatar'); updateAvatarDisplay(null); }
                
                cacheUserProfile(username, profile.avatar_url);
                updateNavbar();
            }
        }
        
        async function updateLastLogin() {
            const { error } = await supabaseClient.from('user_stats').upsert({ user_id: currentUser.id, last_login: new Date().toISOString(), view_count: 0 }, { onConflict: 'user_id' });
            if(!error) safeSetText('lastLogin', new Date().toLocaleString('zh-CN'));
        }
        
        // ================== 签到系统 ==================
        let userStats = { candy_crumbles: 0, rainbow_lollipops: 0, active_points: 0, last_checkin_date: null, checkin_streak: 0 };
        
        function getCheckinRewards(streak) {
            if (streak === 1) return { candy: 3, rainbow: 0, active: 2 };
            if (streak === 2) return { candy: 5, rainbow: 0, active: 2 };
            if (streak === 3) return { candy: 7, rainbow: 0, active: 2 };
            if (streak === 4) return { candy: 9, rainbow: 0, active: 2 };
            if (streak === 5) return { candy: 10, rainbow: 0, active: 2 };
            if (streak === 6) return { candy: 12, rainbow: 0, active: 2 };
            if (streak === 7) return { candy: 15, rainbow: 1, active: 5 };
            if (streak >= 8 && streak <= 14) return { candy: 10 + Math.floor((streak-8)*2), rainbow: 2, active: 8 };
            if (streak === 15) return { candy: 30, rainbow: 5, active: 15 };
            if (streak >= 16 && streak <= 29) return { candy: 50, rainbow: 10, active: 10 };
            if (streak === 30) return { candy: 100, rainbow: 20, active: 50 };
            if (streak >= 31) return { candy: 80, rainbow: 15, active: 20 };
            return { candy: 5, rainbow: 0, active: 1 };
        }
        
        function updateRewardPreview() {
            const streak = userStats.checkin_streak || 0;
            const tomorrowStreak = streak + 1;
            const rewards = getCheckinRewards(tomorrowStreak);
            const previewElem = document.getElementById('rewardPreview');
            if(previewElem) {
                previewElem.innerHTML = `明日签到奖励: 🍬${rewards.candy}糖果碎 ${rewards.rainbow>0?`🌈+${rewards.rainbow}棒糖` : ''} ⚡+${rewards.active}活跃度`;
            }
        }
        
        async function loadUserStats() {
            if(!currentUser) return;
            const { data, error } = await supabaseClient.from('user_stats').select('candy_crumbles, rainbow_lollipops, active_points, last_checkin_date, checkin_streak').eq('user_id', currentUser.id).single();
            if(error && error.code === 'PGRST116') {
                await supabaseClient.from('user_stats').upsert({ 
                    user_id: currentUser.id, 
                    candy_crumbles: 100, 
                    rainbow_lollipops: 5, 
                    active_points: 0,
                    last_checkin_date: null,
                    checkin_streak: 0
                });
                return loadUserStats();
            }
            if(data) {
                userStats.candy_crumbles = data.candy_crumbles ?? 100;
                userStats.rainbow_lollipops = data.rainbow_lollipops ?? 5;
                userStats.active_points = data.active_points ?? 0;
                userStats.last_checkin_date = data.last_checkin_date;
                userStats.checkin_streak = data.checkin_streak ?? 0;
                
                updateActivePointsDisplay();
                updateShopBalanceDisplay();
                document.getElementById('streakDays').innerText = userStats.checkin_streak;
                updateRewardPreview();
                
                const today = new Date().toISOString().slice(0,10);
                const hasCheckedToday = (userStats.last_checkin_date === today);
                const checkinBtn = document.getElementById('checkinBtn');
                if(checkinBtn) {
                    if(hasCheckedToday) {
                        checkinBtn.disabled = true;
                        checkinBtn.innerHTML = '<i class="fas fa-check-circle"></i> 今日已签到';
                    } else {
                        checkinBtn.disabled = false;
                        checkinBtn.innerHTML = '<i class="fas fa-calendar-check"></i> 签到';
                    }
                }
            }
        }
        
        function updateActivePointsDisplay() {
            const activeSpan = document.getElementById('activePointsValue');
            if(activeSpan) activeSpan.innerText = userStats.active_points;
        }
        
        async function performCheckin() {
            if(!currentUser) { showNotification('请先登录', 'error'); return; }
            const checkinBtn = document.getElementById('checkinBtn');
            if(checkinBtn.disabled) {
                showNotification('今天已经签到过了！', 'warning');
                return;
            }
            
            const today = new Date().toISOString().slice(0,10);
            const lastDate = userStats.last_checkin_date;
            let newStreak = 1;
            if(lastDate) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().slice(0,10);
                if(lastDate === yesterdayStr) {
                    newStreak = (userStats.checkin_streak || 0) + 1;
                } else if(lastDate === today) {
                    showNotification('今日已签到', 'warning');
                    return;
                } else {
                    newStreak = 1;
                }
            }
            
            const rewards = getCheckinRewards(newStreak);
            const newCandy = userStats.candy_crumbles + rewards.candy;
            const newRainbow = userStats.rainbow_lollipops + rewards.rainbow;
            const newActive = userStats.active_points + rewards.active;
            
            const { error } = await supabaseClient.from('user_stats').update({
                candy_crumbles: newCandy,
                rainbow_lollipops: newRainbow,
                active_points: newActive,
                last_checkin_date: today,
                checkin_streak: newStreak
            }).eq('user_id', currentUser.id);
            
            if(error) {
                showNotification('签到失败: ' + error.message, 'error');
                return;
            }
            
            userStats.candy_crumbles = newCandy;
            userStats.rainbow_lollipops = newRainbow;
            userStats.active_points = newActive;
            userStats.last_checkin_date = today;
            userStats.checkin_streak = newStreak;
            
            updateActivePointsDisplay();
            updateShopBalanceDisplay();
            document.getElementById('streakDays').innerText = newStreak;
            updateRewardPreview();
            checkinBtn.disabled = true;
            checkinBtn.innerHTML = '<i class="fas fa-check-circle"></i> 今日已签到';
            
            showNotification(`签到成功！获得 🍬${rewards.candy} 糖果碎 ${rewards.rainbow>0?`🌈+${rewards.rainbow} 棒糖 ` : ''}⚡+${rewards.active} 活跃度`, 'success');
        }
        
        // 商店相关（暴露给 shop-panel.html 使用的全局函数）
        function updateShopBalanceDisplay() {
            if(window.shopModule && window.shopModule.updateBalance) {
                window.shopModule.updateBalance(userStats.candy_crumbles, userStats.rainbow_lollipops);
            }
        }
        
        // 暴露给子模块的全局接口
        window.getCurrentUserId = () => currentUser?.id;
        window.getUserStats = () => userStats;
        window.updateUserStatsAfterPurchase = async (newCandy, newRainbow) => {
            userStats.candy_crumbles = newCandy;
            userStats.rainbow_lollipops = newRainbow;
            updateShopBalanceDisplay();
        };
        window.showNotification = showNotification;
        window.supabaseClient = supabaseClient;
        
        // 加载商店内容
        async function loadShopContent() {
            const container = document.getElementById('shopContentContainer');
            if(!container) return;
            try {
                const response = await fetch('shop-panel.html');
                if(!response.ok) throw new Error('加载商店失败');
                const html = await response.text();
                container.innerHTML = html;
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if(oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
            } catch(err) {
                container.innerHTML = `<div style="text-align:center;padding:20px;color:#f87171;">加载商店失败: ${err.message}</div>`;
            }
        }
        
        // 模态框控制
        function openModal(id) { let m = safeGetElement(id); if(m) { m.classList.add('show'); document.body.style.overflow = 'hidden'; } }
        function closeModal(id) { let m = safeGetElement(id); if(m) { m.classList.remove('show'); document.body.style.overflow = ''; } }
        
        window.openUsernameModal = () => { document.getElementById('newUsername').value = userProfile?.username || ''; openModal('usernameModal'); };
        window.openBioModal = () => { document.getElementById('newBio').value = userProfile?.bio || ''; openModal('bioModal'); };
        window.openPasswordModal = () => openModal('passwordModal');
        window.openDeleteAccountModal = () => { document.getElementById('confirmEmail').value = currentUser?.email || ''; openModal('deleteAccountModal'); };
        
        async function updateUsername() {
            const newName = document.getElementById('newUsername').value.trim();
            if(!newName || newName.length<2 || newName.length>20) { showNotification('用户名长度2-20字符','error'); return; }
            try {
                const { error: profileError } = await supabaseClient.from('user_profiles').update({ username: newName }).eq('id', currentUser.id);
                if(profileError) throw profileError;
                const { error: authError } = await supabaseClient.auth.updateUser({ data: { username: newName } });
                if(authError) throw authError;
                userProfile.username = newName;
                // 重新刷新显示
                const roleInfo = getRoleDisplay(userProfile.role);
                const usernameSpan = document.getElementById('displayUsername');
                if(usernameSpan) {
                    usernameSpan.innerHTML = newName;
                    usernameSpan.style.color = roleInfo.color;
                }
                const roleBadge = document.getElementById('roleBadge');
                if(roleBadge) {
                    roleBadge.style.backgroundColor = roleInfo.bg;
                    roleBadge.style.color = roleInfo.color;
                    roleBadge.textContent = roleInfo.name;
                }
                cacheUserProfile(newName, userProfile.avatar_url);
                updateNavbar();
                closeModal('usernameModal');
                showNotification('用户名更新成功','success');
            } catch(e) { showNotification('更新失败: '+e.message, 'error'); }
        }
        async function updateBio() {
            const newBio = document.getElementById('newBio').value.trim();
            await supabaseClient.from('user_profiles').update({ bio: newBio }).eq('id', currentUser.id);
            userProfile.bio = newBio;
            safeSetText('userBio', newBio);
            closeModal('bioModal');
            showNotification('简介更新成功','success');
        }
        async function updatePassword() {
            const cur = document.getElementById('currentPassword').value;
            const np = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            if(!cur || !np || !cp) { showNotification('请填写所有字段','error'); return; }
            if(np.length<6) { showNotification('密码至少6位','error'); return; }
            if(np!==cp) { showNotification('两次密码不一致','error'); return; }
            const { error: signErr } = await supabaseClient.auth.signInWithPassword({ email: currentUser.email, password: cur });
            if(signErr) { showNotification('当前密码错误','error'); return; }
            const { error } = await supabaseClient.auth.updateUser({ password: np });
            if(error) { showNotification('修改失败','error'); }
            else { showNotification('密码已更新，请重新登录','success'); setTimeout(()=>supabaseClient.auth.signOut(),1500); }
            closeModal('passwordModal');
        }
        async function deleteAccount() {
            const confirmEmail = document.getElementById('confirmEmail').value;
            if(confirmEmail !== currentUser.email) { showNotification('邮箱地址不匹配', 'error'); return; }
            showNotification('账号删除功能需后端支持，请联系管理员','warning');
            closeModal('deleteAccountModal');
        }
        
        // 初始化
        async function initializeProfile() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.supabaseClient = supabaseClient;
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if(error || !user) { showNotification('请先登录','error'); setTimeout(()=>window.location.href='login-real.html',1500); return; }
            currentUser = user;
            await updateLastLogin();
            await loadUserProfile();
            await loadUserStats();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
            
            document.getElementById('saveUsername')?.addEventListener('click', updateUsername);
            document.getElementById('saveBio')?.addEventListener('click', updateBio);
            document.getElementById('savePassword')?.addEventListener('click', updatePassword);
            document.getElementById('confirmDeleteAccount')?.addEventListener('click', deleteAccount);
            document.getElementById('confirmCropBtn')?.addEventListener('click', confirmCropAndUpload);
            document.getElementById('cancelCropBtn')?.addEventListener('click', cancelCrop);
            document.getElementById('closeCropModalBtn')?.addEventListener('click', cancelCrop);
            
            const openShopBtn = document.getElementById('openShopBtn');
            const closeShopModalBtn = document.getElementById('closeShopModalBtn');
            openShopBtn?.addEventListener('click', async () => {
                await loadShopContent();
                openModal('shopModal');
            });
            closeShopModalBtn?.addEventListener('click', () => closeModal('shopModal'));
            
            document.querySelectorAll('.close-modal-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const modalId = btn.getAttribute('data-modal');
                    if(modalId) closeModal(modalId);
                });
            });
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.addEventListener('click', function(e) { if(e.target === this) closeModal(this.id); });
            });
            window.addEventListener('scroll', () => { let btn = document.querySelector('.back-to-top'); if(btn) btn.style.display = window.scrollY>300?'flex':'none'; });
            
            document.getElementById('checkinBtn')?.addEventListener('click', performCheckin);
        }
        document.addEventListener('DOMContentLoaded', () => setTimeout(initializeProfile, 100));
    </script>
</body>
</html>
