splashImg.onerror = () => { splashImg.src = "https://xiaochen1235789.github.io/images/changjinglu.webp"; };

let toastTimeout = null;
function showTip(msg) {
    if (toastTimeout) clearTimeout(toastTimeout);
    toastNotice.innerText = msg;
    toastNotice.classList.add('show');
    toastTimeout = setTimeout(() => {
        toastNotice.classList.remove('show');
    }, 2000);
}

function updateUI() {
    jadeSpan.innerText = starJade;
    ticketSpan.innerText = tickets;
    pitySpan.innerText = fiveStarPity;
    fourPitySpan.innerText = fourStarPity;
    let currentRate = getCurrentFiveStarRate(fiveStarPity);
    rateDisplaySpan.innerText = `当前5星概率: ${(currentRate * 100).toFixed(2)}%`;
}

function getCurrentFiveStarRate(pityCount) {
    if (pityCount >= PITY_5_MAX - 1) return 1.0;
    if (pityCount < SOFT_PITY_START) return 0.006;
    let step = pityCount - (SOFT_PITY_START - 1);
    let maxStep = PITY_5_MAX - SOFT_PITY_START;
    let rate = 0.006 + (1.0 - 0.006) * (step / maxStep);
    return Math.min(rate, 1.0);
}

function checkBannerActive() {
    const now = new Date();
    const active = (now >= BANNER_START && now <= BANNER_END);
    if (active !== isBannerActive) {
        isBannerActive = active;
        updateButtonsState();
    }
    return active;
}

function updateButtonsState() {
    if (!isBannerActive) {
        singleBtn.classList.add('disabled');
        tenBtn.classList.add('disabled');
        singleBtn.disabled = true;
        tenBtn.disabled = true;
        disabledNoticeSpan.style.display = 'block';
    } else {
        singleBtn.classList.remove('disabled');
        tenBtn.classList.remove('disabled');
        singleBtn.disabled = false;
        tenBtn.disabled = false;
        disabledNoticeSpan.style.display = 'none';
    }
}

function updateCountdown() {
    const now = new Date();
    if (now >= BANNER_END) {
        countdownTimerSpan.innerText = '卡池已结束';
        if (isBannerActive) {
            isBannerActive = false;
            updateButtonsState();
        }
        return;
    }
    if (now < BANNER_START) {
        const diff = BANNER_START - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        countdownTimerSpan.innerText = `${days}天 ${hours}时 ${minutes}分 ${seconds}秒后开启`;
        if (isBannerActive) {
            isBannerActive = false;
            updateButtonsState();
        }
        return;
    }
    const diff = BANNER_END - now;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (86400000)) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);
    countdownTimerSpan.innerText = `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
    if (!isBannerActive) {
        isBannerActive = true;
        updateButtonsState();
    }
}
setInterval(updateCountdown, 1000);
updateCountdown();

// 从数据库加载用户资源（幂等：若已存在则不重复创建）
async function loadUserData() {
    if (!currentUser) return;
    if (isLoadingData) return;
    isLoadingData = true;
    try {
        // 1. 获取 user_resources
        let { data: resData, error: resErr } = await supabase
            .from('user_resources')
            .select('*')
            .eq('user_id', currentUser.id)
            .maybeSingle(); // 使用 maybeSingle 避免 406 错误
        
        if (resErr) throw resErr;
        
        if (!resData) {
            // 不存在则创建（幂等：只有不存在时才插入）
            const { data: newRes, error: insertErr } = await supabase
                .from('user_resources')
                .insert({ user_id: currentUser.id, star_jade: 2000, tickets: 100 })
                .select()
                .single();
            if (insertErr) throw insertErr;
            resData = newRes;
        }
        starJade = resData.star_jade;
        tickets = resData.tickets;

        // 2. 获取抽卡保底数据
        let { data: stateData, error: stateErr } = await supabase
            .from('user_gacha_state')
            .select('five_star_pity, four_star_pity, guaranteed_up')
            .eq('user_id', currentUser.id)
            .maybeSingle();
        
        if (stateErr) throw stateErr;
        
        if (!stateData) {
            const { data: newState, error: insertStateErr } = await supabase
                .from('user_gacha_state')
                .insert({ user_id: currentUser.id, five_star_pity: 0, four_star_pity: 0, guaranteed_up: false })
                .select()
                .single();
            if (insertStateErr) throw insertStateErr;
            stateData = newState;
        }
        fiveStarPity = stateData.five_star_pity;
        fourStarPity = stateData.four_star_pity;
        guaranteedUp = stateData.guaranteed_up;

        // 3. 获取抽卡历史（表不存在时降级为空数组）
        try {
            let { data: historyData, error: histErr } = await supabase
                .from('gacha_history')
                .select('item_name, star_level, created_at')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false })
                .limit(500);
            if (!histErr) {
                gachaHistory = (historyData || []).map(h => ({ name: h.item_name, star: h.star_level, time: h.created_at }));
            } else {
                console.warn('历史表可能不存在，已忽略', histErr);
                gachaHistory = [];
            }
        } catch (e) {
            console.warn('读取历史失败', e);
            gachaHistory = [];
        }

        // 4. 获取 UID（不影响主流程）
        try {
            let { data: profileData, error: profErr } = await supabase
                .from('user_profiles')
                .select('user_number')
                .eq('id', currentUser.id)
                .maybeSingle();
            if (!profErr && profileData && profileData.user_number) {
                userNumber = profileData.user_number;
                uidBadge.innerText = `UID: ${userNumber}`;
            } else {
                uidBadge.innerText = `UID: --`;
            }
        } catch (e) {
            console.warn('获取UID失败', e);
            uidBadge.innerText = `UID: --`;
        }

        updateUI();
        renderHistoryModal();
    } catch (err) {
        console.error('加载用户数据失败:', err);
        showTip('加载数据失败，请刷新重试');
    } finally {
        isLoadingData = false;
    }
}

// 保存抽卡后状态（资源、保底、历史记录）
async function saveAfterDraw(resultList) {
    if (!currentUser) return;
    try {
        // 1. 更新资源表
        const { error: resUpdateErr } = await supabase
            .from('user_resources')
            .update({ star_jade: starJade, tickets: tickets })
            .eq('user_id', currentUser.id);
        if (resUpdateErr) throw resUpdateErr;

        // 2. 更新保底状态
        const { error: stateUpdateErr } = await supabase
            .from('user_gacha_state')
            .update({ five_star_pity: fiveStarPity, four_star_pity: fourStarPity, guaranteed_up: guaranteedUp })
            .eq('user_id', currentUser.id);
        if (stateUpdateErr) throw stateUpdateErr;

        // 3. 批量插入历史记录（如果 resultList 非空）
        if (resultList && resultList.length > 0) {
            const historyInserts = resultList.map(item => ({
                user_id: currentUser.id,
                item_name: item.name,
                star_level: item.star,
                created_at: new Date().toISOString()
            }));
            const { error: histInsertErr } = await supabase
                .from('gacha_history')
                .insert(historyInserts);
            if (histInsertErr) console.warn('历史插入失败', histInsertErr);
        }
    } catch (err) {
        console.error('保存数据失败:', err);
        showTip('数据保存失败，请检查网络');
    }
}

function addHistoryRecord(itemName, starLevel) {
    gachaHistory.unshift({ name: itemName, star: starLevel });
    if (gachaHistory.length > 500) gachaHistory.pop();
    renderHistoryModal();
}

function renderHistoryModal() {
    if (!recordListDiv) return;
    if (gachaHistory.length === 0) {
        recordListDiv.innerHTML = '<div class="empty-history">暂无抽卡记录</div>';
        return;
    }
    let html = '';
    for (let rec of gachaHistory) {
        let starClass = '';
        let starColorText = '';
        if (rec.star === 5) { starClass = 'record-star5'; starColorText = '★五星'; }
        else if (rec.star === 4) { starClass = 'record-star4'; starColorText = '★四星'; }
        else { starClass = 'record-star3'; starColorText = '★★★三星'; }
        html += `
            <div class="record-item ${starClass}">
                <span>${escapeHtml(rec.name)}</span>
                <span style="font-weight:bold;">${starColorText}</span>
            </div>
        `;
    }
    recordListDiv.innerHTML = html;
}

function showResultDialog(resultsArray) {
    if (!resultsArray || resultsArray.length === 0) return;
    dialogContent.innerHTML = '';
    for (let item of resultsArray) {
        const starClass = item.star === 5 ? 'dialog-star5' : (item.star === 4 ? 'dialog-star4' : 'dialog-star3');
        const starLabel = item.star === 5 ? '五星' : (item.star === 4 ? '四星' : '三星');
        const div = document.createElement('div');
        div.className = `dialog-item ${starClass}`;
        div.innerHTML = `
            <span>${escapeHtml(item.name)}</span>
            <span class="dialog-star-label">${starLabel}</span>
        `;
        dialogContent.appendChild(div);
    }
    resultDialog.classList.add('active');
}

window.closeResultDialogGlobal = function() {
    resultDialog.classList.remove('active');
};

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}

function performSingleDraw() {
    let isFiveStar = false;
    if (fiveStarPity + 1 >= PITY_5_MAX) {
        isFiveStar = true;
    } else {
        const currentRate = getCurrentFiveStarRate(fiveStarPity);
        if (Math.random() < currentRate) isFiveStar = true;
    }
    if (isFiveStar) {
        let selected;
        let isUp = false;
        if (guaranteedUp) {
            selected = UP_FIVE_STAR;
            isUp = true;
            guaranteedUp = false;
        } else {
            const upRand = Math.random() < 0.5;
            if (upRand) {
                selected = UP_FIVE_STAR;
                isUp = true;
            } else {
                selected = PERMANENT_FIVE_STAR[Math.floor(Math.random() * PERMANENT_FIVE_STAR.length)];
                isUp = false;
                guaranteedUp = true;
            }
        }
        fiveStarPity = 0;
        fourStarPity = 0;
        return { name: selected, star: 5, isUp: isUp };
    }
    let mustFourStar = false;
    if (fourStarPity + 1 >= PITY_4_MAX) mustFourStar = true;
    else if (Math.random() < BASE_RATE_4) mustFourStar = true;
    if (mustFourStar) {
        const selected = FOUR_STAR_CHARS[Math.floor(Math.random() * FOUR_STAR_CHARS.length)];
        fourStarPity = 0;
        fiveStarPity++;
        return { name: selected, star: 4 };
    }
    const selectedThree = THREE_STAR_ITEMS[Math.floor(Math.random() * THREE_STAR_ITEMS.length)];
    fourStarPity++;
    fiveStarPity++;
    return { name: selectedThree, star: 3 };
}

function drawOneWithTicket() {
    if (tickets >= COST_SINGLE_TICKET) {
        tickets -= COST_SINGLE_TICKET;
        const result = performSingleDraw();
        updateUI();
        addHistoryRecord(result.name, result.star);
        return result;
    }
    return null;
}

async function attemptDraw(needTickets, costJade, drawFunc) {
    if (tickets >= needTickets) {
        return await drawFunc();
    } else {
        return new Promise((resolve) => {
            const msg = `星轨专票数量不足，是否用 ${costJade} 星琼兑换 ${needTickets} 张星轨专票？`;
            if (confirm(msg)) {
                if (starJade >= costJade) {
                    starJade -= costJade;
                    tickets += needTickets;
                    updateUI();
                    showTip(`兑换成功！获得 ${needTickets} 张星轨专票`);
                    drawFunc().then(resolve);
                } else {
                    showTip(`星琼不足，无法兑换！需要 ${costJade} 星琼`);
                    resolve(false);
                }
            } else {
                resolve(false);
            }
        });
    }
}

async function singlePull() {
    if (!isBannerActive) { showTip('卡池已关闭，无法跃迁'); return; }
    if (isDrawing) { showTip('跃迁进行中...'); return; }
    isDrawing = true;
    await attemptDraw(COST_SINGLE_TICKET, EXCHANGE_RATE, async () => {
        const result = drawOneWithTicket();
        if (result) {
            showTip(`获得: ${result.name} (${result.star}★)`);
            showResultDialog([result]);
            updateUI();
            await saveAfterDraw([result]);
        }
        return result;
    });
    isDrawing = false;
}

async function tenPull() {
    if (!isBannerActive) { showTip('卡池已关闭，无法跃迁'); return; }
    if (isDrawing) { showTip('当前正在跃迁中，请稍等…'); return; }
    isDrawing = true;
    await attemptDraw(COST_TEN_TICKET, EXCHANGE_RATE * COST_TEN_TICKET, async () => {
        showTip('十连跃迁开启，群星闪烁 ✨✨');
        const pullResults = [];
        for (let i = 0; i < 10; i++) {
            await new Promise(r => setTimeout(r, 50));
            if (tickets < 1) break;
            const result = drawOneWithTicket();
            if (result) {
                pullResults.push(result);
                addHistoryRecord(result.name, result.star);
                updateUI();
            }
        }
        const fiveCount = pullResults.filter(r => r.star === 5).length;
        showTip(`十连完成！获得 ${fiveCount} 位五星 ✨`);
        showResultDialog(pullResults);
        await saveAfterDraw(pullResults);
        return pullResults;
    });
    isDrawing = false;
}

async function addStarJade(amount) {
    starJade += amount;
    updateUI();
    showTip(`+${amount} 星琼！ 当前 ${starJade}`);
    if (currentUser) {
        await supabase.from('user_resources').update({ star_jade: starJade }).eq('user_id', currentUser.id);
    }
}

async function fullResetGame() {
    if(isDrawing) return;
    if (!confirm('⚠️ 重置后所有抽卡资源、保底、历史记录将清空，且不可恢复！确定吗？')) return;
    starJade = 2000;
    tickets = 100;
    fiveStarPity = 0;
    fourStarPity = 0;
    gachaHistory = [];
    guaranteedUp = false;
    updateUI();
    renderHistoryModal();
    await saveAfterDraw([]);
    showTip('列车补给完毕！星琼+2000，星轨专票100，跃迁重置');
}

function openExchangeModal() {
    exchangeAmountInput.value = '1';
    updateExchangePreview();
    exchangeModal.classList.add('active');
}
function closeExchangeModal() {
    exchangeModal.classList.remove('active');
}
function updateExchangePreview() {
    let amount = parseInt(exchangeAmountInput.value) || 0;
    if (amount < 1) amount = 1;
    const cost = amount * EXCHANGE_RATE;
    exchangePreview.innerText = `需要消耗 ${cost} 星琼，获得 ${amount} 张星轨专票`;
}
async function performExchange() {
    let amount = parseInt(exchangeAmountInput.value) || 0;
    if (amount < 1) {
        showTip('兑换数量至少为1');
        return;
    }
    const cost = amount * EXCHANGE_RATE;
    if (starJade >= cost) {
        starJade -= cost;
        tickets += amount;
        updateUI();
        showTip(`成功兑换 ${amount} 张星轨专票！`);
        closeExchangeModal();
        if (currentUser) {
            await supabase.from('user_resources').update({ star_jade: starJade, tickets: tickets }).eq('user_id', currentUser.id);
        }
    } else {
        showTip(`星琼不足！需要 ${cost} 星琼`);
    }
}

function openRecordModal() {
    renderHistoryModal();
    recordModal.classList.add('active');
}
function closeRecordModal() {
    recordModal.classList.remove('active');
}

function preventScrollRefresh() {
    document.body.addEventListener('touchmove', function(e) {
        const target = e.target;
        const isScrollable = target.closest('.record-list') || target.closest('.dialog-content') || target.closest('.left-panel');
        if (!isScrollable) e.preventDefault();
    }, { passive: false });
}

function initStars() {
    const starContainer = document.getElementById('starBg');
    starContainer.innerHTML = '';
    for (let i = 0; i < 180; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        starContainer.appendChild(star);
    }
    for (let i = 0; i < 4; i++) {
        const meteor = document.createElement('div');
        meteor.classList.add('shooting-star');
        meteor.style.left = Math.random() * 80 + '%';
        meteor.style.top = Math.random() * 50 + '%';
        meteor.style.animationDelay = Math.random() * 8 + 's';
        starContainer.appendChild(meteor);
    }
}

function bindEvents() {
    singleBtn.addEventListener('click', singlePull);
    tenBtn.addEventListener('click', tenPull);
    addJadeBtn.addEventListener('click', () => addStarJade(999999));
    document.getElementById('exchangeBtn').addEventListener('click', openExchangeModal);
    document.getElementById('openRecordBtn').addEventListener('click', openRecordModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeRecordModal);
    recordModal.addEventListener('click', (e) => { if(e.target === recordModal) closeRecordModal(); });
    resultDialog.addEventListener('click', (e) => { if (e.target === resultDialog) closeResultDialogGlobal(); });
    
    closeExchangeBtn.addEventListener('click', closeExchangeModal);
    cancelExchangeBtn.addEventListener('click', closeExchangeModal);
    confirmExchangeBtn.addEventListener('click', performExchange);
    exchangeAmountInput.addEventListener('input', updateExchangePreview);
    
    let timer = null;
    addJadeBtn.addEventListener('touchstart', () => { timer = setTimeout(() => fullResetGame(), 800); });
    addJadeBtn.addEventListener('touchend', () => { clearTimeout(timer); });
    addJadeBtn.addEventListener('mousedown', () => { timer = setTimeout(() => fullResetGame(), 800); });
    addJadeBtn.addEventListener('mouseup', () => { clearTimeout(timer); });
}

// 初始化登录检查（确保 loading 始终消失）
async function initAuth() {
    try {
        const { data: { user }, error } = await supabase.auth.getUser();
        if (error || !user) {
            showTip('请先登录，即将跳转到登录页...');
            setTimeout(() => {
                window.location.href = 'login-real.html';
            }, 1500);
            return false;
        }
        currentUser = user;
        await loadUserData();
    } catch (err) {
        console.error('初始化失败:', err);
        showTip('初始化失败，请刷新页面');
    } finally {
        // 无论成功失败，都隐藏 loading 并显示主界面
        loginLoadingDiv.style.display = 'none';
        mainContentDiv.style.display = 'flex';
    }
    return true;
}

async function init() {
    initStars();
    await initAuth();
    bindEvents();
    preventScrollRefresh();
    updateCountdown();
    checkBannerActive();
}
init();
</script>
