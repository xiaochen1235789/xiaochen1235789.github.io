<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>六哥荣耀 - 官方直连音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3a2f 0%, #0f2a1f 100%);
            font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-card {
            max-width: 550px;
            width: 100%;
            background: rgba(30, 58, 47, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .cover-area {
            display: flex;
            justify-content: center;
            padding: 24px 24px 12px 24px;
        }
        .cover-img {
            width: 70%;
            max-width: 240px;
            border-radius: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .cover-img:hover {
            transform: scale(1.02);
        }

        .song-info {
            text-align: center;
            padding: 0 20px 12px;
        }
        .song-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }
        .song-artist {
            font-size: 1rem;
            color: #b0c4b0;
        }

        .progress-area {
            padding: 0 24px 12px;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #a0b8a0;
            margin-bottom: 6px;
        }
        .progress-bar {
            background: #3d6a58;
            height: 6px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #81c784, #a8e6b0);
            border-radius: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 16px 24px;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .play-btn {
            background: #81c784;
            color: #1e3a2f;
            width: 72px;
            height: 72px;
            font-size: 2rem;
            box-shadow: 0 8px 18px rgba(129,199,132,0.3);
        }

        .extra-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 24px;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(129,199,132,0.2);
        }
        .volume-wrap, .loop-wrap, .list-wrap {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: none;
            border: none;
            color: #c0e0c0;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #3d6a58;
            border-radius: 4px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #81c784;
            border-radius: 50%;
            cursor: pointer;
        }
        .loop-btn.active {
            color: #81c784;
        }

        /* 底部向上弹出模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .songlist-modal {
            background: var(--bg-primary, #1e3a2f);
            width: 100%;
            max-width: 550px;
            border-radius: 32px 32px 0 0;
            max-height: 60vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            padding-bottom: 20px;
        }
        .modal-overlay.show .songlist-modal {
            transform: translateY(0);
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(129,199,132,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #81c784;
            position: sticky;
            top: 0;
            background: #1e3a2f;
            z-index: 1;
        }
        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: #c0e0c0;
        }
        .song-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 24px;
            color: #e0f0e0;
            border-bottom: 1px solid rgba(129,199,132,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .song-item.active {
            background: rgba(129,199,132,0.2);
            color: #81c784;
            border-left: 4px solid #81c784;
        }
        .song-item:hover {
            background: rgba(129,199,132,0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #81c784;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1100;
            display: none;
            white-space: nowrap;
        }

        @media (max-width: 500px) {
            .song-title { font-size: 1.4rem; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 1.4rem; }
            .play-btn { width: 64px; height: 64px; font-size: 1.8rem; }
            .extra-bar { flex-direction: column; align-items: stretch; }
            .cover-img { width: 80%; }
            .toast { white-space: normal; max-width: 80%; text-align: center; }
        }
    </style>
</head>
<body>
<div class="player-card">
    <div class="cover-area">
        <img class="cover-img" id="cover" src="https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300" alt="封面">
    </div>
    <div class="song-info">
        <div class="song-title" id="title">昔涟</div>
        <div class="song-artist" id="artist">张韶涵、HOYO-MiX</div>
    </div>
    <div class="progress-area">
        <div class="time-row">
            <span id="currentTime">00:00</span>
            <span id="totalTime">03:06</span>
        </div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    <div class="controls">
        <button class="ctrl-btn" id="prevBtn">❮</button>
        <button class="ctrl-btn play-btn" id="playBtn">▶</button>
        <button class="ctrl-btn" id="nextBtn">❯</button>
    </div>
    <div class="extra-bar">
        <div class="volume-wrap">
            <button id="volumeBtn">🔊</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
        </div>
        <div class="loop-wrap">
            <button id="loopBtn">🔁</button>
            <span id="loopText">顺序</span>
        </div>
        <div class="list-wrap">
            <button id="openListBtn">📋 歌单</button>
        </div>
    </div>
</div>

<!-- 向上弹出模态框 -->
<div class="modal-overlay" id="songListModal">
    <div class="songlist-modal">
        <div class="modal-header">
            <span>🎵 播放列表</span>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div id="modalSongList"></div>
    </div>
</div>

<div class="toast" id="toast">提示</div>
<audio id="audio" preload="metadata"></audio>

<script>
    // ========== 使用官方直链（无任何第三方API） ==========
    // 歌曲列表（固定，可自行增删，歌曲ID从网易云获取）
    const SONGS = [
        { id: "3316968660", title: "昔涟", artist: "张韶涵、HOYO-MiX", duration: "03:06", pic: "https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300" },
        { id: "2722510685", title: "耀斑", artist: "HOYO-MiX,YMIR", duration: "03:33", pic: "https://p2.music.126.net/DYDACa_8zB5irAOrasVgnQ==/109951171396677694.jpg?param=300x300" },
        { id: "2709812973", title: "拂晓 Proi Proi", artist: "HOYO-MiX,NIDA", duration: "03:58", pic: "https://p2.music.126.net/2qGGwWFlMYF2o-GyNMhH5A==/109951171066942237.jpg?param=300x300" },
        { id: "2658660685", title: "何者", artist: "谭晶,HOYO-MiX", duration: "02:26", pic: "https://p1.music.126.net/gtunmoxObQyoH01HzURNUw==/109951170292455448.jpg?param=300x300" },
        { id: "2122308127", title: "不眠之夜", artist: "张杰,HOYO-MiX", duration: "02:18", pic: "https://p1.music.126.net/sZ-rACbFrybF0x_lI6XNMw==/109951169297766755.jpg?param=300x300" }
    ];

    let currentSongList = [...SONGS];
    let currentIndex = 0;
    let isPlaying = false;
    let loopMode = 0;   // 0顺序 1列表循环 2单曲循环
    let volume = 0.7;
    let progressInterval = null;
    let isDragging = false;

    // DOM 元素
    const audio = document.getElementById('audio');
    const coverImg = document.getElementById('cover');
    const titleSpan = document.getElementById('title');
    const artistSpan = document.getElementById('artist');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loopBtn = document.getElementById('loopBtn');
    const loopText = document.getElementById('loopText');
    const openListBtn = document.getElementById('openListBtn');
    const modalOverlay = document.getElementById('songListModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalSongList = document.getElementById('modalSongList');
    const toast = document.getElementById('toast');

    function showMessage(msg, isError = false) {
        toast.textContent = msg;
        toast.style.background = isError ? '#f87171' : 'rgba(0,0,0,0.8)';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function formatTime(sec) {
        if (isNaN(sec)) return "00:00";
        const mins = Math.floor(sec / 60);
        const remain = Math.floor(sec % 60);
        return `${mins.toString().padStart(2,'0')}:${remain.toString().padStart(2,'0')}`;
    }

    function updateUI() {
        const song = currentSongList[currentIndex];
        if (!song) return;
        titleSpan.innerText = song.title;
        artistSpan.innerText = song.artist;
        totalTimeSpan.innerText = song.duration;
        coverImg.src = song.pic;
        renderModalList();
    }

    // 官方直链地址
    function getOfficialUrl(songId) {
        return `https://music.163.com/song/media/outer/url?id=${songId}.mp3`;
    }

    function playSong(index) {
        if (index < 0) index = 0;
        if (index >= currentSongList.length) index = 0;
        currentIndex = index;
        const song = currentSongList[currentIndex];
        updateUI();

        const url = getOfficialUrl(song.id);
        audio.src = url;
        audio.volume = volume;

        if (isPlaying) {
            audio.play().catch(err => {
                console.warn("播放失败", err);
                showMessage("播放失败，请手动点击播放", true);
                isPlaying = false;
                playBtn.innerText = '▶';
            });
            startProgressTimer();
        }
        showMessage("加载中: " + song.title);
        // 保存状态
        localStorage.setItem('currentIndex', currentIndex);
    }

    function togglePlay() {
        if (!audio.src) {
            playSong(currentIndex);
            isPlaying = true;
            playBtn.innerText = '⏸';
            return;
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.innerText = '▶';
            if (progressInterval) clearInterval(progressInterval);
        } else {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerText = '⏸';
                startProgressTimer();
            }).catch(err => {
                showMessage("播放失败，请检查网络", true);
            });
        }
    }

    function startProgressTimer() {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (!isDragging && isPlaying && audio.src && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        }, 200);
    }

    function nextSong() {
        let newIndex = currentIndex + 1;
        if (newIndex >= currentSongList.length) {
            if (loopMode === 1) newIndex = 0;
            else {
                newIndex = currentSongList.length - 1;
                isPlaying = false;
                playBtn.innerText = '▶';
                if (progressInterval) clearInterval(progressInterval);
                return;
            }
        }
        currentIndex = newIndex;
        isPlaying = true;
        playSong(currentIndex);
    }

    function prevSong() {
        let newIndex = currentIndex - 1;
        if (newIndex < 0) {
            if (loopMode === 1) newIndex = currentSongList.length - 1;
            else newIndex = 0;
        }
        currentIndex = newIndex;
        isPlaying = true;
        playSong(currentIndex);
    }

    function setVolume(val) {
        volume = val;
        audio.volume = volume;
        volumeSlider.value = volume;
        volumeBtn.innerText = volume === 0 ? '🔇' : (volume < 0.5 ? '🔉' : '🔊');
        localStorage.setItem('volume', volume);
    }

    function toggleLoopMode() {
        loopMode = (loopMode + 1) % 3;
        const modes = ['顺序', '列表循环', '单曲循环'];
        const icons = ['🔁', '🔄', '🔂'];
        loopBtn.innerText = icons[loopMode];
        loopText.innerText = modes[loopMode];
        if (loopMode !== 0) loopBtn.classList.add('active');
        else loopBtn.classList.remove('active');
        localStorage.setItem('loopMode', loopMode);
    }

    function renderModalList() {
        modalSongList.innerHTML = '';
        currentSongList.forEach((song, idx) => {
            const div = document.createElement('div');
            div.className = 'song-item' + (idx === currentIndex ? ' active' : '');
            div.innerHTML = `<span>${idx+1}. ${song.title} - ${song.artist}</span><span>${song.duration}</span>`;
            div.addEventListener('click', () => {
                currentIndex = idx;
                isPlaying = true;
                playSong(currentIndex);
                closeModal();
            });
            modalSongList.appendChild(div);
        });
    }

    function openModal() {
        renderModalList();
        modalOverlay.classList.add('show');
    }

    function closeModal() {
        modalOverlay.classList.remove('show');
    }

    function seekProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        let percent = (e.clientX - rect.left) / rect.width;
        percent = Math.min(1, Math.max(0, percent));
        if (audio.duration && !isNaN(audio.duration)) {
            audio.currentTime = percent * audio.duration;
        }
    }

    function bindEvents() {
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        volumeSlider.addEventListener('input', (e) => setVolume(parseFloat(e.target.value)));
        volumeBtn.addEventListener('click', () => setVolume(audio.volume > 0 ? 0 : (volume || 0.7)));
        loopBtn.addEventListener('click', toggleLoopMode);
        openListBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        progressBar.addEventListener('click', seekProgress);
        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            seekProgress(e);
            const onMouseMove = (e) => seekProgress(e);
            const onMouseUp = () => {
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        progressBar.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            seekProgress(e.touches[0]);
            const onTouchMove = (e) => seekProgress(e.touches[0]);
            const onTouchEnd = () => {
                isDragging = false;
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            };
            document.addEventListener('touchmove', onTouchMove);
            document.addEventListener('touchend', onTouchEnd);
        });
        audio.addEventListener('ended', () => {
            if (loopMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextSong();
            }
        });
        audio.addEventListener('timeupdate', () => {
            if (!isDragging && isPlaying && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        });
    }

    function loadStoredState() {
        const savedVolume = localStorage.getItem('volume');
        if (savedVolume) setVolume(parseFloat(savedVolume));
        const savedLoop = localStorage.getItem('loopMode');
        if (savedLoop) {
            loopMode = parseInt(savedLoop);
            if (loopMode === 0) { loopBtn.innerText = '🔁'; loopText.innerText = '顺序'; loopBtn.classList.remove('active'); }
            if (loopMode === 1) { loopBtn.innerText = '🔄'; loopText.innerText = '列表循环'; loopBtn.classList.add('active'); }
            if (loopMode === 2) { loopBtn.innerText = '🔂'; loopText.innerText = '单曲循环'; loopBtn.classList.add('active'); }
        }
        const savedIndex = localStorage.getItem('currentIndex');
        if (savedIndex && !isNaN(parseInt(savedIndex))) {
            currentIndex = Math.min(currentSongList.length - 1, parseInt(savedIndex));
        }
    }

    function init() {
        bindEvents();
        loadStoredState();
        // 预加载第一首但不自动播放
        const firstSong = currentSongList[currentIndex];
        if (firstSong) {
            audio.src = getOfficialUrl(firstSong.id);
            audio.volume = volume;
            updateUI();
        }
        // 确保不自动播放
        audio.pause();
        isPlaying = false;
        playBtn.innerText = '▶';
        if (progressInterval) clearInterval(progressInterval);
    }

    init();
</script>
</body>
</html>
