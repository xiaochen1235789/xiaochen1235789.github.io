<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>六哥荣耀 - 音乐播放器（支持搜索）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1e3a2f 0%, #0f2a1f 100%);
            font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player {
            max-width: 550px;
            width: 100%;
            background: rgba(30, 58, 47, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .cover-area {
            display: flex;
            justify-content: center;
            padding: 30px 24px 20px;
        }
        .cover-img {
            width: 70%;
            max-width: 240px;
            border-radius: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .cover-img:hover {
            transform: scale(1.02);
        }
        .song-info {
            text-align: center;
            padding: 0 20px 20px;
        }
        .song-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }
        .song-artist {
            font-size: 1rem;
            color: #b0c4b0;
        }
        .progress-area {
            padding: 0 24px 12px;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #a0b8a0;
            margin-bottom: 6px;
        }
        .progress-bar {
            background: #3d6a58;
            height: 6px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #81c784, #a8e6b0);
            border-radius: 8px;
            position: relative;
        }
        .progress-handle {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-handle {
            opacity: 1;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            padding: 16px 24px;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .ctrl-btn:active {
            transform: scale(0.96);
        }
        .play-btn {
            background: #81c784;
            color: #1e3a2f;
            width: 72px;
            height: 72px;
            font-size: 2rem;
            box-shadow: 0 8px 18px rgba(129,199,132,0.3);
        }
        .play-btn:hover {
            background: #a3d9a8;
            transform: scale(1.02);
        }
        .extra-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 24px 24px;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(129,199,132,0.2);
        }
        .volume-wrap, .loop-wrap, .list-wrap {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: none;
            border: none;
            color: #c0e0c0;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            color: #81c784;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #3d6a58;
            border-radius: 4px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #81c784;
            border-radius: 50%;
            cursor: pointer;
        }
        .loop-btn.active {
            color: #81c784;
        }
        .song-list-panel {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.4s ease;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid transparent;
        }
        .song-list-panel.show {
            max-height: 320px;
            border-top-color: rgba(129,199,132,0.3);
        }
        .song-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 24px;
            color: #e0f0e0;
            border-bottom: 1px solid rgba(129,199,132,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .song-item.active {
            background: rgba(129,199,132,0.2);
            color: #81c784;
            border-left: 4px solid #81c784;
        }
        .song-item:hover {
            background: rgba(129,199,132,0.1);
        }
        .search-area {
            padding: 16px 24px;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(129,199,132,0.2);
        }
        .search-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .search-input::placeholder {
            color: #a0b8a0;
        }
        .search-btn {
            background: #81c784;
            color: #1e3a2f;
            padding: 0 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #81c784;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            display: none;
            white-space: nowrap;
        }
        @media (max-width: 500px) {
            .song-title { font-size: 1.4rem; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 1.4rem; }
            .play-btn { width: 64px; height: 64px; font-size: 1.8rem; }
            .extra-bar { flex-direction: column; align-items: stretch; }
            .volume-wrap, .loop-wrap, .list-wrap { justify-content: space-between; }
            .cover-img { width: 80%; }
            .toast { white-space: normal; max-width: 80%; text-align: center; }
        }
        @media (hover: none) and (pointer: coarse) {
            .progress-handle { opacity: 1; width: 16px; height: 16px; }
            .progress-bar { height: 8px; }
            .ctrl-btn, .play-btn, button { min-height: 44px; }
        }
    </style>
</head>
<body>
<div class="player">
    <div class="cover-area">
        <img class="cover-img" id="cover" src="https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300" alt="封面">
    </div>
    <div class="song-info">
        <div class="song-title" id="title">昔涟</div>
        <div class="song-artist" id="artist">张韶涵、HOYO-MiX</div>
    </div>
    <div class="progress-area">
        <div class="time-row">
            <span id="currentTime">00:00</span>
            <span id="totalTime">03:06</span>
        </div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-handle" id="progressHandle"></div>
        </div>
    </div>
    <div class="controls">
        <button class="ctrl-btn" id="prevBtn">❮</button>
        <button class="ctrl-btn play-btn" id="playBtn">▶</button>
        <button class="ctrl-btn" id="nextBtn">❯</button>
    </div>
    <div class="extra-bar">
        <div class="volume-wrap">
            <button id="volumeBtn">🔊</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
        </div>
        <div class="loop-wrap">
            <button id="loopBtn">🔁</button>
            <span id="loopText">顺序</span>
        </div>
        <div class="list-wrap">
            <button id="listToggleBtn">📋 歌单</button>
        </div>
    </div>
    <div class="search-area">
        <input type="text" class="search-input" id="searchKeyword" placeholder="搜索歌曲...">
        <button class="search-btn" id="searchBtn">搜索</button>
    </div>
    <div class="song-list-panel" id="songListPanel">
        <div id="songListContainer"></div>
    </div>
</div>
<div class="toast" id="toast">提示</div>

<audio id="audio" preload="metadata"></audio>

<script>
    // ================= 使用稳定的公共 API =================
    // API 1: 搜索（使用 66mz8.com，支持HTTPS和跨域）
    const SEARCH_API = (keyword) => `https://api.66mz8.com/api/music.163.php?type=search&key=${encodeURIComponent(keyword)}`;
    // API 2: 获取播放地址（同一个API，type=url）
    const GET_URL_API = (id) => `https://api.66mz8.com/api/music.163.php?type=url&id=${id}`;
    // 备用API（injahow，当主API失败时尝试）
    const BACKUP_SEARCH_API = (keyword) => `https://api.injahow.cn/meting/?type=search&keywords=${encodeURIComponent(keyword)}`;
    const BACKUP_URL_API = (id) => `https://api.injahow.cn/meting/?type=url&id=${id}`;

    // 内置默认歌单（网易云热门歌曲）
    const DEFAULT_SONGS = [
        { id: "3316968660", title: "昔涟", artist: "张韶涵、HOYO-MiX", duration: "03:06", pic: "https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300" },
        { id: "2722510685", title: "耀斑", artist: "HOYO-MiX,YMIR", duration: "03:33", pic: "https://p2.music.126.net/DYDACa_8zB5irAOrasVgnQ==/109951171396677694.jpg?param=300x300" },
        { id: "2709812973", title: "拂晓 Proi Proi", artist: "HOYO-MiX,NIDA", duration: "03:58", pic: "https://p2.music.126.net/2qGGwWFlMYF2o-GyNMhH5A==/109951171066942237.jpg?param=300x300" },
        { id: "2658660685", title: "何者", artist: "谭晶,HOYO-MiX", duration: "02:26", pic: "https://p1.music.126.net/gtunmoxObQyoH01HzURNUw==/109951170292455448.jpg?param=300x300" },
        { id: "2122308127", title: "不眠之夜", artist: "张杰,HOYO-MiX", duration: "02:18", pic: "https://p1.music.126.net/sZ-rACbFrybF0x_lI6XNMw==/109951169297766755.jpg?param=300x300" }
    ];

    let currentSongList = [...DEFAULT_SONGS];
    let currentIndex = 0;
    let isPlaying = false;
    let loopMode = 0;   // 0顺序 1列表循环 2单曲循环
    let volume = 0.7;
    let progressInterval = null;
    let isDragging = false;

    // DOM 元素
    const audio = document.getElementById('audio');
    const coverImg = document.getElementById('cover');
    const titleSpan = document.getElementById('title');
    const artistSpan = document.getElementById('artist');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loopBtn = document.getElementById('loopBtn');
    const loopText = document.getElementById('loopText');
    const listToggleBtn = document.getElementById('listToggleBtn');
    const songListPanel = document.getElementById('songListPanel');
    const songListContainer = document.getElementById('songListContainer');
    const searchBtn = document.getElementById('searchBtn');
    const searchKeyword = document.getElementById('searchKeyword');
    const toast = document.getElementById('toast');

    function showMessage(msg, isError = false) {
        toast.textContent = msg;
        toast.style.background = isError ? '#f87171' : 'rgba(0,0,0,0.8)';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function formatTime(sec) {
        if (isNaN(sec)) return "00:00";
        const mins = Math.floor(sec / 60);
        const remain = Math.floor(sec % 60);
        return `${mins.toString().padStart(2,'0')}:${remain.toString().padStart(2,'0')}`;
    }

    function updateUI() {
        const song = currentSongList[currentIndex];
        if (!song) return;
        titleSpan.innerText = song.title;
        artistSpan.innerText = song.artist;
        totalTimeSpan.innerText = song.duration;
        coverImg.src = song.pic || 'https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300';
        renderSongList();
    }

    // 获取播放地址（主API + 备用）
    async function getSongUrl(songId) {
        try {
            let res = await fetch(GET_URL_API(songId));
            let data = await res.json();
            if (data && data.url) return data.url;
            // 如果主API没有返回url，尝试备用
            res = await fetch(BACKUP_URL_API(songId));
            data = await res.json();
            if (data && data.url) return data.url;
            throw new Error("无法获取播放地址");
        } catch (e) {
            // 备用API再试一次
            const backupRes = await fetch(BACKUP_URL_API(songId));
            const backupData = await backupRes.json();
            if (backupData && backupData.url) return backupData.url;
            throw e;
        }
    }

    async function playSong(index) {
        if (index < 0) index = 0;
        if (index >= currentSongList.length) index = 0;
        currentIndex = index;
        const song = currentSongList[currentIndex];
        updateUI();

        try {
            showMessage("加载中...");
            const url = await getSongUrl(song.id);
            audio.src = url;
            audio.volume = volume;
            if (isPlaying) {
                await audio.play();
                startProgressTimer();
            }
            showMessage("正在播放: " + song.title);
            // 保存状态
            localStorage.setItem('currentList', JSON.stringify(currentSongList.map(s => s.id)));
            localStorage.setItem('currentIndex', currentIndex);
        } catch (err) {
            console.error(err);
            showMessage("播放失败: " + err.message, true);
            isPlaying = false;
            playBtn.innerText = '▶';
        }
    }

    async function togglePlay() {
        if (!audio.src) {
            await playSong(currentIndex);
            isPlaying = true;
            playBtn.innerText = '⏸';
            return;
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.innerText = '▶';
            if (progressInterval) clearInterval(progressInterval);
        } else {
            await audio.play();
            isPlaying = true;
            playBtn.innerText = '⏸';
            startProgressTimer();
        }
    }

    function startProgressTimer() {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (!isDragging && isPlaying && audio.src && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        }, 200);
    }

    function nextSong() {
        let newIndex = currentIndex + 1;
        if (newIndex >= currentSongList.length) {
            if (loopMode === 1) newIndex = 0;
            else {
                newIndex = currentSongList.length - 1;
                isPlaying = false;
                playBtn.innerText = '▶';
                if (progressInterval) clearInterval(progressInterval);
                return;
            }
        }
        currentIndex = newIndex;
        isPlaying = true;
        playSong(currentIndex);
    }

    function prevSong() {
        let newIndex = currentIndex - 1;
        if (newIndex < 0) {
            if (loopMode === 1) newIndex = currentSongList.length - 1;
            else newIndex = 0;
        }
        currentIndex = newIndex;
        isPlaying = true;
        playSong(currentIndex);
    }

    function setVolume(val) {
        volume = val;
        audio.volume = volume;
        volumeSlider.value = volume;
        volumeBtn.innerText = volume === 0 ? '🔇' : (volume < 0.5 ? '🔉' : '🔊');
        localStorage.setItem('volume', volume);
    }

    function toggleLoopMode() {
        loopMode = (loopMode + 1) % 3;
        const modes = ['顺序', '列表循环', '单曲循环'];
        const icons = ['🔁', '🔄', '🔂'];
        loopBtn.innerText = icons[loopMode];
        loopText.innerText = modes[loopMode];
        if (loopMode !== 0) loopBtn.classList.add('active');
        else loopBtn.classList.remove('active');
        localStorage.setItem('loopMode', loopMode);
    }

    // 搜索歌曲（使用主API，失败则用备用）
    async function searchSongs(keyword) {
        if (!keyword.trim()) return;
        showMessage("搜索中...");
        try {
            let res = await fetch(SEARCH_API(keyword));
            let data = await res.json();
            let songs = null;
            if (data && data.code === 200 && data.data && data.data.length) {
                // 66mz8 返回格式: { code:200, data:[{id,name,artist,album,picUrl,duration}] }
                songs = data.data;
            } else {
                // 尝试备用API
                res = await fetch(BACKUP_SEARCH_API(keyword));
                data = await res.json();
                if (data && data.songs && data.songs.length) {
                    songs = data.songs.map(s => ({
                        id: s.id,
                        name: s.name,
                        artist: s.artist,
                        picUrl: s.picUrl,
                        duration: s.duration
                    }));
                } else {
                    throw new Error("无搜索结果");
                }
            }
            if (songs && songs.length) {
                currentSongList = songs.slice(0, 30).map(s => ({
                    id: s.id,
                    title: s.name,
                    artist: s.artist,
                    duration: formatTime(s.duration / 1000),
                    pic: s.picUrl
                }));
                currentIndex = 0;
                isPlaying = true;
                updateUI();
                await playSong(0);
                showMessage(`找到 ${currentSongList.length} 首`);
                // 自动关闭歌单面板
                songListPanel.classList.remove('show');
                listToggleBtn.innerText = '📋 歌单';
            } else {
                showMessage("未找到相关歌曲", true);
            }
        } catch (err) {
            console.error(err);
            showMessage("搜索失败，请稍后重试", true);
        }
    }

    function renderSongList() {
        songListContainer.innerHTML = '';
        currentSongList.forEach((song, idx) => {
            const div = document.createElement('div');
            div.className = 'song-item' + (idx === currentIndex ? ' active' : '');
            div.innerHTML = `<span>${idx+1}. ${song.title} - ${song.artist}</span><span class="song-duration">${song.duration}</span>`;
            div.addEventListener('click', () => {
                currentIndex = idx;
                isPlaying = true;
                playSong(currentIndex);
                songListPanel.classList.remove('show');
                listToggleBtn.innerText = '📋 歌单';
            });
            songListContainer.appendChild(div);
        });
    }

    function seekProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        let percent = (e.clientX - rect.left) / rect.width;
        percent = Math.min(1, Math.max(0, percent));
        if (audio.duration && !isNaN(audio.duration)) {
            audio.currentTime = percent * audio.duration;
        }
    }

    function bindEvents() {
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        volumeSlider.addEventListener('input', (e) => setVolume(parseFloat(e.target.value)));
        volumeBtn.addEventListener('click', () => setVolume(audio.volume > 0 ? 0 : (volume || 0.7)));
        loopBtn.addEventListener('click', toggleLoopMode);
        listToggleBtn.addEventListener('click', () => {
            songListPanel.classList.toggle('show');
            listToggleBtn.innerText = songListPanel.classList.contains('show') ? '✖ 关闭' : '📋 歌单';
            renderSongList();
        });
        searchBtn.addEventListener('click', () => searchSongs(searchKeyword.value));
        searchKeyword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchSongs(searchKeyword.value);
        });
        progressBar.addEventListener('click', seekProgress);
        // 鼠标/触摸拖拽
        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            seekProgress(e);
            const onMouseMove = (e) => seekProgress(e);
            const onMouseUp = () => {
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        progressBar.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            seekProgress(e.touches[0]);
            const onTouchMove = (e) => seekProgress(e.touches[0]);
            const onTouchEnd = () => {
                isDragging = false;
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            };
            document.addEventListener('touchmove', onTouchMove);
            document.addEventListener('touchend', onTouchEnd);
        });
        audio.addEventListener('ended', () => {
            if (loopMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextSong();
            }
        });
        audio.addEventListener('timeupdate', () => {
            if (!isDragging && isPlaying && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        });
    }

    function loadStoredState() {
        const savedVolume = localStorage.getItem('volume');
        if (savedVolume) setVolume(parseFloat(savedVolume));
        const savedLoop = localStorage.getItem('loopMode');
        if (savedLoop) {
            loopMode = parseInt(savedLoop);
            if (loopMode === 0) { loopBtn.innerText = '🔁'; loopText.innerText = '顺序'; loopBtn.classList.remove('active'); }
            if (loopMode === 1) { loopBtn.innerText = '🔄'; loopText.innerText = '列表循环'; loopBtn.classList.add('active'); }
            if (loopMode === 2) { loopBtn.innerText = '🔂'; loopText.innerText = '单曲循环'; loopBtn.classList.add('active'); }
        }
        const savedIndex = localStorage.getItem('currentIndex');
        if (savedIndex && !isNaN(parseInt(savedIndex))) {
            currentIndex = Math.min(currentSongList.length - 1, parseInt(savedIndex));
        }
    }

    async function init() {
        bindEvents();
        loadStoredState();
        // 预加载默认歌曲但不自动播放（避免浏览器策略）
        await playSong(currentIndex);
        // 标记为暂停状态，让用户手动播放
        if (!isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.innerText = '▶';
            if (progressInterval) clearInterval(progressInterval);
        }
    }

    init();
</script>
</body>
</html>
