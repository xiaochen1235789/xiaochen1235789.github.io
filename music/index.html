<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>六哥荣耀 - 音乐播放器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1e3a2f 0%, #0f2a1f 100%);
            font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player {
            max-width: 550px;
            width: 100%;
            background: rgba(30, 58, 47, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .cover-area { display: flex; justify-content: center; padding: 30px 24px 20px; }
        .cover-img { width: 70%; max-width: 240px; border-radius: 24px; box-shadow: 0 12px 24px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .cover-img:hover { transform: scale(1.02); }
        .song-info { text-align: center; padding: 0 20px 20px; }
        .song-title { font-size: 1.8rem; font-weight: 700; color: white; margin-bottom: 6px; }
        .song-artist { font-size: 1rem; color: #b0c4b0; }
        .progress-area { padding: 0 24px 12px; }
        .time-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: #a0b8a0; margin-bottom: 6px; }
        .progress-bar { background: #3d6a58; height: 6px; border-radius: 8px; cursor: pointer; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #81c784, #a8e6b0); border-radius: 8px; }
        .controls { display: flex; justify-content: center; gap: 28px; padding: 16px 24px; }
        .ctrl-btn { background: rgba(255,255,255,0.1); border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 1.8rem; color: white; cursor: pointer; transition: 0.2s; }
        .play-btn { background: #81c784; color: #1e3a2f; width: 72px; height: 72px; font-size: 2rem; box-shadow: 0 8px 18px rgba(129,199,132,0.3); }
        .extra-bar { display: flex; justify-content: space-between; padding: 12px 24px 24px; gap: 12px; flex-wrap: wrap; border-top: 1px solid rgba(129,199,132,0.2); }
        .volume-wrap, .loop-wrap, .list-wrap { background: rgba(0,0,0,0.2); padding: 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
        button { background: none; border: none; color: #c0e0c0; font-size: 1.2rem; cursor: pointer; }
        .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; background: #3d6a58; border-radius: 4px; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #81c784; border-radius: 50%; cursor: pointer; }
        .loop-btn.active { color: #81c784; }
        .song-list-panel { max-height: 0; overflow-y: auto; transition: max-height 0.4s; background: rgba(0,0,0,0.3); border-top: 1px solid transparent; }
        .song-list-panel.show { max-height: 320px; border-top-color: rgba(129,199,132,0.3); }
        .song-item { display: flex; justify-content: space-between; padding: 12px 24px; color: #e0f0e0; border-bottom: 1px solid rgba(129,199,132,0.1); cursor: pointer; }
        .song-item.active { background: rgba(129,199,132,0.2); color: #81c784; border-left: 4px solid #81c784; }
        .search-area { padding: 16px 24px; display: flex; gap: 8px; border-top: 1px solid rgba(129,199,132,0.2); }
        .search-input { flex: 1; padding: 10px 16px; border-radius: 40px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 0.9rem; }
        .search-btn { background: #81c784; color: #1e3a2f; padding: 0 20px; border-radius: 40px; font-weight: bold; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #81c784; padding: 8px 16px; border-radius: 40px; font-size: 12px; z-index: 1000; display: none; }
        @media (max-width: 500px) {
            .song-title { font-size: 1.4rem; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 1.4rem; }
            .play-btn { width: 64px; height: 64px; font-size: 1.8rem; }
            .extra-bar { flex-direction: column; align-items: stretch; }
            .cover-img { width: 80%; }
        }
    </style>
</head>
<body>
<div class="player">
    <div class="cover-area"><img class="cover-img" id="cover" src="https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300"></div>
    <div class="song-info"><div class="song-title" id="title">昔涟</div><div class="song-artist" id="artist">张韶涵、HOYO-MiX</div></div>
    <div class="progress-area"><div class="time-row"><span id="currentTime">00:00</span><span id="totalTime">03:06</span></div><div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div></div>
    <div class="controls"><button class="ctrl-btn" id="prevBtn">❮</button><button class="ctrl-btn play-btn" id="playBtn">▶</button><button class="ctrl-btn" id="nextBtn">❯</button></div>
    <div class="extra-bar"><div class="volume-wrap"><button id="volumeBtn">🔊</button><input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7"></div><div class="loop-wrap"><button id="loopBtn">🔁</button><span id="loopText">顺序</span></div><div class="list-wrap"><button id="listToggleBtn">📋 歌单</button></div></div>
    <div class="search-area"><input type="text" class="search-input" id="searchKeyword" placeholder="搜索歌曲..."><button class="search-btn" id="searchBtn">搜索</button></div>
    <div class="song-list-panel" id="songListPanel"><div id="songListContainer"></div></div>
</div>
<div class="toast" id="toast"></div>
<audio id="audio" preload="metadata"></audio>

<script>
    // 使用稳定的 HTTPS API (liyefeng.top 提供网易云代理)
    const GET_URL_API = (id) => `https://api.liyefeng.top/song/url?id=${id}`;
    const SEARCH_API = (keyword) => `https://api.liyefeng.top/search?keywords=${encodeURIComponent(keyword)}`;
    const PLAYLIST_API = (id) => `https://api.liyefeng.top/playlist/track/all?id=${id}`;
    const DEFAULT_PLAYLIST_ID = "3778678";

    let currentSongList = [];
    let currentIndex = 0;
    let isPlaying = false;
    let loopMode = 0; // 0顺序 1列表循环 2单曲循环
    let volume = 0.7;
    let progressInterval = null;
    let isDragging = false;

    const audio = document.getElementById('audio');
    const coverImg = document.getElementById('cover');
    const titleSpan = document.getElementById('title');
    const artistSpan = document.getElementById('artist');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loopBtn = document.getElementById('loopBtn');
    const loopText = document.getElementById('loopText');
    const listToggleBtn = document.getElementById('listToggleBtn');
    const songListPanel = document.getElementById('songListPanel');
    const songListContainer = document.getElementById('songListContainer');
    const searchBtn = document.getElementById('searchBtn');
    const searchKeyword = document.getElementById('searchKeyword');
    const toast = document.getElementById('toast');

    function showMessage(msg, isError = false) {
        toast.textContent = msg;
        toast.style.background = isError ? '#f87171' : 'rgba(0,0,0,0.8)';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function formatTime(sec) {
        if (isNaN(sec)) return "00:00";
        const mins = Math.floor(sec / 60);
        const remain = Math.floor(sec % 60);
        return `${mins.toString().padStart(2,'0')}:${remain.toString().padStart(2,'0')}`;
    }

    function updateUI() {
        const song = currentSongList[currentIndex];
        if (!song) return;
        titleSpan.innerText = song.title;
        artistSpan.innerText = song.artist;
        totalTimeSpan.innerText = song.duration;
        coverImg.src = song.pic || 'https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300';
        renderSongList();
        localStorage.setItem('currentSongId', song.id);
        localStorage.setItem('currentIndex', currentIndex);
    }

    async function playSong(index) {
        if (index < 0) index = 0;
        if (index >= currentSongList.length) index = 0;
        currentIndex = index;
        const song = currentSongList[currentIndex];
        updateUI();
        try {
            showMessage("加载中...");
            const res = await fetch(GET_URL_API(song.id));
            const data = await res.json();
            if (data && data.data && data.data[0] && data.data[0].url) {
                audio.src = data.data[0].url;
                audio.volume = volume;
                if (isPlaying) {
                    await audio.play();
                    startProgressTimer();
                }
                showMessage("正在播放: " + song.title);
                localStorage.setItem('currentList', JSON.stringify(currentSongList.map(s => s.id)));
            } else {
                throw new Error("无法获取播放地址");
            }
        } catch (err) {
            console.error(err);
            showMessage("播放失败: " + err.message, true);
            isPlaying = false;
            playBtn.innerText = '▶';
        }
    }

    async function togglePlay() {
        if (!audio.src) {
            await playSong(currentIndex);
            isPlaying = true;
            playBtn.innerText = '⏸';
            return;
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.innerText = '▶';
            if (progressInterval) clearInterval(progressInterval);
        } else {
            await audio.play();
            isPlaying = true;
            playBtn.innerText = '⏸';
            startProgressTimer();
        }
    }

    function startProgressTimer() {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (!isDragging && isPlaying && audio.src && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        }, 200);
    }

    function nextSong() {
        let newIndex = currentIndex + 1;
        if (newIndex >= currentSongList.length) {
            if (loopMode === 1) newIndex = 0;
            else {
                newIndex = currentSongList.length - 1;
                isPlaying = false;
                playBtn.innerText = '▶';
                if (progressInterval) clearInterval(progressInterval);
                return;
            }
        }
        currentIndex = newIndex;
        isPlaying = true;
        playSong(currentIndex);
    }

    function prevSong() {
        let newIndex = currentIndex - 1;
        if (newIndex < 0) {
            if (loopMode === 1) newIndex = currentSongList.length - 1;
            else newIndex = 0;
        }
        currentIndex = newIndex;
        isPlaying = true;
        playSong(currentIndex);
    }

    function setVolume(val) {
        volume = val;
        audio.volume = volume;
        volumeSlider.value = volume;
        volumeBtn.innerText = volume === 0 ? '🔇' : (volume < 0.5 ? '🔉' : '🔊');
        localStorage.setItem('volume', volume);
    }

    function toggleLoopMode() {
        loopMode = (loopMode + 1) % 3;
        const modes = ['顺序', '列表循环', '单曲循环'];
        const icons = ['🔁', '🔄', '🔂'];
        loopBtn.innerText = icons[loopMode];
        loopText.innerText = modes[loopMode];
        if (loopMode !== 0) loopBtn.classList.add('active');
        else loopBtn.classList.remove('active');
        localStorage.setItem('loopMode', loopMode);
    }

    async function loadPlaylist(playlistId) {
        showMessage("加载歌单...");
        try {
            const res = await fetch(PLAYLIST_API(playlistId));
            const data = await res.json();
            if (data && data.songs && data.songs.length) {
                currentSongList = data.songs.map(s => ({
                    id: s.id,
                    title: s.name,
                    artist: s.ar.map(a => a.name).join('/'),
                    duration: formatTime(s.dt / 1000),
                    pic: s.al.picUrl
                }));
                currentIndex = 0;
                isPlaying = true;
                updateUI();
                await playSong(0);
                showMessage(`加载成功，共${currentSongList.length}首`);
            } else {
                throw new Error("歌单为空");
            }
        } catch (err) {
            console.error(err);
            showMessage("加载歌单失败，使用内置歌曲", true);
            currentSongList = [
                { id: "3316968660", title: "昔涟", artist: "张韶涵、HOYO-MiX", duration: "03:06", pic: "https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300" },
                { id: "2722510685", title: "耀斑", artist: "HOYO-MiX,YMIR", duration: "03:33", pic: "https://p2.music.126.net/DYDACa_8zB5irAOrasVgnQ==/109951171396677694.jpg?param=300x300" }
            ];
            currentIndex = 0;
            isPlaying = true;
            updateUI();
            await playSong(0);
        }
    }

    async function searchSongs(keyword) {
        if (!keyword.trim()) return;
        showMessage("搜索中...");
        try {
            const res = await fetch(SEARCH_API(keyword));
            const data = await res.json();
            if (data && data.result && data.result.songs && data.result.songs.length) {
                currentSongList = data.result.songs.slice(0, 30).map(s => ({
                    id: s.id,
                    title: s.name,
                    artist: s.artists.map(a => a.name).join('/'),
                    duration: formatTime(s.duration / 1000),
                    pic: s.album.picUrl
                }));
                currentIndex = 0;
                isPlaying = true;
                updateUI();
                await playSong(0);
                showMessage(`找到 ${currentSongList.length} 首`);
                songListPanel.classList.remove('show');
                listToggleBtn.innerText = '📋 歌单';
            } else {
                showMessage("未找到相关歌曲", true);
            }
        } catch (err) {
            console.error(err);
            showMessage("搜索失败", true);
        }
    }

    function renderSongList() {
        songListContainer.innerHTML = '';
        currentSongList.forEach((song, idx) => {
            const div = document.createElement('div');
            div.className = 'song-item' + (idx === currentIndex ? ' active' : '');
            div.innerHTML = `<span>${idx+1}. ${song.title} - ${song.artist}</span><span>${song.duration}</span>`;
            div.addEventListener('click', () => {
                currentIndex = idx;
                isPlaying = true;
                playSong(currentIndex);
                songListPanel.classList.remove('show');
                listToggleBtn.innerText = '📋 歌单';
            });
            songListContainer.appendChild(div);
        });
    }

    function seekProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        let percent = (e.clientX - rect.left) / rect.width;
        percent = Math.min(1, Math.max(0, percent));
        if (audio.duration && !isNaN(audio.duration)) {
            audio.currentTime = percent * audio.duration;
        }
    }

    function bindEvents() {
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        volumeSlider.addEventListener('input', (e) => setVolume(parseFloat(e.target.value)));
        volumeBtn.addEventListener('click', () => setVolume(audio.volume > 0 ? 0 : (volume || 0.7)));
        loopBtn.addEventListener('click', toggleLoopMode);
        listToggleBtn.addEventListener('click', () => {
            songListPanel.classList.toggle('show');
            listToggleBtn.innerText = songListPanel.classList.contains('show') ? '✖ 关闭' : '📋 歌单';
            renderSongList();
        });
        searchBtn.addEventListener('click', () => searchSongs(searchKeyword.value));
        searchKeyword.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchSongs(searchKeyword.value); });
        progressBar.addEventListener('click', seekProgress);
        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            seekProgress(e);
            const onMouseMove = (e) => seekProgress(e);
            const onMouseUp = () => { isDragging = false; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        progressBar.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            seekProgress(e.touches[0]);
            const onTouchMove = (e) => seekProgress(e.touches[0]);
            const onTouchEnd = () => { isDragging = false; document.removeEventListener('touchmove', onTouchMove); document.removeEventListener('touchend', onTouchEnd); };
            document.addEventListener('touchmove', onTouchMove);
            document.addEventListener('touchend', onTouchEnd);
        });
        audio.addEventListener('ended', () => {
            if (loopMode === 2) { audio.currentTime = 0; audio.play(); }
            else { nextSong(); }
        });
        audio.addEventListener('timeupdate', () => {
            if (!isDragging && isPlaying && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        });
    }

    function loadStoredState() {
        const savedVolume = localStorage.getItem('volume');
        if (savedVolume) setVolume(parseFloat(savedVolume));
        const savedLoop = localStorage.getItem('loopMode');
        if (savedLoop) {
            loopMode = parseInt(savedLoop);
            if (loopMode === 0) { loopBtn.innerText = '🔁'; loopText.innerText = '顺序'; loopBtn.classList.remove('active'); }
            if (loopMode === 1) { loopBtn.innerText = '🔄'; loopText.innerText = '列表循环'; loopBtn.classList.add('active'); }
            if (loopMode === 2) { loopBtn.innerText = '🔂'; loopText.innerText = '单曲循环'; loopBtn.classList.add('active'); }
        }
    }

    async function init() {
        bindEvents();
        loadStoredState();
        await loadPlaylist(DEFAULT_PLAYLIST_ID);
    }
    init();
</script>
</body>
</html>
