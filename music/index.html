<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>六哥荣耀 - 音乐播放器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:linear-gradient(135deg,#1e3a2f,#0f2a1f);font-family:system-ui;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .player{max-width:550px;width:100%;background:rgba(30,58,47,0.85);backdrop-filter:blur(20px);border-radius:48px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.4);}
        .cover-area{display:flex;justify-content:center;padding:30px 24px 20px;}
        .cover-img{width:70%;max-width:240px;border-radius:24px;box-shadow:0 12px 24px rgba(0,0,0,0.3);}
        .song-info{text-align:center;padding:0 20px 20px;}
        .song-title{font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:6px;}
        .song-artist{font-size:1rem;color:#b0c4b0;}
        .progress-area{padding:0 24px 12px;}
        .time-row{display:flex;justify-content:space-between;font-size:0.75rem;color:#a0b8a0;margin-bottom:6px;}
        .progress-bar{background:#3d6a58;height:6px;border-radius:8px;cursor:pointer;position:relative;}
        .progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#81c784,#a8e6b0);border-radius:8px;}
        .controls{display:flex;justify-content:center;gap:28px;padding:16px 24px;}
        .ctrl-btn{background:rgba(255,255,255,0.1);border:none;width:56px;height:56px;border-radius:50%;font-size:1.8rem;color:#fff;cursor:pointer;}
        .play-btn{background:#81c784;color:#1e3a2f;width:72px;height:72px;font-size:2rem;box-shadow:0 8px 18px rgba(129,199,132,0.3);}
        .extra-bar{display:flex;justify-content:space-between;padding:12px 24px 24px;gap:12px;flex-wrap:wrap;border-top:1px solid rgba(129,199,132,0.2);}
        .volume-wrap,.loop-wrap,.list-wrap{background:rgba(0,0,0,0.2);padding:6px 14px;border-radius:40px;display:flex;align-items:center;gap:8px;}
        button{background:none;border:none;color:#c0e0c0;font-size:1.2rem;cursor:pointer;}
        .volume-slider{width:80px;height:4px;-webkit-appearance:none;background:#3d6a58;border-radius:4px;}
        .volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#81c784;border-radius:50%;cursor:pointer;}
        .loop-btn.active{color:#81c784;}
        .song-list-panel{max-height:0;overflow-y:auto;transition:max-height 0.4s;background:rgba(0,0,0,0.3);border-top:1px solid transparent;}
        .song-list-panel.show{max-height:320px;border-top-color:rgba(129,199,132,0.3);}
        .song-item{display:flex;justify-content:space-between;padding:12px 24px;color:#e0f0e0;border-bottom:1px solid rgba(129,199,132,0.1);cursor:pointer;}
        .song-item.active{background:rgba(129,199,132,0.2);color:#81c784;border-left:4px solid #81c784;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#81c784;padding:8px 16px;border-radius:40px;font-size:12px;z-index:1000;display:none;}
        @media (max-width:500px){.song-title{font-size:1.4rem}.ctrl-btn{width:48px;height:48px;font-size:1.4rem}.play-btn{width:64px;height:64px;font-size:1.8rem}.extra-bar{flex-direction:column;align-items:stretch}.cover-img{width:80%}}
    </style>
</head>
<body>
<div class="player">
    <div class="cover-area"><img class="cover-img" id="cover" src="https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300"></div>
    <div class="song-info"><div class="song-title" id="title">昔涟</div><div class="song-artist" id="artist">张韶涵、HOYO-MiX</div></div>
    <div class="progress-area"><div class="time-row"><span id="currentTime">00:00</span><span id="totalTime">03:06</span></div><div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div></div>
    <div class="controls"><button class="ctrl-btn" id="prevBtn">❮</button><button class="ctrl-btn play-btn" id="playBtn">▶</button><button class="ctrl-btn" id="nextBtn">❯</button></div>
    <div class="extra-bar"><div class="volume-wrap"><button id="volumeBtn">🔊</button><input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7"></div><div class="loop-wrap"><button id="loopBtn">🔁</button><span id="loopText">顺序</span></div><div class="list-wrap"><button id="listToggleBtn">📋 歌单</button></div></div>
    <div class="song-list-panel" id="songListPanel"><div id="songListContainer"></div></div>
</div>
<div class="toast" id="toast"></div>
<audio id="audio" preload="metadata"></audio>

<script>
    // 内置歌曲列表（使用网易云官方直链）
    const SONGS = [
        { id: "3316968660", title: "昔涟", artist: "张韶涵、HOYO-MiX", duration: "03:06", pic: "https://p2.music.126.net/BKJrPO1FlbXcy-98AYXOzg==/109951172268004943.jpg?param=300x300" },
        { id: "2722510685", title: "耀斑", artist: "HOYO-MiX,YMIR", duration: "03:33", pic: "https://p2.music.126.net/DYDACa_8zB5irAOrasVgnQ==/109951171396677694.jpg?param=300x300" },
        { id: "2709812973", title: "拂晓 Proi Proi", artist: "HOYO-MiX,NIDA", duration: "03:58", pic: "https://p2.music.126.net/2qGGwWFlMYF2o-GyNMhH5A==/109951171066942237.jpg?param=300x300" },
        { id: "2658660685", title: "何者", artist: "谭晶,HOYO-MiX", duration: "02:26", pic: "https://p1.music.126.net/gtunmoxObQyoH01HzURNUw==/109951170292455448.jpg?param=300x300" },
        { id: "2122308127", title: "不眠之夜", artist: "张杰,HOYO-MiX", duration: "02:18", pic: "https://p1.music.126.net/sZ-rACbFrybF0x_lI6XNMw==/109951169297766755.jpg?param=300x300" }
    ];

    let currentList = [...SONGS];
    let currentIdx = 0;
    let isPlaying = false;
    let loopMode = 0;
    let volume = 0.7;
    let timer = null;
    let isDragging = false;

    const audio = document.getElementById('audio');
    const cover = document.getElementById('cover');
    const titleSpan = document.getElementById('title');
    const artistSpan = document.getElementById('artist');
    const currentSpan = document.getElementById('currentTime');
    const totalSpan = document.getElementById('totalTime');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loopBtn = document.getElementById('loopBtn');
    const loopText = document.getElementById('loopText');
    const listToggleBtn = document.getElementById('listToggleBtn');
    const listPanel = document.getElementById('songListPanel');
    const listContainer = document.getElementById('songListContainer');
    const toast = document.getElementById('toast');

    function showMsg(msg, isErr=false){
        toast.textContent = msg;
        toast.style.background = isErr ? '#f87171' : 'rgba(0,0,0,0.8)';
        toast.style.display = 'block';
        setTimeout(()=>toast.style.display='none',2000);
    }
    function formatTime(sec){
        if(isNaN(sec)) return "00:00";
        let m = Math.floor(sec/60);
        let s = Math.floor(sec%60);
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function updateUI(){
        let song = currentList[currentIdx];
        titleSpan.innerText = song.title;
        artistSpan.innerText = song.artist;
        totalSpan.innerText = song.duration;
        cover.src = song.pic;
        renderList();
    }

    function getSongUrl(songId){
        return `https://music.163.com/song/media/outer/url?id=${songId}.mp3`;
    }

    async function playSong(index){
        if(index<0) index=0;
        if(index>=currentList.length) index=0;
        currentIdx = index;
        updateUI();
        let song = currentList[currentIdx];
        let url = getSongUrl(song.id);
        audio.src = url;
        audio.volume = volume;
        if(isPlaying){
            try{
                await audio.play();
                startTimer();
                showMsg("正在播放: "+song.title);
            }catch(e){
                showMsg("播放失败，请点击播放", true);
                isPlaying = false;
                playBtn.innerText = '▶';
            }
        }
        localStorage.setItem('currentIdx', currentIdx);
        localStorage.setItem('currentListIds', JSON.stringify(currentList.map(s=>s.id)));
    }

    async function togglePlay(){
        if(!audio.src){
            await playSong(currentIdx);
            isPlaying = true;
            playBtn.innerText = '⏸';
            return;
        }
        if(isPlaying){
            audio.pause();
            isPlaying = false;
            playBtn.innerText = '▶';
            if(timer) clearInterval(timer);
        }else{
            await audio.play();
            isPlaying = true;
            playBtn.innerText = '⏸';
            startTimer();
        }
    }

    function startTimer(){
        if(timer) clearInterval(timer);
        timer = setInterval(()=>{
            if(!isDragging && isPlaying && audio.src && !isNaN(audio.duration)){
                let percent = (audio.currentTime/audio.duration)*100;
                progressFill.style.width = percent+'%';
                currentSpan.innerText = formatTime(audio.currentTime);
            }
        },200);
    }

    function next(){
        let newIdx = currentIdx+1;
        if(newIdx >= currentList.length){
            if(loopMode===1) newIdx=0;
            else newIdx=currentList.length-1;
        }
        currentIdx = newIdx;
        isPlaying = true;
        playSong(currentIdx);
    }
    function prev(){
        let newIdx = currentIdx-1;
        if(newIdx<0){
            if(loopMode===1) newIdx=currentList.length-1;
            else newIdx=0;
        }
        currentIdx = newIdx;
        isPlaying = true;
        playSong(currentIdx);
    }

    function setVolume(val){
        volume = val;
        audio.volume = volume;
        volumeSlider.value = volume;
        volumeBtn.innerText = volume===0?'🔇':(volume<0.5?'🔉':'🔊');
        localStorage.setItem('volume',volume);
    }

    function toggleLoop(){
        loopMode = (loopMode+1)%3;
        let modes = ['顺序','列表循环','单曲循环'];
        let icons = ['🔁','🔄','🔂'];
        loopBtn.innerText = icons[loopMode];
        loopText.innerText = modes[loopMode];
        if(loopMode!==0) loopBtn.classList.add('active');
        else loopBtn.classList.remove('active');
        localStorage.setItem('loopMode',loopMode);
    }

    function renderList(){
        listContainer.innerHTML = '';
        currentList.forEach((song,idx)=>{
            let div = document.createElement('div');
            div.className = 'song-item'+(idx===currentIdx?' active':'');
            div.innerHTML = `<span>${idx+1}. ${song.title} - ${song.artist}</span><span>${song.duration}</span>`;
            div.onclick = ()=>{
                currentIdx = idx;
                isPlaying = true;
                playSong(currentIdx);
                listPanel.classList.remove('show');
                listToggleBtn.innerText = '📋 歌单';
            };
            listContainer.appendChild(div);
        });
    }

    function seekProgress(e){
        let rect = progressBar.getBoundingClientRect();
        let percent = (e.clientX - rect.left)/rect.width;
        percent = Math.min(1,Math.max(0,percent));
        if(audio.duration && !isNaN(audio.duration)){
            audio.currentTime = percent * audio.duration;
        }
    }

    function bindEvents(){
        playBtn.onclick = togglePlay;
        prevBtn.onclick = prev;
        nextBtn.onclick = next;
        volumeSlider.oninput = (e)=>setVolume(parseFloat(e.target.value));
        volumeBtn.onclick = ()=>setVolume(audio.volume>0?0:volume||0.7);
        loopBtn.onclick = toggleLoop;
        listToggleBtn.onclick = ()=>{
            listPanel.classList.toggle('show');
            listToggleBtn.innerText = listPanel.classList.contains('show')?'✖ 关闭':'📋 歌单';
            renderList();
        };
        progressBar.onclick = seekProgress;
        progressBar.addEventListener('mousedown',(e)=>{
            isDragging = true;
            seekProgress(e);
            let onMouseMove = (e)=>seekProgress(e);
            let onMouseUp = ()=>{ isDragging=false; document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); };
            document.addEventListener('mousemove',onMouseMove);
            document.addEventListener('mouseup',onMouseUp);
        });
        progressBar.addEventListener('touchstart',(e)=>{
            e.preventDefault();
            isDragging = true;
            seekProgress(e.touches[0]);
            let onTouchMove = (e)=>seekProgress(e.touches[0]);
            let onTouchEnd = ()=>{ isDragging=false; document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd); };
            document.addEventListener('touchmove',onTouchMove);
            document.addEventListener('touchend',onTouchEnd);
        });
        audio.onended = ()=>{
            if(loopMode===2){
                audio.currentTime = 0;
                audio.play();
            }else{
                next();
            }
        };
        audio.ontimeupdate = ()=>{
            if(!isDragging && isPlaying && audio.duration){
                let percent = (audio.currentTime/audio.duration)*100;
                progressFill.style.width = percent+'%';
                currentSpan.innerText = formatTime(audio.currentTime);
            }
        };
    }

    function loadStored(){
        let savedVol = localStorage.getItem('volume');
        if(savedVol) setVolume(parseFloat(savedVol));
        let savedLoop = localStorage.getItem('loopMode');
        if(savedLoop){
            loopMode = parseInt(savedLoop);
            if(loopMode===0){ loopBtn.innerText='🔁'; loopText.innerText='顺序'; loopBtn.classList.remove('active');}
            if(loopMode===1){ loopBtn.innerText='🔄'; loopText.innerText='列表循环'; loopBtn.classList.add('active');}
            if(loopMode===2){ loopBtn.innerText='🔂'; loopText.innerText='单曲循环'; loopBtn.classList.add('active');}
        }
        let savedIdx = localStorage.getItem('currentIdx');
        if(savedIdx && !isNaN(parseInt(savedIdx))) currentIdx = Math.min(currentList.length-1, parseInt(savedIdx));
    }

    function init(){
        bindEvents();
        loadStored();
        updateUI();
        // 预加载但不自动播放（避免浏览器策略）
        audio.src = getSongUrl(currentList[currentIdx].id);
        audio.volume = volume;
        // 如果之前是播放状态，尝试恢复播放（需要用户交互）
        let wasPlaying = localStorage.getItem('wasPlaying');
        if(wasPlaying === 'true'){
            // 不自动播放，等待用户点击
        }
        setInterval(()=>{
            localStorage.setItem('wasPlaying', isPlaying);
        },1000);
    }
    init();
</script>
</body>
</html>
