<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <link rel="icon" href="/images/wangzhantupian.png" type="image/png">
    <title>妹妹小兹 · 六哥荣耀WIKI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0c0c0c;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #0c0c0c;
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #2c2c2e;
            flex-shrink: 0;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-image: url('https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/avatars/icon.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #4a3b2c;
        }
        .title h2 { font-size: 18px; font-weight: 600; color: #ffffff; }
        .title p { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .config-panel {
            background: #1c1c1e;
            padding: 12px 16px;
            border-bottom: 0.5px solid #2c2c2e;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .status-text {
            font-size: 12px;
            color: #30d158;
            margin-top: 0;
        }
        .clear-btn {
            background: #c41e3a;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-btn:hover {
            background: #a01830;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0c0c0c;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            background: #1c1c1e;
            color: #ffffff;
        }
        .message.user .bubble {
            background: #0a84ff;
            border-top-right-radius: 4px;
        }
        .message.ai .bubble {
            background: #2c2c2e;
            border-top-left-radius: 4px;
        }
        .time {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            padding: 0 6px;
        }
        .message.user .time { text-align: right; }
        .input-area {
            background: #0c0c0c;
            border-top: 0.5px solid #2c2c2e;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }
        #messageInput:focus { outline: none; border-color: #0a84ff; }
        .send-btn {
            background: #0a84ff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:disabled {
            background: #3a3a3c;
            cursor: not-allowed;
        }
        .loading-tip {
            text-align: center;
            padding: 12px;
            color: #8e8e93;
            font-size: 13px;
        }
        @media (max-width: 560px) {
            .config-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .clear-btn {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="chat-header">
    <div class="avatar"></div>
    <div class="title">
        <h2>小兹</h2>
        <p>WIKI小助手</p>
    </div>
</div>

<div class="config-panel">
    <div id="apiStatus" class="status-text">✅ 已连接，小兹随时在线～</div>
    <button id="clearHistoryBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> 清空聊天记录</button>
    <div style="font-size: 11px; color: #8e8e93; margin-top: 4px; width: 100%;">
        📚 小兹会查角色/光锥/材料/版本活动，用自然语言回答你～
    </div>
</div>

<div class="messages-area" id="messagesArea"></div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="对小兹说点什么..."></textarea>
    <button class="send-btn" id="sendBtn">➤</button>
</div>

<script>
    (function() {
        // ========== 固定密钥 ==========
        const DEEPSEEK_API_KEY = 'sk-231a300ad8034180b287dc1e174b72f9';
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';

        // 小兹的专属系统提示（补充性格设定）
        const SYSTEM_PROMPT = `你的名字叫小兹，是一个温柔可爱的邻家妹妹，同时也是「六哥荣耀WIKI」的智能助手。你喜欢聊天，乐于助人，语气亲切自然，偶尔会用“～”、“呀”、“哦”等语气词，但不会过度卖萌或做作。
你擅长回答关于游戏角色、光锥、材料以及版本活动的问题。
如果用户提问与你知识库相关，你会优先利用提供的WIKI资料给出准确、自然的答案。
如果资料不够详细（比如只知道角色的版本、属性），你可以结合游戏通用知识适当补充，但必须明确区分“WIKI资料”和“我的推测”。
如果完全查不到，你会诚实地说“小兹暂时没查到，要不要去WIKI主页看看呀～”。
回答要简洁清晰，尽量让用户感受到被关心和帮助。`;

        // DOM 元素
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiStatusSpan = document.getElementById('apiStatus');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let conversationHistory = [];
        let supabaseClient = null;

        // ========== Supabase ==========
        function getSupabase() {
            if (supabaseClient) return supabaseClient;
            if (!window.supabase) return null;
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch(e) { return null; }
            return supabaseClient;
        }

        // ========== 本地 WIKI 检索 ==========
        async function searchLocalWiki(query) {
            const client = getSupabase();
            if (!client) return null;
            let keywords = query.replace(/[?？、，。！？什么哪个怎么如何告诉我解释一下帮忙]/g, ' ').trim();
            if (!keywords) keywords = query;
            const results = [];

            const { data: characters } = await client
                .from('characters')
                .select('name, element, version')
                .or(`name.ilike.%${keywords}%,element.ilike.%${keywords}%,version.ilike.%${keywords}%`)
                .limit(5);
            if (characters?.length) {
                characters.forEach(c => results.push(`角色「${c.name}」｜属性：${c.element || '未知'}｜登场版本：${c.version || '未知'}`));
            }

            try {
                const { data: lightCones } = await client
                    .from('light_cones')
                    .select('name, description')
                    .or(`name.ilike.%${keywords}%,description.ilike.%${keywords}%`)
                    .limit(3);
                if (lightCones?.length) {
                    lightCones.forEach(l => results.push(`光锥「${l.name}」：${l.description || '暂无效果'}`));
                }
            } catch(e) {}

            try {
                const { data: materials } = await client
                    .from('materials')
                    .select('name, description')
                    .or(`name.ilike.%${keywords}%,description.ilike.%${keywords}%`)
                    .limit(3);
                if (materials?.length) {
                    materials.forEach(m => results.push(`材料「${m.name}」：${m.description || '暂无获取方式'}`));
                }
            } catch(e) {}

            try {
                const { data: versions } = await client
                    .from('game_versions')
                    .select('version, phase, name, description')
                    .or(`version.ilike.%${keywords}%,phase.ilike.%${keywords}%,name.ilike.%${keywords}%,description.ilike.%${keywords}%`)
                    .limit(3);
                if (versions?.length) {
                    versions.forEach(v => results.push(`版本活动「${v.version} ${v.phase} - ${v.name}」：${v.description || ''}`));
                }
            } catch(e) {}

            return results.length ? results.slice(0, 5) : null;
        }

        // ========== DeepSeek 调用 ==========
        async function callDeepSeekWithContext(userMessage, wikiContext) {
            let contextMessage = '';
            if (wikiContext?.length) {
                contextMessage = `以下是六哥荣耀WIKI中与用户问题相关的资料（请优先使用这些信息回答，用小兹的语气）：\n${wikiContext.join('\n')}\n\n如果资料只有角色的版本和属性，没有详细描述，你可以根据游戏常识适当补充推测，但要说明“WIKI里只记录了这些”。`;
            } else {
                contextMessage = '（当前没有找到与用户问题直接相关的WIKI资料，请根据你的通用知识回答，但如果用户问的是WIKI专属内容，请诚实说“小兹暂时没查到，可以去WIKI主页看看哦～”。）';
            }

            const recent = conversationHistory.slice(-8).map(m => ({ role: m.role, content: m.content }));
            const messages = [
                { role: 'system', content: SYSTEM_PROMPT + '\n\n' + contextMessage },
                ...recent,
                { role: 'user', content: userMessage }
            ];

            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messages,
                    temperature: 0.7,
                    max_tokens: 2048
                })
            });
            if (!response.ok) {
                let err = `HTTP ${response.status}`;
                try { const data = await response.json(); err += `: ${data.error?.message || ''}`; } catch(e) {}
                throw new Error(err);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ========== 发送消息 ==========
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            autoResize();

            addMessage('user', text, true);

            const loader = document.createElement('div');
            loader.className = 'loading-tip';
            loader.id = 'aiLoader';
            loader.innerHTML = '🔍 小兹正在查WIKI...';
            messagesArea.appendChild(loader);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const wikiResults = await searchLocalWiki(text);
                if (wikiResults?.length) {
                    loader.innerHTML = '📚 找到资料，小兹正在组织答案...';
                } else {
                    loader.innerHTML = '💭 没找到WIKI资料，小兹凭印象回答...';
                }
                const reply = await callDeepSeekWithContext(text, wikiResults);
                document.getElementById('aiLoader')?.remove();
                addMessage('assistant', reply, false);
            } catch (error) {
                document.getElementById('aiLoader')?.remove();
                console.error(error);
                addSystemMessage(`😥 小兹出错了: ${error.message}`);
                if (error.message.includes('401') || error.message.includes('Incorrect API key')) {
                    apiStatusSpan.innerHTML = '❌ 密钥无效，请联系管理员';
                    apiStatusSpan.style.color = '#ff453a';
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
            }
        }

        function addMessage(role, content, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            div.appendChild(bubble);
            div.appendChild(timeDiv);
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            conversationHistory.push({ role: role, content: content });
            saveHistory();
        }

        function addSystemMessage(content) {
            const div = document.createElement('div');
            div.className = 'message ai';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            div.appendChild(bubble);
            div.appendChild(timeDiv);
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function autoResize() {
            const ta = messageInput;
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        }

        function saveHistory() {
            localStorage.setItem('ai_sister_history', JSON.stringify(conversationHistory));
        }

        function loadStorage() {
            const savedHistory = localStorage.getItem('ai_sister_history');
            if (savedHistory) {
                try {
                    conversationHistory = JSON.parse(savedHistory);
                    renderMessagesFromHistory();
                } catch(e) {}
            }
            if (!conversationHistory.length) {
                addSystemMessage('🌸 小兹准备好啦～ 直接开始聊天吧！\n📚 我会查角色/光锥/材料/版本活动，用自然语言回答你～');
            }
        }

        function renderMessagesFromHistory() {
            messagesArea.innerHTML = '';
            for (const msg of conversationHistory) {
                const isUser = (msg.role === 'user');
                const div = document.createElement('div');
                div.className = `message ${isUser ? 'user' : 'ai'}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = escapeHtml(msg.content).replace(/\n/g, '<br>');
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                timeDiv.textContent = '·';
                div.appendChild(bubble);
                div.appendChild(timeDiv);
                messagesArea.appendChild(div);
            }
            if (conversationHistory.length === 0) {
                addSystemMessage('🌸 小兹准备好啦～');
            }
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function clearHistory() {
            if (confirm('确定清空所有聊天记录吗？此操作不可恢复。')) {
                conversationHistory = [];
                localStorage.removeItem('ai_sister_history');
                messagesArea.innerHTML = '';
                addSystemMessage('✨ 聊天记录已清空，重新开始吧～');
            }
        }

        function bindEvents() {
            sendBtn.onclick = sendMessage;
            messageInput.addEventListener('keypress', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            messageInput.addEventListener('input', autoResize);
            if (clearHistoryBtn) {
                clearHistoryBtn.onclick = clearHistory;
            }
            const headerTitle = document.querySelector('.title h2');
            if (headerTitle) {
                headerTitle.addEventListener('dblclick', clearHistory);
            }
        }

        async function autoTestConnection() {
            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: 'ping' }], max_tokens: 5 })
                });
                if (res.ok) {
                    apiStatusSpan.innerHTML = '✅ 小兹已就绪，直接聊天吧～';
                    apiStatusSpan.style.color = '#30d158';
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    apiStatusSpan.innerHTML = '⚠️ 连接失败，稍后再试试？';
                    apiStatusSpan.style.color = '#ff9f0a';
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
            } catch (err) {
                apiStatusSpan.innerHTML = '⚠️ 网络异常，小兹暂时无法响应';
                apiStatusSpan.style.color = '#ff9f0a';
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        function init() {
            loadStorage();
            bindEvents();
            autoTestConnection();
            if (!window.supabase) {
                console.warn('Supabase JS 加载失败，WIKI 查询功能不可用');
                addSystemMessage('⚠️ Supabase SDK 加载失败，部分WIKI查询功能暂不可用。');
            }
        }

        init();
    })();
</script>
</body>
</html>
