<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>问答妹妹（bate） · 六哥荣耀WIKI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0c0c0c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #0c0c0c;
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #2c2c2e;
            flex-shrink: 0;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4a3b2c, #6b4e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .title h2 {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        .title p {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 2px;
        }
        .settings-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #0a84ff;
            padding: 6px;
            margin-left: auto;
        }
        /* 配置面板默认显示，不再隐藏 */
        .config-panel {
            background: #1c1c1e;
            padding: 12px 16px;
            border-bottom: 0.5px solid #2c2c2e;
            display: block;
        }
        .api-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .api-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #3a3a3c;
            border-radius: 24px;
            font-size: 14px;
            background: #2c2c2e;
            color: #ffffff;
            min-width: 200px;
        }
        .api-input:focus {
            outline: none;
            border-color: #0a84ff;
        }
        .btn-sm {
            background: #0a84ff;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-outline {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #ffffff;
        }
        .status-text {
            font-size: 12px;
            color: #ff9f0a;
            margin-top: 6px;
        }
        .status-text.success { color: #30d158; }
        .status-text.error { color: #ff453a; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0c0c0c;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            background: #1c1c1e;
            color: #ffffff;
        }
        .message.user .bubble {
            background: #0a84ff;
            border-top-right-radius: 4px;
        }
        .message.ai .bubble {
            background: #2c2c2e;
            border-top-left-radius: 4px;
        }
        .time {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            padding: 0 6px;
        }
        .message.user .time {
            text-align: right;
        }
        .input-area {
            background: #0c0c0c;
            border-top: 0.5px solid #2c2c2e;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }
        #messageInput:focus {
            outline: none;
            border-color: #0a84ff;
        }
        .send-btn {
            background: #0a84ff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:disabled {
            background: #3a3a3c;
            cursor: not-allowed;
        }
        .loading-tip {
            text-align: center;
            padding: 12px;
            color: #8e8e93;
            font-size: 13px;
        }
        @media (max-width: 560px) {
            .api-row { flex-direction: column; align-items: stretch; }
            .btn-sm { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="chat-header">
    <div class="avatar">🌸</div>
    <div class="title">
        <h2>AI妹妹</h2>
        <p>WIKI专家 · 温柔陪伴</p>
    </div>
    <button class="settings-btn" id="settingsBtn" style="opacity:0.5; pointer-events:none;">⚙️</button>
    <!-- 齿轮按钮禁用，因为面板已经默认显示 -->
</div>

<!-- 配置面板始终可见 -->
<div class="config-panel" id="configPanel">
    <div class="api-row">
        <input type="password" id="apiKeyInput" class="api-input" placeholder="DeepSeek API Key (sk-...)" autocomplete="off">
        <button id="saveKeyBtn" class="btn-sm">保存密钥</button>
    </div>
    <div class="api-row">
        <button id="testConnBtn" class="btn-sm btn-outline">测试连接</button>
        <button id="clearHistoryBtn" class="btn-sm btn-outline" style="color:#ff453a;">清空对话</button>
    </div>
    <div id="apiStatus" class="status-text"></div>
    <div style="font-size: 11px; color: #8e8e93; margin-top: 8px;">
        🔑 密钥仅保存在本地浏览器。<br>
        💡 没有密钥？<a href="https://platform.deepseek.com/" target="_blank" style="color:#0a84ff;">免费获取</a><br>
        📚 妹妹会优先查询WIKI数据库，找不到再问AI～
    </div>
</div>

<div class="messages-area" id="messagesArea">
    <div class="loading-tip">✨ 输入DeepSeek密钥后点击「保存密钥」再「测试连接」～</div>
</div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="对妹妹说点什么..." disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
</div>

<script>
    // ================== 配置区 ==================
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_ANON_KEY = '你的anon密钥';  // ⚠️ 请替换为你的 Supabase anon 密钥
    const SYSTEM_PROMPT = `你是一个温柔可爱的邻家妹妹，同时也是「六哥荣耀WIKI」的智能助手。你擅长回答关于游戏角色、光锥、材料等 WIKI 内容。如果用户提问与你知识库相关，你会优先利用提供的WIKI资料给出准确答案。如果资料不足，你会诚实地说“妹妹暂时没查到，要不要去WIKI主页看看呀～”。继续保持自然、真诚的语气。`;

    // ================== 全局变量 ==================
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let conversationHistory = [];
    let currentApiKey = '';
    let isConnected = false;

    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const testConnBtn = document.getElementById('testConnBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const apiStatusSpan = document.getElementById('apiStatus');

    // ================== 本地知识库检索（优先使用）==================
    async function searchLocalWiki(query) {
        const keywords = query.replace(/[?？什么哪个怎么如何告诉我解释一下]/g, '').trim();
        if (!keywords) return null;
        const [charRes, coneRes, matRes] = await Promise.all([
            supabase.from('characters').select('name, description, detail_url').ilike('name', `%${keywords}%`),
            supabase.from('light_cones').select('name, description, detail_url').ilike('name', `%${keywords}%`),
            supabase.from('materials').select('name, description, detail_url').ilike('name', `%${keywords}%`)
        ]);
        const results = [];
        if (charRes.data && charRes.data.length) results.push(...charRes.data.map(r => `角色「${r.name}」：${r.description || '暂无介绍'}`));
        if (coneRes.data && coneRes.data.length) results.push(...coneRes.data.map(r => `光锥「${r.name}」：${r.description || '暂无效果'}`));
        if (matRes.data && matRes.data.length) results.push(...matRes.data.map(r => `材料「${r.name}」：${r.description || '获取方式待补充'}`));
        return results.length ? results.slice(0, 3) : null;
    }

    function buildLocalReply(results, userQuery) {
        if (!results) return null;
        const info = results.join('\n');
        return `嗯～ 我查了一下WIKI，关于「${userQuery}」的信息如下：\n${info}\n\n需要更详细的内容可以去WIKI主页看看哦～(｡･ω･｡)`;
    }

    // ================== 远程API调用 ==================
    async function callDeepSeek(userMessage) {
        const recentHistory = conversationHistory.slice(-10).map(msg => ({ role: msg.role, content: msg.content }));
        const messages = [
            { role: 'system', content: SYSTEM_PROMPT },
            ...recentHistory,
            { role: 'user', content: userMessage }
        ];
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${currentApiKey}`
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: messages,
                temperature: 0.7,
                max_tokens: 500
            })
        });
        if (!response.ok) {
            let errMsg = `HTTP ${response.status}`;
            try { const errData = await response.json(); errMsg += `: ${errData.error?.message || ''}`; } catch(e) {}
            throw new Error(errMsg);
        }
        const data = await response.json();
        return data.choices[0].message.content;
    }

    // ================== 核心发送逻辑 ==================
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (!currentApiKey || !isConnected) {
            addSystemMessage('⚠️ 请先保存密钥并测试连接成功后再聊天～');
            return;
        }
        messageInput.value = '';
        autoResize();
        addMessage('user', text, true);
        const loader = document.createElement('div');
        loader.className = 'loading-tip';
        loader.id = 'aiLoader';
        loader.innerHTML = '🔍 妹妹正在查WIKI...';
        messagesArea.appendChild(loader);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        try {
            const localResult = await searchLocalWiki(text);
            let reply = null;
            if (localResult && localResult.length > 0) {
                reply = buildLocalReply(localResult, text);
            }
            if (!reply) {
                loader.innerHTML = '💬 妹妹思考中...';
                reply = await callDeepSeek(text);
            }
            document.getElementById('aiLoader')?.remove();
            addMessage('assistant', reply, false);
            conversationHistory.push({ role: 'assistant', content: reply });
        } catch (error) {
            document.getElementById('aiLoader')?.remove();
            console.error(error);
            addSystemMessage(`😥 妹妹出错了: ${error.message}`);
            if (error.message.includes('401') || error.message.includes('Incorrect API key')) {
                apiStatusSpan.innerHTML = '❌ 密钥无效，请重新保存';
                apiStatusSpan.className = 'status-text error';
                isConnected = false;
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }
    }

    // ================== UI辅助 ==================
    function addMessage(role, content, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'ai'}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
        const timeDiv = document.createElement('div');
        timeDiv.className = 'time';
        timeDiv.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        div.appendChild(bubble);
        div.appendChild(timeDiv);
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        if (!isUser) conversationHistory.push({ role, content });
        saveHistory();
    }

    function addSystemMessage(content) {
        const div = document.createElement('div');
        div.className = 'message ai';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
        const timeDiv = document.createElement('div');
        timeDiv.className = 'time';
        timeDiv.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        div.appendChild(bubble);
        div.appendChild(timeDiv);
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function autoResize() {
        const ta = messageInput;
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    }

    function saveHistory() {
        localStorage.setItem('ai_sister_history', JSON.stringify(conversationHistory));
    }

    function loadStorage() {
        const savedKey = localStorage.getItem('ai_sister_key');
        if (savedKey) {
            currentApiKey = savedKey;
            apiKeyInput.value = savedKey;
            checkApiKeyValid();
        }
        const savedHistory = localStorage.getItem('ai_sister_history');
        if (savedHistory) {
            try {
                conversationHistory = JSON.parse(savedHistory);
                renderMessagesFromHistory();
            } catch(e) {}
        }
        if (!conversationHistory.length) {
            addSystemMessage('🌸 妹妹准备好啦～ 输入DeepSeek密钥就可以聊天咯！\n📚 我会先查WIKI数据库，找不到再问AI～');
        }
    }

    function renderMessagesFromHistory() {
        messagesArea.innerHTML = '';
        for (const msg of conversationHistory) {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = escapeHtml(msg.content).replace(/\n/g, '<br>');
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = '·';
            div.appendChild(bubble);
            div.appendChild(timeDiv);
            messagesArea.appendChild(div);
        }
        messagesArea.scrollTop = messagesArea.scrollHeight;
        if (conversationHistory.length === 0) addSystemMessage('🌸 妹妹准备好啦～');
    }

    function clearHistory() {
        if (confirm('清空所有聊天记录？')) {
            conversationHistory = [];
            localStorage.removeItem('ai_sister_history');
            messagesArea.innerHTML = '';
            addSystemMessage('✨ 聊天记录已清空，重新开始吧～');
        }
    }

    function saveApiKey() {
        const key = apiKeyInput.value.trim();
        if (!key || !key.startsWith('sk-')) {
            apiStatusSpan.innerHTML = '❌ 密钥格式错误，应以 sk- 开头';
            apiStatusSpan.className = 'status-text error';
            return;
        }
        currentApiKey = key;
        localStorage.setItem('ai_sister_key', key);
        checkApiKeyValid();
        apiStatusSpan.innerHTML = '✅ 密钥已保存！请点击「测试连接」';
        apiStatusSpan.className = 'status-text success';
    }

    async function testConnection() {
        if (!currentApiKey) {
            apiStatusSpan.innerHTML = '请先保存密钥';
            apiStatusSpan.className = 'status-text error';
            return;
        }
        apiStatusSpan.innerHTML = '⏳ 测试中...';
        apiStatusSpan.className = 'status-text';
        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'user', content: 'ping' }],
                    max_tokens: 5
                })
            });
            if (res.ok) {
                apiStatusSpan.innerHTML = '✅ 连接成功！现在可以聊天啦。';
                apiStatusSpan.className = 'status-text success';
                isConnected = true;
                messageInput.disabled = false;
                sendBtn.disabled = false;
            } else {
                let err = `HTTP ${res.status}`;
                try { const data = await res.json(); err += `: ${data.error?.message || ''}`; } catch(e) {}
                apiStatusSpan.innerHTML = `❌ 连接失败: ${err}`;
                apiStatusSpan.className = 'status-text error';
                isConnected = false;
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        } catch (err) {
            apiStatusSpan.innerHTML = `❌ 网络错误: ${err.message}`;
            apiStatusSpan.className = 'status-text error';
            isConnected = false;
            messageInput.disabled = true;
            sendBtn.disabled = true;
        }
    }

    function checkApiKeyValid() {
        if (currentApiKey && currentApiKey.startsWith('sk-')) {
            isConnected = false; // 需要手动测试连接
            messageInput.disabled = true;
            sendBtn.disabled = true;
            messageInput.placeholder = '请先测试连接';
            apiStatusSpan.innerHTML = '🔑 密钥已保存，点击「测试连接」验证';
            apiStatusSpan.className = 'status-text';
        } else {
            isConnected = false;
            messageInput.disabled = true;
            sendBtn.disabled = true;
            messageInput.placeholder = '请先配置API密钥';
            apiStatusSpan.innerHTML = '⚠️ 未检测到有效的密钥';
            apiStatusSpan.className = 'status-text error';
        }
    }

    function bindEvents() {
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        messageInput.addEventListener('input', autoResize);
        saveKeyBtn.onclick = () => { saveApiKey(); };
        testConnBtn.onclick = testConnection;
        clearHistoryBtn.onclick = clearHistory;
    }

    function init() {
        loadStorage();
        bindEvents();
    }

    init();
</script>
</body>
</html>
