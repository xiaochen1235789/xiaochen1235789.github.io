<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <link rel="icon" href="/images/wangzhantupian.png" type="image/png">
    <title>AI妹妹 · 六哥荣耀WIKI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0c0c0c;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #0c0c0c;
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #2c2c2e;
            flex-shrink: 0;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4a3b2c, #6b4e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .title h2 { font-size: 18px; font-weight: 600; color: #ffffff; }
        .title p { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .config-panel {
            background: #1c1c1e;
            padding: 12px 16px;
            border-bottom: 0.5px solid #2c2c2e;
        }
        .api-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .api-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #3a3a3c;
            border-radius: 24px;
            font-size: 14px;
            background: #2c2c2e;
            color: #ffffff;
            min-width: 200px;
        }
        .api-input:focus { outline: none; border-color: #0a84ff; }
        .btn-sm {
            background: #0a84ff;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-outline {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #ffffff;
        }
        .status-text {
            font-size: 12px;
            color: #ff9f0a;
            margin-top: 6px;
        }
        .status-text.success { color: #30d158; }
        .status-text.error { color: #ff453a; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0c0c0c;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            background: #1c1c1e;
            color: #ffffff;
        }
        .message.user .bubble {
            background: #0a84ff;
            border-top-right-radius: 4px;
        }
        .message.ai .bubble {
            background: #2c2c2e;
            border-top-left-radius: 4px;
        }
        .time {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            padding: 0 6px;
        }
        .message.user .time { text-align: right; }
        .input-area {
            background: #0c0c0c;
            border-top: 0.5px solid #2c2c2e;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }
        #messageInput:focus { outline: none; border-color: #0a84ff; }
        .send-btn {
            background: #0a84ff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:disabled {
            background: #3a3a3c;
            cursor: not-allowed;
        }
        .loading-tip {
            text-align: center;
            padding: 12px;
            color: #8e8e93;
            font-size: 13px;
        }
        @media (max-width: 560px) {
            .api-row { flex-direction: column; align-items: stretch; }
            .btn-sm { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="chat-header">
    <div class="avatar">🌸</div>
    <div class="title">
        <h2>AI妹妹</h2>
        <p>WIKI专家 · 智能检索</p>
    </div>
</div>

<div class="config-panel">
    <div class="api-row">
        <input type="password" id="apiKeyInput" class="api-input" placeholder="DeepSeek API Key (sk-...)" autocomplete="off">
        <button id="saveKeyBtn" class="btn-sm">保存密钥</button>
    </div>
    <div class="api-row">
        <button id="testConnBtn" class="btn-sm btn-outline">测试连接</button>
        <button id="clearHistoryBtn" class="btn-sm btn-outline" style="color:#ff453a;">清空对话</button>
    </div>
    <div id="apiStatus" class="status-text"></div>
    <div style="font-size: 11px; color: #8e8e93; margin-top: 8px;">
        🔑 密钥本地保存 | 📚 我会查角色/光锥/材料/版本活动，用自然语言回答你～
    </div>
</div>

<div class="messages-area" id="messagesArea">
    <div class="loading-tip">✨ 输入DeepSeek密钥后点击「保存密钥」再「测试连接」～</div>
</div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="对妹妹说点什么..." disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
</div>

<script>
    (function() {
        // ========== 配置（请替换为你的真实 anon key）==========
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';

        // 妹妹人设（稍作调整，强调会利用已有信息）
        const SYSTEM_PROMPT = `你是一个温柔可爱的邻家妹妹，同时也是「六哥荣耀WIKI」的智能助手。你擅长回答关于游戏角色、光锥、材料以及版本活动的问题。
如果用户提问与你知识库相关，你会优先利用提供的WIKI资料给出准确、自然的答案。
如果资料不够详细（比如只知道角色的版本、属性），你可以结合游戏通用知识适当补充，但必须明确区分“WIKI资料”和“我的推测”。
如果完全查不到，你会诚实地说“妹妹暂时没查到，要不要去WIKI主页看看呀～”。
回答要亲切、自然，可以使用“～”、“呀”等语气词，但不要过度卖萌。`;

        // ========== DOM ==========
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const testConnBtn = document.getElementById('testConnBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const apiStatusSpan = document.getElementById('apiStatus');

        let conversationHistory = [];
        let currentApiKey = '';
        let isConnected = false;

        // ========== Supabase 客户端 ==========
        let supabaseClient = null;
        function getSupabase() {
            if (supabaseClient) return supabaseClient;
            if (!window.supabase) {
                console.warn('Supabase JS 未加载');
                return null;
            }
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch(e) {
                console.error('创建 Supabase 客户端失败', e);
                return null;
            }
            return supabaseClient;
        }

        // ========== 智能检索（适配角色仅有 name, element, version）==========
        async function searchLocalWiki(query) {
            const client = getSupabase();
            if (!client) return null;

            // 提取关键词
            let keywords = query.replace(/[?？、，。！？什么哪个怎么如何告诉我解释一下帮忙]/g, ' ').trim();
            if (!keywords) keywords = query;
            console.log('[检索] 原始提问:', query);
            console.log('[检索] 关键词:', keywords);

            const results = [];

            // 1. 查询角色表（只有 name, element, version）
            const { data: characters } = await client
                .from('characters')
                .select('name, element, version')
                .or(`name.ilike.%${keywords}%,element.ilike.%${keywords}%,version.ilike.%${keywords}%`)
                .limit(5);
            if (characters && characters.length) {
                characters.forEach(c => {
                    results.push(`角色「${c.name}」｜属性：${c.element || '未知'}｜登场版本：${c.version || '未知'}`);
                });
            }

            // 2. 查询光锥表（假设有 name, description）
            try {
                const { data: lightCones } = await client
                    .from('light_cones')
                    .select('name, description')
                    .or(`name.ilike.%${keywords}%,description.ilike.%${keywords}%`)
                    .limit(3);
                if (lightCones && lightCones.length) {
                    lightCones.forEach(l => results.push(`光锥「${l.name}」：${l.description || '暂无效果'}`));
                }
            } catch(e) { console.warn('light_cones 表查询失败', e); }

            // 3. 查询材料表（假设有 name, description）
            try {
                const { data: materials } = await client
                    .from('materials')
                    .select('name, description')
                    .or(`name.ilike.%${keywords}%,description.ilike.%${keywords}%`)
                    .limit(3);
                if (materials && materials.length) {
                    materials.forEach(m => results.push(`材料「${m.name}」：${m.description || '暂无获取方式'}`));
                }
            } catch(e) { console.warn('materials 表查询失败', e); }

            // 4. 查询版本活动表（如果存在）
            try {
                const { data: versions } = await client
                    .from('game_versions')
                    .select('version, phase, name, description')
                    .or(`version.ilike.%${keywords}%,phase.ilike.%${keywords}%,name.ilike.%${keywords}%,description.ilike.%${keywords}%`)
                    .limit(3);
                if (versions && versions.length) {
                    versions.forEach(v => results.push(`版本活动「${v.version} ${v.phase} - ${v.name}」：${v.description || ''}`));
                }
            } catch(e) { console.warn('game_versions 表可能未创建', e); }

            console.log('[检索] 总结果数:', results.length);
            return results.length ? results.slice(0, 5) : null;
        }

        // ========== 调用 DeepSeek 并附带上下文 ==========
        async function callDeepSeekWithContext(userMessage, wikiContext) {
            let contextMessage = '';
            if (wikiContext && wikiContext.length) {
                contextMessage = `以下是六哥荣耀WIKI中与用户问题相关的资料（请优先使用这些信息回答，用自然的妹妹口吻）：\n${wikiContext.join('\n')}\n\n如果资料只有角色的版本和属性，没有详细描述，你可以根据游戏常识适当补充推测，但要说明“WIKI里只记录了这些”。`;
            } else {
                contextMessage = '（当前没有找到与用户问题直接相关的WIKI资料，请根据你的通用知识回答，但如果用户问的是WIKI专属内容，请诚实说“妹妹暂时没查到，可以去WIKI主页看看哦～”。）';
            }

            const recent = conversationHistory.slice(-8).map(m => ({ role: m.role, content: m.content }));
            const messages = [
                { role: 'system', content: SYSTEM_PROMPT + '\n\n' + contextMessage },
                ...recent,
                { role: 'user', content: userMessage }
            ];

            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messages,
                    temperature: 0.7,
                    max_tokens: 600
                })
            });
            if (!response.ok) {
                let err = `HTTP ${response.status}`;
                try { const data = await response.json(); err += `: ${data.error?.message || ''}`; } catch(e) {}
                throw new Error(err);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ========== 发送消息 ==========
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (!currentApiKey || !isConnected) {
                addSystemMessage('⚠️ 请先保存密钥并测试连接成功后再聊天～');
                return;
            }
            messageInput.value = '';
            autoResize();
            addMessage('user', text, true);

            const loader = document.createElement('div');
            loader.className = 'loading-tip';
            loader.id = 'aiLoader';
            loader.innerHTML = '🔍 妹妹正在查WIKI...';
            messagesArea.appendChild(loader);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const wikiResults = await searchLocalWiki(text);
                if (wikiResults && wikiResults.length) {
                    loader.innerHTML = '📚 找到资料，妹妹正在组织答案...';
                } else {
                    loader.innerHTML = '💭 没找到WIKI资料，妹妹凭印象回答...';
                }
                const reply = await callDeepSeekWithContext(text, wikiResults);
                document.getElementById('aiLoader')?.remove();
                addMessage('assistant', reply, false);
                conversationHistory.push({ role: 'assistant', content: reply });
            } catch (error) {
                document.getElementById('aiLoader')?.remove();
                console.error(error);
                addSystemMessage(`😥 妹妹出错了: ${error.message}`);
                if (error.message.includes('401') || error.message.includes('Incorrect API key')) {
                    apiStatusSpan.innerHTML = '❌ 密钥无效，请重新保存';
                    apiStatusSpan.className = 'status-text error';
                    isConnected = false;
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
            }
        }

        // ==================== UI 辅助函数（不变）====================
        function addMessage(role, content, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            div.appendChild(bubble);
            div.appendChild(timeDiv);
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            if (!isUser) conversationHistory.push({ role, content });
            saveHistory();
        }

        function addSystemMessage(content) {
            const div = document.createElement('div');
            div.className = 'message ai';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            div.appendChild(bubble);
            div.appendChild(timeDiv);
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function autoResize() {
            const ta = messageInput;
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        }

        function saveHistory() {
            localStorage.setItem('ai_sister_history', JSON.stringify(conversationHistory));
        }

        function loadStorage() {
            const savedKey = localStorage.getItem('ai_sister_key');
            if (savedKey) {
                currentApiKey = savedKey;
                apiKeyInput.value = savedKey;
                checkApiKeyValid();
            }
            const savedHistory = localStorage.getItem('ai_sister_history');
            if (savedHistory) {
                try {
                    conversationHistory = JSON.parse(savedHistory);
                    renderMessagesFromHistory();
                } catch(e) {}
            }
            if (!conversationHistory.length) {
                addSystemMessage('🌸 妹妹准备好啦～ 输入DeepSeek密钥就可以聊天咯！\n📚 我会查角色/光锥/材料/版本活动，用自然语言回答你～');
            }
        }

        function renderMessagesFromHistory() {
            messagesArea.innerHTML = '';
            for (const msg of conversationHistory) {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = escapeHtml(msg.content).replace(/\n/g, '<br>');
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                timeDiv.textContent = '·';
                div.appendChild(bubble);
                div.appendChild(timeDiv);
                messagesArea.appendChild(div);
            }
            messagesArea.scrollTop = messagesArea.scrollHeight;
            if (conversationHistory.length === 0) addSystemMessage('🌸 妹妹准备好啦～');
        }

        function clearHistory() {
            if (confirm('清空所有聊天记录？')) {
                conversationHistory = [];
                localStorage.removeItem('ai_sister_history');
                messagesArea.innerHTML = '';
                addSystemMessage('✨ 聊天记录已清空，重新开始吧～');
            }
        }

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if (!key || !key.startsWith('sk-')) {
                apiStatusSpan.innerHTML = '❌ 密钥格式错误，应以 sk- 开头';
                apiStatusSpan.className = 'status-text error';
                return;
            }
            currentApiKey = key;
            localStorage.setItem('ai_sister_key', key);
            checkApiKeyValid();
            apiStatusSpan.innerHTML = '✅ 密钥已保存！请点击「测试连接」';
            apiStatusSpan.className = 'status-text success';
        }

        async function testConnection() {
            if (!currentApiKey) {
                apiStatusSpan.innerHTML = '请先保存密钥';
                apiStatusSpan.className = 'status-text error';
                return;
            }
            apiStatusSpan.innerHTML = '⏳ 测试中...';
            apiStatusSpan.className = 'status-text';
            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: 'ping' }], max_tokens: 5 })
                });
                if (res.ok) {
                    apiStatusSpan.innerHTML = '✅ 连接成功！现在可以聊天啦。';
                    apiStatusSpan.className = 'status-text success';
                    isConnected = true;
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    let err = `HTTP ${res.status}`;
                    try { const data = await res.json(); err += `: ${data.error?.message || ''}`; } catch(e) {}
                    apiStatusSpan.innerHTML = `❌ 连接失败: ${err}`;
                    apiStatusSpan.className = 'status-text error';
                    isConnected = false;
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
            } catch (err) {
                apiStatusSpan.innerHTML = `❌ 网络错误: ${err.message}`;
                apiStatusSpan.className = 'status-text error';
                isConnected = false;
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        function checkApiKeyValid() {
            if (currentApiKey && currentApiKey.startsWith('sk-')) {
                isConnected = false;
                messageInput.disabled = true;
                sendBtn.disabled = true;
                messageInput.placeholder = '请先测试连接';
                apiStatusSpan.innerHTML = '🔑 密钥已保存，点击「测试连接」验证';
                apiStatusSpan.className = 'status-text';
            } else {
                isConnected = false;
                messageInput.disabled = true;
                sendBtn.disabled = true;
                messageInput.placeholder = '请先配置API密钥';
                apiStatusSpan.innerHTML = '⚠️ 未检测到有效的密钥';
                apiStatusSpan.className = 'status-text error';
            }
        }

        function bindEvents() {
            sendBtn.onclick = sendMessage;
            messageInput.addEventListener('keypress', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            messageInput.addEventListener('input', autoResize);
            saveKeyBtn.onclick = saveApiKey;
            testConnBtn.onclick = testConnection;
            clearHistoryBtn.onclick = clearHistory;
        }

        function init() {
            loadStorage();
            bindEvents();
            if (!window.supabase) {
                console.warn('Supabase JS 加载失败，WIKI 查询功能不可用');
                addSystemMessage('⚠️ Supabase SDK 加载失败，部分WIKI查询功能暂不可用。');
            }
        }

        init();
    })();
</script>
</body>
</html>
