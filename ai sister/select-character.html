<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 · 鹿馆出征</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <!-- 引入游戏数据 -->
    <script src="game-data.js"></script>
    <style>
        /* 原有样式保持不变，只调整部分尺寸以适配单人队伍 */
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-card: #1e1e2e;
            --hsr-primary: #00d4ff;
            --hsr-primary-dark: #0088cc;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #ffffff;
            --hsr-subtext: #a0b4c6;
            --hsr-danger: #ff4757;
            --hsr-warning: #ff9f43;
            --hsr-success: #1dd1a1;
            --hsr-energy: #4488ff;
            --hsr-hp: #ff6b81;
            --hsr-glass: rgba(255, 255, 255, 0.05);
            --hsr-glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'HYWenHei-85W', 'Microsoft YaHei', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--hsr-bg);
            color: var(--hsr-text);
            position: fixed;
        }

        .selection-container {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                var(--hsr-bg);
            padding: 20px;
            overflow: auto;
            position: relative;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 10px;
            color: var(--hsr-text);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .back-button:hover {
            border-color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .page-title {
            text-align: center;
            margin: 40px 0 30px;
            padding-top: 20px;
        }

        .page-title h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00d4ff, #66e5ff, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .page-title p {
            color: var(--hsr-subtext);
            opacity: 0.8;
            font-size: 1rem;
        }

        .team-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .team-info h3 {
            color: var(--hsr-primary);
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .team-count {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--hsr-glass);
            border-radius: 20px;
            margin-top: 10px;
            border: 1px solid var(--hsr-glass-border);
        }

        .team-count .count {
            font-weight: bold;
            color: var(--hsr-primary);
            font-size: 1.2rem;
        }

        .selected-area {
            max-width: 1000px;
            margin: 0 auto 40px;
            padding: 25px;
            background: var(--hsr-glass);
            border-radius: 20px;
            border: 1px solid var(--hsr-glass-border);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .selected-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--hsr-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .selected-characters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            min-height: 150px;
        }

        .empty-slot {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed var(--hsr-glass-border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: var(--hsr-subtext);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .empty-slot:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: var(--hsr-primary);
            transform: translateY(-5px);
        }

        .character-slot {
            background: var(--hsr-surface);
            border: 2px solid var(--hsr-glass-border);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .character-slot:hover {
            border-color: var(--hsr-primary);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }

        .slot-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .slot-info {
            flex: 1;
        }

        .slot-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--hsr-text);
        }

        .slot-path {
            font-size: 0.85rem;
            color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.15);
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 25px;
            height: 25px;
            background: var(--hsr-danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0;
            transition: all 0.3s;
        }

        .character-slot:hover .remove-btn {
            opacity: 1;
        }

        .character-select {
            max-width: 1000px;
            margin: 0 auto;
        }

        .character-select h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--hsr-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .character-card {
            background: var(--hsr-surface);
            border: 2px solid var(--hsr-glass-border);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .character-card:hover::before {
            left: 100%;
        }

        .character-card:hover {
            border-color: var(--hsr-primary);
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
        }

        .character-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .character-card.disabled:hover {
            transform: none;
            border-color: var(--hsr-glass-border);
            box-shadow: none;
        }

        .character-card.selected {
            border-color: var(--hsr-success);
            background: rgba(29, 209, 161, 0.05);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--hsr-text);
        }

        .card-path {
            font-size: 0.85rem;
            color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.15);
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .card-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: var(--hsr-glass);
            border-radius: 12px;
            border: 1px solid var(--hsr-glass-border);
        }

        .card-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .stat-icon {
            color: var(--hsr-primary);
            font-size: 0.9rem;
        }

        .card-skills {
            margin-top: 10px;
        }

        .skill-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--hsr-subtext);
            margin-right: 6px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            background: rgba(29, 209, 161, 0.2);
            color: var(--hsr-success);
            border-radius: 10px;
            font-size: 0.75rem;
            border: 1px solid rgba(29, 209, 161, 0.3);
        }

        .action-buttons {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
            padding: 0 20px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        .action-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            justify-content: center;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .reset-btn {
            background: var(--hsr-glass);
            border: 2px solid var(--hsr-glass-border);
            color: var(--hsr-text);
        }

        .reset-btn:hover:not(:disabled) {
            background: rgba(255, 71, 87, 0.1);
            border-color: var(--hsr-danger);
            color: var(--hsr-danger);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.2);
        }

        .start-btn {
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            border: 2px solid transparent;
            color: white;
        }

        .start-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--hsr-primary-light), var(--hsr-primary));
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .message-box {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 12px;
            padding: 12px 24px;
            color: var(--hsr-warning);
            font-size: 0.95rem;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideUp 0.3s ease;
            z-index: 200;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .character-preview {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: panelFadeIn 0.3s ease;
        }

        .character-preview.active { display: flex; }

        .preview-header { display: flex; align-items: center; gap: 20px; }
        .preview-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .preview-info h3 { font-size: 1.5rem; margin-bottom: 5px; }
        .preview-tags { display: flex; gap: 10px; flex-wrap: wrap; }
        .preview-tag { padding: 4px 12px; background: rgba(0,212,255,0.15); border-radius: 12px; font-size:0.85rem; color: var(--hsr-primary); border:1px solid rgba(0,212,255,0.3); }
        .preview-stats { display: grid; grid-template-columns: repeat(2,1fr); gap:15px; padding:20px; background:var(--hsr-glass); border-radius:15px; }
        .preview-stat { display: flex; justify-content: space-between; font-size:0.95rem; }
        .preview-skills { padding:20px; background:var(--hsr-glass); border-radius:15px; }
        .preview-skills h4 { margin-bottom:15px; color:var(--hsr-primary); }
        .preview-skill { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--hsr-glass-border); font-size:0.9rem; }
        .preview-actions { display: flex; gap:15px; }
        .preview-btn { flex:1; padding:12px; border-radius:10px; border:none; cursor:pointer; font-weight:600; }
        .preview-cancel { background:var(--hsr-glass); color:var(--hsr-text); border:1px solid var(--hsr-glass-border); }
        .preview-select { background:linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark)); color:white; }

        @media (max-width: 768px) {
            .selected-characters { grid-template-columns: 1fr; }
            .character-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; align-items: stretch; }
            .message-box { white-space: normal; width: 80%; text-align: center; bottom: 100px; }
        }
    </style>
</head>
<body>
    <a href="https://xiaochen1235789.github.io/ai sister/index.html" class="back-button">← 返回主菜单</a>
    
    <div class="selection-container">
        <div class="page-title">
            <h1>鹿将军 · 独行试炼</h1>
            <p>选择鹿馆，独自踏上星穹之旅</p>
        </div>
        
        <div class="team-info">
            <h3>⚡ 单人出征</h3>
            <p>鹿馆将独自面对强敌，无需组队</p>
            <div class="team-count">
                <span>已选择：</span>
                <span class="count" id="selectedCount">0</span>
                <span>/1</span>
            </div>
        </div>
        
        <!-- 已选角色区域（只显示一个槽位） -->
        <div class="selected-area">
            <div class="selected-title">
                <span>🛡️</span>
                <span>出战角色</span>
            </div>
            <div class="selected-characters" id="selectedCharacters"></div>
        </div>
        
        <!-- 角色选择区域（只显示鹿馆） -->
        <div class="character-select">
            <h3><span>🌟</span><span>可用角色</span></h3>
            <div class="character-grid" id="characterGrid"></div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn reset-btn" onclick="resetSelection()">🔄 重置</button>
            <button class="action-btn start-btn" id="startBtn" onclick="startBattle()" disabled>🚀 开始战斗</button>
        </div>
        
        <div class="message-box" id="messageBox"></div>
    </div>
    
    <!-- 角色详情预览（仅用于鹿馆） -->
    <div class="character-preview" id="characterPreview">
        <div class="preview-header">
            <div class="preview-avatar" id="previewAvatar">🦌</div>
            <div class="preview-info">
                <h3 id="previewName">鹿管</h3>
                <div class="preview-tags">
                    <span class="preview-tag" id="previewPath">巡猎</span>
                    <span class="preview-tag" id="previewElement">💨 风</span>
                    <span class="preview-tag" id="previewRarity">⭐⭐⭐⭐⭐</span>
                </div>
            </div>
        </div>
        <div class="preview-stats">
            <div class="preview-stat"><span>生命值</span><span id="previewHP">-</span></div>
            <div class="preview-stat"><span>攻击力</span><span id="previewAttack">-</span></div>
            <div class="preview-stat"><span>防御力</span><span id="previewDefense">-</span></div>
            <div class="preview-stat"><span>速度</span><span id="previewSpeed">-</span></div>
            <div class="preview-stat"><span>暴击率</span><span id="previewCritRate">-</span></div>
            <div class="preview-stat"><span>暴击伤害</span><span id="previewCritDamage">-</span></div>
        </div>
        <div class="preview-skills">
            <h4>技能</h4>
            <div id="previewSkill1" class="preview-skill"></div>
            <div id="previewSkill2" class="preview-skill"></div>
            <div id="previewSkill3" class="preview-skill"></div>
            <div id="previewSkill4" class="preview-skill"></div>
        </div>
        <div class="preview-actions">
            <button class="preview-btn preview-cancel" onclick="closePreview()">取消</button>
            <button class="preview-btn preview-select" onclick="selectFromPreview()">加入队伍</button>
        </div>
    </div>

    <script>
        // 队伍最大人数改为 1
        const MAX_TEAM_SIZE = 1;
        
        // 只返回鹿馆角色（硬编码，不依赖 GameData 中的多角色）
        function getGameCharacters() {
            // 优先从 GameData 中获取鹿馆的真实属性（如果可用）
            let luguanFromData = null;
            if (typeof GameData !== 'undefined' && GameData.characters && GameData.characters.length > 0) {
                const original = GameData.characters.find(c => c.id === 'luguan');
                if (original) {
                    luguanFromData = original;
                }
            }
            
            if (luguanFromData) {
                // 转换为前端所需格式
                return [{
                    id: 0,
                    gameId: luguanFromData.id,
                    name: luguanFromData.name,
                    avatar: '🦌',
                    path: luguanFromData.path,
                    element: getElementName(luguanFromData.element),
                    rarity: luguanFromData.rarity === 5 ? '⭐⭐⭐⭐⭐' : '⭐⭐⭐⭐',
                    hp: luguanFromData.maxHp,
                    attack: luguanFromData.attack,
                    defense: luguanFromData.defense,
                    speed: luguanFromData.speed,
                    critRate: Math.round((luguanFromData.critRate || 0.05) * 100) + '%',
                    critDamage: Math.round((luguanFromData.critDamage || 1.5) * 100) + '%',
                    skills: (luguanFromData.skills || []).map(s => ({
                        name: s.name,
                        icon: s.icon,
                        description: s.description
                    })),
                    description: '高速风系巡猎，单体爆发'
                }];
            }
            
            // 后备数据（直接硬编码鹿馆）
            return [{
                id: 0,
                gameId: 'luguan',
                name: '鹿管',
                avatar: '🦌',
                path: '巡猎',
                element: '💨 风',
                rarity: '⭐⭐⭐⭐⭐',
                hp: 9999,
                attack: 2900,
                defense: 800,
                speed: 140,
                critRate: '80%',
                critDamage: '175%',
                skills: [
                    {name: '迅风斩', icon: '⚔️', description: '单体风属性伤害110%'},
                    {name: '风之挑衅', icon: '🌀', description: '单体伤害，降低目标防御'},
                    {name: '狂风终结', icon: '💥', description: '单体高伤害，对负面目标伤害提高'},
                    {name: '防御', icon: '🛡️', description: '减少下次受到的伤害'}
                ],
                description: '高速单体输出'
            }];
        }

        function getElementName(elementId) {
            const map = {
                'wind': '💨 风', 'fire': '🔥 火', 'ice': '❄️ 冰',
                'lightning': '⚡ 雷', 'quantum': '🌌 量子',
                'physical': '💪 物理', 'imaginary': '✨ 虚数'
            };
            return map[elementId] || '💫 未知';
        }

        let characters = [];
        let selectedCharacters = [];  // 最多1个
        let previewCharacter = null;

        function initSelectionPage() {
            characters = getGameCharacters();
            // 检查保存的队伍（只保留鹿馆）
            const savedTeam = localStorage.getItem('hsr-selected-team');
            if (savedTeam) {
                try {
                    const teamData = JSON.parse(savedTeam);
                    if (teamData.characters && teamData.characters.length > 0) {
                        const savedChar = teamData.characters[0];
                        const match = characters.find(c => c.gameId === savedChar.id || c.name === savedChar.name);
                        if (match) selectedCharacters = [match];
                        else selectedCharacters = [];
                    }
                } catch(e) {}
            }
            renderSelectedCharacters();
            renderCharacterGrid();
            updateSelectionCount();
        }

        function renderSelectedCharacters() {
            const container = document.getElementById('selectedCharacters');
            container.innerHTML = '';
            for (let i = 0; i < MAX_TEAM_SIZE; i++) {
                if (selectedCharacters[i]) {
                    const c = selectedCharacters[i];
                    container.innerHTML += `
                        <div class="character-slot" data-index="${i}">
                            <div class="slot-avatar">${c.avatar}</div>
                            <div class="slot-info">
                                <div class="slot-name">${c.name}</div>
                                <div class="slot-path">${c.path}</div>
                            </div>
                            <div class="remove-btn" onclick="removeCharacter(${i})">×</div>
                        </div>
                    `;
                } else {
                    container.innerHTML += `
                        <div class="empty-slot" onclick="showAvailableCharacters()">
                            <div class="slot-icon">➕</div>
                            <div>点击选择鹿馆</div>
                        </div>
                    `;
                }
            }
        }

        function renderCharacterGrid() {
            const container = document.getElementById('characterGrid');
            container.innerHTML = '';
            characters.forEach(ch => {
                const isSelected = selectedCharacters.some(s => s.id === ch.id);
                const isDisabled = isSelected || selectedCharacters.length >= MAX_TEAM_SIZE;
                container.innerHTML += `
                    <div class="character-card ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}" 
                         onclick="${isDisabled ? '' : `showCharacterPreview(${ch.id})`}">
                        <div class="card-header">
                            <div class="card-avatar">${ch.avatar}</div>
                            <div class="card-info">
                                <div class="card-name">${ch.name}</div>
                                <div class="card-path">${ch.path}</div>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="card-stat"><span class="stat-icon">❤️</span><span class="stat-value">${ch.hp}</span></div>
                            <div class="card-stat"><span class="stat-icon">⚔️</span><span class="stat-value">${ch.attack}</span></div>
                            <div class="card-stat"><span class="stat-icon">🛡️</span><span class="stat-value">${ch.defense}</span></div>
                            <div class="card-stat"><span class="stat-icon">⚡</span><span class="stat-value">${ch.speed}</span></div>
                        </div>
                        <div class="card-skills">
                            ${ch.skills.slice(0,2).map(s => `<span class="skill-tag">${s.name}</span>`).join('')}
                        </div>
                        ${isSelected ? '<div class="card-status">已选择</div>' : ''}
                    </div>
                `;
            });
        }

        function showCharacterPreview(characterId) {
            const ch = characters.find(c => c.id === characterId);
            if (!ch) return;
            previewCharacter = ch;
            document.getElementById('previewAvatar').textContent = ch.avatar;
            document.getElementById('previewName').textContent = ch.name;
            document.getElementById('previewPath').textContent = ch.path;
            document.getElementById('previewElement').textContent = ch.element;
            document.getElementById('previewRarity').textContent = ch.rarity;
            document.getElementById('previewHP').textContent = ch.hp;
            document.getElementById('previewAttack').textContent = ch.attack;
            document.getElementById('previewDefense').textContent = ch.defense;
            document.getElementById('previewSpeed').textContent = ch.speed;
            document.getElementById('previewCritRate').textContent = ch.critRate;
            document.getElementById('previewCritDamage').textContent = ch.critDamage;
            
            const skillIds = ['previewSkill1', 'previewSkill2', 'previewSkill3', 'previewSkill4'];
            skillIds.forEach((id, idx) => {
                const el = document.getElementById(id);
                if (ch.skills[idx]) {
                    const s = ch.skills[idx];
                    el.innerHTML = `<div class="skill-name"><span>${s.icon || '✨'}</span> ${s.name}</div><div class="skill-desc">${s.description}</div>`;
                } else {
                    el.innerHTML = '';
                }
            });
            document.getElementById('characterPreview').classList.add('active');
        }

        function closePreview() {
            document.getElementById('characterPreview').classList.remove('active');
            previewCharacter = null;
        }

        function selectFromPreview() {
            if (!previewCharacter) return;
            addCharacter(previewCharacter.id);
            closePreview();
        }

        function addCharacter(characterId) {
            const ch = characters.find(c => c.id === characterId);
            if (!ch) return;
            if (selectedCharacters.some(c => c.id === ch.id)) {
                showMessage('鹿馆已经在队伍中了', 'warning');
                return;
            }
            if (selectedCharacters.length >= MAX_TEAM_SIZE) {
                showMessage('只能选择一名角色出战', 'warning');
                return;
            }
            selectedCharacters.push(ch);
            showMessage(`${ch.name} 已加入队伍！`, 'success');
            renderSelectedCharacters();
            renderCharacterGrid();
            updateSelectionCount();
        }

        function removeCharacter(index) {
            if (index >= 0 && index < selectedCharacters.length) {
                const removed = selectedCharacters.splice(index, 1)[0];
                showMessage(`${removed.name} 已移除`, 'info');
                renderSelectedCharacters();
                renderCharacterGrid();
                updateSelectionCount();
            }
        }

        function resetSelection() {
            if (selectedCharacters.length === 0) {
                showMessage('队伍已是空的', 'info');
                return;
            }
            if (confirm('确定重置吗？')) {
                selectedCharacters = [];
                showMessage('队伍已重置', 'success');
                renderSelectedCharacters();
                renderCharacterGrid();
                updateSelectionCount();
            }
        }

        function updateSelectionCount() {
            const countSpan = document.getElementById('selectedCount');
            const startBtn = document.getElementById('startBtn');
            countSpan.textContent = selectedCharacters.length;
            startBtn.disabled = selectedCharacters.length !== MAX_TEAM_SIZE;
        }

        function showMessage(text, type = 'info') {
            const msg = document.getElementById('messageBox');
            msg.textContent = text;
            msg.style.display = 'flex';
            let color = '#00d4ff';
            if (type === 'success') color = '#1dd1a1';
            else if (type === 'warning') color = '#ff9f43';
            else if (type === 'danger') color = '#ff4757';
            msg.style.color = color;
            msg.style.borderColor = color;
            setTimeout(() => { msg.style.display = 'none'; }, 2500);
        }

        function showAvailableCharacters() {
            if (selectedCharacters.length >= MAX_TEAM_SIZE) {
                showMessage('队伍已满，请先移除当前角色', 'warning');
            } else {
                showMessage('点击下方鹿馆卡片加入队伍', 'info');
            }
        }

        function startBattle() {
            if (selectedCharacters.length !== MAX_TEAM_SIZE) {
                showMessage('请选择鹿馆出战', 'warning');
                return;
            }
            const teamData = {
                characters: selectedCharacters.map(c => ({
                    id: c.gameId,
                    name: c.name,
                    avatar: c.avatar,
                    path: c.path,
                    element: c.element.replace(/[^\w\s]/g, '').trim(),
                    hp: c.hp,
                    attack: c.attack,
                    defense: c.defense,
                    speed: c.speed
                })),
                timestamp: Date.now(),
                teamName: '鹿馆·独行'
            };
            localStorage.setItem('hsr-selected-team', JSON.stringify(teamData));
            showMessage('正在进入战斗...', 'info');
            setTimeout(() => { window.location.href = 'battle.html'; }, 1200);
        }

        window.addEventListener('DOMContentLoaded', initSelectionPage);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePreview();
        });
    </script>
</body>
</html>
