<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 · 鹿馆升级</title>
    <link rel="icon" href="/images/wangzhantupian.png" type="image/png">
    <script src="/ai%20sister/game-data.js"></script>
    <script src="/css/relic-data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: system-ui, 'Microsoft YaHei', sans-serif; }
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-primary: #00d4ff;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #ffffff;
            --hsr-subtext: #a0b4c6;
            --hsr-success: #1dd1a1;
            --hsr-warning: #ff9f43;
            --hsr-danger: #ff4757;
            --hsr-glass: rgba(255, 255, 255, 0.05);
            --hsr-glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        var(--hsr-bg);
            color: var(--hsr-text);
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .back-link { background: var(--hsr-glass); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 40px; text-decoration: none; color: var(--hsr-primary); border: 1px solid var(--hsr-glass-border); transition: 0.2s; }
        .title { font-size: 1.8rem; background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .credits { background: var(--hsr-glass); padding: 8px 20px; border-radius: 40px; font-size: 1rem; border: 1px solid var(--hsr-glass-border); }

        /* 选项卡样式 */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--hsr-glass-border);
            padding-bottom: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--hsr-subtext);
            cursor: pointer;
            border-radius: 30px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--hsr-primary);
            color: #000;
            box-shadow: 0 0 12px var(--hsr-primary);
        }
        .tab-pane {
            display: none;
            animation: fadeIn 0.2s;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 通用卡片样式 */
        .section-card {
            background: var(--hsr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 28px;
            padding: 24px;
        }

        /* 角色卡片（独立于选项卡） */
        .character-card {
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .char-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
        .char-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, var(--hsr-primary), #0066aa); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; border: 2px solid rgba(255,255,255,0.2); }
        .char-name { font-size: 1.8rem; font-weight: bold; margin-bottom: 4px; }
        .char-meta { display: flex; gap: 12px; flex-wrap: wrap; }
        .char-tag { background: rgba(0,212,255,0.15); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--hsr-primary); border: 1px solid rgba(0,212,255,0.3); }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.8rem; color: var(--hsr-subtext); margin-bottom: 6px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--hsr-primary); }

        /* 技能列表 */
        .skill-item { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--hsr-glass-border); }
        .skill-info { flex: 2; }
        .skill-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
        .skill-desc { font-size: 0.8rem; color: var(--hsr-subtext); margin-bottom: 6px; line-height: 1.4; }
        .skill-next, .skill-max { font-size: 0.7rem; margin-top: 4px; }
        .skill-next { color: var(--hsr-warning); }
        .skill-max { color: var(--hsr-success); }
        .skill-level { font-size: 1rem; margin: 0 16px; min-width: 100px; text-align: center; }
        .skill-level span { color: var(--hsr-primary); font-weight: bold; }
        .upgrade-btn { background: var(--hsr-primary-dark); border: none; color: white; padding: 8px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; min-width: 100px; }
        .upgrade-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #555; }
        .upgrade-btn:not(:disabled):hover { background: var(--hsr-primary); transform: scale(1.02); }

        /* 命座卡片 */
        .eidolon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 15px; }
        .eidolon-card {
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 16px;
            transition: 0.2s;
        }
        .eidolon-card.active { border-color: var(--hsr-primary); box-shadow: 0 0 12px var(--hsr-primary); background: rgba(0,212,255,0.05); }
        .eidolon-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .eidolon-name { font-size: 1.1rem; font-weight: bold; color: var(--hsr-primary); }
        .eidolon-desc { font-size: 0.8rem; color: var(--hsr-subtext); margin-bottom: 14px; line-height: 1.4; }
        .eidolon-activate-btn { background: var(--hsr-glass); border: 1px solid var(--hsr-glass-border); padding: 6px 16px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; color: var(--hsr-text); transition: 0.2s; width: 100%; text-align: center; }
        .eidolon-activate-btn.active { background: var(--hsr-primary); color: #000; border-color: var(--hsr-primary); }

        /* 遗器系统 */
        .relic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .relic-slot {
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 16px;
        }
        .relic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .relic-partName { font-weight: bold; color: var(--hsr-primary); font-size: 1rem; }
        .relic-level { font-size: 0.8rem; color: var(--hsr-warning); }
        .relic-mainStat { font-size: 0.85rem; margin: 8px 0; }
        .relic-subStats { font-size: 0.75rem; color: var(--hsr-subtext); margin-top: 8px; }
        .relic-actions { display: flex; gap: 8px; margin-top: 12px; }
        .relic-btn { background: var(--hsr-glass); border: 1px solid var(--hsr-glass-border); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .relic-btn:hover { background: var(--hsr-primary-dark); border-color: var(--hsr-primary); }
        .relic-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .save-area { text-align: center; margin-top: 20px; }
        .save-btn { background: linear-gradient(135deg, var(--hsr-success), #0f8b6e); border: none; padding: 14px 40px; border-radius: 60px; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); color: var(--hsr-primary); padding: 8px 24px; border-radius: 40px; font-size: 0.9rem; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        @media (max-width: 600px) {
            .skill-item { flex-direction: column; gap: 12px; align-items: stretch; text-align: center; }
            .upgrade-btn { align-self: center; }
            .relic-grid { grid-template-columns: 1fr; }
            .tabs { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="back-link">← 返回主菜单</a>
        <div class="title">鹿馆 · 修炼室</div>
        <div class="credits" id="creditDisplay">💰 0 信用点</div>
    </div>

    <!-- 角色信息卡片（始终显示） -->
    <div class="character-card" id="characterCard"></div>

    <!-- 选项卡 -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1">📈 角色提升</button>
        <button class="tab-btn" data-tab="tab2">🌟 星魂同调</button>
        <button class="tab-btn" data-tab="tab3">📿 遗器系统</button>
    </div>

    <!-- 板块一：角色提升 -->
    <div id="tab1" class="tab-pane active">
        <div class="section-card">
            <div class="section-title" style="margin-bottom: 20px;">📈 角色等级</div>
            <div id="levelUpPanel"></div>
            <div class="section-title" style="margin-top: 20px; margin-bottom: 20px;">✨ 技能升级</div>
            <div id="skillList"></div>
        </div>
    </div>

    <!-- 板块二：星魂同调 -->
    <div id="tab2" class="tab-pane">
        <div class="section-card">
            <div class="section-title">🌟 星魂 · 命座激活</div>
            <div class="eidolon-grid" id="eidolonGrid"></div>
            <div style="font-size:0.75rem; color:var(--hsr-subtext); margin-top:12px;">※ 命座效果将在战斗中自动生效（E1/E2/E6已实现，E3/E5影响技能上限）</div>
        </div>
    </div>

    <!-- 板块三：遗器系统 -->
    <div id="tab3" class="tab-pane">
        <div class="section-card">
            <div class="section-title">📿 遗器装备</div>
            <div class="relic-grid" id="relicGrid"></div>
            <div style="font-size:0.75rem; color:var(--hsr-subtext); margin-top:12px;">※ 每件遗器可升级至+15，消耗信用点</div>
        </div>
    </div>

    <div class="save-area">
        <button class="save-btn" id="saveBtn">💾 保存并返回</button>
    </div>
</div>
<div class="toast" id="toastMsg">提示</div>

<script>
    // 角色升级相关变量
    let currentCharacter = null;
    let totalCredits = 5000000;
    let activatedEidolons = [];
    const COST_LEVEL = 1000;
    const COST_SKILL = 500;
    const RELIC_UPGRADE_COST = 500;   // 遗器每级升级消耗

    // 遗器装备数据
    let relicEquips = {
        head: null, hands: null, body: null, feet: null, sphere: null, rope: null
    };

    // ========== 辅助函数 ==========
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.color = isError ? 'var(--hsr-danger)' : 'var(--hsr-primary)';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    function updateCreditUI() {
        document.getElementById('creditDisplay').innerHTML = `💰 ${totalCredits} 信用点`;
    }

    // ========== 遗器相关 ==========
    function loadRelicEquips() {
        const saved = localStorage.getItem('hsr-relic-equips');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                relicEquips = { ...relicEquips, ...parsed };
            } catch(e) {}
        }
        const parts = ['head', 'hands', 'body', 'feet', 'sphere', 'rope'];
        for (let part of parts) {
            if (!relicEquips[part] && window.generateRandomRelic) {
                relicEquips[part] = generateRandomRelic(part, 0);
            } else if (!relicEquips[part]) {
                relicEquips[part] = {
                    id: `relic_${part}_init`,
                    setType: "新生的未来",
                    part: part,
                    level: 0,
                    mainStat: { type: part === 'head' ? 'hpPercent' : (part === 'hands' ? 'atkPercent' : 'hpPercent'), value: 0 },
                    subStats: []
                };
            }
        }
        saveRelicEquips();
    }

    function saveRelicEquips() {
        localStorage.setItem('hsr-relic-equips', JSON.stringify(relicEquips));
    }

    function upgradeRelic(part) {
        let relic = relicEquips[part];
        if (!relic) return;
        if (relic.level >= 15) {
            showToast(`${getPartName(part)} 已达最高等级！`, true);
            return;
        }
        if (totalCredits < RELIC_UPGRADE_COST) {
            showToast('信用点不足！', true);
            return;
        }
        totalCredits -= RELIC_UPGRADE_COST;
        relic.level++;
        if (window.getRelicMainStatValue) {
            relic.mainStat.value = getRelicMainStatValue(relic.mainStat.type, relic.level);
        } else {
            relic.mainStat.value = (relic.mainStat.value || 0) + (relic.mainStat.type === 'speed' ? 1.5 : 2.5);
            relic.mainStat.value = parseFloat(relic.mainStat.value.toFixed(1));
        }
        saveRelicEquips();
        renderRelicSystem();
        updateCreditUI();
        showToast(`${getPartName(part)} 升至 +${relic.level}`);
    }

    function getPartName(part) {
        const map = { head: '智慧头套', hands: '指挥手套', body: '安心的护甲', feet: '健步如飞的靴子', sphere: '过去的球', rope: '过去的绳' };
        return map[part] || part;
    }

    // 优化属性显示：百分比加%后缀，固定值不加
    function formatStatValue(type, value) {
        if (type === 'hpPercent' || type === 'atkPercent' || type === 'defPercent' || type === 'critRate' || type === 'critDamage' ||
            type === 'effectHitRate' || type === 'effectRes' || type === 'energyRegen' ||
            type === 'windDamage' || type === 'fireDamage' || type === 'iceDamage' || type === 'imaginaryDamage' ||
            type === 'physicalDamage' || type === 'quantumDamage') {
            return `${value}%`;
        } else {
            return `${value}`;
        }
    }

    function getStatName(type) {
        const map = {
            hpPercent: '生命%', atkPercent: '攻击%', defPercent: '防御%', critRate: '暴击率', critDamage: '暴伤',
            speed: '速度', effectHitRate: '效果命中', effectRes: '效果抵抗', energyRegen: '能量回复',
            windDamage: '风伤', fireDamage: '火伤', iceDamage: '冰伤', imaginaryDamage: '虚数伤', physicalDamage: '物理伤', quantumDamage: '量子伤',
            hp: '生命', atk: '攻击', def: '防御'
        };
        return map[type] || type;
    }

    function renderRelicSystem() {
        const container = document.getElementById('relicGrid');
        if (!container) return;
        const parts = ['head', 'hands', 'body', 'feet', 'sphere', 'rope'];
        container.innerHTML = parts.map(part => {
            const relic = relicEquips[part];
            if (!relic) return `<div class="relic-slot">${getPartName(part)}<div>无遗器</div></div>`;
            const mainTypeName = getStatName(relic.mainStat.type);
            const mainValFormatted = formatStatValue(relic.mainStat.type, relic.mainStat.value);
            const subStatsHtml = relic.subStats.map(sub => {
                const subName = getStatName(sub.type);
                const subVal = formatStatValue(sub.type, sub.value);
                return `<div>${subName}: ${subVal}</div>`;
            }).join('');
            const partName = getPartName(part);
            return `
                <div class="relic-slot">
                    <div class="relic-header">
                        <span class="relic-partName">${partName}</span>
                        <span class="relic-level">+${relic.level}</span>
                    </div>
                    <div class="relic-mainStat">⚡主: ${mainTypeName} ${mainValFormatted}</div>
                    <div class="relic-subStats">${subStatsHtml || '<span style="color:#aaa;">无副词条</span>'}</div>
                    <div class="relic-actions">
                        <button class="relic-btn" onclick="upgradeRelic('${part}')">⬆️ 升级 (${RELIC_UPGRADE_COST})</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== 角色升级等原有逻辑（保持基本不变） ==========
    function rebuildCharacter() {
        if (!GameData) return;
        let initState = GameData.getInitialState(null, activatedEidolons);
        let newChar = initState.party[0];
        const upgradeData = loadSavedUpgradeData();
        if (upgradeData) {
            if (upgradeData.level && upgradeData.level > 1) GameData.levelUpCharacter(newChar, upgradeData.level);
            if (upgradeData.skillLevels) {
                newChar.skills.forEach(skill => {
                    const targetLv = upgradeData.skillLevels[skill.id];
                    if (targetLv && targetLv > skill.currentLevel) {
                        while (skill.currentLevel < targetLv && skill.currentLevel < skill.maxLevel) GameData.levelUpSkill(skill);
                    }
                });
            }
        }
        currentCharacter = newChar;
        renderCharacterInfo();
        renderLevelUpPanel();
        renderSkillList();
    }

    function toggleEidolon(eidolonId) {
        const index = activatedEidolons.indexOf(eidolonId);
        if (index === -1) activatedEidolons.push(eidolonId);
        else activatedEidolons.splice(index, 1);
        renderEidolonButtons();
        rebuildCharacter();
    }

    function renderEidolonButtons() {
        const container = document.getElementById('eidolonGrid');
        if (!container) return;
        const fallbackEidolons = {
            e1: { name: '疾风追影', description: '攻击敌方目标时，若其生命≥20%，受到的伤害提高50%。' },
            e2: { name: '旋刃狩魂', description: '对拥有负面效果的目标暴击率提高18%，每有一个负面效果暴击伤害提高24%，最多144%。' },
            e3: { name: '裂空破障', description: '普攻等级+1，天赋等级+2。' },
            e4: { name: '破晓狩风', description: '消灭目标时恢复20能量并获得额外回合。' },
            e5: { name: '风狩铭纹', description: '战技等级+2，终结技等级+2。' },
            e6: { name: '逐影风刃', description: '天赋所有效果进入战斗后立即生效，且伤害无视目标24%防御。' }
        };
        let eidolonMap = (window.GameData && window.GameData.eidolons) ? window.GameData.eidolons : fallbackEidolons;
        const allEidolons = ['e1', 'e2', 'e3', 'e4', 'e5', 'e6'];
        container.innerHTML = allEidolons.map(id => {
            const eData = eidolonMap[id] || fallbackEidolons[id];
            const name = eData ? eData.name : (id === 'e1' ? '疾风追影' : '未知命座');
            const desc = eData ? eData.description : '暂无描述';
            const isActive = activatedEidolons.includes(id);
            return `
                <div class="eidolon-card ${isActive ? 'active' : ''}" data-eidolon="${id}">
                    <div class="eidolon-header"><span class="eidolon-name">${name}</span></div>
                    <div class="eidolon-desc">${desc}</div>
                    <button class="eidolon-activate-btn ${isActive ? 'active' : ''}" data-id="${id}">${isActive ? '✓ 已激活' : '🔘 未激活'}</button>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.eidolon-activate-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); toggleEidolon(btn.dataset.id); };
        });
    }

    function loadSavedEidolons() {
        const saved = localStorage.getItem('hsr-activated-eidolons');
        if (saved) {
            try { activatedEidolons = JSON.parse(saved); if (!Array.isArray(activatedEidolons)) activatedEidolons = []; } catch(e) { activatedEidolons = []; }
        } else { activatedEidolons = []; }
        renderEidolonButtons();
    }

    function renderCharacterInfo() {
        if (!currentCharacter) return;
        const char = currentCharacter;
        document.getElementById('characterCard').innerHTML = `
            <div class="char-header">
                <div class="char-avatar">${char.avatar || '🦌'}</div>
                <div class="char-info">
                    <div class="char-name">${char.name}</div>
                    <div class="char-meta">
                        <span class="char-tag">${char.path}</span>
                        <span class="char-tag">${char.element === 'wind' ? '风' : char.element}</span>
                        <span class="char-tag">Lv.${char.level}</span>
                        ${activatedEidolons.length > 0 ? `<span class="char-tag">🌟${activatedEidolons.length}命</span>` : ''}
                    </div>
                </div>
            </div>
            <div class="stat-grid">
                <div class="stat-item"><div class="stat-label">❤️ 生命</div><div class="stat-value">${char.maxHp}</div></div>
                <div class="stat-item"><div class="stat-label">⚔️ 攻击</div><div class="stat-value">${char.attack}</div></div>
                <div class="stat-item"><div class="stat-label">🛡️ 防御</div><div class="stat-value">${char.defense}</div></div>
                <div class="stat-item"><div class="stat-label">⚡ 速度</div><div class="stat-value">${char.speed}</div></div>
                <div class="stat-item"><div class="stat-label">💥 暴击率</div><div class="stat-value">${Math.round(char.critRate * 100)}%</div></div>
                <div class="stat-item"><div class="stat-label">💢 暴伤</div><div class="stat-value">${Math.round(char.critDamage * 100)}%</div></div>
            </div>
        `;
    }

    function getNextDamage(skill) {
        if (skill.currentLevel >= skill.maxLevel) return null;
        let nextLv = skill.currentLevel + 1;
        if (skill.type === 'normal') return GameData.getSkillValue('normal', nextLv, 0) / 100;
        if (skill.type === 'skill') return GameData.getSkillValue('skill', nextLv, 0) / 100;
        if (skill.type === 'ultimate') return GameData.getSkillValue('ultimate', nextLv, 0) / 100;
        return null;
    }

    function getProcessedDescription(skill) {
        let desc = skill.description || '无描述';
        if (skill.baseDamage && desc.includes('{damage}')) desc = desc.replace('{damage}', `${Math.round(skill.baseDamage * 100)}%`);
        if (skill.extraDamage && desc.includes('{extra}')) desc = desc.replace('{extra}', `${Math.round(skill.extraDamage * 100)}%`);
        if (skill.type === 'talent') {
            if (skill.penetration !== undefined && desc.includes('{penetration}')) desc = desc.replace('{penetration}', `${Math.round(skill.penetration * 100)}%`);
            if (skill.atkBonus !== undefined && desc.includes('{atkBonus}')) desc = desc.replace('{atkBonus}', `${Math.round(skill.atkBonus * 100)}%`);
        }
        return desc;
    }

    function getNextTalentValues(skill) {
        if (skill.type !== 'talent' || skill.currentLevel >= skill.maxLevel) return null;
        let nextLv = skill.currentLevel + 1;
        let nextPen = GameData.getSkillValue('talent', nextLv, 0) / 100;
        let nextAtk = GameData.getSkillValue('talent', nextLv, 1) / 100;
        return { curPen: skill.penetration, curAtk: skill.atkBonus, nextPen, nextAtk };
    }

    function renderLevelUpPanel() {
        const char = currentCharacter;
        const nextLevel = char.level + 1;
        const canLevelUp = nextLevel <= GameData.MAX_CHARACTER_LEVEL && totalCredits >= COST_LEVEL;
        let nextHp = char.maxHp, nextAtk = char.attack, nextDef = char.defense;
        if (nextLevel <= GameData.MAX_CHARACTER_LEVEL && GameData.getStatByLevel) {
            nextHp = GameData.getStatByLevel(nextLevel, 'hp');
            nextAtk = GameData.getStatByLevel(nextLevel, 'atk');
            nextDef = GameData.getStatByLevel(nextLevel, 'def');
        }
        const panel = document.getElementById('levelUpPanel');
        panel.innerHTML = `
            <div class="skill-item">
                <div class="skill-info">
                    <div class="skill-name">当前等级 ${char.level}</div>
                    <div class="skill-desc">下一级 → Lv.${nextLevel}<br>
                        生命 ${char.maxHp} → ${nextHp} &nbsp;|&nbsp;
                        攻击 ${char.attack} → ${nextAtk} &nbsp;|&nbsp;
                        防御 ${char.defense} → ${nextDef}
                    </div>
                </div>
                <div class="skill-level"><span>消耗 ${COST_LEVEL} 信用点</span></div>
                <button class="upgrade-btn" id="levelUpBtn" ${!canLevelUp ? 'disabled' : ''}>⬆️ 升级</button>
            </div>
        `;
        const btn = document.getElementById('levelUpBtn');
        if (btn) btn.onclick = () => levelUpCharacter();
    }

    function levelUpCharacter() {
        const char = currentCharacter;
        const nextLevel = char.level + 1;
        if (nextLevel > GameData.MAX_CHARACTER_LEVEL) { showToast('已达最高等级！', true); return; }
        if (totalCredits < COST_LEVEL) { showToast('信用点不足！', true); return; }
        if (GameData.levelUpCharacter(char, nextLevel)) {
            totalCredits -= COST_LEVEL;
            updateCreditUI();
            renderCharacterInfo();
            renderLevelUpPanel();
            renderSkillList();
            showToast(`升级成功！鹿馆升至 Lv.${char.level}`);
        } else showToast('升级失败', true);
    }

    function renderSkillList() {
        const char = currentCharacter;
        const skills = char.skills || [];
        const displaySkills = skills.filter(s => ['normal', 'skill', 'ultimate', 'talent'].includes(s.type));
        const container = document.getElementById('skillList');
        if (displaySkills.length === 0) {
            container.innerHTML = '<div style="padding:20px;text-align:center;">技能加载中...</div>';
            return;
        }
        container.innerHTML = displaySkills.map(skill => {
            const canUp = skill.currentLevel < skill.maxLevel && totalCredits >= COST_SKILL;
            const processedDesc = getProcessedDescription(skill);
            let nextPreview = '';
            if (skill.type !== 'talent') {
                if (skill.currentLevel < skill.maxLevel) {
                    const nextDamage = getNextDamage(skill);
                    if (nextDamage) {
                        let currentPercent = Math.round(skill.baseDamage * 100);
                        let nextPercent = Math.round(nextDamage * 100);
                        nextPreview = `<div class="skill-next">下一级: ${currentPercent}% → ${nextPercent}%</div>`;
                    }
                } else { nextPreview = `<div class="skill-max">✓ 已达最高等级</div>`; }
            } else {
                if (skill.currentLevel < skill.maxLevel) {
                    const nextVals = getNextTalentValues(skill);
                    if (nextVals) {
                        let curPen = Math.round(nextVals.curPen * 100), nextPen = Math.round(nextVals.nextPen * 100);
                        let curAtk = Math.round(nextVals.curAtk * 100), nextAtk = Math.round(nextVals.nextAtk * 100);
                        nextPreview = `<div class="skill-next">下一级: 穿透上限 ${curPen}% → ${nextPen}% &nbsp;|&nbsp; 攻击加成上限 ${curAtk}% → ${nextAtk}%</div>`;
                    } else { nextPreview = `<div class="skill-next">升级提升天赋效果</div>`; }
                } else { nextPreview = `<div class="skill-max">✓ 天赋已达最高等级</div>`; }
            }
            return `
                <div class="skill-item" data-skill-id="${skill.id}">
                    <div class="skill-info">
                        <div class="skill-name">${skill.icon || '✨'} ${skill.name}</div>
                        <div class="skill-desc">${processedDesc}</div>
                        ${nextPreview}
                    </div>
                    <div class="skill-level">Lv.<span>${skill.currentLevel}</span> / ${skill.maxLevel}</div>
                    <button class="upgrade-btn skill-upgrade" ${!canUp ? 'disabled' : ''}>⬆️ 升级 (${COST_SKILL})</button>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.skill-upgrade').forEach(btn => {
            const skillItem = btn.closest('.skill-item');
            const skillId = skillItem?.dataset.skillId;
            const skill = currentCharacter.skills.find(s => s.id === skillId);
            if (skill) btn.onclick = () => upgradeSkill(skill);
        });
    }

    function upgradeSkill(skill) {
        if (skill.currentLevel >= skill.maxLevel) { showToast(`${skill.name} 已达最高等级！`, true); return; }
        if (totalCredits < COST_SKILL) { showToast('信用点不足！', true); return; }
        if (GameData.levelUpSkill(skill)) {
            totalCredits -= COST_SKILL;
            updateCreditUI();
            renderSkillList();
            renderCharacterInfo();
            showToast(`${skill.name} 升至 Lv.${skill.currentLevel}`);
        } else showToast(`${skill.name} 升级失败`, true);
    }

    function saveCharacter() {
        const char = currentCharacter;
        const teamData = {
            characters: [{
                id: char.id, name: char.name, avatar: char.avatar, path: char.path,
                element: char.element === 'wind' ? '风' : char.element,
                hp: char.maxHp, attack: char.attack, defense: char.defense, speed: char.speed,
                level: char.level,
                skills: char.skills.map(s => ({ id: s.id, currentLevel: s.currentLevel }))
            }],
            timestamp: Date.now(), teamName: '鹿馆·独行'
        };
        const upgradeData = { level: char.level, skillLevels: {} };
        char.skills.forEach(s => { upgradeData.skillLevels[s.id] = s.currentLevel; });
        localStorage.setItem('hsr-selected-team', JSON.stringify(teamData));
        localStorage.setItem('hsr-upgrade-data', JSON.stringify(upgradeData));
        localStorage.setItem('hsr-activated-eidolons', JSON.stringify(activatedEidolons));
        saveRelicEquips();
        showToast('角色数据已保存！');
        setTimeout(() => window.location.href = 'index.html', 800);
    }

    function loadSavedUpgradeData() {
        const saved = localStorage.getItem('hsr-upgrade-data');
        try { return saved ? JSON.parse(saved) : null; } catch(e) { return null; }
    }

    function saveCredits() { localStorage.setItem('hsr_credits', totalCredits); }

    // ========== 选项卡切换逻辑 ==========
    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                panes.forEach(pane => pane.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        });
    }

    // ========== 初始化 ==========
    async function initUpgradePage() {
        if (!window.GameData) { setTimeout(initUpgradePage, 200); return; }
        loadSavedEidolons();
        let initState = GameData.getInitialState(null, activatedEidolons);
        let character = initState.party[0];
        const upgradeData = loadSavedUpgradeData();
        if (upgradeData) {
            if (upgradeData.level && upgradeData.level > 1) GameData.levelUpCharacter(character, upgradeData.level);
            if (upgradeData.skillLevels) {
                character.skills.forEach(skill => {
                    const savedLv = upgradeData.skillLevels[skill.id];
                    if (savedLv && savedLv > skill.currentLevel) {
                        while (skill.currentLevel < savedLv && skill.currentLevel < skill.maxLevel) GameData.levelUpSkill(skill);
                    }
                });
            }
        }
        currentCharacter = character;
        const savedCredits = localStorage.getItem('hsr_credits');
        if (savedCredits) totalCredits = parseInt(savedCredits) || 50000;
        updateCreditUI();
        renderCharacterInfo();
        renderLevelUpPanel();
        renderSkillList();
        if (window.RelicSets) {
            loadRelicEquips();
            renderRelicSystem();
        } else {
            console.warn('relic-data.js 未加载，遗器系统不可用');
        }
        initTabs();
    }

    window.upgradeRelic = upgradeRelic;  // 暴露全局
    window.addEventListener('DOMContentLoaded', initUpgradePage);
    document.getElementById('saveBtn').addEventListener('click', () => { saveCredits(); saveCharacter(); });
    setInterval(() => { if (totalCredits !== undefined) saveCredits(); }, 5000);
</script>
</body>
</html>
