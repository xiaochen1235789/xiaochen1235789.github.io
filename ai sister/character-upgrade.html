<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 · 鹿馆升级</title>
    <link rel="icon" href="/images/wangzhantupian.png" type="image/png">
    <!-- 依赖数据文件 -->
   <script src="/ai%20sister/game-data.js"></script>
<script src="/css/relic-data.js"></script>
<script src="/css/character-upgrade.css"></script>
<!-- 新增：角色词条规则配置 -->
<script src="/css/character-rules.js"></script>
<!-- 升级页面核心逻辑 -->
<script src="/css/character-upgrade.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="back-link">← 返回主菜单</a>
        <div class="title">鹿馆 · 修炼室</div>
        <div class="credits" id="creditDisplay">💰 0 信用点</div>
    </div>

    <div class="character-card" id="characterCard"></div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1">📈 角色提升</button>
        <button class="tab-btn" data-tab="tab2">✨ 光锥提升</button>
        <button class="tab-btn" data-tab="tab3">📿 遗器调整</button>
        <button class="tab-btn" data-tab="tab4">🌟 星魂同调</button>
    </div>

    <!-- 角色提升 -->
    <div id="tab1" class="tab-pane active">
        <div class="section-card">
            <div class="section-title" style="margin-bottom: 20px;">📈 角色等级</div>
            <div id="levelUpPanel"></div>
            <div class="section-title" style="margin-top: 20px; margin-bottom: 20px;">✨ 技能升级</div>
            <div id="skillList"></div>
        </div>
    </div>

    <!-- 光锥提升 -->
    <div id="tab2" class="tab-pane">
        <div class="lightcone-section">
            <div class="lightcone-header">
                <div class="lightcone-name">快乐的路一天</div>
                <div class="lightcone-rating" style="color: gold;">✭✭✭✭✭</div>
            </div>
            <div class="lightcone-stats" id="lightconeStats">
                <div class="lightcone-stat"><span>❤️ 生命值</span> <span id="lcHp">0</span></div>
                <div class="lightcone-stat"><span>⚔️ 攻击力</span> <span id="lcAtk">0</span></div>
                <div class="lightcone-stat"><span>🛡️ 防御力</span> <span id="lcDef">0</span></div>
            </div>
            <div class="level-control">
                <div class="level-header"><span class="level-label">光锥等级</span><span class="level-value" id="lcLevelDisplay">Lv.1</span></div>
                <input type="range" class="level-slider" id="lcLevelSlider" min="1" max="90" value="1" step="1">
                <div class="btn-group"><button class="upgrade-btn" id="lcLevelDown">⬇️ 降级</button><button class="upgrade-btn" id="lcLevelUp">⬆️ 升级</button></div>
                <div class="superimpose-row"><span class="level-label">叠影等级</span><select id="lcSuperimpose" class="superimpose-select"><option value="1">叠影①</option><option value="2">叠影②</option><option value="3">叠影③</option><option value="4">叠影④</option><option value="5">叠影⑤</option></select></div>
                <div class="lc-desc" id="lcDesc"></div>
                <div style="margin-top: 12px; color: var(--hsr-warning); font-size: 0.8rem;">升级消耗：每级 500 信用点</div>
            </div>
        </div>
    </div>

    <!-- 遗器调整 -->
    <div id="tab3" class="tab-pane">
        <div class="section-card">
            <div class="section-title">📿 遗器装备</div>
            <div class="relic-grid" id="relicGrid"></div>
            <div style="font-size:0.75rem; color:var(--hsr-subtext); margin-top:12px;">※ 每件遗器可升级至+15，每3级随机强化一条副词条或新增词条</div>
        </div>
    </div>

    <!-- 星魂同调 -->
    <div id="tab4" class="tab-pane">
        <div class="section-card">
            <div class="section-title">🌟 星魂 · 命座激活</div>
            <div class="eidolon-grid" id="eidolonGrid"></div>
            <div style="font-size:0.75rem; color:var(--hsr-subtext); margin-top:12px;">※ 命座效果将在战斗中自动生效（E1/E2/E6已实现，E3/E5影响技能上限）</div>
        </div>
    </div>

    <div class="save-area"><button class="save-btn" id="saveBtn">💾 保存并返回</button></div>
</div>
<div class="toast" id="toastMsg">提示</div>
</body>
</html>
