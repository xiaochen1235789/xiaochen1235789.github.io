<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 · 鹿馆实战</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <script src="/ai sister/game-data.js"></script>
    <script src="/ai sister/battle-logic.js"></script>
    <script src="/css/relic-data.js"></script>
    <link rel="stylesheet" href="/css/battle.css">
    <link rel="stylesheet" href="/css/info-popup.css">
</head>
<body>
    <div class="battle-container" id="battleContainer">
        <div class="damage-stats" id="damageStats"></div>
        <div class="battle-log" id="battleLog">战斗开始</div>
        <!-- 回合标识（顶部） -->
        <div class="status-bar">
            <div class="turn-badge" id="turnBadge"><span>⚡ 玩家回合</span></div>
            <!-- 战技点已移出此处 -->
        </div>

        <!-- 行动条 -->
        <div class="action-bar" id="actionBar"></div>

        <!-- 敌人区域 -->
        <div class="enemy-area" id="enemyArea"></div>

        <!-- 角色区域（包含战技点 + 角色卡片） -->
        <div class="party-area" id="partyArea">
            <!-- 战技点容器（动态生成，位于角色卡片上方） -->
            <div class="skill-points-container" id="skillPointsContainer">
                <div class="skill-points-title">战技点</div>
                <div class="skill-points-icons" id="skillPointsIcons"></div>
                <button class="home-btn" id="homeBtn">Ⅱ</button>
            </div>
            <!-- 角色卡片将动态插入此处 -->
            <div id="characterCardPlaceholder"></div>
        </div>

        <!-- 技能网格和结束按钮 -->
        <div class="action-area">
            <div class="skills-grid" id="skillsGrid"></div>
            <button class="end-turn-btn" id="endTurnBtn">⏩ 结束回合</button>
        </div>
    </div>

    <script src="/css/info-popup.js"></script>
    <script>
        // 等待 GameData 和 BattleLogic 加载
        let initTimer;
        function waitForDeps() {
            if (typeof GameData !== 'undefined' && typeof BattleLogic !== 'undefined') initBattleUI();
            else { clearTimeout(initTimer); initTimer = setTimeout(waitForDeps, 200); }
        }
        window.gameState = null;

        // 返回主页
        function goHome() {
            window.location.href = 'index.html';
        }

        // 渲染战技点（使用图片）
        function renderSkillPoints() {
            const state = window.gameState;
            if (!state) return;
            const container = document.getElementById('skillPointsIcons');
            if (!container) return;
            const current = state.skillPoints;
            const max = state.maxSkillPoints;
            const imgUrl = '/attribute_image/PointBPFull.webp';
            let html = '';
            for (let i = 0; i < max; i++) {
                const isActive = i < current;
                // 有战技点时正常显示，无战技点时半透明 + 灰度
                const opacity = isActive ? '1' : '0.3';
                const filter = isActive ? 'none' : 'grayscale(0.5)';
                html += `<img src="${imgUrl}" class="skill-point-img" style="opacity:${opacity}; filter:${filter};" alt="战技点">`;
            }
            container.innerHTML = html;
        }

        // 渲染行动条
        function renderActionBar() {
            const state = window.gameState;
            if (!state) return;
            const actionBar = document.getElementById('actionBar');
            if (!actionBar) return;

            const units = [];
            const player = state.party[0];
            if (player && player.hp > 0) {
                units.push({ type: 'player', name: player.name, avatar: player.avatar || '🦌', speed: player.speed });
            }
            state.enemies.forEach((enemy, idx) => {
                if (enemy.hp > 0) {
                    units.push({ type: 'enemy', name: enemy.name, avatar: enemy.emoji || '👹', speed: enemy.speed, idx });
                }
            });
            units.sort((a, b) => b.speed - a.speed);

            let currentUid = null;
            if (state.isPlayerTurn) {
                currentUid = 'player';
            }

            actionBar.innerHTML = units.map(unit => {
                let isActive = (currentUid === 'player' && unit.type === 'player');
                return `
                    <div class="action-item ${isActive ? 'current' : ''}">
                        <div class="action-avatar">${unit.avatar}</div>
                        <div class="action-name">${unit.name}</div>
                        <div class="action-speed">⚡${unit.speed}</div>
                    </div>
                `;
            }).join('');
        }

        window.updateBattleUI = function () {
            if (!window.gameState) return;
            const state = window.gameState;
            // 敌人区域
            const enemyArea = document.getElementById('enemyArea');
            enemyArea.innerHTML = state.enemies.map((e, idx) => `
                <div class="enemy-card ${idx === state.selectedEnemy ? 'selected' : ''}">
                    <div class="info-btn" data-type="enemy" data-index="${idx}">ℹ️</div>
                    <div class="enemy-avatar">${e.emoji || '👹'}</div>
                    <div class="enemy-name">${e.name}</div>
                    <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${(e.hp / e.maxHp) * 100}%"></div></div>
                    <div class="enemy-hp-text">${Math.max(0, e.hp)}/${e.maxHp}</div>
                </div>
            `).join('');
            document.querySelectorAll('.enemy-card').forEach((card, idx) => { card.onclick = (e) => { if (e.target.classList.contains('info-btn')) return; selectEnemy(idx); }; });
            document.querySelectorAll('.info-btn[data-type="enemy"]').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const idx = parseInt(btn.dataset.index); if (!isNaN(idx) && typeof showEnemyInfo === 'function') showEnemyInfo(idx); else console.warn('showEnemyInfo not defined'); }; });

            // 角色区域（使用占位符）
            const ch = state.party[0];
            let talentPenetration = 0, talentAtkBonus = 0;
            const talentSkill = ch.skills.find(s => s.type === 'talent');
            if (talentSkill) {
                const hasTalent = ch._activatedTraces && ch._activatedTraces.includes('luguan_talent');
                if (hasTalent && ch.speed >= 100) {
                    let penetration = ch._talentMaxPenetration || 0;
                    if (!ch.activatedEidolons?.includes('e6')) {
                        const speedOver = ch.speed - 100;
                        const stacks = Math.floor(speedOver / 5);
                        const maxPen = talentSkill.penetration || 0.1;
                        penetration = Math.min(maxPen, stacks * 0.02);
                    }
                    talentPenetration = penetration * 100;
                }
                const atkBonusCap = talentSkill.atkBonus || 0.2;
                let currentBonus = 0;
                if (ch.activatedEidolons?.includes('e6')) currentBonus = atkBonusCap;
                else currentBonus = Math.min(atkBonusCap, (ch._actionCount || 0) * 0.05);
                talentAtkBonus = currentBonus * 100;
            }
            const placeholder = document.getElementById('characterCardPlaceholder');
            if (placeholder) {
                placeholder.innerHTML = `
                    <div class="character-card active">
                        <div class="info-btn" data-type="character" data-index="0">ℹ️</div>
                        <div class="character-avatar">${ch.avatar || '🦌'}</div>
                        <div class="character-info">
                            <div class="character-name">${ch.name}</div>
                            <div class="character-path">${ch.path}</div>
                            <div class="stat-bars">
                                <div class="stat-bar"><div class="bar-bg"><div class="hp-fill" style="width:${(ch.hp / ch.maxHp) * 100}%"></div></div><span class="stat-text">❤️ ${ch.hp}/${ch.maxHp}</span></div>
                                <div class="stat-bar"><div class="bar-bg"><div class="energy-fill" style="width:${(ch.energy / ch.maxEnergy) * 100}%"></div></div><span class="stat-text">⚡ ${ch.energy}/${ch.maxEnergy}</span></div>
                            </div>
                            <div class="talent-status">🎯 猎杀强化: 穿透 +${talentPenetration.toFixed(1)}% &nbsp;|&nbsp; 攻击 +${talentAtkBonus.toFixed(1)}%</div>
                        </div>
                    </div>
                `;
            }
            const charInfoBtn = document.querySelector('.info-btn[data-type="character"]');
            if (charInfoBtn && typeof showCharacterInfo === 'function') charInfoBtn.onclick = (e) => { e.stopPropagation(); showCharacterInfo(0); };

            // 更新战技点显示
            renderSkillPoints();

            const turnBadge = document.getElementById('turnBadge');
            turnBadge.innerHTML = state.isPlayerTurn ? '<span>⚡ 玩家回合</span>' : '<span>🔥 敌人回合</span>';
            turnBadge.className = `turn-badge ${state.isPlayerTurn ? '' : 'enemy-turn'}`;

            const skillsGrid = document.getElementById('skillsGrid');
            if (state.isPlayerTurn && !state.gameOver) {
                const character = state.party[0];
                const allSkills = character.skills || [];
                const activeSkills = allSkills.filter(sk => sk.type !== 'talent');
                skillsGrid.innerHTML = activeSkills.map((sk, idx) => {
                    let disabled = false, costText = '';
                    if (sk.type === 'skill') { disabled = state.skillPoints < (sk.skillPointCost || 1); costText = `✦${sk.skillPointCost || 1}`; }
                    else if (sk.type === 'ultimate') { disabled = character.energy < (sk.energyCost || 120); costText = `⚡${sk.energyCost || 120}`; }
                    const originalIndex = allSkills.findIndex(s => s.id === sk.id);
                    return `<div class="skill-btn ${disabled ? 'disabled' : ''}" data-skill-original-index="${originalIndex}"><div class="skill-icon">${sk.icon}</div><div class="skill-name">${sk.name}</div>${costText ? `<div class="skill-cost">${costText}</div>` : ''}</div>`;
                }).join('');
                document.querySelectorAll('.skill-btn').forEach(btn => { btn.onclick = () => { const originalIdx = parseInt(btn.dataset.skillOriginalIndex); if (!isNaN(originalIdx)) window.useSkillLogic(originalIdx); }; });
            } else skillsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#aaa;">等待敌人行动...</div>';
            const endBtn = document.getElementById('endTurnBtn');
            endBtn.disabled = !state.isPlayerTurn || state.gameOver;

            renderActionBar();
        };

        window.selectEnemy = function(idx) { if (window.gameState && window.gameState.isPlayerTurn) { window.gameState.selectedEnemy = idx; window.updateBattleUI(); } };

        // 光锥属性数组（1~90级）
        const lcBasePoints = {
            1:{hp:48,atk:26,def:21},20:{hp:242,atk:133,def:106},30:{hp:391,atk:215,def:171},40:{hp:540,atk:297,def:236},
            50:{hp:688,atk:378,def:301},60:{hp:837,atk:460,def:366},70:{hp:986,atk:542,def:431},80:{hp:1058,atk:582,def:463},
            90:{hp:1270,atk:698,def:556}
        };
        const lcLevels = [1,20,30,40,50,60,70,80,90];
        let lightconeStatsByLevel = [];
        for (let i = 1; i <= 90; i++) {
            let lower = lcLevels[0], upper = lcLevels[lcLevels.length-1];
            for (let j = 0; j < lcLevels.length-1; j++) if (i >= lcLevels[j] && i <= lcLevels[j+1]) { lower = lcLevels[j]; upper = lcLevels[j+1]; break; }
            const low = lcBasePoints[lower], high = lcBasePoints[upper], ratio = (i - lower) / (upper - lower);
            lightconeStatsByLevel[i] = { hp: Math.round(low.hp + (high.hp - low.hp) * ratio), atk: Math.round(low.atk + (high.atk - low.atk) * ratio), def: Math.round(low.def + (high.def - low.def) * ratio) };
        }

        function initBattleUI() {
            let savedTeam = null, savedUpgrade = null, activatedEidolons = [];
            try {
                const saved = localStorage.getItem('hsr-selected-team');
                if (saved) savedTeam = JSON.parse(saved);
                const upgrade = localStorage.getItem('hsr-upgrade-data');
                if (upgrade) savedUpgrade = JSON.parse(upgrade);
                const eid = localStorage.getItem('hsr-activated-eidolons');
                if (eid) activatedEidolons = JSON.parse(eid);
            } catch(e) {}

            // 行迹激活状态
            let activatedTraces = [];
            try {
                const tracesData = localStorage.getItem('hsr-activated-traces');
                if (tracesData) {
                    const parsed = JSON.parse(tracesData);
                    if (Array.isArray(parsed)) activatedTraces = parsed;
                }
            } catch(e) {}
            if (activatedTraces.length === 0) activatedTraces = ['luguan_talent1', 'luguan_talent2', 'luguan_talent3'];

            let initState = GameData.getInitialState(null, activatedEidolons);
            let character = initState.party[0];

            if (savedTeam && savedTeam.characters && savedTeam.characters.length > 0) {
                const teamChar = savedTeam.characters[0];
                character.name = teamChar.name || character.name;
                character.avatar = teamChar.avatar || '🦌';
                if (!savedUpgrade || !savedUpgrade.level) {
                    character.maxHp = teamChar.hp || character.maxHp;
                    character.attack = teamChar.attack || character.attack;
                    character.defense = teamChar.defense || character.defense;
                    character.speed = teamChar.speed || character.speed;
                }
                if (teamChar.level && (!savedUpgrade || !savedUpgrade.level)) character.level = teamChar.level;
            }

            if (!character.skills || character.skills.length === 0) character.skills = initState.party[0].skills;
            if (savedUpgrade) {
                if (savedUpgrade.level && savedUpgrade.level > character.level) GameData.levelUpCharacter(character, savedUpgrade.level);
                if (savedUpgrade.skillLevels) {
                    character.skills.forEach(skill => {
                        const targetLv = savedUpgrade.skillLevels[skill.id];
                        if (targetLv && targetLv > skill.currentLevel) while (skill.currentLevel < targetLv && skill.currentLevel < skill.maxLevel) GameData.levelUpSkill(skill);
                    });
                }
            } else if (character.level > 1) GameData.levelUpCharacter(character, character.level);

            character.activatedEidolons = activatedEidolons;
            character._activatedTraces = activatedTraces;
            character.energy = 0;
            character.maxEnergy = 120;
            character.path = character.path || '巡猎';

            const baseHp = character.maxHp, baseAtk = character.attack, baseDef = character.defense;
            // 硬编码行迹属性
            character.attack += Math.floor(baseAtk * 0.198);
            character.critDamage += 0.4105;
            character.speed += 11;

            // 遗器加成
            if (window.RelicSets && localStorage.getItem('hsr-relic-equips')) {
                const savedRelics = localStorage.getItem('hsr-relic-equips');
                let relicEquips = {};
                try { relicEquips = JSON.parse(savedRelics); } catch(e) {}
                function addStat(statType, value, isPercent) {
                    if (isPercent) {
                        if (statType === 'hpPercent') character.maxHp += Math.floor(baseHp * (value / 100));
                        else if (statType === 'atkPercent') character.attack += Math.floor(baseAtk * (value / 100));
                        else if (statType === 'defPercent') character.defense += Math.floor(baseDef * (value / 100));
                        else if (statType === 'critRate') character.critRate += value / 100;
                        else if (statType === 'critDamage') character.critDamage += value / 100;
                        else if (statType === 'speed') character.speed += value;
                    } else {
                        if (statType === 'hp') character.maxHp += value;
                        else if (statType === 'atk') character.attack += value;
                        else if (statType === 'def') character.defense += value;
                        else if (statType === 'speed') character.speed += value;
                    }
                }
                const parts = ['head','hands','body','feet','sphere','rope'];
                for (let part of parts) {
                    const relic = relicEquips[part]; if (!relic) continue;
                    const main = relic.mainStat;
                    const isPercentMain = main.type.includes('Percent') || main.type === 'critRate' || main.type === 'critDamage';
                    if (main.type === 'windDamage') character.windDamageBoost += main.value / 100;
                    else addStat(main.type, main.value, isPercentMain);
                    for (let sub of relic.subStats) {
                        const isPercentSub = sub.type.includes('Percent') || sub.type === 'critRate' || sub.type === 'critDamage';
                        if (sub.type === 'windDamage') character.windDamageBoost += sub.value / 100;
                        else addStat(sub.type, sub.value, isPercentSub);
                    }
                }
                const setCount = { "新生的未来":0, "过往的旧事物":0 };
                for (let part of parts) {
                    const relic = relicEquips[part];
                    if (relic && relic.setType && setCount[relic.setType] !== undefined) setCount[relic.setType]++;
                }
                character.relicSetCounts = setCount;
                if (setCount["新生的未来"] >= 2) character.critRate += 0.08;
                if (setCount["过往的旧事物"] >= 2) character._hasSpeedDmgSet = true;
                if (setCount["新生的未来"] >= 4) character._hasAtkThresholdSet = true;
            }

            // 光锥加成
            let lightconeLevel = 1, superimpose = 1;
            try {
                const lvl = localStorage.getItem('hsr-lightcone-level');
                if (lvl) lightconeLevel = parseInt(lvl,10);
                const sup = localStorage.getItem('hsr-lightcone-superimpose');
                if (sup) superimpose = parseInt(sup,10);
            } catch(e) {}
            const lcStats = lightconeStatsByLevel[lightconeLevel] || { hp:0, atk:0, def:0 };
            character.maxHp += lcStats.hp;
            character.attack += lcStats.atk;
            character.defense += lcStats.def;
            const hpRatio = character.hp / (character.maxHp - lcStats.hp);
            character.hp = Math.floor(character.maxHp * hpRatio);
            if (character.hp <= 0) character.hp = 1;
            const critRateBonus = [0.20,0.225,0.25,0.275,0.30][superimpose-1];
            const skillDmgPerStack = [0.06,0.08,0.10,0.12,0.14][superimpose-1];
            const ultDmgPerStack = [0.16,0.18,0.20,0.22,0.24][superimpose-1];
            character.critRate += critRateBonus;
            const darkStacks = Math.min(10, Math.max(0, Math.floor((character.speed - 100) / 6)));
            character._darkSurgeStacks = darkStacks;
            character._lightconeBonus = { skillNormalDmg: skillDmgPerStack, ultimateCritDmg: ultDmgPerStack };
            character._lightconeInfo = {
                name: "快乐的路一天",
                level: lightconeLevel,
                superimpose: superimpose,
                stats: lcStats,
                desc: `暴击率提高${(critRateBonus*100).toFixed(1)}%；速度＞100时，每超过6点获得1层【暗涌】（当前${darkStacks}层），每层使普攻/战技伤害提高${(skillDmgPerStack*100).toFixed(0)}%，终结技暴伤提高${(ultDmgPerStack*100).toFixed(0)}%`
            };

            // 六命效果
            if (character.activatedEidolons && character.activatedEidolons.includes('e6')) {
                const talentSkill = character.skills.find(s => s.type === 'talent');
                if (talentSkill) {
                    character._talentMaxPenetration = talentSkill.penetration || 0.1;
                    const maxAtkBonus = talentSkill.atkBonus || 0.2;
                    character.attack += Math.floor(character._baseAttack * maxAtkBonus);
                    character._baseAttack = character.attack;
                    character._actionCountLock = true;
                    character._actionCount = 999;
                }
            }

            character.hp = character.maxHp;
            character._baseAttack = character.attack;
            character._actionCount = character._actionCount || 0;
            character._extraTurnUsedInThisTurn = false;

            const baseEnemy = {
                id: 'abyss_monster', name: '深渊魔物', emoji: '👹', attack: 600, defense: 400,
                skills: [{ name: '暗影爪', baseDamage: 0.6 }], isDefDown: false, defDownTurns: 0, debuffs: []
            };
            const enemies = [
                { ...baseEnemy, name: '深渊魔物·左', maxHp: 3200, hp: 3200 },
                { ...baseEnemy, name: '深渊魔物·中', maxHp: 3800, hp: 3800 },
                { ...baseEnemy, name: '深渊魔物·右', maxHp: 3000, hp: 3000 }
            ];

            window.gameState = {
                party: [character],
                enemies: enemies,
                skillPoints: 3,
                maxSkillPoints: 5,
                turn: 0,
                isPlayerTurn: true,
                gameOver: false,
                selectedEnemy: 0,
                activeCharacter: 0,
                lastDamage: 0,
                lastDamageTaken: 0
            };
            window.updateBattleUI();
            addLog('战斗开始！鹿馆迎战深渊魔物');
        }

        function addLog(msg) {
            const logDiv = document.getElementById('battleLog');
            if (logDiv) logDiv.innerHTML = `${msg} &nbsp; → ${logDiv.innerHTML.slice(0, 100)}`;
            console.log(msg);
        }

        window.showDamageEffect = function(targetIndex, damage, isCritical, isEnemy) {
            let targetElem = isEnemy ? document.querySelector(`.enemy-card:nth-child(${targetIndex+1}) .enemy-avatar`) : document.querySelector(`.character-card .character-avatar`);
            if (targetElem) {
                const rect = targetElem.getBoundingClientRect();
                const div = document.createElement('div');
                div.className = `damage-popup ${isCritical ? 'critical' : ''}`;
                div.textContent = isCritical ? `💥${damage}` : `${damage}`;
                div.style.left = rect.left + rect.width/2 + 'px';
                div.style.top = rect.top + rect.height/3 + 'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 800);
            }
            const statsDiv = document.getElementById('damageStats');
            statsDiv.style.opacity = '1';
            statsDiv.textContent = `${isEnemy ? '⚔️ 造成' : '🛡️ 受到'} ${damage} ${isCritical ? '暴击‼' : ''}`;
            statsDiv.style.background = isEnemy ? '#00d4ffcc' : '#ff4757cc';
            setTimeout(() => statsDiv.style.opacity = '0', 1200);
        };

        window.showMessage = function(title, msg) {
            addLog(`${title}: ${msg}`);
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = 'position:fixed;top:30%;left:50%;transform:translateX(-50%);background:#000c;color:#00d4ff;padding:6px 14px;border-radius:30px;z-index:200;backdrop-filter:blur(8px);font-size:0.8rem;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        };

        document.getElementById('endTurnBtn').onclick = () => window.endTurnLogic();
        document.getElementById('homeBtn').onclick = () => goHome();
        window.getCharacterDataForPopup = () => window.gameState?.party[0];
        window.getEnemyDataForPopup = (idx) => window.gameState?.enemies[idx];
        waitForDeps();
    </script>
</body>
</html>
