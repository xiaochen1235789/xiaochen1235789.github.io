<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 · 鹿馆实战</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <script src="/ai sister/game-data.js"></script>
    <script src="/ai sister/battle-logic.js"></script>
    <link rel="stylesheet" href="/css/info-popup.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #0a0a14;
            color: #fff;
            font-family: system-ui, 'Microsoft YaHei', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .battle-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        #0a0a14;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .back-btn {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #00d4ff;
            text-decoration: none;
            z-index: 100;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .enemy-area {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 80px 20px 20px;
            overflow-y: auto;
            min-height: 0;
        }

        .enemy-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            min-width: 140px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.2s;
            position: relative;
        }

        .enemy-card.selected {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .enemy-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #8b0000, #330000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 12px;
            border: 2px solid #ff4757;
        }

        .enemy-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffa5a5;
            margin-bottom: 8px;
        }

        .enemy-hp-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .enemy-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff8c9e);
        }

        .enemy-hp-text {
            font-size: 0.8rem;
            color: #ccc;
        }

        .info-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #ddd;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.2s;
            z-index: 10;
        }
        .info-btn:active { background: #00d4ff; color: #000; transform: scale(0.95); }

        .status-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .turn-badge {
            background: #00d4ff20;
            border: 1px solid #00d4ff;
            border-radius: 24px;
            padding: 4px 16px;
            font-weight: bold;
        }

        .enemy-turn {
            background: #ff475720;
            border-color: #ff4757;
        }

        .skill-points {
            display: flex;
            gap: 6px;
        }

        .skill-point {
            width: 22px;
            height: 28px;
            background: rgba(29, 209, 161, 0.3);
            border-radius: 4px;
            border: 1px solid #1dd1a1;
        }

        .skill-point.active {
            background: #1dd1a1;
            box-shadow: 0 0 8px #1dd1a1;
        }

        .party-area {
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(16px);
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .character-card {
            display: flex;
            gap: 16px;
            background: rgba(30, 30, 46, 0.6);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid transparent;
            position: relative;
        }

        .character-card.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .character-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #00d4ff, #0066aa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .character-info {
            flex: 1;
        }

        .character-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .character-path {
            font-size: 0.75rem;
            color: #00d4ff;
            background: #00d4ff20;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .stat-bars {
            margin-top: 8px;
        }

        .stat-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .bar-bg {
            flex: 1;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff8c9e);
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #4488ff, #88aaff);
        }

        .stat-text {
            font-size: 0.7rem;
            min-width: 45px;
            text-align: right;
            color: #aaa;
        }

        .action-area {
            background: #0a0f1a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .skill-btn {
            background: #1e1e2e;
            border: 1px solid #2a2a3e;
            border-radius: 16px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
        }

        .skill-btn:active {
            transform: scale(0.96);
        }

        .skill-btn.disabled {
            opacity: 0.4;
            filter: grayscale(0.3);
            pointer-events: none;
        }

        .skill-icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .skill-name {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }

        .skill-cost {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 0.7rem;
            color: #4488ff;
        }

        .end-turn-btn {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            border: none;
            border-radius: 32px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .damage-popup {
            position: fixed;
            font-weight: bold;
            font-size: 1.3rem;
            pointer-events: none;
            z-index: 1000;
            text-shadow: 0 0 4px black;
            animation: floatUp 0.8s ease-out forwards;
        }

        .critical {
            color: #ffdd00;
            font-size: 1.6rem;
            text-shadow: 0 0 8px #ffaa00;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.8);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.2);
            }
        }

        .damage-stats {
            position: fixed;
            top: 70px;
            right: 20px;
            background: #00d4ffcc;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            z-index: 100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .battle-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            max-width: 60%;
            white-space: nowrap;
            overflow-x: auto;
            z-index: 100;
            color: #ccc;
        }

        @media (max-width: 768px) {
            .enemy-avatar {
                width: 70px;
                height: 70px;
                font-size: 2.2rem;
            }
            .enemy-card {
                min-width: 120px;
            }
            .skills-grid {
                gap: 8px;
            }
            .skill-icon {
                font-size: 1.5rem;
            }
            .skill-name {
                font-size: 0.7rem;
            }
            .character-avatar {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .enemy-area {
                padding: 70px 12px 12px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回</a>
    <div class="battle-container" id="battleContainer">
        <div class="damage-stats" id="damageStats"></div>
        <div class="battle-log" id="battleLog">战斗开始</div>
        <div class="enemy-area" id="enemyArea"></div>
        <div class="status-bar">
            <div class="turn-badge" id="turnBadge"><span>⚡ 玩家回合</span></div>
            <div class="skill-points" id="skillPoints"></div>
        </div>
        <div class="party-area" id="partyArea"></div>
        <div class="action-area">
            <div class="skills-grid" id="skillsGrid"></div>
            <button class="end-turn-btn" id="endTurnBtn">⏩ 结束回合</button>
        </div>
    </div>

    <script src="/css/info-popup.js"></script>
    <script>
        // 等待 GameData 和 BattleLogic 加载
        let initTimer;

        function waitForDeps() {
            if (typeof GameData !== 'undefined' && typeof BattleLogic !== 'undefined') {
                initBattleUI();
            } else {
                clearTimeout(initTimer);
                initTimer = setTimeout(waitForDeps, 200);
            }
        }

        window.gameState = null;

        window.updateBattleUI = function () {
            if (!window.gameState) return;
            const state = window.gameState;

            // 敌人区域
            const enemyArea = document.getElementById('enemyArea');
            enemyArea.innerHTML = state.enemies.map((e, idx) => `
                <div class="enemy-card ${idx === state.selectedEnemy ? 'selected' : ''}">
                    <div class="info-btn" data-type="enemy" data-index="${idx}">ℹ️</div>
                    <div class="enemy-avatar">${e.emoji || '👹'}</div>
                    <div class="enemy-name">${e.name}</div>
                    <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${(e.hp / e.maxHp) * 100}%"></div></div>
                    <div class="enemy-hp-text">${Math.max(0, e.hp)}/${e.maxHp}</div>
                </div>
            `).join('');

            // 重新绑定敌人点击选择和信息按钮事件
            document.querySelectorAll('.enemy-card').forEach((card, idx) => {
                card.onclick = (e) => {
                    if (e.target.classList.contains('info-btn')) return;
                    selectEnemy(idx);
                };
            });
            document.querySelectorAll('.info-btn[data-type="enemy"]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    if (!isNaN(idx) && typeof showEnemyInfo === 'function') showEnemyInfo(idx);
                    else console.warn('showEnemyInfo not defined');
                };
            });

            // 角色区域
            const ch = state.party[0];
            const partyArea = document.getElementById('partyArea');
            partyArea.innerHTML = `
                <div class="character-card active">
                    <div class="info-btn" data-type="character" data-index="0">ℹ️</div>
                    <div class="character-avatar">${ch.avatar || '🦌'}</div>
                    <div class="character-info">
                        <div class="character-name">${ch.name}</div>
                        <div class="character-path">${ch.path}</div>
                        <div class="stat-bars">
                            <div class="stat-bar"><div class="bar-bg"><div class="hp-fill" style="width:${(ch.hp / ch.maxHp) * 100}%"></div></div><span class="stat-text">❤️ ${ch.hp}/${ch.maxHp}</span></div>
                            <div class="stat-bar"><div class="bar-bg"><div class="energy-fill" style="width:${(ch.energy / ch.maxEnergy) * 100}%"></div></div><span class="stat-text">⚡ ${ch.energy}/${ch.maxEnergy}</span></div>
                        </div>
                    </div>
                </div>
            `;
            const charInfoBtn = document.querySelector('.info-btn[data-type="character"]');
            if (charInfoBtn && typeof showCharacterInfo === 'function') {
                charInfoBtn.onclick = (e) => {
                    e.stopPropagation();
                    showCharacterInfo(0);
                };
            }

            // 战技点
            const skillPointsDiv = document.getElementById('skillPoints');
            skillPointsDiv.innerHTML = Array(state.maxSkillPoints).fill().map((_, i) => `<div class="skill-point ${i < state.skillPoints ? 'active' : ''}"></div>`).join('');

            // 回合标识
            const turnBadge = document.getElementById('turnBadge');
            turnBadge.innerHTML = state.isPlayerTurn ? '<span>⚡ 玩家回合</span>' : '<span>🔥 敌人回合</span>';
            turnBadge.className = `turn-badge ${state.isPlayerTurn ? '' : 'enemy-turn'}`;

            // 技能网格
            const skillsGrid = document.getElementById('skillsGrid');
            if (state.isPlayerTurn && !state.gameOver) {
                const character = state.party[0];
                const allSkills = character.skills || [];
                const activeSkills = allSkills.filter(sk => sk.type !== 'talent');
                skillsGrid.innerHTML = activeSkills.map((sk, idx) => {
                    let disabled = false,
                        costText = '';
                    if (sk.type === 'skill') {
                        disabled = state.skillPoints < (sk.skillPointCost || 1);
                        costText = `✦${sk.skillPointCost || 1}`;
                    } else if (sk.type === 'ultimate') {
                        disabled = character.energy < (sk.energyCost || 120);
                        costText = `⚡${sk.energyCost || 120}`;
                    }
                    const originalIndex = allSkills.findIndex(s => s.id === sk.id);
                    return `<div class="skill-btn ${disabled ? 'disabled' : ''}" data-skill-original-index="${originalIndex}">
                                <div class="skill-icon">${sk.icon}</div>
                                <div class="skill-name">${sk.name}</div>
                                ${costText ? `<div class="skill-cost">${costText}</div>` : ''}
                            </div>`;
                }).join('');
                document.querySelectorAll('.skill-btn').forEach(btn => {
                    btn.onclick = () => {
                        const originalIdx = parseInt(btn.dataset.skillOriginalIndex);
                        if (!isNaN(originalIdx)) window.useSkillLogic(originalIdx);
                    };
                });
            } else {
                skillsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#aaa;">等待敌人行动...</div>';
            }
            const endBtn = document.getElementById('endTurnBtn');
            endBtn.disabled = !state.isPlayerTurn || state.gameOver;
        };

        window.selectEnemy = function (idx) {
            if (!window.gameState || !window.gameState.isPlayerTurn) return;
            window.gameState.selectedEnemy = idx;
            window.updateBattleUI();
        };

        function initBattleUI() {
            let savedTeam = null;
            let savedUpgrade = null;
            try {
                const saved = localStorage.getItem('hsr-selected-team');
                if (saved) savedTeam = JSON.parse(saved);
                const upgrade = localStorage.getItem('hsr-upgrade-data');
                if (upgrade) savedUpgrade = JSON.parse(upgrade);
            } catch (e) {}

            // 获取初始状态（等级1，技能等级1）
            let initState = GameData.getInitialState();
            let character = initState.party[0];

            // 应用队伍保存的基础属性（从选人界面来，覆盖外观和初始属性）
            if (savedTeam && savedTeam.characters && savedTeam.characters.length > 0) {
                const teamChar = savedTeam.characters[0];
                character.name = teamChar.name || character.name;
                character.avatar = teamChar.avatar || '🦌';
                // 注意：不要直接覆盖 maxHp/attack/defense，因为等级升级会重新计算
                // 但如果没有升级数据，可以先用队伍保存的值
                if (!savedUpgrade || !savedUpgrade.level) {
                    character.maxHp = teamChar.hp || character.maxHp;
                    character.attack = teamChar.attack || character.attack;
                    character.defense = teamChar.defense || character.defense;
                    character.speed = teamChar.speed || character.speed;
                }
                if (teamChar.level && (!savedUpgrade || !savedUpgrade.level)) {
                    character.level = teamChar.level;
                }
            }

            // 重要：不要覆盖 character.skills！它已经包含动态倍率
            // 只需确保技能数组不为空（正常情况下 initState 已有）
            if (!character.skills || character.skills.length === 0) {
                character.skills = initState.party[0].skills;
            }

            // 应用升级数据（等级和技能等级）—— 这会覆盖上面的临时属性
            if (savedUpgrade) {
                // 先升级角色等级
                if (savedUpgrade.level && savedUpgrade.level > character.level) {
                    GameData.levelUpCharacter(character, savedUpgrade.level);
                }
                // 再升级技能等级
                if (savedUpgrade.skillLevels) {
                    character.skills.forEach(skill => {
                        const targetLv = savedUpgrade.skillLevels[skill.id];
                        if (targetLv && targetLv > skill.currentLevel) {
                            while (skill.currentLevel < targetLv && skill.currentLevel < skill.maxLevel) {
                                GameData.levelUpSkill(skill);
                            }
                        }
                    });
                }
            } else {
                // 如果没有升级数据，但队伍保存了等级，尝试按队伍等级升级
                if (character.level > 1) {
                    GameData.levelUpCharacter(character, character.level);
                }
            }

            // 确保能量归零
            character.energy = 0;
            character.maxEnergy = 120;
            character.path = character.path || '巡猎';

            // 敌人定义
            const baseEnemy = {
                id: 'abyss_monster',
                name: '深渊魔物',
                emoji: '👹',
                attack: 600,
                defense: 400,
                skills: [{ name: '暗影爪', baseDamage: 0.6 }],
                isDefDown: false,
                defDownTurns: 0
            };
            const enemies = [
                { ...baseEnemy, name: '深渊魔物·左', maxHp: 3200, hp: 3200 },
                { ...baseEnemy, name: '深渊魔物·中', maxHp: 3800, hp: 3800 },
                { ...baseEnemy, name: '深渊魔物·右', maxHp: 3000, hp: 3000 }
            ];

            window.gameState = {
                party: [character],
                enemies: enemies,
                skillPoints: 3,
                maxSkillPoints: 5,
                turn: 0,
                isPlayerTurn: true,
                gameOver: false,
                selectedEnemy: 0,
                activeCharacter: 0,
                lastDamage: 0,
                lastDamageTaken: 0
            };
            window.updateBattleUI();
            addLog('战斗开始！鹿馆迎战深渊魔物');
        }

        function addLog(msg) {
            const logDiv = document.getElementById('battleLog');
            if (logDiv) {
                logDiv.innerHTML = `${msg} &nbsp; ➜ ${logDiv.innerHTML.slice(0, 100)}`;
            }
            console.log(msg);
        }

        window.showDamageEffect = function (targetIndex, damage, isCritical, isEnemy) {
            let targetElem = null;
            if (isEnemy) {
                targetElem = document.querySelector(`.enemy-card:nth-child(${targetIndex + 1}) .enemy-avatar`);
            } else {
                targetElem = document.querySelector(`.character-card .character-avatar`);
            }
            if (targetElem) {
                const rect = targetElem.getBoundingClientRect();
                const div = document.createElement('div');
                div.className = `damage-popup ${isCritical ? 'critical' : ''}`;
                div.textContent = isCritical ? `💥${damage}` : `${damage}`;
                div.style.left = rect.left + rect.width / 2 + 'px';
                div.style.top = rect.top + rect.height / 3 + 'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 800);
            }
            const statsDiv = document.getElementById('damageStats');
            statsDiv.style.opacity = '1';
            statsDiv.textContent = `${isEnemy ? '⚔️ 造成' : '🛡️ 受到'} ${damage} ${isCritical ? '暴击‼' : ''}`;
            statsDiv.style.background = isEnemy ? '#00d4ffcc' : '#ff4757cc';
            setTimeout(() => statsDiv.style.opacity = '0', 1200);
        };

        window.showMessage = function (title, msg) {
            addLog(`${title}: ${msg}`);
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = 'position:fixed;top:30%;left:50%;transform:translateX(-50%);background:#000c;color:#00d4ff;padding:8px 16px;border-radius:40px;z-index:200;backdrop-filter:blur(8px);';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        };

        document.getElementById('endTurnBtn').onclick = () => {
            window.endTurnLogic();
        };

        // 暴露获取当前角色/敌函数供 info-popup 使用
        window.getCharacterDataForPopup = () => window.gameState?.party[0];
        window.getEnemyDataForPopup = (idx) => window.gameState?.enemies[idx];

        waitForDeps();
    </script>
</body>
</html>
