<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 - 星穹启程</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, 'Microsoft YaHei', sans-serif;
        }
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-primary: #00d4ff;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #fff;
            --hsr-subtext: #a0b4c6;
            --hsr-glass: rgba(255,255,255,0.05);
            --hsr-glass-border: rgba(255,255,255,0.1);
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--hsr-bg);
            color: var(--hsr-text);
            position: fixed;
        }
        /* 星空背景 */
        .stars-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        /* 主界面 */
        .main-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        var(--hsr-bg);
            overflow-y: auto;
            overflow-x: hidden;
            display: none;
            z-index: 2;
        }
        .title-container {
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 8vh;
        }
        .game-title {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #00d4ff, #66e5ff, #fff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0,212,255,0.5);
        }
        .game-subtitle {
            font-size: 1.2rem;
            color: var(--hsr-subtext);
            margin-bottom: 2rem;
        }
        /* 圆形音乐按钮 */
        .music-circle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(16px);
            border: 1px solid var(--hsr-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(0,212,255,0.3);
            touch-action: manipulation;
        }
        .music-circle:active { transform: scale(0.95); }
        .music-circle span { font-size: 1.5rem; pointer-events: none; }
        @keyframes guidePulse {
            0% { box-shadow: 0 0 0 0 rgba(0,212,255,0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(0,212,255,0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); transform: scale(1); }
        }
        .music-circle.guide { animation: guidePulse 1.2s ease-out 4; }
        @media (max-width: 768px) {
            .music-circle { width: 56px; height: 56px; }
            .music-circle span { font-size: 1.8rem; }
        }
        /* 菜单 */
        .menu-container {
            width: 90%;
            max-width: 400px;
            margin: 0 auto 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-item {
            background: var(--hsr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 1.2rem;
            color: var(--hsr-text);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            text-decoration: none;
            touch-action: manipulation;
        }
        .menu-item:hover {
            border-color: var(--hsr-primary);
            background: rgba(0,212,255,0.05);
            transform: translateX(10px);
        }
        /* 角色展示 */
        .character-showcase {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px auto 40px;
            flex-wrap: wrap;
        }
        .character-card {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), #0088cc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            touch-action: manipulation;
        }
        .character-card:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: var(--hsr-primary);
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
        }
        .character-name {
            position: absolute;
            bottom: -28px;
            font-size: 0.8rem;
            color: var(--hsr-primary-light);
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 12px;
            pointer-events: none;
        }
        .character-card:hover .character-name { opacity: 1; }
        .footer-info {
            text-align: center;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            margin: 20px auto 30px;
            opacity: 0.6;
        }
        .version {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0.5;
        }
        /* 设置/关于面板 */
        .settings-panel, .about-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .settings-panel.active, .about-panel.active { display: flex; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hsr-bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        .loading-text { font-size: 1.5rem; color: var(--hsr-primary); margin-bottom: 20px; }
        .loading-percent { font-size: 1.2rem; color: var(--hsr-primary-light); margin-bottom: 20px; }
        .loading-bar { width: 260px; height: 4px; background: var(--hsr-glass); border-radius: 2px; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--hsr-primary), var(--hsr-primary-light)); transition: width 0.1s; }
        .loading-status { margin-top: 20px; font-size: 0.8rem; color: var(--hsr-subtext); }
        /* 引导页 */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,20,0.96);
            backdrop-filter: blur(20px);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1s;
        }
        .splash-content { text-align: center; animation: fadeInUp 0.8s; }
        .splash-content h2 { font-size: 2rem; color: var(--hsr-primary); margin-bottom: 1rem; }
        .splash-content p { font-size: 1.2rem; color: var(--hsr-primary-light); margin-bottom: 2rem; }
        .splash-icon { font-size: 4rem; margin-bottom: 1rem; animation: bounce 1.5s infinite; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        /* 设置内部样式 */
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--hsr-glass-border);
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #444;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active { background: var(--hsr-primary); }
        .toggle-switch::after {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle-switch.active::after { left: 22px; }
        .volume-slider {
            width: 140px;
            height: 4px;
            background: #444;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            touch-action: none;
        }
        .volume-fill {
            position: absolute;
            height: 100%;
            background: var(--hsr-primary);
            border-radius: 4px;
            width: 0%;
            pointer-events: none;
        }
        .volume-handle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: -5px;
            left: 0%;
            transform: translateX(-50%);
            pointer-events: none;
            box-shadow: 0 0 6px var(--hsr-primary);
        }
        .quality-select {
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            color: var(--hsr-text);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .settings-actions { display: flex; gap: 20px; justify-content: center; margin-top: 10px; }
        .settings-btn {
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--hsr-text);
        }
        .settings-btn.primary { background: var(--hsr-primary); color: #000; border: none; }
        .volume-value { font-size: 0.8rem; min-width: 45px; text-align: right; }
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        .click-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #00d4ff, #0088cc);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: particleExpand 0.6s ease-out forwards;
        }
        @keyframes particleExpand {
            0% { width: 8px; height: 8px; opacity: 0.8; }
            100% { width: 60px; height: 60px; opacity: 0; filter: blur(4px); }
        }
        @media (max-width: 480px) {
            .game-title { font-size: 2.5rem; }
            .menu-item { padding: 18px 20px; font-size: 1rem; }
            .character-card { width: 60px; height: 60px; font-size: 2rem; }
            .version { top: 10px; left: 10px; font-size: 0.7rem; }
            .music-circle { width: 48px; height: 48px; top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">跃迁准备中...</div>
        <div class="loading-percent" id="loadingPercent">0%</div>
        <div class="loading-bar"><div class="loading-progress" id="loadingProgressFill"></div></div>
        <div class="loading-status" id="loadingStatus">正在预加载音乐资源...</div>
    </div>

    <!-- 首屏引导页 -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-icon">✨</div>
            <h2>六哥荣耀</h2>
            <p>轻触进入星穹世界</p>
            <div style="font-size:0.9rem; opacity:0.7;">✦ 触摸任意位置唤醒音乐 ✦</div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <div class="stars-bg" id="starsBg"></div>
        <div class="version">v1.0.0</div>
        <div class="title-container">
            <h1 class="game-title">六哥荣耀</h1>
            <div class="game-subtitle">星海无垠，命运待启</div>
        </div>
        <div class="music-circle" id="musicCircleBtn">
            <span id="musicIcon">🔇</span>
        </div>
        <div class="menu-container">
            <a href="https://xiaochen1235789.github.io/ai sister/select-character.html" class="menu-item">🚀 开始游戏 ▶</a>
            <a href="https://xiaochen1235789.github.io/ai sister/role-details.html" class="menu-item">🐾 角色详情 ▶</a>
            <div class="menu-item" onclick="showSettings()">⚙️ 设置 ⚙️</div>
            <div class="menu-item" onclick="showAbout()">📖 关于 📖</div>
            <div class="menu-item" onclick="exitGame()">🚪 退出 🚪</div>
        </div>
        <div class="character-showcase">
            <div class="character-card" data-name="三月七">❄️<div class="character-name">三月七</div></div>
            <div class="character-card" data-name="丹恒">🗡️<div class="character-name">丹恒</div></div>
            <div class="character-card" data-name="姬子">☕<div class="character-name">姬子</div></div>
            <div class="character-card" data-name="瓦尔特">🧥<div class="character-name">瓦尔特</div></div>
        </div>
        <div class="footer-info">追随星神的轨迹，书写属于你的传奇</div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="setting-item">
            <span>🎵 背景音乐</span>
            <div class="setting-control">
                <div class="toggle-switch active" id="musicToggle" onclick="toggleMusicSetting()"></div>
                <div class="volume-slider" id="musicVolumeSlider">
                    <div class="volume-fill" style="width:30%"></div>
                    <div class="volume-handle" style="left:30%"></div>
                </div>
                <span class="volume-value" id="volumePercent">60%</span>
            </div>
        </div>
        <div class="setting-item">
            <span>🔊 音效开关</span>
            <div class="setting-control"><div class="toggle-switch active" id="sfxToggle" onclick="toggleSfx()"></div></div>
        </div>
        <div class="setting-item">
            <span>📳 震动反馈</span>
            <div class="setting-control"><div class="toggle-switch" id="vibeToggle" onclick="toggleVibration()"></div></div>
        </div>
        <div class="setting-item">
            <span>🎨 画面质量</span>
            <div class="setting-control"><select class="quality-select" id="qualitySelect" onchange="changeQuality()"><option value="low">低</option><option value="medium" selected>中</option><option value="high">高</option><option value="ultra">极致</option></select></div>
        </div>
        <div class="settings-actions">
            <button class="settings-btn" onclick="resetSettings()">重置</button>
            <button class="settings-btn primary" onclick="saveAndCloseSettings()">保存</button>
        </div>
    </div>
    <div class="about-panel" id="aboutPanel">
        <h2>✨ 关于 ✨</h2>
        <div class="about-content">开发者：小尘 | 版本 v1.0.0 | 仅供学习交流</div>
        <div class="settings-actions"><button class="settings-btn primary" onclick="hideAbout()">返回</button></div>
    </div>
    <div class="particle-container" id="particleContainer"></div>

    <script>
        // ========== 粒子效果 ==========
        function createClickParticle(x, y) {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const p = document.createElement('div');
            p.className = 'click-particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            container.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }
        function handleTap(e) {
            let cx, cy;
            if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            createClickParticle(cx, cy);
        }
        document.addEventListener('click', handleTap);
        document.addEventListener('touchstart', handleTap);

        // ========== 音频系统（仅在用户点击引导页后初始化） ==========
        let bgmAudio = null;
        let audioCtx = null;
        let gainNode = null;
        let sourceNode = null;
        let isWebAudioActive = false;
        let musicEnabled = true;
        let musicVolumePercent = 60;
        let sfxEnabled = true;
        let vibrationEnabled = true;
        let quality = 'medium';
        let audioInitialized = false;
        let musicBlobUrl = null;

        const musicCircle = document.getElementById('musicCircleBtn');
        const musicIconSpan = document.getElementById('musicIcon');
        const musicToggle = document.getElementById('musicToggle');

        // 获取音频 Blob（带缓存）
        async function getAudioBlobUrl() {
            const url = "https://xiaochen1235789.github.io/ai%20sister/zhujiemian.aac";
            const CACHE_KEY = 'hsr_music_v5';
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    const bin = atob(cached);
                    const arr = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                    const blob = new Blob([arr], { type: 'audio/mp4' });
                    return URL.createObjectURL(blob);
                } catch(e) { localStorage.removeItem(CACHE_KEY); }
            }
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error();
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                if (blob.size < 4 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        if (base64 && base64.length < 5e6) localStorage.setItem(CACHE_KEY, base64);
                    };
                    reader.readAsDataURL(blob);
                }
                return blobUrl;
            } catch(e) {
                console.warn("音频下载失败，使用原始链接");
                return url;
            }
        }

        // 一次性初始化音频（在用户点击引导页时调用）
        async function initAndStartMusic() {
            if (audioInitialized) return;
            audioInitialized = true;

            // 获取音频源
            if (!musicBlobUrl) musicBlobUrl = await getAudioBlobUrl();
            if (!musicBlobUrl) return;

            // 创建 audio 元素
            bgmAudio = new Audio();
            bgmAudio.loop = true;
            bgmAudio.src = musicBlobUrl;
            bgmAudio.crossOrigin = "anonymous";

            // 创建 Web Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gainNode.gain.value = musicVolumePercent / 100;

            try {
                sourceNode = audioCtx.createMediaElementSource(bgmAudio);
                sourceNode.connect(gainNode);
                isWebAudioActive = true;
                bgmAudio.volume = 1;  // 完全由 gain 控制
            } catch(e) {
                console.warn("Web Audio 失败，降级原生音量", e);
                isWebAudioActive = false;
                bgmAudio.volume = Math.min(1, musicVolumePercent / 100);
            }

            // 唤醒 AudioContext
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // 自动播放（如果音乐开关开启）
            if (musicEnabled) {
                try {
                    await bgmAudio.play();
                    updateMusicButtonUI();
                } catch(e) { console.warn("自动播放失败", e); }
            }

            // 隐藏引导页，显示主界面
            const splash = document.getElementById('splashScreen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 1000);
            }
            document.getElementById('mainContainer').style.display = 'block';
            createStars();     // 确保星星背景已生成
            if (musicCircle) musicCircle.classList.remove('guide');
        }

        // 音量应用
        function applyVolumePercent(percent) {
            musicVolumePercent = Math.min(200, Math.max(0, percent));
            if (!bgmAudio || !musicEnabled) return;
            if (isWebAudioActive && gainNode) {
                gainNode.gain.value = musicVolumePercent / 100;
                bgmAudio.volume = 1;
            } else if (bgmAudio) {
                bgmAudio.volume = Math.min(1, musicVolumePercent / 100);
            }
            document.getElementById('volumePercent').innerText = Math.round(musicVolumePercent) + '%';
            const fill = document.querySelector('#musicVolumeSlider .volume-fill');
            const handle = document.querySelector('#musicVolumeSlider .volume-handle');
            if (fill) fill.style.width = (musicVolumePercent / 200 * 100) + '%';
            if (handle) handle.style.left = (musicVolumePercent / 200 * 100) + '%';
            if (musicVolumePercent > 100) showNotification("⚠️ 音量超过100%，可能失真", 1500);
        }

        // 音量滑块（安全实现，无 pointer capture 错误）
        function setupVolumeSlider() {
            const slider = document.getElementById('musicVolumeSlider');
            if (!slider) return;
            let dragging = false;
            const update = (e) => {
                const rect = slider.getBoundingClientRect();
                let x = (e.clientX - rect.left) / rect.width;
                x = Math.min(1, Math.max(0, x));
                applyVolumePercent(Math.round(x * 200));
                saveSettings();
            };
            const onMove = (e) => { if (dragging) { e.preventDefault(); update(e); } };
            const onUp = () => {
                dragging = false;
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('touchend', onUp);
            };
            slider.addEventListener('mousedown', (e) => {
                dragging = true;
                update(e);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            });
            slider.addEventListener('touchstart', (e) => {
                dragging = true;
                update(e.touches[0]);
                window.addEventListener('touchmove', onMove);
                window.addEventListener('touchend', onUp);
                e.preventDefault();
            });
            slider.addEventListener('click', update);
        }

        function saveSettings() {
            localStorage.setItem('hsr_music_enabled', musicEnabled);
            localStorage.setItem('hsr_music_volume_percent', musicVolumePercent);
            localStorage.setItem('hsr_sfx_enabled', sfxEnabled);
            localStorage.setItem('hsr_vibration_enabled', vibrationEnabled);
            localStorage.setItem('hsr_quality', quality);
        }

        function loadSettings() {
            musicEnabled = localStorage.getItem('hsr_music_enabled') !== 'false';
            musicVolumePercent = parseFloat(localStorage.getItem('hsr_music_volume_percent')) || 60;
            sfxEnabled = localStorage.getItem('hsr_sfx_enabled') !== 'false';
            vibrationEnabled = localStorage.getItem('hsr_vibration_enabled') === 'true';
            quality = localStorage.getItem('hsr_quality') || 'medium';

            musicToggle.classList.toggle('active', musicEnabled);
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            const vt = document.getElementById('vibeToggle');
            if (vt) vt.classList.toggle('active', vibrationEnabled);
            const qs = document.getElementById('qualitySelect');
            if (qs) qs.value = quality;
            applyVolumePercent(musicVolumePercent);
            changeQuality();
            updateMusicButtonUI();
        }

        function toggleMusicSetting() {
            musicEnabled = !musicEnabled;
            musicToggle.classList.toggle('active', musicEnabled);
            if (bgmAudio) {
                if (musicEnabled) {
                    if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent / 100;
                    else if (bgmAudio) bgmAudio.volume = Math.min(1, musicVolumePercent/100);
                    if (bgmAudio.paused) bgmAudio.play().catch(e=>console.warn);
                } else {
                    if (isWebAudioActive && gainNode) gainNode.gain.value = 0;
                    else if (bgmAudio) bgmAudio.volume = 0;
                    if (!bgmAudio.paused) bgmAudio.pause();
                }
            }
            saveSettings();
            updateMusicButtonUI();
        }

        function updateMusicButtonUI() {
            if (!bgmAudio) {
                musicIconSpan.innerText = '🔇';
                return;
            }
            if (!musicEnabled) {
                musicIconSpan.innerText = '🔇';
                musicCircle.style.borderColor = '#888';
            } else {
                musicIconSpan.innerText = bgmAudio.paused ? '⏸️' : '🎵';
                musicCircle.style.borderColor = 'var(--hsr-primary)';
            }
        }

        // 圆形按钮点击
        async function onMusicTap(e) {
            e.preventDefault();
            e.stopPropagation();
            if (!audioInitialized) {
                await initAndStartMusic();
                return;
            }
            if (!bgmAudio) return;
            if (!musicEnabled) {
                musicEnabled = true;
                musicToggle.classList.add('active');
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent / 100;
                else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
                saveSettings();
            }
            if (bgmAudio.paused) {
                try { await bgmAudio.play(); } catch(e) {}
                updateMusicButtonUI();
            } else {
                bgmAudio.pause();
                updateMusicButtonUI();
            }
        }
        musicCircle.addEventListener('click', onMusicTap);
        musicCircle.addEventListener('touchstart', onMusicTap, { passive: false });

        // ========== 音效系统 ==========
        let sfxCtx = null;
        function playSfx() {
            if (!sfxEnabled) return;
            if (!sfxCtx) sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = sfxCtx.createOscillator();
            const gain = sfxCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 660;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(sfxCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, sfxCtx.currentTime + 0.3);
            osc.stop(sfxCtx.currentTime + 0.3);
            if (sfxCtx.state === 'suspended') sfxCtx.resume();
        }
        function toggleSfx() {
            sfxEnabled = !sfxEnabled;
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            saveSettings();
        }
        function vibrate(p) { if (vibrationEnabled && navigator.vibrate) navigator.vibrate(p); }
        function toggleVibration() {
            vibrationEnabled = !vibrationEnabled;
            const t = document.getElementById('vibeToggle');
            if (t) t.classList.toggle('active', vibrationEnabled);
            saveSettings();
            showNotification(vibrationEnabled ? "震动反馈已开启" : "震动反馈已关闭", 1000);
        }

        // 画质与星空
        function changeQuality() {
            const sel = document.getElementById('qualitySelect');
            if (sel) quality = sel.value;
            localStorage.setItem('hsr_quality', quality);
            createStars();
            const main = document.getElementById('mainContainer');
            if (quality === 'low') {
                main.style.backdropFilter = 'none';
                document.querySelectorAll('.menu-item, .music-circle').forEach(el => el.style.backdropFilter = 'none');
            } else {
                main.style.backdropFilter = '';
                document.querySelectorAll('.menu-item, .music-circle').forEach(el => el.style.backdropFilter = '');
            }
        }
        function createStars() {
            const starsBg = document.getElementById('starsBg');
            if (!starsBg) return;
            starsBg.innerHTML = '';
            let cnt = quality === 'low' ? 30 : (quality === 'medium' ? 80 : (quality === 'high' ? 120 : 180));
            cnt = Math.min(cnt, Math.floor(window.innerWidth / 8));
            for (let i = 0; i < cnt; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const sz = Math.random() * 3 + 1;
                star.style.width = sz + 'px';
                star.style.height = sz + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.opacity = Math.random() * 0.6 + 0.2;
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                starsBg.appendChild(star);
            }
        }

        // 角色卡片
        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                playSfx();
                vibrate(30);
                showNotification(`✨ ${card.dataset.name} 向你问好！`, 1500);
            });
        });
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => vibrate(20));
        });

        let notifTimer;
        function showNotification(msg, dur) {
            let n = document.getElementById('floatNotif');
            if (!n) {
                n = document.createElement('div');
                n.id = 'floatNotif';
                n.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); color:#00d4ff; padding:8px 20px; border-radius:40px; font-size:0.9rem; z-index:10001; white-space:nowrap; border:1px solid #00d4ff; pointer-events:none; transition:opacity 0.2s;';
                document.body.appendChild(n);
            }
            n.textContent = msg;
            n.style.opacity = '1';
            clearTimeout(notifTimer);
            notifTimer = setTimeout(() => n.style.opacity = '0', dur);
        }

        // UI 面板
        function showSettings() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('settingsPanel').classList.add('active');
        }
        function saveAndCloseSettings() { saveSettings(); showNotification("设置已保存", 1000); closePanels(); }
        function showAbout() { document.getElementById('overlay').classList.add('active'); document.getElementById('aboutPanel').classList.add('active'); }
        function hideAbout() { closePanels(); }
        function closePanels() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('settingsPanel').classList.remove('active');
            document.getElementById('aboutPanel').classList.remove('active');
        }
        function exitGame() {
            if (confirm("确定要登上星穹列车离开吗？")) {
                const main = document.getElementById('mainContainer');
                main.style.transition = 'opacity 1s';
                main.style.opacity = '0';
                setTimeout(() => {
                    document.body.innerHTML = `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a14;color:#00d4ff;font-size:1.5rem;">🚀<br>感谢游玩，愿星光照耀你的旅途<br><span style="font-size:0.9rem;margin-top:20px;">页面即将关闭...</span></div>`;
                    setTimeout(() => window.close(), 2000);
                }, 800);
            }
        }
        function resetSettings() {
            musicEnabled = true;
            musicVolumePercent = 60;
            sfxEnabled = true;
            vibrationEnabled = true;
            quality = 'medium';
            musicToggle.classList.add('active');
            document.getElementById('sfxToggle').classList.add('active');
            const vt = document.getElementById('vibeToggle');
            if (vt) vt.classList.add('active');
            document.getElementById('qualitySelect').value = 'medium';
            applyVolumePercent(60);
            if (bgmAudio) {
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent/100;
                else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
            }
            changeQuality();
            saveSettings();
            showNotification("设置已重置", 1000);
        }

        // 预加载（只下载音频到缓存，不初始化播放）
        async function preloadOnly() {
            const loadingPercent = document.getElementById('loadingPercent');
            const loadingFill = document.getElementById('loadingProgressFill');
            const loadingStatus = document.getElementById('loadingStatus');
            loadingPercent.innerText = '80%';
            loadingFill.style.width = '80%';
            loadingStatus.innerText = '正在缓存音乐...';
            await getAudioBlobUrl();  // 触发下载并缓存
            loadingPercent.innerText = '100%';
            loadingFill.style.width = '100%';
            loadingStatus.innerText = '加载完成，请触摸进入';
            await new Promise(r => setTimeout(r, 500));
        }

        async function init() {
            await preloadOnly();
            const loading = document.getElementById('loadingScreen');
            if (loading) loading.style.opacity = '0';
            setTimeout(() => {
                if (loading) loading.style.display = 'none';
                setupVolumeSlider();
                loadSettings();
                createStars();  // 预生成星星，主界面还未显示，没关系
            }, 500);
        }

        window.addEventListener('DOMContentLoaded', init);
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 引导页点击事件
        const splashDiv = document.getElementById('splashScreen');
        if (splashDiv) {
            const onSplashTap = (e) => {
                e.preventDefault();
                initAndStartMusic();
                splashDiv.removeEventListener('click', onSplashTap);
                splashDiv.removeEventListener('touchstart', onSplashTap);
            };
            splashDiv.addEventListener('click', onSplashTap);
            splashDiv.addEventListener('touchstart', onSplashTap, { passive: false });
        }
    </script>
</body>
</html>
