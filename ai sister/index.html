<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 - 星穹启程</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <style>
        
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-card: #1e1e2e;
            --hsr-primary: #00d4ff;
            --hsr-primary-dark: #0088cc;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #ffffff;
            --hsr-subtext: #a0b4c6;
            --hsr-danger: #ff4757;
            --hsr-warning: #ff9f43;
            --hsr-success: #1dd1a1;
            --hsr-glass: rgba(255, 255, 255, 0.05);
            --hsr-glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'HYWenHei-85W', 'Microsoft YaHei', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--hsr-bg);
            color: var(--hsr-text);
            position: fixed;
        }

        .main-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        var(--hsr-bg);
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .stars-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        .click-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #00d4ff, #0088cc);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: particleExpand 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes particleExpand {
            0% { width: 8px; height: 8px; opacity: 0.8; }
            100% { width: 60px; height: 60px; opacity: 0; filter: blur(4px); }
        }

        .title-container {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 8vh;
        }

        .game-title {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #00d4ff, #66e5ff, #ffffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: var(--hsr-subtext);
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .music-control {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: center;
            margin: 20px auto 30px;
        }

        .music-btn {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 10px 24px;
            border: 1px solid var(--hsr-primary);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: var(--hsr-primary-light);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        }

        .music-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.02);
            border-color: var(--hsr-primary-light);
        }

        .menu-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            margin: 0 auto 40px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background: var(--hsr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 1.2rem;
            color: var(--hsr-text);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .menu-item:hover::before {
            left: 100%;
        }

        .menu-item:hover {
            border-color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.05);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .character-showcase {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px auto 40px;
            z-index: 5;
            flex-wrap: wrap;
        }

        .character-card {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .character-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s;
        }

        .character-card:hover::after {
            left: 100%;
        }

        .character-card:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: var(--hsr-primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        .character-name {
            position: absolute;
            bottom: -28px;
            font-size: 0.8rem;
            color: var(--hsr-primary-light);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 12px;
            pointer-events: none;
        }

        .character-card:hover .character-name {
            opacity: 1;
        }

        .footer-info {
            text-align: center;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            margin: 20px auto 30px;
            opacity: 0.6;
            width: 100%;
            pointer-events: none;
        }

        .version {
            position: fixed;
            top: 20px;
            right: 20px;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0.5;
        }

        .settings-panel, .about-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .settings-panel.active, .about-panel.active { display: flex; animation: panelFadeIn 0.3s ease; }
        @keyframes panelFadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hsr-bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loading-text {
            font-size: 1.5rem;
            color: var(--hsr-primary);
            margin-bottom: 30px;
            animation: pulse 1.5s infinite;
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: var(--hsr-glass);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--hsr-primary), var(--hsr-primary-light));
            border-radius: 2px;
            animation: loading 2s ease-in-out infinite;
        }
        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        @media (max-width: 768px) {
            .game-title { font-size: 2.5rem; }
            .menu-item { padding: 18px 20px; font-size: 1rem; }
            .character-card { width: 60px; height: 60px; font-size: 2rem; }
            .music-btn { padding: 8px 20px; font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .title-container { padding-top: 5vh; }
            .version { top: 10px; right: 10px; font-size: 0.7rem; }
        }
        @media (max-height: 600px) {
            .title-container { padding-top: 3vh; }
            .character-showcase { margin: 20px auto; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">跃迁准备中...</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <div class="main-container" id="mainContainer" style="display: none;">
        <div class="stars-bg" id="starsBg"></div>
        <div class="version">v1.2.0</div>
        <div class="title-container">
            <h1 class="game-title">六哥荣耀</h1>
            <div class="game-subtitle">星海无垠，命运待启</div>
        </div>

        <div class="music-control">
            <div class="music-btn" id="musicControlBtn">
                <span id="musicIcon">🎵</span>
                <span id="musicStatusText">点击播放音乐</span>
            </div>
        </div>
        <audio id="bgmAudio" loop preload="auto" style="display: none;">
            <!-- 请替换为你的音乐直链 -->
            <source src="https://xiaochen1235789.github.io/ai%20sister/%E4%B8%BB%E7%95%8C%E9%9D%A2.aac" type="audio/aac">
            <source src="https://xiaochen1235789.github.io/ai%20sister/%E4%B8%BB%E7%95%8C%E9%9D%A2.mp3" type="audio/mpeg">
        </audio>

        <div class="menu-container">
            <a href="https://xiaochen1235789.github.io/ai sister/select-character.html" class="menu-item" id="startGameBtn">
                <span>🚀 开始游戏</span>
                <span class="menu-icon">▶</span>
            </a>
            <a href="https://xiaochen1235789.github.io/ai sister/role-details.html" class="menu-item">
                <span>🐾 角色详情</span>
                <span class="menu-icon">▶</span>
            </a>
            <div class="menu-item" onclick="showSettings()">
                <span>⚙️ 设置</span>
                <span class="menu-icon">⚙️</span>
            </div>
            <div class="menu-item" onclick="showAbout()">
                <span>📖 关于</span>
                <span class="menu-icon">📖</span>
            </div>
            <div class="menu-item" onclick="exitGame()">
                <span>🚪 退出</span>
                <span class="menu-icon">🚪</span>
            </div>
        </div>

        <div class="character-showcase">
            <div class="character-card" data-name="三月七">❄️<div class="character-name">三月七</div></div>
            <div class="character-card" data-name="丹恒">🗡️<div class="character-name">丹恒</div></div>
            <div class="character-card" data-name="姬子">☕<div class="character-name">姬子</div></div>
            <div class="character-card" data-name="瓦尔特">🧥<div class="character-name">瓦尔特</div></div>
        </div>

        <div class="footer-info">追随星神的轨迹，书写属于你的传奇</div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2 class="settings-title">游戏设置</h2>
            <button class="close-btn" onclick="hideSettings()">✕</button>
        </div>
        <div class="setting-item">
            <span class="setting-label">🎵 背景音乐</span>
            <div class="setting-control">
                <div class="toggle-switch active" id="musicToggle" onclick="toggleMusicSetting()"></div>
                <div class="volume-slider" id="musicVolumeSlider" onclick="adjustVolume(event, this)">
                    <div class="volume-fill" style="width: 60%"></div>
                    <div class="volume-handle" style="left: 58%"></div>
                </div>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🔊 音效开关</span>
            <div class="setting-control"><div class="toggle-switch active" id="sfxToggle" onclick="toggleSfx()"></div></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">📳 震动反馈</span>
            <div class="setting-control"><div class="toggle-switch" onclick="toggleSetting(this)"></div></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🎨 画面质量</span>
            <div class="setting-control"><select class="quality-select" onchange="changeQuality(this)"><option value="low">低</option><option value="medium" selected>中</option><option value="high">高</option><option value="ultra">极致</option></select></div>
        </div>
        <div class="settings-actions">
            <button class="settings-btn" onclick="resetSettings()">重置</button>
            <button class="settings-btn primary" onclick="saveSettings()">保存</button>
        </div>
    </div>

    <div class="about-panel" id="aboutPanel">
        <h2 class="about-title">✨ 关于星穹铁道 ✨</h2>
        <div class="about-content">基于《崩坏：星穹铁道》世界观，体验回合制策略战斗与角色养成。</div>
        <div class="about-features">
            <div class="feature-item"><div class="feature-icon">⚔️</div><div class="feature-text">策略战斗</div></div>
            <div class="feature-item"><div class="feature-icon">🌟</div><div class="feature-text">星神之旅</div></div>
            <div class="feature-item"><div class="feature-icon">🎵</div><div class="feature-text">沉浸音乐</div></div>
            <div class="feature-item"><div class="feature-icon">📱</div><div class="feature-text">全平台适配</div></div>
        </div>
        <div class="about-content">开发者：小尘 | 版本 v1.2.0 | 仅供学习交流</div>
        <div class="settings-actions"><button class="settings-btn primary" onclick="hideAbout()">返回</button></div>
    </div>

    <div class="particle-container" id="particleContainer"></div>

    <script>
        // ---------- 点击粒子效果 ----------
        function createClickParticle(x, y) {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }

        function handleTap(e) {
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            createClickParticle(clientX, clientY);
        }
        document.addEventListener('click', handleTap);
        document.addEventListener('touchstart', handleTap);

        // ---------- 背景音乐系统 ----------
        const bgmAudio = document.getElementById('bgmAudio');
        const musicControlBtn = document.getElementById('musicControlBtn');
        const musicStatusText = document.getElementById('musicStatusText');
        const musicToggleSwitch = document.getElementById('musicToggle');
        
        let musicEnabled = true;
        let musicVolume = 0.6;
        let autoPlayAttempted = false;   // 标记是否已尝试自动播放

        // 加载设置
        function loadAudioSettings() {
            const savedMusic = localStorage.getItem('hsr_music_enabled');
            if (savedMusic !== null) musicEnabled = savedMusic === 'true';
            const savedVol = localStorage.getItem('hsr_music_volume');
            if (savedVol !== null) musicVolume = parseFloat(savedVol);
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            updateMusicVolumeUI(musicVolume * 100);
            if (bgmAudio) {
                bgmAudio.volume = musicEnabled ? musicVolume : 0;
            }
        }

        function updateMusicVolumeUI(percent) {
            const fill = document.querySelector('#musicVolumeSlider .volume-fill');
            const handle = document.querySelector('#musicVolumeSlider .volume-handle');
            if (fill) fill.style.width = `${percent}%`;
            if (handle) handle.style.left = `${percent}%`;
        }

        function updateMusicVolume(value) {
            musicVolume = Math.min(1, Math.max(0, value / 100));
            if (bgmAudio) bgmAudio.volume = musicEnabled ? musicVolume : 0;
            updateMusicVolumeUI(value);
            saveSettings();
        }

        function toggleMusicSetting() {
            musicEnabled = !musicEnabled;
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            if (bgmAudio) {
                bgmAudio.volume = musicEnabled ? musicVolume : 0;
                if (musicEnabled && !bgmAudio.paused) {
                    // 保持播放
                } else if (musicEnabled && bgmAudio.paused && bgmAudio.src && !bgmAudio.ended) {
                    // 开关打开但处于暂停状态 – 不自动播放，尊重用户
                }
            }
            saveSettings();
            // 更新UI文本
            if (bgmAudio && !bgmAudio.paused && musicEnabled) {
                musicStatusText.innerText = '播放中';
            } else if (bgmAudio && bgmAudio.paused && !bgmAudio.ended) {
                musicStatusText.innerText = '已暂停';
            } else if (!musicEnabled) {
                musicStatusText.innerText = '音乐已关闭';
            } else {
                musicStatusText.innerText = '点击播放';
            }
        }

        // 核心播放函数，统一处理播放逻辑
        function attemptPlay(callback) {
            if (!bgmAudio || !bgmAudio.src) {
                if (callback) callback(false);
                return false;
            }
            if (!musicEnabled) {
                if (callback) callback(false);
                return false;
            }
            const playPromise = bgmAudio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicStatusText.innerText = '播放中';
                    if (callback) callback(true);
                }).catch(err => {
                    console.warn('自动播放被阻止，等待用户交互', err);
                    musicStatusText.innerText = '点击播放';
                    if (callback) callback(false);
                });
            }
            return true;
        }

        // 手动点击播放/暂停
        function toggleMusicPlay() {
            if (!bgmAudio || !bgmAudio.src) {
                musicStatusText.innerText = '无音乐链接';
                return;
            }
            if (!musicEnabled) {
                // 如果总开关关闭，自动打开
                musicEnabled = true;
                musicToggleSwitch.classList.add('active');
                saveSettings();
                bgmAudio.volume = musicVolume;
            }
            if (bgmAudio.paused) {
                attemptPlay();
            } else {
                bgmAudio.pause();
                musicStatusText.innerText = '已暂停';
            }
        }

        if (musicControlBtn) {
            musicControlBtn.addEventListener('click', toggleMusicPlay);
        }

        // 自动播放：页面加载完成后尝试，如果失败则等待用户第一次点击任意位置
        function autoPlayMusic() {
            if (autoPlayAttempted) return;
            autoPlayAttempted = true;
            attemptPlay((success) => {
                if (!success && musicEnabled) {
                    // 播放失败，等待首次用户交互
                    const onceClick = () => {
                        attemptPlay();
                        document.removeEventListener('click', onceClick);
                        document.removeEventListener('touchstart', onceClick);
                    };
                    document.addEventListener('click', onceClick);
                    document.addEventListener('touchstart', onceClick);
                }
            });
        }

        // ---------- 音效系统 ----------
        let audioCtx = null;
        let sfxEnabled = true;
        function initAudioContext() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playSfx(type) {
            if (!sfxEnabled) return;
            initAudioContext();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = type === 'hover' ? 880 : 660;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSfx() {
            const toggle = document.getElementById('sfxToggle');
            sfxEnabled = !sfxEnabled;
            toggle.classList.toggle('active', sfxEnabled);
            saveSettings();
        }

        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (sfxEnabled) playSfx('click');
                const name = card.getAttribute('data-name');
                showNotification(`✨ ${name} 向你问好，开拓者！`, 1500);
            });
        });

        let notifTimeout = null;
        function showNotification(msg, duration = 2000) {
            let notif = document.getElementById('floatNotif');
            if (!notif) {
                notif = document.createElement('div');
                notif.id = 'floatNotif';
                notif.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); color:#00d4ff; padding:8px 20px; border-radius:40px; font-size:0.9rem; z-index:10000; white-space:nowrap; border:1px solid #00d4ff; pointer-events:none; transition:opacity 0.2s;';
                document.body.appendChild(notif);
            }
            notif.textContent = msg;
            notif.style.opacity = '1';
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => { notif.style.opacity = '0'; }, duration);
        }

        // 菜单功能
        function showSettings() { document.getElementById('overlay').classList.add('active'); document.getElementById('settingsPanel').classList.add('active'); if (audioCtx && audioCtx.state !== 'running') audioCtx.resume(); }
        function hideSettings() { closePanels(); }
        function showAbout() { document.getElementById('overlay').classList.add('active'); document.getElementById('aboutPanel').classList.add('active'); }
        function hideAbout() { closePanels(); }
        function closePanels() { document.getElementById('overlay').classList.remove('active'); document.getElementById('settingsPanel').classList.remove('active'); document.getElementById('aboutPanel').classList.remove('active'); }

        function exitGame() {
            if (confirm("确定要登上星穹列车离开吗？")) {
                const main = document.getElementById('mainContainer');
                main.style.transition = 'opacity 1s';
                main.style.opacity = '0';
                setTimeout(() => {
                    document.body.innerHTML = `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a14;color:#00d4ff;font-size:1.5rem;">🚀<br>感谢游玩，愿星光照耀你的旅途<br><span style="font-size:0.9rem;margin-top:20px;">页面即将关闭...</span></div>`;
                    setTimeout(() => { window.close(); }, 2000);
                }, 800);
            }
        }

        function adjustVolume(event, slider) {
            const rect = slider.getBoundingClientRect();
            let x = event.clientX - rect.left;
            x = Math.min(Math.max(x, 0), rect.width);
            const percent = Math.round((x / rect.width) * 100);
            const fill = slider.querySelector('.volume-fill');
            const handle = slider.querySelector('.volume-handle');
            fill.style.width = `${percent}%`;
            handle.style.left = `${percent}%`;
            if (slider.id === 'musicVolumeSlider') updateMusicVolume(percent);
        }

        function changeQuality(select) { console.log("画质:", select.value); }
        function toggleSetting(el) { el.classList.toggle('active'); }

        function resetSettings() {
            musicEnabled = true;
            musicVolume = 0.6;
            sfxEnabled = true;
            document.getElementById('musicToggle').classList.add('active');
            document.getElementById('sfxToggle').classList.add('active');
            updateMusicVolume(60);
            if (bgmAudio) bgmAudio.volume = musicVolume;
            document.querySelector('.quality-select').value = 'medium';
            showNotification("设置已重置", 1000);
            saveSettings();
        }

        function saveSettings() {
            localStorage.setItem('hsr_music_enabled', musicEnabled);
            localStorage.setItem('hsr_sfx_enabled', sfxEnabled);
            localStorage.setItem('hsr_music_volume', musicVolume);
            showNotification("设置已保存", 1000);
            hideSettings();
        }

        // 星空背景
        function createStars() {
            const starsBg = document.getElementById('starsBg');
            starsBg.innerHTML = '';
            const starCount = Math.min(120, Math.floor(window.innerWidth / 12));
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.opacity = Math.random() * 0.6 + 0.2;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                starsBg.appendChild(star);
            }
        }

        function enableAudioOnFirstInteraction() {
            const events = ['click', 'touchstart', 'keydown'];
            const listener = () => {
                initAudioContext();
                events.forEach(ev => document.removeEventListener(ev, listener));
            };
            events.forEach(ev => document.addEventListener(ev, listener, { once: true }));
        }
        enableAudioOnFirstInteraction();

        // 保底初始化：确保加载界面消失，并触发自动播放
        function init() {
            setTimeout(() => {
                const loading = document.getElementById('loadingScreen');
                const main = document.getElementById('mainContainer');
                if (loading) loading.style.opacity = '0';
                setTimeout(() => {
                    if (loading) loading.style.display = 'none';
                    if (main) main.style.display = 'block';
                    createStars();
                    loadAudioSettings();
                    // 尝试自动播放音乐
                    autoPlayMusic();
                    setTimeout(() => showNotification("欢迎来到星穹列车，开拓者！", 2000), 500);
                }, 500);
            }, 1300);
        }

        window.addEventListener('DOMContentLoaded', init);
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
