<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 - 星穹启程</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <style>
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-card: #1e1e2e;
            --hsr-primary: #00d4ff;
            --hsr-primary-dark: #0088cc;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #ffffff;
            --hsr-subtext: #a0b4c6;
            --hsr-glass: rgba(255, 255, 255, 0.05);
            --hsr-glass-border: rgba(255, 255, 255, 0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'HYWenHei-85W', 'Microsoft YaHei', sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--hsr-bg);
            color: var(--hsr-text);
            position: fixed;
        }
        .main-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        var(--hsr-bg);
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .stars-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        .click-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #00d4ff, #0088cc);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: particleExpand 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes particleExpand {
            0% { width: 8px; height: 8px; opacity: 0.8; }
            100% { width: 60px; height: 60px; opacity: 0; filter: blur(4px); }
        }
        .title-container {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 8vh;
        }
        .game-title {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #00d4ff, #66e5ff, #ffffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }
        .game-subtitle {
            font-size: 1.2rem;
            color: var(--hsr-subtext);
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .music-circle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid var(--hsr-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            transition: all 0.2s ease;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
            touch-action: manipulation;
        }
        .music-circle:active { transform: scale(0.95); }
        .music-circle span { font-size: 1.5rem; pointer-events: none; }
        @keyframes guidePulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(0, 212, 255, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); transform: scale(1); }
        }
        .music-circle.guide {
            animation: guidePulse 1.2s ease-out 4;
        }
        @media (max-width: 768px) {
            .music-circle { width: 56px; height: 56px; top: 16px; right: 16px; }
            .music-circle span { font-size: 1.8rem; }
        }
        .menu-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            margin: 0 auto 40px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-item {
            background: var(--hsr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 1.2rem;
            color: var(--hsr-text);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            touch-action: manipulation;
        }
        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .menu-item:hover::before { left: 100%; }
        .menu-item:hover {
            border-color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.05);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        .character-showcase {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px auto 40px;
            z-index: 5;
            flex-wrap: wrap;
        }
        .character-card {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }
        .character-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s;
        }
        .character-card:hover::after { left: 100%; }
        .character-card:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: var(--hsr-primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }
        .character-name {
            position: absolute;
            bottom: -28px;
            font-size: 0.8rem;
            color: var(--hsr-primary-light);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 12px;
            pointer-events: none;
        }
        .character-card:hover .character-name { opacity: 1; }
        .footer-info {
            text-align: center;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            margin: 20px auto 30px;
            opacity: 0.6;
            width: 100%;
            pointer-events: none;
        }
        .version {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0.5;
        }
        .settings-panel, .about-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .settings-panel.active, .about-panel.active { display: flex; animation: panelFadeIn 0.3s ease; }
        @keyframes panelFadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hsr-bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loading-text { font-size: 1.5rem; color: var(--hsr-primary); margin-bottom: 20px; }
        .loading-percent { font-size: 1.2rem; color: var(--hsr-primary-light); margin-bottom: 20px; }
        .loading-bar { width: 260px; height: 4px; background: var(--hsr-glass); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-progress { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, var(--hsr-primary), var(--hsr-primary-light)); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
        .loading-status { margin-top: 20px; font-size: 0.8rem; color: var(--hsr-subtext); }
        .settings-header { display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: none; border: none; color: var(--hsr-subtext); font-size: 1.5rem; cursor: pointer; display: none; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--hsr-glass-border); }
        .setting-label { font-size: 1rem; }
        .setting-control { display: flex; gap: 15px; align-items: center; }
        .toggle-switch { width: 44px; height: 24px; background: #444; border-radius: 30px; position: relative; cursor: pointer; transition: 0.2s; touch-action: manipulation; }
        .toggle-switch.active { background: var(--hsr-primary); }
        .toggle-switch::after { content: ''; width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
        .toggle-switch.active::after { left: 22px; }
        .volume-slider {
            width: 140px;
            height: 4px;
            background: #444;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            touch-action: none;
        }
        .volume-fill { position: absolute; height: 100%; background: var(--hsr-primary); border-radius: 4px; width: 0%; pointer-events: none; }
        .volume-handle { position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: -5px; left: 0%; transform: translateX(-50%); pointer-events: none; box-shadow: 0 0 6px var(--hsr-primary); }
        .quality-select { background: var(--hsr-glass); border: 1px solid var(--hsr-glass-border); color: var(--hsr-text); padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .settings-actions { display: flex; gap: 20px; justify-content: center; margin-top: 10px; }
        .settings-btn { background: var(--hsr-glass); border: 1px solid var(--hsr-glass-border); padding: 8px 20px; border-radius: 30px; color: var(--hsr-text); cursor: pointer; transition: 0.2s; touch-action: manipulation; }
        .settings-btn.primary { background: var(--hsr-primary); color: #000; border: none; }
        .volume-value { font-size: 0.8rem; min-width: 45px; text-align: right; }
        .guide-toast {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: var(--hsr-primary-light);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            white-space: nowrap;
            z-index: 10001;
            border: 1px solid var(--hsr-primary);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .guide-toast { font-size: 0.75rem; white-space: normal; width: 80%; text-align: center; bottom: 25%; }
            .game-title { font-size: 2.5rem; }
            .menu-item { padding: 18px 20px; font-size: 1rem; }
            .character-card { width: 60px; height: 60px; font-size: 2rem; }
            .title-container { padding-top: 5vh; }
            .version { top: 10px; left: 10px; font-size: 0.7rem; }
            .music-circle { width: 48px; height: 48px; top: 12px; right: 12px; }
        }
        @media (max-width: 768px) {
            .game-title { font-size: 2.5rem; }
            .menu-item { padding: 18px 20px; font-size: 1rem; }
            .character-card { width: 60px; height: 60px; font-size: 2rem; }
        }
        @media (max-height: 600px) {
            .title-container { padding-top: 3vh; }
            .character-showcase { margin: 20px auto; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">跃迁准备中...</div>
        <div class="loading-percent" id="loadingPercent">0%</div>
        <div class="loading-bar"><div class="loading-progress" id="loadingProgressFill"></div></div>
        <div class="loading-status" id="loadingStatus">正在预加载音乐资源...</div>
    </div>

    <div class="main-container" id="mainContainer" style="display: none;">
        <div class="stars-bg" id="starsBg"></div>
        <div class="version">v1.3.0</div>
        <div class="title-container">
            <h1 class="game-title">六哥荣耀</h1>
            <div class="game-subtitle">星海无垠，命运待启</div>
        </div>
        <div class="music-circle" id="musicCircleBtn">
            <span id="musicIcon">🔇</span>
        </div>
        <audio id="bgmAudio" loop preload="auto" style="display: none;"></audio>
        <div class="menu-container">
            <a href="https://xiaochen1235789.github.io/ai sister/select-character.html" class="menu-item" id="startGameBtn">
                <span>🚀 开始游戏</span><span class="menu-icon">▶</span>
            </a>
            <a href="https://xiaochen1235789.github.io/ai sister/role-details.html" class="menu-item">
                <span>🐾 角色详情</span><span class="menu-icon">▶</span>
            </a>
            <div class="menu-item" onclick="showSettings()">
                <span>⚙️ 设置</span><span class="menu-icon">⚙️</span>
            </div>
            <div class="menu-item" onclick="showAbout()">
                <span>📖 关于</span><span class="menu-icon">📖</span>
            </div>
            <div class="menu-item" onclick="exitGame()">
                <span>🚪 退出</span><span class="menu-icon">🚪</span>
            </div>
        </div>
        <div class="character-showcase">
            <div class="character-card" data-name="三月七">❄️<div class="character-name">三月七</div></div>
            <div class="character-card" data-name="丹恒">🗡️<div class="character-name">丹恒</div></div>
            <div class="character-card" data-name="姬子">☕<div class="character-name">姬子</div></div>
            <div class="character-card" data-name="瓦尔特">🧥<div class="character-name">瓦尔特</div></div>
        </div>
        <div class="footer-info">追随星神的轨迹，书写属于你的传奇</div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header"><h2>游戏设置</h2><button class="close-btn" onclick="hideSettings()">✕</button></div>
        <div class="setting-item">
            <span class="setting-label">🎵 背景音乐</span>
            <div class="setting-control">
                <div class="toggle-switch active" id="musicToggle" onclick="toggleMusicSetting()"></div>
                <div class="volume-slider" id="musicVolumeSlider">
                    <div class="volume-fill" style="width: 30%"></div>
                    <div class="volume-handle" style="left: 30%"></div>
                </div>
                <span class="volume-value" id="volumePercent">60%</span>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🔊 音效开关</span>
            <div class="setting-control"><div class="toggle-switch active" id="sfxToggle" onclick="toggleSfx()"></div></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">📳 震动反馈</span>
            <div class="setting-control"><div class="toggle-switch" id="vibeToggle" onclick="toggleVibration()"></div></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🎨 画面质量</span>
            <div class="setting-control"><select class="quality-select" id="qualitySelect" onchange="changeQuality()"><option value="low">低</option><option value="medium" selected>中</option><option value="high">高</option><option value="ultra">极致</option></select></div>
        </div>
        <div class="settings-actions">
            <button class="settings-btn" onclick="resetSettings()">重置</button>
            <button class="settings-btn primary" onclick="saveAndCloseSettings()">保存</button>
        </div>
    </div>
    <div class="about-panel" id="aboutPanel">
        <h2>✨ 关于 ✨</h2>
        <div class="about-content">开发者：小尘 | 版本 v1.3.0 | 仅供学习交流</div>
        <div class="settings-actions"><button class="settings-btn primary" onclick="hideAbout()">返回</button></div>
    </div>
    <div class="particle-container" id="particleContainer"></div>
    <div class="guide-toast" id="guideToast">✨ 点击屏幕任意位置，开启星穹音乐</div>

    <script>
        // ---------- 点击粒子效果 ----------
        function createClickParticle(x, y) {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }
        function handleTap(e) {
            let clientX, clientY;
            if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            else { clientX = e.clientX; clientY = e.clientY; }
            createClickParticle(clientX, clientY);
        }
        document.addEventListener('click', handleTap);
        document.addEventListener('touchstart', handleTap);

        // ---------- 音乐系统（支持200%，移动端完全优化）----------
        const bgmAudio = document.getElementById('bgmAudio');
        const musicCircleBtn = document.getElementById('musicCircleBtn');
        const musicIconSpan = document.getElementById('musicIcon');
        const musicToggleSwitch = document.getElementById('musicToggle');
        
        let musicEnabled = true;
        let musicVolumePercent = 60;
        let sfxEnabled = true;
        let vibrationEnabled = true;
        let quality = 'medium';

        let audioCtx = null;
        let sourceNode = null;
        let gainNode = null;
        let isWebAudioActive = false;
        let musicBlobUrl = null;
        let userInteracted = false;
        let audioInitialized = false;   // 防止多次初始化

        const guideToast = document.getElementById('guideToast');

        function showGuideToast() {
            if (guideToast) guideToast.style.opacity = '1';
            setTimeout(() => { if (guideToast) guideToast.style.opacity = '0'; }, 3000);
        }

        // 唯一的音频初始化函数（必须在用户手势中调用）
        async function initAudioOnUserGesture() {
            if (audioInitialized) return true;
            audioInitialized = true;
            
            // 创建 AudioContext
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                gainNode.connect(audioCtx.destination);
                gainNode.gain.value = musicVolumePercent / 100;
            }
            
            // 关键：createMediaElementSource 只能调用一次，必须在 AudioContext 未关闭时进行
            if (!sourceNode && bgmAudio.src) {
                try {
                    sourceNode = audioCtx.createMediaElementSource(bgmAudio);
                    sourceNode.connect(gainNode);
                    isWebAudioActive = true;
                    bgmAudio.volume = 1;   // 由 gainNode 完全控制
                } catch(e) {
                    console.warn("MediaElementSource 连接失败，回退原生音量", e);
                    isWebAudioActive = false;
                }
            }
            
            // 唤醒 AudioContext
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            return true;
        }

        function applyVolumePercent(percent) {
            musicVolumePercent = Math.min(200, Math.max(0, percent));
            if (!musicEnabled) return;
            if (isWebAudioActive && gainNode) {
                gainNode.gain.value = musicVolumePercent / 100;
                bgmAudio.volume = 1;
            } else {
                let nativeVol = Math.min(1, musicVolumePercent / 100);
                bgmAudio.volume = nativeVol;
            }
            const percentSpan = document.getElementById('volumePercent');
            if (percentSpan) percentSpan.innerText = Math.round(musicVolumePercent) + '%';
            const fill = document.querySelector('#musicVolumeSlider .volume-fill');
            const handle = document.querySelector('#musicVolumeSlider .volume-handle');
            if (fill) fill.style.width = (musicVolumePercent / 200 * 100) + '%';
            if (handle) handle.style.left = (musicVolumePercent / 200 * 100) + '%';
            if (musicVolumePercent > 100) showNotification("⚠️ 音量已超过100%，可能失真", 1500);
        }

        function setupVolumeSlider() {
            const slider = document.getElementById('musicVolumeSlider');
            if (!slider) return;
            let isDragging = false;
            const updateFromEvent = (clientX) => {
                const rect = slider.getBoundingClientRect();
                let x = (clientX - rect.left) / rect.width;
                x = Math.min(1, Math.max(0, x));
                let newPercent = Math.round(x * 200);
                applyVolumePercent(newPercent);
                saveSettingsImmediate();
            };
            const onPointerMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                updateFromEvent(e.clientX);
            };
            const onPointerUp = () => {
                isDragging = false;
                window.removeEventListener('pointermove', onPointerMove);
                window.removeEventListener('pointerup', onPointerUp);
                slider.releasePointerCapture?.(slider.pointerId);
            };
            const onPointerDown = (e) => {
                e.preventDefault();
                isDragging = true;
                slider.setPointerCapture(e.pointerId);
                updateFromEvent(e.clientX);
                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
            };
            slider.addEventListener('pointerdown', onPointerDown);
            slider.addEventListener('click', (e) => updateFromEvent(e.clientX));
        }

        function saveSettingsImmediate() {
            localStorage.setItem('hsr_music_enabled', musicEnabled);
            localStorage.setItem('hsr_music_volume_percent', musicVolumePercent);
            localStorage.setItem('hsr_sfx_enabled', sfxEnabled);
            localStorage.setItem('hsr_vibration_enabled', vibrationEnabled);
            localStorage.setItem('hsr_quality', quality);
        }

        function loadAudioSettings() {
            const savedMusic = localStorage.getItem('hsr_music_enabled');
            if (savedMusic !== null) musicEnabled = savedMusic === 'true';
            const savedVol = localStorage.getItem('hsr_music_volume_percent');
            if (savedVol !== null) musicVolumePercent = parseFloat(savedVol);
            const savedSfx = localStorage.getItem('hsr_sfx_enabled');
            if (savedSfx !== null) sfxEnabled = savedSfx === 'true';
            const savedVibe = localStorage.getItem('hsr_vibration_enabled');
            if (savedVibe !== null) vibrationEnabled = savedVibe === 'true';
            const savedQuality = localStorage.getItem('hsr_quality');
            if (savedQuality !== null) quality = savedQuality;
            
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            const vibeToggle = document.getElementById('vibeToggle');
            if (vibeToggle) vibeToggle.classList.toggle('active', vibrationEnabled);
            const qSelect = document.getElementById('qualitySelect');
            if (qSelect) qSelect.value = quality;
            applyVolumePercent(musicVolumePercent);
            if (bgmAudio) {
                if (musicEnabled) {
                    if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent / 100;
                    else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
                } else {
                    if (isWebAudioActive && gainNode) gainNode.gain.value = 0;
                    else bgmAudio.volume = 0;
                }
            }
            changeQuality();
            updateMusicButtonUI();
        }

        function toggleMusicSetting() {
            musicEnabled = !musicEnabled;
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            if (musicEnabled) {
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent / 100;
                else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
                if (bgmAudio.paused && userInteracted) {
                    attemptPlay(true);
                }
            } else {
                if (isWebAudioActive && gainNode) gainNode.gain.value = 0;
                else bgmAudio.volume = 0;
                if (!bgmAudio.paused) bgmAudio.pause();
            }
            saveSettingsImmediate();
            updateMusicButtonUI();
        }

        function updateMusicButtonUI() {
            if (!musicEnabled) {
                musicIconSpan.innerText = '🔇';
                musicCircleBtn.style.borderColor = '#888';
            } else {
                if (!bgmAudio.paused) {
                    musicIconSpan.innerText = '🎵';
                    musicCircleBtn.style.borderColor = 'var(--hsr-primary)';
                } else {
                    musicIconSpan.innerText = '⏸️';
                    musicCircleBtn.style.borderColor = 'var(--hsr-primary)';
                }
            }
        }

        async function attemptPlay(silent = false) {
            if (!bgmAudio) return false;
            if (!musicEnabled) return false;
            // 确保音频已初始化（如果还没初始化，尝试初始化）
            if (!audioInitialized) {
                await initAudioOnUserGesture();
            }
            // 确保 AudioContext 是 running 状态
            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            try {
                await bgmAudio.play();
                if (!silent) updateMusicButtonUI();
                musicCircleBtn.classList.remove('guide');
                return true;
            } catch(err) {
                console.warn('播放失败', err);
                if (!silent) updateMusicButtonUI();
                return false;
            }
        }

        // 圆形按钮点击/触摸
        async function onMusicButtonTap(e) {
            e.preventDefault();
            e.stopPropagation();
            userInteracted = true;
            await initAudioOnUserGesture();
            
            if (!musicEnabled) {
                musicEnabled = true;
                musicToggleSwitch.classList.add('active');
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent / 100;
                saveSettingsImmediate();
            }
            
            if (bgmAudio.paused) {
                await attemptPlay(false);
            } else {
                bgmAudio.pause();
                updateMusicButtonUI();
            }
        }
        musicCircleBtn.addEventListener('click', onMusicButtonTap);
        musicCircleBtn.addEventListener('touchstart', onMusicButtonTap, { passive: false });

        // 全局首次用户交互（触摸或点击，只执行一次）
        let globalInteractionHandled = false;
        async function onFirstUserInteraction(e) {
            if (globalInteractionHandled) return;
            globalInteractionHandled = true;
            userInteracted = true;
            await initAudioOnUserGesture();
            if (musicEnabled && bgmAudio.paused) {
                await attemptPlay(true);
            }
            if (guideToast) guideToast.style.opacity = '0';
            musicCircleBtn.classList.remove('guide');
        }
        document.addEventListener('touchstart', onFirstUserInteraction, { passive: false });
        document.addEventListener('click', onFirstUserInteraction);

        // ---------- 音效系统 ----------
        let sfxAudioCtx = null;
        function initSfxContext() {
            if (sfxAudioCtx) return;
            sfxAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playSfx(type) {
            if (!sfxEnabled) return;
            initSfxContext();
            if (!sfxAudioCtx) return;
            const osc = sfxAudioCtx.createOscillator();
            const gain = sfxAudioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = type === 'hover' ? 880 : 660;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(sfxAudioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, sfxAudioCtx.currentTime + 0.3);
            osc.stop(sfxAudioCtx.currentTime + 0.3);
            if (sfxAudioCtx.state === 'suspended') sfxAudioCtx.resume();
        }
        function toggleSfx() {
            sfxEnabled = !sfxEnabled;
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            saveSettingsImmediate();
        }
        function vibratePattern(pattern = 50) {
            if (vibrationEnabled && navigator.vibrate) navigator.vibrate(pattern);
        }
        function toggleVibration() {
            vibrationEnabled = !vibrationEnabled;
            const toggle = document.getElementById('vibeToggle');
            if (toggle) toggle.classList.toggle('active', vibrationEnabled);
            saveSettingsImmediate();
            showNotification(vibrationEnabled ? "震动反馈已开启" : "震动反馈已关闭", 1000);
        }
        function changeQuality() {
            const select = document.getElementById('qualitySelect');
            if (select) quality = select.value;
            else quality = 'medium';
            localStorage.setItem('hsr_quality', quality);
            createStars();
            const mainContainer = document.getElementById('mainContainer');
            if (quality === 'low') {
                mainContainer.style.backdropFilter = 'none';
                document.querySelectorAll('.menu-item, .music-circle').forEach(el => el.style.backdropFilter = 'none');
            } else {
                mainContainer.style.backdropFilter = '';
                document.querySelectorAll('.menu-item, .music-circle').forEach(el => el.style.backdropFilter = '');
            }
        }
        function createStars() {
            const starsBg = document.getElementById('starsBg');
            if (!starsBg) return;
            starsBg.innerHTML = '';
            let starCount = quality === 'low' ? 30 : (quality === 'medium' ? 80 : (quality === 'high' ? 120 : 180));
            starCount = Math.min(starCount, Math.floor(window.innerWidth / 8));
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.opacity = Math.random() * 0.6 + 0.2;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                starsBg.appendChild(star);
            }
        }

        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (sfxEnabled) playSfx('click');
                vibratePattern(30);
                showNotification(`✨ ${card.getAttribute('data-name')} 向你问好，开拓者！`, 1500);
            });
            card.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: false });
        });
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => vibratePattern(20));
            item.addEventListener('touchstart', () => vibratePattern(20), { passive: false });
        });

        let notifTimeout = null;
        function showNotification(msg, duration = 2000) {
            let notif = document.getElementById('floatNotif');
            if (!notif) {
                notif = document.createElement('div');
                notif.id = 'floatNotif';
                notif.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); color:#00d4ff; padding:8px 20px; border-radius:40px; font-size:0.9rem; z-index:10000; white-space:nowrap; border:1px solid #00d4ff; pointer-events:none; transition:opacity 0.2s;';
                document.body.appendChild(notif);
            }
            notif.textContent = msg;
            notif.style.opacity = '1';
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => { notif.style.opacity = '0'; }, duration);
        }

        function showSettings() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('settingsPanel').classList.add('active');
            if (sfxAudioCtx && sfxAudioCtx.state !== 'running') sfxAudioCtx.resume();
        }
        function hideSettings() {}
        function saveAndCloseSettings() {
            saveSettingsImmediate();
            showNotification("设置已保存", 1000);
            closePanels();
        }
        function showAbout() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('aboutPanel').classList.add('active');
        }
        function hideAbout() { closePanels(); }
        function closePanels() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('settingsPanel').classList.remove('active');
            document.getElementById('aboutPanel').classList.remove('active');
        }
        function exitGame() {
            if (confirm("确定要登上星穹列车离开吗？")) {
                const main = document.getElementById('mainContainer');
                main.style.transition = 'opacity 1s';
                main.style.opacity = '0';
                setTimeout(() => {
                    document.body.innerHTML = `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a14;color:#00d4ff;font-size:1.5rem;">🚀<br>感谢游玩，愿星光照耀你的旅途<br><span style="font-size:0.9rem;margin-top:20px;">页面即将关闭...</span></div>`;
                    setTimeout(() => window.close(), 2000);
                }, 800);
            }
        }
        function resetSettings() {
            musicEnabled = true;
            musicVolumePercent = 60;
            sfxEnabled = true;
            vibrationEnabled = true;
            quality = 'medium';
            document.getElementById('musicToggle').classList.add('active');
            document.getElementById('sfxToggle').classList.add('active');
            const vibeToggle = document.getElementById('vibeToggle');
            if (vibeToggle) vibeToggle.classList.add('active');
            document.getElementById('qualitySelect').value = 'medium';
            applyVolumePercent(60);
            if (bgmAudio) {
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent/100;
                else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
            }
            changeQuality();
            saveSettingsImmediate();
            showNotification("设置已重置", 1000);
        }

        // 预加载音乐（带 localStorage 缓存）
        async function preloadMusicWithProgress() {
            const audioUrl = "https://xiaochen1235789.github.io/ai%20sister/zhujiemian.aac";
            const loadingPercentDiv = document.getElementById('loadingPercent');
            const loadingFill = document.getElementById('loadingProgressFill');
            const loadingStatus = document.getElementById('loadingStatus');
            const CACHE_KEY = 'hsr_music_cache_v2';
            
            const cachedBase64 = localStorage.getItem(CACHE_KEY);
            if (cachedBase64) {
                try {
                    const binary = atob(cachedBase64);
                    const array = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                    const blob = new Blob([array], { type: 'audio/aac' });
                    const blobUrl = URL.createObjectURL(blob);
                    bgmAudio.src = blobUrl;
                    bgmAudio.load();
                    loadingPercentDiv.innerText = `100% (缓存)`;
                    loadingFill.style.width = `100%`;
                    loadingStatus.innerText = "音乐已从缓存加载，准备进入...";
                    await new Promise(resolve => setTimeout(resolve, 300));
                    return true;
                } catch(e) {
                    console.warn("缓存读取失败，重新下载", e);
                    localStorage.removeItem(CACHE_KEY);
                }
            }
            
            try {
                const response = await fetch(audioUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const contentLength = response.headers.get('content-length');
                const total = contentLength ? parseInt(contentLength, 10) : null;
                let loaded = 0;
                const reader = response.body.getReader();
                const chunks = [];
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    loaded += value.length;
                    if (total) {
                        const percent = (loaded / total * 100).toFixed(1);
                        loadingPercentDiv.innerText = `${percent}%`;
                        loadingFill.style.width = `${percent}%`;
                    } else {
                        loadingPercentDiv.innerText = `加载中 ${Math.min(99, Math.floor(loaded/1024))}KB`;
                        loadingFill.style.width = `70%`;
                    }
                }
                const blob = new Blob(chunks, { type: 'audio/aac' });
                musicBlobUrl = URL.createObjectURL(blob);
                bgmAudio.src = musicBlobUrl;
                bgmAudio.load();
                
                if (blob.size < 4 * 1024 * 1024) {
                    const readerForCache = new FileReader();
                    readerForCache.onloadend = () => {
                        const base64 = readerForCache.result.split(',')[1];
                        if (base64 && base64.length < 5 * 1024 * 1024) {
                            localStorage.setItem(CACHE_KEY, base64);
                        }
                    };
                    readerForCache.readAsDataURL(blob);
                }
                
                loadingPercentDiv.innerText = `100%`;
                loadingFill.style.width = `100%`;
                loadingStatus.innerText = "音乐加载完成，准备进入...";
                await new Promise(resolve => setTimeout(resolve, 300));
                return true;
            } catch (err) {
                console.error("预加载失败", err);
                loadingStatus.innerText = "音乐加载失败，将使用在线源";
                bgmAudio.innerHTML = '<source src="' + audioUrl + '" type="audio/aac">';
                bgmAudio.load();
                await new Promise(resolve => setTimeout(resolve, 1000));
                return false;
            }
        }

        async function init() {
            await preloadMusicWithProgress();
            // 重要：不要在这里初始化 Web Audio，等待用户手势
            setupVolumeSlider();
            loadAudioSettings();
            const loading = document.getElementById('loadingScreen');
            const main = document.getElementById('mainContainer');
            if (loading) loading.style.opacity = '0';
            setTimeout(() => {
                if (loading) loading.style.display = 'none';
                if (main) main.style.display = 'block';
                createStars();
                showGuideToast();
                musicCircleBtn.classList.add('guide');
                setTimeout(() => showNotification("欢迎来到星穹列车，开拓者！", 2000), 500);
            }, 500);
        }
        window.addEventListener('DOMContentLoaded', init);
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
