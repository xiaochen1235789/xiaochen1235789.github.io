<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 - 星穹启程</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <style>
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-card: #1e1e2e;
            --hsr-primary: #00d4ff;
            --hsr-primary-dark: #0088cc;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #ffffff;
            --hsr-subtext: #a0b4c6;
            --hsr-danger: #ff4757;
            --hsr-warning: #ff9f43;
            --hsr-success: #1dd1a1;
            --hsr-glass: rgba(255, 255, 255, 0.05);
            --hsr-glass-border: rgba(255, 255, 255, 0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'HYWenHei-85W', 'Microsoft YaHei', sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--hsr-bg);
            color: var(--hsr-text);
            position: fixed;
        }
        .main-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        var(--hsr-bg);
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .stars-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        .click-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #00d4ff, #0088cc);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: particleExpand 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes particleExpand {
            0% { width: 8px; height: 8px; opacity: 0.8; }
            100% { width: 60px; height: 60px; opacity: 0; filter: blur(4px); }
        }
        .title-container {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 8vh;
        }
        .game-title {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #00d4ff, #66e5ff, #ffffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }
        .game-subtitle {
            font-size: 1.2rem;
            color: var(--hsr-subtext);
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .music-circle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid var(--hsr-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            transition: all 0.2s ease;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }
        .music-circle:hover {
            transform: scale(1.05);
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--hsr-primary-light);
        }
        .music-circle span {
            font-size: 1.5rem;
        }
        @media (max-width: 768px) {
            .music-circle {
                width: 56px;
                height: 56px;
                top: 16px;
                right: 16px;
            }
            .music-circle span {
                font-size: 1.8rem;
            }
        }
        .menu-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            margin: 0 auto 40px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-item {
            background: var(--hsr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 1.2rem;
            color: var(--hsr-text);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .menu-item:hover::before {
            left: 100%;
        }
        .menu-item:hover {
            border-color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.05);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        .character-showcase {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px auto 40px;
            z-index: 5;
            flex-wrap: wrap;
        }
        .character-card {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .character-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s;
        }
        .character-card:hover::after {
            left: 100%;
        }
        .character-card:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: var(--hsr-primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }
        .character-name {
            position: absolute;
            bottom: -28px;
            font-size: 0.8rem;
            color: var(--hsr-primary-light);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 12px;
            pointer-events: none;
        }
        .character-card:hover .character-name {
            opacity: 1;
        }
        .footer-info {
            text-align: center;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            margin: 20px auto 30px;
            opacity: 0.6;
            width: 100%;
            pointer-events: none;
        }
        .version {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0.5;
        }
        .settings-panel, .about-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .settings-panel.active, .about-panel.active { display: flex; animation: panelFadeIn 0.3s ease; }
        @keyframes panelFadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hsr-bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loading-text {
            font-size: 1.5rem;
            color: var(--hsr-primary);
            margin-bottom: 20px;
        }
        .loading-percent {
            font-size: 1.2rem;
            color: var(--hsr-primary-light);
            margin-bottom: 20px;
        }
        .loading-bar {
            width: 260px;
            height: 4px;
            background: var(--hsr-glass);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--hsr-primary), var(--hsr-primary-light));
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .loading-status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--hsr-subtext);
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--hsr-subtext);
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--hsr-glass-border);
        }
        .setting-label {
            font-size: 1rem;
        }
        .setting-control {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #444;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: var(--hsr-primary);
        }
        .toggle-switch::after {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle-switch.active::after {
            left: 22px;
        }
        .volume-slider {
            width: 140px;
            height: 4px;
            background: #444;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            touch-action: none;
        }
        .volume-fill {
            position: absolute;
            height: 100%;
            background: var(--hsr-primary);
            border-radius: 4px;
            width: 0%;
            pointer-events: none;
        }
        .volume-handle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: -5px;
            left: 0%;
            transform: translateX(-50%);
            pointer-events: none;
            box-shadow: 0 0 6px var(--hsr-primary);
        }
        .quality-select {
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            color: var(--hsr-text);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .settings-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
        }
        .settings-btn {
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            padding: 8px 20px;
            border-radius: 30px;
            color: var(--hsr-text);
            cursor: pointer;
            transition: 0.2s;
        }
        .settings-btn.primary {
            background: var(--hsr-primary);
            color: #000;
            border: none;
        }
        .volume-value {
            font-size: 0.8rem;
            min-width: 45px;
            text-align: right;
        }
        @media (max-width: 768px) {
            .game-title { font-size: 2.5rem; }
            .menu-item { padding: 18px 20px; font-size: 1rem; }
            .character-card { width: 60px; height: 60px; font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .title-container { padding-top: 5vh; }
            .version { top: 10px; left: 10px; font-size: 0.7rem; }
            .music-circle { width: 48px; height: 48px; top: 12px; right: 12px; }
        }
        @media (max-height: 600px) {
            .title-container { padding-top: 3vh; }
            .character-showcase { margin: 20px auto; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">跃迁准备中...</div>
        <div class="loading-percent" id="loadingPercent">0%</div>
        <div class="loading-bar"><div class="loading-progress" id="loadingProgressFill"></div></div>
        <div class="loading-status" id="loadingStatus">正在预加载音乐资源...</div>
    </div>
    <div class="main-container" id="mainContainer" style="display: none;">
        <div class="stars-bg" id="starsBg"></div>
        <div class="version">v1.0.0</div>
        <div class="title-container">
            <h1 class="game-title">六哥荣耀</h1>
            <div class="game-subtitle">星海无垠，命运待启</div>
        </div>
        <div class="music-circle" id="musicCircleBtn">
            <span id="musicIcon">🔇</span>
        </div>
        <audio id="bgmAudio" loop preload="auto" style="display: none;">
        <div class="menu-container">
            <a href="https://xiaochen1235789.github.io/ai sister/select-character.html" class="menu-item" id="startGameBtn">
                <span>🚀 开始游戏</span>
                <span class="menu-icon">▶</span>
            </a>
            <a href="https://xiaochen1235789.github.io/ai sister/role-details.html" class="menu-item">
                <span>🐾 角色详情</span>
                <span class="menu-icon">▶</span>
            </a>
            <div class="menu-item" onclick="showSettings()">
                <span>⚙️ 设置</span>
                <span class="menu-icon">⚙️</span>
            </div>
            <div class="menu-item" onclick="showAbout()">
                <span>📖 关于</span>
                <span class="menu-icon">📖</span>
            </div>
            <div class="menu-item" onclick="exitGame()">
                <span>🚪 退出</span>
                <span class="menu-icon">🚪</span>
            </div>
        </div>
        <div class="character-showcase">
            <div class="character-card" data-name="三月七">❄️<div class="character-name">三月七</div></div>
            <div class="character-card" data-name="丹恒">🗡️<div class="character-name">丹恒</div></div>
            <div class="character-card" data-name="姬子">☕<div class="character-name">姬子</div></div>
            <div class="character-card" data-name="瓦尔特">🧥<div class="character-name">瓦尔特</div></div>
        </div>
        <div class="footer-info">追随星神的轨迹，书写属于你的传奇</div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>游戏设置</h2>
            <button class="close-btn" onclick="hideSettings()">✕</button>
        </div>
        <div class="setting-item">
            <span class="setting-label">🎵 背景音乐</span>
            <div class="setting-control">
                <div class="toggle-switch active" id="musicToggle" onclick="toggleMusicSetting()"></div>
                <div class="volume-slider" id="musicVolumeSlider">
                    <div class="volume-fill" style="width: 30%"></div>
                    <div class="volume-handle" style="left: 30%"></div>
                </div>
                <span class="volume-value" id="volumePercent">60%</span>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🔊 音效开关</span>
            <div class="setting-control"><div class="toggle-switch active" id="sfxToggle" onclick="toggleSfx()"></div></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">📳 震动反馈</span>
            <div class="setting-control"><div class="toggle-switch" id="vibeToggle" onclick="toggleVibration()"></div></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🎨 画面质量</span>
            <div class="setting-control"><select class="quality-select" id="qualitySelect" onchange="changeQuality()"><option value="low">低</option><option value="medium" selected>中</option><option value="high">高</option><option value="ultra">极致</option></select></div>
        </div>
        <div class="settings-actions">
            <button class="settings-btn" onclick="resetSettings()">重置</button>
            <button class="settings-btn primary" onclick="saveAndCloseSettings()">保存</button>
        </div>
    </div>
    <div class="about-panel" id="aboutPanel">
        <h2>✨ 关于星穹铁道 ✨</h2>
        <div class="about-content">基于《崩坏：星穹铁道》世界观，体验回合制策略战斗与角色养成。</div>
        <div class="about-features">
            
        </div>
        <div class="about-content">开发者：小尘 | 版本 v1.0.0 | 仅供学习交流</div>
        <div class="settings-actions"><button class="settings-btn primary" onclick="hideAbout()">返回</button></div>
    </div>
    <div class="particle-container" id="particleContainer"></div>
    <script>
        function createClickParticle(x, y) {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }
        function handleTap(e) {
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            createClickParticle(clientX, clientY);
        }
        document.addEventListener('click', handleTap);
        document.addEventListener('touchstart', handleTap);

        const bgmAudio = document.getElementById('bgmAudio');
        const musicCircleBtn = document.getElementById('musicCircleBtn');
        const musicIconSpan = document.getElementById('musicIcon');
        const musicToggleSwitch = document.getElementById('musicToggle');
        
        let musicEnabled = true;
        let musicVolumePercent = 60;
        let sfxEnabled = true;
        let vibrationEnabled = false;
        let quality = 'medium';
        let audioCtx = null;
        let sourceNode = null;
        let gainNode = null;
        let isWebAudioActive = false;
        let musicBlobUrl = null;
        let userInteracted = false;

        document.addEventListener('click', () => { userInteracted = true });
        document.addEventListener('touchstart', () => { userInteracted = true });

        async function initWebAudioForBGM() {
            if (audioCtx && audioCtx.state !== 'closed') return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            try {
                if (sourceNode) sourceNode?.disconnect();
                sourceNode = audioCtx.createMediaElementSource(bgmAudio);
                sourceNode.connect(gainNode);
                isWebAudioActive = true;
                applyVolumePercent(musicVolumePercent);
            } catch (e) {
                isWebAudioActive = false;
            }
        }

        function applyVolumePercent(percent) {
            musicVolumePercent = Math.min(200, Math.max(0, percent));
            if (isWebAudioActive && gainNode) {
                gainNode.gain.value = musicVolumePercent / 100;
                bgmAudio.volume = 1;
            } else {
                bgmAudio.volume = Math.min(1, musicVolumePercent / 100);
            }
            const p = document.getElementById('volumePercent');
            if (p) p.innerText = Math.round(musicVolumePercent) + '%';
            const f = document.querySelector('#musicVolumeSlider .volume-fill');
            const h = document.querySelector('#musicVolumeSlider .volume-handle');
            if (f) f.style.width = (musicVolumePercent / 200 * 100) + '%';
            if (h) h.style.left = (musicVolumePercent / 200 * 100) + '%';
        }

        function setupVolumeSlider() {
            const s = document.getElementById('musicVolumeSlider');
            if (!s) return;
            let d = false;
            const up = (e) => {
                const r = s.getBoundingClientRect();
                const x = Math.max(0, Math.min(1, ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) / r.width));
                applyVolumePercent(Math.round(x * 200));
                saveSettingsImmediate();
            };
            s.addEventListener('mousedown', (e) => { d = true; up(e); });
            s.addEventListener('touchstart', (e) => { d = true; up(e); }, { passive: false });
            window.addEventListener('mouseup', () => d = false);
            window.addEventListener('touchend', () => d = false);
            window.addEventListener('mousemove', (e) => d && up(e));
            window.addEventListener('touchmove', (e) => d && up(e), { passive: false });
        }

        function saveSettingsImmediate() {
            localStorage.setItem('hsr_music_enabled', musicEnabled);
            localStorage.setItem('hsr_music_volume_percent', musicVolumePercent);
            localStorage.setItem('hsr_sfx_enabled', sfxEnabled);
            localStorage.setItem('hsr_vibration_enabled', vibrationEnabled);
            localStorage.setItem('hsr_quality', quality);
        }

        function loadAudioSettings() {
            musicEnabled = localStorage.getItem('hsr_music_enabled') !== 'false';
            musicVolumePercent = parseFloat(localStorage.getItem('hsr_music_volume_percent')) || 60;
            sfxEnabled = localStorage.getItem('hsr_sfx_enabled') !== 'false';
            vibrationEnabled = localStorage.getItem('hsr_vibration_enabled') === 'true';
            quality = localStorage.getItem('hsr_quality') || 'medium';
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            const v = document.getElementById('vibeToggle');
            if (v) v.classList.toggle('active', vibrationEnabled);
            document.getElementById('qualitySelect').value = quality;
            applyVolumePercent(musicVolumePercent);
            updateMusicButtonUI();
        }

        function updateMusicButtonUI() {
            if (!musicEnabled) {
                musicIconSpan.innerText = '🔇';
                musicCircleBtn.style.borderColor = '#888';
            } else {
                musicIconSpan.innerText = bgmAudio.paused ? '⏸️' : '🎵';
                musicCircleBtn.style.borderColor = 'var(--hsr-primary)';
            }
        }

        async function tryPlay() {
            if (!musicEnabled || !userInteracted) return;
            if (audioCtx?.state === 'suspended') await audioCtx.resume();
            try { await bgmAudio.play(); } catch (e) {}
            updateMusicButtonUI();
        }

        function toggleMusicPlay() {
            userInteracted = true;
            musicEnabled = true;
            musicToggleSwitch.classList.add('active');
            if (bgmAudio.paused) { tryPlay(); } else { bgmAudio.pause(); }
            saveSettingsImmediate();
            updateMusicButtonUI();
        }

        musicCircleBtn.addEventListener('click', toggleMusicPlay);
        musicCircleBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            toggleMusicPlay();
        }, { passive: false });

        function toggleMusicSetting() {
            musicEnabled = !musicEnabled;
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            if (musicEnabled) tryPlay();
            else bgmAudio.pause();
            saveSettingsImmediate();
            updateMusicButtonUI();
        }

        let sfxAudioCtx = null;
        function initSfxContext() {
            if (!sfxAudioCtx) sfxAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playSfx() {
            if (!sfxEnabled) return;
            initSfxContext();
            const o = sfxAudioCtx.createOscillator();
            const g = sfxAudioCtx.createGain();
            o.type = 'sine'; o.frequency.value = 660;
            g.gain.value = 0.1; o.connect(g); g.connect(sfxAudioCtx.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, sfxAudioCtx.currentTime + 0.3);
            o.stop(sfxAudioCtx.currentTime + 0.3);
            if (sfxAudioCtx.state === 'suspended') sfxAudioCtx.resume();
        }
        function toggleSfx() {
            sfxEnabled = !sfxEnabled;
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            saveSettingsImmediate();
        }
        function vibratePattern(t) {
            vibrationEnabled && navigator.vibrate?.(t);
        }
        function toggleVibration() {
            vibrationEnabled = !vibrationEnabled;
            document.getElementById('vibeToggle').classList.toggle('active', vibrationEnabled);
            saveSettingsImmediate();
        }
        function changeQuality() {
            quality = document.getElementById('qualitySelect').value;
            localStorage.setItem('hsr_quality', quality);
            createStars();
        }
        function createStars() {
            const b = document.getElementById('starsBg');
            if (!b) return; b.innerHTML = '';
            let n = { low:30, medium:80, high:120, ultra:180 }[quality] || 80;
            for(let i=0; i<n; i++){
                const s=document.createElement('div');s.className='star';
                const z=Math.random()*3+1;s.style.width=z+'px';s.style.height=z+'px';
                s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
                s.style.setProperty('--duration',Math.random()*3+2+'s');
                b.appendChild(s);
            }
        }
        document.querySelectorAll('.character-card').forEach(c=>{
            c.addEventListener('click',()=>{
                playSfx();vibratePattern(30);
                showNotification(`✨ ${c.dataset.name} 向你问好！`,1500);
            });
        });
        let notifTimeout;
        function showNotification(m,d=2000){
            let n=document.getElementById('floatNotif');
            if(!n){n=document.createElement('div');n.id='floatNotif';
            n.style.cssText='position:fixed;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);backdrop-filter:blur(10px);color:#00d4ff;padding:8px 20px;border-radius:40px;font-size:.9rem;z-index:10000;white-space:nowrap;border:1px solid #00d4ff;pointer-events:none;transition:opacity .2s;';
            document.body.appendChild(n);}
            n.textContent=m;n.style.opacity='1';
            clearTimeout(notifTimeout);notifTimeout=setTimeout(()=>n.style.opacity='0',d);
        }
        function showSettings(){document.getElementById('overlay').classList.add('active');document.getElementById('settingsPanel').classList.add('active');}
        function hideSettings(){}
        function saveAndCloseSettings(){saveSettingsImmediate();showNotification('设置已保存',1000);closePanels();}
        function showAbout(){document.getElementById('overlay').classList.add('active');document.getElementById('aboutPanel').classList.add('active');}
        function hideAbout(){closePanels();}
        function closePanels(){document.getElementById('overlay').classList.remove('active');document.getElementById('settingsPanel').classList.remove('active');document.getElementById('aboutPanel').classList.remove('active');}
        function exitGame(){confirm('确定离开？')&&window.close();}
        function resetSettings(){
            musicEnabled=true;musicVolumePercent=60;sfxEnabled=true;vibrationEnabled=false;quality='medium';
            musicToggleSwitch.classList.add('active');document.getElementById('sfxToggle').classList.add('active');
            document.getElementById('vibeToggle').classList.remove('active');document.getElementById('qualitySelect').value='medium';
            applyVolumePercent(60);saveSettingsImmediate();showNotification('已重置',1000);
        }
        async function preloadMusicWithProgress(){
            const u="https://xiaochen1235789.github.io/ai%20sister/zhujiemian.aac";
            try{
                const res=await fetch(u);const reader=res.body.getReader();
                const chunks=[];while(true){const {done,value}=await reader.read();if(done)break;chunks.push(value);}
                musicBlobUrl=URL.createObjectURL(new Blob(chunks,{type:'audio/aac'}));
                bgmAudio.src=musicBlobUrl;
            }catch(e){bgmAudio.src=u;}
        }
        async function init(){
            await preloadMusicWithProgress();
            await initWebAudioForBGM();
            setupVolumeSlider();
            loadAudioSettings();
            document.getElementById('loadingScreen').style.display='none';
            document.getElementById('mainContainer').style.display='block';
            createStars();
            setTimeout(()=>showNotification('欢迎来到星穹列车！',2000),500);
        }
        window.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
