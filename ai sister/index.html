<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六哥荣耀 - 星穹启程</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <style>
        :root {
            --hsr-bg: #0a0a14;
            --hsr-surface: #151525;
            --hsr-card: #1e1e2e;
            --hsr-primary: #00d4ff;
            --hsr-primary-dark: #0088cc;
            --hsr-primary-light: #66e5ff;
            --hsr-text: #ffffff;
            --hsr-subtext: #a0b4c6;
            --hsr-danger: #ff4757;
            --hsr-warning: #ff9f43;
            --hsr-success: #1dd1a1;
            --hsr-glass: rgba(255, 255, 255, 0.05);
            --hsr-glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'HYWenHei-85W', 'Microsoft YaHei', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--hsr-bg);
            color: var(--hsr-text);
            position: fixed;
        }

        .main-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 10%, #1a1a3a 0%, transparent 40%),
                        radial-gradient(circle at 80% 90%, #0f1a2e 0%, transparent 40%),
                        var(--hsr-bg);
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .stars-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        .click-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #00d4ff, #0088cc);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: particleExpand 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes particleExpand {
            0% { width: 8px; height: 8px; opacity: 0.8; }
            100% { width: 60px; height: 60px; opacity: 0; filter: blur(4px); }
        }

        .title-container {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 8vh;
        }

        .game-title {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #00d4ff, #66e5ff, #ffffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: var(--hsr-subtext);
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .music-control {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: center;
            margin: 20px auto 30px;
        }

        .music-btn {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 10px 24px;
            border: 1px solid var(--hsr-primary);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: var(--hsr-primary-light);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        }

        .music-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.02);
            border-color: var(--hsr-primary-light);
        }

        .menu-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            margin: 0 auto 40px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background: var(--hsr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 1.2rem;
            color: var(--hsr-text);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .menu-item:hover::before {
            left: 100%;
        }

        .menu-item:hover {
            border-color: var(--hsr-primary);
            background: rgba(0, 212, 255, 0.05);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .character-showcase {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px auto 40px;
            z-index: 5;
            flex-wrap: wrap;
        }

        .character-card {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hsr-primary), var(--hsr-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .character-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s;
        }

        .character-card:hover::after {
            left: 100%;
        }

        .character-card:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: var(--hsr-primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        .character-name {
            position: absolute;
            bottom: -28px;
            font-size: 0.8rem;
            color: var(--hsr-primary-light);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 12px;
            pointer-events: none;
        }

        .character-card:hover .character-name {
            opacity: 1;
        }

        .footer-info {
            text-align: center;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            margin: 20px auto 30px;
            opacity: 0.6;
            width: 100%;
            pointer-events: none;
        }

        .version {
            position: fixed;
            top: 20px;
            right: 20px;
            color: var(--hsr-subtext);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0.5;
        }

        .settings-panel, .about-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--hsr-surface);
            border: 1px solid var(--hsr-glass-border);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .settings-panel.active, .about-panel.active { display: flex; animation: panelFadeIn 0.3s ease; }
        @keyframes panelFadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hsr-bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loading-text {
            font-size: 1.5rem;
            color: var(--hsr-primary);
            margin-bottom: 30px;
            animation: pulse 1.5s infinite;
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: var(--hsr-glass);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--hsr-primary), var(--hsr-primary-light));
            border-radius: 2px;
            animation: loading 2s ease-in-out infinite;
        }
        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        /* 设置面板内样式 */
        .settings-header, .about-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--hsr-subtext);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--hsr-glass-border);
        }
        .setting-label {
            font-size: 1rem;
        }
        .setting-control {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #444;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: var(--hsr-primary);
        }
        .toggle-switch::after {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle-switch.active::after {
            left: 22px;
        }
        .volume-slider {
            width: 120px;
            height: 4px;
            background: #444;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }
        .volume-fill {
            position: absolute;
            height: 100%;
            background: var(--hsr-primary);
            border-radius: 4px;
            width: 0%;
        }
        .volume-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: -4px;
            left: 0%;
            transform: translateX(-50%);
            pointer-events: none;
        }
        .quality-select {
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            color: var(--hsr-text);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .settings-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
        }
        .settings-btn {
            background: var(--hsr-glass);
            border: 1px solid var(--hsr-glass-border);
            padding: 8px 20px;
            border-radius: 30px;
            color: var(--hsr-text);
            cursor: pointer;
            transition: 0.2s;
        }
        .settings-btn.primary {
            background: var(--hsr-primary);
            color: #000;
            border: none;
        }
        .volume-value {
            font-size: 0.8rem;
            min-width: 45px;
            text-align: right;
        }

        @media (max-width: 768px) {
            .game-title { font-size: 2.5rem; }
            .menu-item { padding: 18px 20px; font-size: 1rem; }
            .character-card { width: 60px; height: 60px; font-size: 2rem; }
            .music-btn { padding: 8px 20px; font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .title-container { padding-top: 5vh; }
            .version { top: 10px; right: 10px; font-size: 0.7rem; }
        }
        @media (max-height: 600px) {
            .title-container { padding-top: 3vh; }
            .character-showcase { margin: 20px auto; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">跃迁准备中...</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>

            <a href="https://xiaochen1235789.github.io/ai sister/role-details.html" class="menu-item">

            <div class="menu-item" onclick="showSettings()">
                <span>⚙️ 设置</span>

    <div class="particle-container" id="particleContainer"></div>

    <script>
        // ---------- 点击粒子效果 ----------
        function createClickParticle(x, y) {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }

        function handleTap(e) {
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            createClickParticle(clientX, clientY);
        }
        document.addEventListener('click', handleTap);
        document.addEventListener('touchstart', handleTap);

        // ---------- 增强版音乐系统（支持150%音量）----------
        const bgmAudio = document.getElementById('bgmAudio');
        const musicControlBtn = document.getElementById('musicControlBtn');
        const musicStatusText = document.getElementById('musicStatusText');
        const musicToggleSwitch = document.getElementById('musicToggle');
        
        let musicEnabled = true;
        let musicVolumePercent = 60;   // 存储 0-150
        let sfxEnabled = true;
        let vibrationEnabled = true;
        let quality = 'medium';

        // Web Audio 相关
        let audioCtx = null;
        let sourceNode = null;
        let gainNode = null;
        let isWebAudioActive = false;

        // 初始化 Web Audio 上下文并连接 <audio> 元素
        async function initWebAudioForBGM() {
            if (!bgmAudio) return;
            if (audioCtx && audioCtx.state !== 'closed') return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            
            // 创建 MediaElementSource
            try {
                if (sourceNode) {
                    try { sourceNode.disconnect(); } catch(e) {}
                }
                sourceNode = audioCtx.createMediaElementSource(bgmAudio);
                sourceNode.connect(gainNode);
                isWebAudioActive = true;
                // 恢复当前音量设置
                applyVolumePercent(musicVolumePercent);
                // 如果音乐正在播放，需要保持播放状态（注意AudioContext挂起）
                if (!bgmAudio.paused && audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
            } catch(e) {
                console.warn("Web Audio 连接失败，回退到原生音量", e);
                isWebAudioActive = false;
                // 回退：原生音量最大1，超过100%无效
                let nativeVol = Math.min(1, musicVolumePercent / 100);
                bgmAudio.volume = musicEnabled ? nativeVol : 0;
            }
        }

        // 应用音量百分比 (0-150)
        function applyVolumePercent(percent) {
            musicVolumePercent = Math.min(150, Math.max(0, percent));
            if (!musicEnabled) return;
            if (isWebAudioActive && gainNode) {
                let gain = musicVolumePercent / 100;
                gainNode.gain.value = gain;
                // 原生音量设为1，完全由gain控制
                bgmAudio.volume = 1;
            } else {
                let nativeVol = Math.min(1, musicVolumePercent / 100);
                bgmAudio.volume = nativeVol;
            }
            // 更新UI显示
            const percentSpan = document.getElementById('volumePercent');
            if (percentSpan) percentSpan.innerText = Math.round(musicVolumePercent) + '%';
            const fill = document.querySelector('#musicVolumeSlider .volume-fill');
            const handle = document.querySelector('#musicVolumeSlider .volume-handle');
            if (fill) fill.style.width = (musicVolumePercent / 150 * 100) + '%';
            if (handle) handle.style.left = (musicVolumePercent / 150 * 100) + '%';
            
            // 超过100%提示
            if (musicVolumePercent > 100) {
                showNotification("⚠️ 音量已超过100%，可能失真", 1500);
            }
        }

        function updateMusicVolumeUIFromPercent() {
            const percent = musicVolumePercent;
            const fill = document.querySelector('#musicVolumeSlider .volume-fill');
            const handle = document.querySelector('#musicVolumeSlider .volume-handle');
            if (fill) fill.style.width = (percent / 150 * 100) + '%';
            if (handle) handle.style.left = (percent / 150 * 100) + '%';
            const span = document.getElementById('volumePercent');
            if (span) span.innerText = Math.round(percent) + '%';
        }

        // 音量滑动条交互
        function setupVolumeSlider() {
            const slider = document.getElementById('musicVolumeSlider');
            if (!slider) return;
            const updateFromEvent = (e) => {
                const rect = slider.getBoundingClientRect();
                let x = (e.clientX - rect.left) / rect.width;
                x = Math.min(1, Math.max(0, x));
                let newPercent = Math.round(x * 150);
                applyVolumePercent(newPercent);
                saveSettings(); // 实时保存
            };
            slider.addEventListener('click', updateFromEvent);
            slider.addEventListener('touchstart', (e) => {
                e.preventDefault();
                updateFromEvent(e.touches[0]);
            });
            slider.addEventListener('touchmove', (e) => {
                e.preventDefault();
                updateFromEvent(e.touches[0]);
            });
        }

        // 加载设置
        function loadAudioSettings() {
            const savedMusic = localStorage.getItem('hsr_music_enabled');
            if (savedMusic !== null) musicEnabled = savedMusic === 'true';
            const savedVol = localStorage.getItem('hsr_music_volume_percent');
            if (savedVol !== null) musicVolumePercent = parseFloat(savedVol);
            const savedSfx = localStorage.getItem('hsr_sfx_enabled');
            if (savedSfx !== null) sfxEnabled = savedSfx === 'true';
            const savedVibe = localStorage.getItem('hsr_vibration_enabled');
            if (savedVibe !== null) vibrationEnabled = savedVibe === 'true';
            const savedQuality = localStorage.getItem('hsr_quality');
            if (savedQuality !== null) quality = savedQuality;
            
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            document.getElementById('sfxToggle').classList.toggle('active', sfxEnabled);
            const vibeToggle = document.getElementById('vibeToggle');
            if (vibeToggle) vibeToggle.classList.toggle('active', vibrationEnabled);
            const qSelect = document.getElementById('qualitySelect');
            if (qSelect) qSelect.value = quality;
            
            applyVolumePercent(musicVolumePercent);
            if (bgmAudio) {
                bgmAudio.volume = musicEnabled ? (isWebAudioActive ? 1 : Math.min(1, musicVolumePercent/100)) : 0;
                if (!musicEnabled) bgmAudio.volume = 0;
            }
            changeQuality(); // 应用画质
        }

        function toggleMusicSetting() {
            musicEnabled = !musicEnabled;
            musicToggleSwitch.classList.toggle('active', musicEnabled);
            if (bgmAudio) {
                if (musicEnabled) {
                    if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent / 100;
                    else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
                    // 如果之前因为关闭而暂停，尝试恢复播放
                    if (bgmAudio.paused && !autoPlayAttemptedFlag) {
                        autoPlayMusic();
                    }
                } else {
                    if (isWebAudioActive && gainNode) gainNode.gain.value = 0;
                    else bgmAudio.volume = 0;
                }
            }
            saveSettings();
            updateMusicStatusText();
        }

        function updateMusicStatusText() {
            if (!bgmAudio) return;
            if (!musicEnabled) musicStatusText.innerText = '音乐已关闭';
            else if (!bgmAudio.paused) musicStatusText.innerText = '播放中';
            else musicStatusText.innerText = '已暂停';
        }

        // 核心播放函数（支持Web Audio）
        let autoPlayAttemptedFlag = false;
        async function attemptPlay(callback) {
            if (!bgmAudio) { if(callback) callback(false); return false; }
            if (!musicEnabled) { if(callback) callback(false); return false; }
            // 确保Web Audio已初始化
            if (!isWebAudioActive && audioCtx === null) {
                await initWebAudioForBGM();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            try {
                const playPromise = bgmAudio.play();
                if (playPromise) {
                    await playPromise;
                    musicStatusText.innerText = '播放中';
                    if (callback) callback(true);
                } else {
                    musicStatusText.innerText = '点击播放';
                    if(callback) callback(false);
                }
            } catch(err) {
                console.warn('播放失败', err);
                musicStatusText.innerText = '点击播放';
                if(callback) callback(false);
            }
        }

        function toggleMusicPlay() {
            if (!bgmAudio) return;
            if (!musicEnabled) {
                musicEnabled = true;
                musicToggleSwitch.classList.add('active');
                saveSettings();
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent/100;
                else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
            }
            if (bgmAudio.paused) {
                attemptPlay();
            } else {
                bgmAudio.pause();
                musicStatusText.innerText = '已暂停';
            }
        }
        if (musicControlBtn) musicControlBtn.addEventListener('click', toggleMusicPlay);

        function autoPlayMusic() {
            if (autoPlayAttemptedFlag) return;
            autoPlayAttemptedFlag = true;
            attemptPlay((success) => {
                if (!success && musicEnabled) {
                    const onceClick = () => {
                        attemptPlay();
                        document.removeEventListener('click', onceClick);
                        document.removeEventListener('touchstart', onceClick);
                    };
                    document.addEventListener('click', onceClick);
                    document.addEventListener('touchstart', onceClick);
                }
            });
        }

        // ---------- 音效系统 ----------
        let sfxAudioCtx = null;
        function initSfxContext() {
            if (sfxAudioCtx) return;
            sfxAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playSfx(type) {
            if (!sfxEnabled) return;
            initSfxContext();
            if (!sfxAudioCtx) return;
            const osc = sfxAudioCtx.createOscillator();
            const gain = sfxAudioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = type === 'hover' ? 880 : 660;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(sfxAudioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, sfxAudioCtx.currentTime + 0.3);
            osc.stop(sfxAudioCtx.currentTime + 0.3);
            if (sfxAudioCtx.state === 'suspended') sfxAudioCtx.resume();
        }

        function toggleSfx() {
            sfxEnabled = !sfxEnabled;
            const toggle = document.getElementById('sfxToggle');
            if (toggle) toggle.classList.toggle('active', sfxEnabled);
            saveSettings();
        }

        // 震动反馈
        function vibratePattern(pattern = 50) {
            if (vibrationEnabled && navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        function toggleVibration() {
            vibrationEnabled = !vibrationEnabled;
            const toggle = document.getElementById('vibeToggle');
            if (toggle) toggle.classList.toggle('active', vibrationEnabled);
            saveSettings();
            showNotification(vibrationEnabled ? "震动反馈已开启" : "震动反馈已关闭", 1000);
        }

        // 画质切换：影响星星数量、背景模糊等
        function changeQuality() {
            const select = document.getElementById('qualitySelect');
            if (select) quality = select.value;
            else quality = 'medium';
            localStorage.setItem('hsr_quality', quality);
            // 重新生成星星
            createStars();
            // 调整背景模糊/特效
            const mainContainer = document.getElementById('mainContainer');
            if (quality === 'low') {
                mainContainer.style.backdropFilter = 'none';
                document.querySelectorAll('.menu-item, .music-btn').forEach(el => {
                    el.style.backdropFilter = 'none';
                });
            } else {
                mainContainer.style.backdropFilter = '';
                document.querySelectorAll('.menu-item, .music-btn').forEach(el => {
                    el.style.backdropFilter = '';
                });
            }
            if (quality === 'ultra') {
                // 增加额外粒子效果（略）
            }
        }

        // 星空背景生成（根据画质调整数量）
        function createStars() {
            const starsBg = document.getElementById('starsBg');
            if (!starsBg) return;
            starsBg.innerHTML = '';
            let starCount = 80;
            if (quality === 'low') starCount = 30;
            else if (quality === 'medium') starCount = 80;
            else if (quality === 'high') starCount = 120;
            else if (quality === 'ultra') starCount = 180;
            starCount = Math.min(starCount, Math.floor(window.innerWidth / 8));
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.opacity = Math.random() * 0.6 + 0.2;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                starsBg.appendChild(star);
            }
        }

        // 角色卡片点击增加震动
        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (sfxEnabled) playSfx('click');
                vibratePattern(30);
                const name = card.getAttribute('data-name');
                showNotification(`✨ ${name} 向你问好，开拓者！`, 1500);
            });
        });
        // 菜单项点击震动 (通过事件委托)
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => vibratePattern(20));
        });

        let notifTimeout = null;
        function showNotification(msg, duration = 2000) {
            let notif = document.getElementById('floatNotif');
            if (!notif) {
                notif = document.createElement('div');
                notif.id = 'floatNotif';
                notif.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); color:#00d4ff; padding:8px 20px; border-radius:40px; font-size:0.9rem; z-index:10000; white-space:nowrap; border:1px solid #00d4ff; pointer-events:none; transition:opacity 0.2s;';
                document.body.appendChild(notif);
            }
            notif.textContent = msg;
            notif.style.opacity = '1';
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => { notif.style.opacity = '0'; }, duration);
        }

        // 设置面板控制
        function showSettings() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('settingsPanel').classList.add('active');
            if (sfxAudioCtx && sfxAudioCtx.state !== 'running') sfxAudioCtx.resume();
        }
        function hideSettings() { closePanels(); }
        function showAbout() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('aboutPanel').classList.add('active');
        }
        function hideAbout() { closePanels(); }
        function closePanels() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('settingsPanel').classList.remove('active');
            document.getElementById('aboutPanel').classList.remove('active');
        }

        function exitGame() {
            if (confirm("确定要登上星穹列车离开吗？")) {
                const main = document.getElementById('mainContainer');
                main.style.transition = 'opacity 1s';
                main.style.opacity = '0';
                setTimeout(() => {
                    document.body.innerHTML = `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a14;color:#00d4ff;font-size:1.5rem;">🚀<br>感谢游玩，愿星光照耀你的旅途<br><span style="font-size:0.9rem;margin-top:20px;">页面即将关闭...</span></div>`;
                    setTimeout(() => { window.close(); }, 2000);
                }, 800);
            }
        }

        function resetSettings() {
            musicEnabled = true;
            musicVolumePercent = 60;
            sfxEnabled = true;
            vibrationEnabled = true;
            quality = 'medium';
            document.getElementById('musicToggle').classList.add('active');
            document.getElementById('sfxToggle').classList.add('active');
            const vibeToggle = document.getElementById('vibeToggle');
            if (vibeToggle) vibeToggle.classList.add('active');
            document.getElementById('qualitySelect').value = 'medium';
            applyVolumePercent(60);
            if (bgmAudio) {
                if (isWebAudioActive && gainNode) gainNode.gain.value = musicVolumePercent/100;
                else bgmAudio.volume = Math.min(1, musicVolumePercent/100);
            }
            changeQuality();
            showNotification("设置已重置", 1000);
            saveSettings();
        }

        function saveSettings() {
            localStorage.setItem('hsr_music_enabled', musicEnabled);
            localStorage.setItem('hsr_music_volume_percent', musicVolumePercent);
            localStorage.setItem('hsr_sfx_enabled', sfxEnabled);
            localStorage.setItem('hsr_vibration_enabled', vibrationEnabled);
            localStorage.setItem('hsr_quality', quality);
            showNotification("设置已保存", 1000);
            hideSettings();
        }

        // 初始化函数
        async function init() {
            await initWebAudioForBGM();
            setupVolumeSlider();
            loadAudioSettings();
            setTimeout(() => {
                const loading = document.getElementById('loadingScreen');
                const main = document.getElementById('mainContainer');
                if (loading) loading.style.opacity = '0';
                setTimeout(() => {
                    if (loading) loading.style.display = 'none';
                    if (main) main.style.display = 'block';
                    createStars();
                    autoPlayMusic();
                    setTimeout(() => showNotification("欢迎来到星穹列车，开拓者！", 2000), 500);
                }, 500);
            }, 1300);
        }

        window.addEventListener('DOMContentLoaded', init);
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
