<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>六哥荣耀WIKI登录系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 主卡片 */
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 440px;
            transition: all 0.2s ease;
            backdrop-filter: blur(2px);
        }

        .card-inner {
            padding: 2rem 1.8rem 2rem 1.8rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.3px;
        }

        /* 状态条 */
        .status-chip {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 0.6rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #667eea;
            transition: all 0.2s;
        }
        .status-chip i {
            margin-right: 6px;
            font-size: 0.8rem;
        }
        #status-text {
            font-weight: 600;
        }

        /* 提示框 */
        .alert {
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            animation: fadeSlide 0.2s ease;
        }
        .alert.success { background: #e0f2e9; color: #0b5e2e; border-left: 4px solid #10b981; }
        .alert.error { background: #fee9e6; color: #b91c1c; border-left: 4px solid #ef4444; }
        .alert.info { background: #e6f0ff; color: #1e40af; border-left: 4px solid #3b82f6; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.4rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.7rem 0;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #5b6e8c;
        }
        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* 表单容器 (动态切换) */
        .form-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .form-panel.active-panel {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 用户信息卡片 */
        .user-card {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.4rem;
            margin-top: 0.5rem;
            border: 1px solid #eef2ff;
        }
        .user-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #0f172a;
            border-left: 3px solid #667eea;
            padding-left: 0.7rem;
        }
        .user-detail {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all;
        }
        .user-detail strong {
            color: #334155;
        }
        .user-detail span {
            color: #1e293b;
            font-weight: 500;
            max-width: 65%;
            text-align: right;
        }

        /* 表单元素 */
        input, button {
            width: 100%;
            padding: 0.9rem 1rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        input {
            border: 1.5px solid #e2e8f0;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        button {
            background: linear-gradient(100deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:active { transform: scale(0.97); }
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #4b5563;
            box-shadow: none;
        }
        .btn-danger {
            background: linear-gradient(100deg, #ef4444, #dc2626);
        }

        /* 密码容器 */
        .password-wrapper {
            position: relative;
        }
        .toggle-pwd {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 2;
        }
        .toggle-pwd:hover { color: #667eea; }

        /* 密码强度 */
        .strength-meter {
            display: flex;
            gap: 5px;
            margin: 8px 0 4px;
        }
        .strength-bar {
            flex: 1;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .strength-hint {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-bottom: 0.5rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.7rem 0;
        }
        .remember input {
            width: 1.1rem;
            margin: 0;
        }
        .extra-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
        }
        .extra-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .loading-overlay {
            display: none;
            text-align: center;
            margin: 1.5rem 0;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 响应式 */
        @media (max-width: 480px) {
            .card-inner { padding: 1.5rem; }
            h1 { font-size: 1.5rem; }
        }

        hr { margin: 1rem 0; border-color: #eef2ff; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-inner">
        <h1>⚡ AuthPro</h1>

        <!-- 状态栏 -->
        <div class="status-chip">
            <span><i class="fas fa-shield-alt"></i> 安全认证</span>
            <span id="status-text">初始化中...</span>
        </div>

        <div id="globalAlert" class="alert"></div>

        <!-- 未登录区域 (动态显示/隐藏) -->
        <div id="authSection">
            <div class="tabs" id="tabGroup">
                <div class="tab active" data-tab="login">🔐 登录</div>
                <div class="tab" data-tab="register">📝 注册</div>
            </div>

            <!-- 登录表单 -->
            <div id="loginPanel" class="form-panel active-panel">
                <input type="email" id="loginEmail" placeholder="电子邮箱" autocomplete="email">
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
                    <span class="toggle-pwd" data-target="loginPassword"><i class="far fa-eye"></i></span>
                </div>
                <div class="remember">
                    <input type="checkbox" id="rememberCheckbox">
                    <label for="rememberCheckbox">🔁 记住此设备（持久会话）</label>
                </div>
                <button id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> 登录</button>
                <div class="extra-link">
                    <a href="#" id="forgotPwdLink">🔑 忘记密码？</a>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="registerPanel" class="form-panel">
                <input type="email" id="regEmail" placeholder="电子邮箱" autocomplete="email">
                <div class="password-wrapper">
                    <input type="password" id="regPassword" placeholder="密码（至少6位）" autocomplete="new-password">
                    <span class="toggle-pwd" data-target="regPassword"><i class="far fa-eye"></i></span>
                </div>
                <div class="strength-meter" id="strengthMeter">
                    <div class="strength-bar"></div><div class="strength-bar"></div>
                    <div class="strength-bar"></div><div class="strength-bar"></div>
                </div>
                <div class="strength-hint" id="strengthHint"></div>
                <input type="text" id="regUsername" placeholder="用户名 (可选)" autocomplete="off">
                <input type="text" id="regFullname" placeholder="姓名 (可选)" autocomplete="off">
                <button id="registerBtn"><i class="fas fa-user-plus"></i> 注册新账户</button>
            </div>
        </div>

        <!-- 已登录用户区域 (初始隐藏) -->
        <div id="userSection" style="display: none;">
            <div class="user-card">
                <h3><i class="fas fa-user-circle"></i> 账户信息</h3>
                <div class="user-detail"><strong>📧 邮箱</strong><span id="userEmail">—</span></div>
                <div class="user-detail"><strong>👤 昵称</strong><span id="userName">—</span></div>
                <div class="user-detail"><strong>🆔 用户ID</strong><span id="userId" title="完整ID">—</span></div>
                <div class="user-detail"><strong>🕒 登录时间</strong><span id="loginTime">—</span></div>
                <button id="logoutBtn" class="btn-danger"><i class="fas fa-sign-out-alt"></i> 安全退出</button>
            </div>
        </div>

        <!-- 全局加载 -->
        <div id="globalLoader" class="loading-overlay">
            <div class="spinner"></div>
            <p style="font-size: 0.8rem;">处理中...</p>
        </div>
    </div>
</div>

<script>
    // ======================= 配置 =======================
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    
    // 全局客户端 & 状态
    let supabase;
    let currentLoading = false;
    let authListener = null;

    // DOM 元素
    const dom = {
        authSection: document.getElementById('authSection'),
        userSection: document.getElementById('userSection'),
        statusText: document.getElementById('status-text'),
        alertBox: document.getElementById('globalAlert'),
        loader: document.getElementById('globalLoader'),
        loginBtn: document.getElementById('loginBtn'),
        registerBtn: document.getElementById('registerBtn'),
        logoutBtn: document.getElementById('logoutBtn'),
        loginEmail: document.getElementById('loginEmail'),
        loginPassword: document.getElementById('loginPassword'),
        regEmail: document.getElementById('regEmail'),
        regPassword: document.getElementById('regPassword'),
        regUsername: document.getElementById('regUsername'),
        regFullname: document.getElementById('regFullname'),
        rememberCheck: document.getElementById('rememberCheckbox'),
        forgotLink: document.getElementById('forgotPwdLink'),
        userEmailSpan: document.getElementById('userEmail'),
        userNameSpan: document.getElementById('userName'),
        userIdSpan: document.getElementById('userId'),
        loginTimeSpan: document.getElementById('loginTime'),
        strengthBars: document.querySelectorAll('#strengthMeter .strength-bar'),
        strengthHint: document.getElementById('strengthHint')
    };

    // ======================= 通用工具 =======================
    function showMessage(text, type = 'info') {
        if (!dom.alertBox) return;
        dom.alertBox.textContent = text;
        dom.alertBox.className = `alert ${type}`;
        dom.alertBox.style.display = 'block';
        const duration = type === 'error' ? 6000 : 4000;
        setTimeout(() => {
            if (dom.alertBox) dom.alertBox.style.display = 'none';
        }, duration);
    }

    function updateStatus(text, isOk = true) {
        if (dom.statusText) {
            dom.statusText.innerHTML = text;
            dom.statusText.style.color = isOk ? '#15803d' : '#b91c1c';
            setTimeout(() => { if(dom.statusText) dom.statusText.style.color = ''; }, 2000);
        }
    }

    function setLoading(loading) {
        currentLoading = loading;
        dom.loader.style.display = loading ? 'flex' : 'none';
        const btns = [dom.loginBtn, dom.registerBtn, dom.logoutBtn];
        btns.forEach(btn => { if (btn) btn.disabled = loading; });
    }

    // 邮箱/密码基础验证
    function isValidEmail(email) { return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email); }
    function isValidPassword(pwd) { return pwd && pwd.length >= 6; }

    // 密码强度指示器
    function updateStrengthMeter(pwd) {
        if (!dom.strengthBars.length) return;
        let score = 0;
        if (!pwd) { 
            dom.strengthBars.forEach(bar => bar.style.background = '#e2e8f0');
            dom.strengthHint.textContent = '';
            return;
        }
        if (pwd.length >= 6) score++;
        if (pwd.length >= 8) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        score = Math.min(score, 4);
        const colors = ['#f97316', '#eab308', '#84cc16', '#22c55e'];
        dom.strengthBars.forEach((bar, idx) => {
            bar.style.background = idx < score ? colors[Math.min(score-1,3)] : '#e2e8f0';
        });
        const hints = ['太弱', '较弱', '良好', '强', '极强'];
        dom.strengthHint.textContent = pwd ? hints[score] : '';
        dom.strengthHint.style.color = score >= 3 ? '#16a34a' : '#ca8a04';
    }

    // 切换密码可见性 (事件委托方式)
    function setupPasswordToggles() {
        document.querySelectorAll('.toggle-pwd').forEach(toggle => {
            toggle.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = toggle.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    const icon = toggle.querySelector('i');
                    if (icon) icon.className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
                }
            });
        });
    }

    // 切换UI: 登录状态 vs 未登录
    function toggleUIBySession(user) {
        if (user) {
            dom.authSection.style.display = 'none';
            dom.userSection.style.display = 'block';
            displayUserInfo(user);
        } else {
            dom.authSection.style.display = 'block';
            dom.userSection.style.display = 'none';
            // 重置表单内容
            if (dom.loginEmail) dom.loginEmail.value = '';
            if (dom.loginPassword) dom.loginPassword.value = '';
            if (dom.regEmail) dom.regEmail.value = '';
            if (dom.regPassword) dom.regPassword.value = '';
            if (dom.regUsername) dom.regUsername.value = '';
            if (dom.regFullname) dom.regFullname.value = '';
            updateStrengthMeter('');
            // 默认选中登录标签
            switchTab('login');
        }
    }

    // 展示用户详细信息（元数据增强）
    function displayUserInfo(user) {
        if (!user) return;
        const metadata = user.user_metadata || {};
        const username = metadata.username || metadata.full_name || user.email?.split('@')[0] || '用户';
        const fullName = metadata.full_name || metadata.username || '';
        const displayName = fullName ? `${fullName} (${username})` : username;
        dom.userEmailSpan.textContent = user.email;
        dom.userNameSpan.textContent = displayName;
        dom.userIdSpan.textContent = user.id.slice(0, 12) + '...';
        dom.userIdSpan.title = user.id;
        dom.loginTimeSpan.textContent = new Date().toLocaleString('zh-CN');
    }

    // 标签页切换
    function switchTab(tabId) {
        const loginPanel = document.getElementById('loginPanel');
        const regPanel = document.getElementById('registerPanel');
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            const target = tab.getAttribute('data-tab');
            if (target === tabId) tab.classList.add('active');
            else tab.classList.remove('active');
        });
        if (tabId === 'login') {
            loginPanel.classList.add('active-panel');
            regPanel.classList.remove('active-panel');
        } else {
            regPanel.classList.add('active-panel');
            loginPanel.classList.remove('active-panel');
            // 注册时重置密码强度提示
            updateStrengthMeter(dom.regPassword.value);
        }
    }

    // ======================= 认证核心 =======================
    async function handleLogin() {
        if (currentLoading) return;
        const email = dom.loginEmail.value.trim();
        const pwd = dom.loginPassword.value;
        if (!email || !pwd) return showMessage('请填写邮箱和密码', 'error');
        if (!isValidEmail(email)) return showMessage('邮箱格式不正确', 'error');
        if (!isValidPassword(pwd)) return showMessage('密码至少6位', 'error');
        
        setLoading(true);
        try {
            const persist = dom.rememberCheck.checked; // true: 持久会话(localStorage), false: 仅会话存储
            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password: pwd,
                options: { persistSession: persist }
            });
            if (error) throw error;
            showMessage(`欢迎回来，${data.user.email}`, 'success');
            updateStatus('登录成功 ✓', true);
            // UI会自动被onAuthStateChange触发，无需额外调用
        } catch (err) {
            let friendlyMsg = err.message;
            if (err.message.includes('Invalid login')) friendlyMsg = '邮箱或密码错误';
            else if (err.message.includes('Email not confirmed')) friendlyMsg = '请先验证邮箱（查看垃圾箱）';
            showMessage(friendlyMsg, 'error');
            updateStatus('登录失败', false);
        } finally {
            setLoading(false);
        }
    }

    async function handleRegister() {
        if (currentLoading) return;
        const email = dom.regEmail.value.trim();
        const pwd = dom.regPassword.value;
        const username = dom.regUsername.value.trim();
        const fullname = dom.regFullname.value.trim();

        if (!email) return showMessage('请输入邮箱', 'error');
        if (!isValidEmail(email)) return showMessage('邮箱格式无效', 'error');
        if (!isValidPassword(pwd)) return showMessage('密码至少需要6位', 'error');
        if (username && username.length > 30) return showMessage('用户名不能超过30字符', 'error');

        setLoading(true);
        try {
            const meta = {
                username: username || email.split('@')[0],
                full_name: fullname || username || '新用户'
            };
            const { data, error } = await supabase.auth.signUp({
                email,
                password: pwd,
                options: { data: meta }
            });
            if (error) throw error;

            if (data.user?.identities?.length === 0) {
                showMessage('该邮箱已注册，请直接登录', 'info');
            } else {
                showMessage('注册成功！请查收验证邮件 (若未收到请检查垃圾箱)', 'success');
                // 清空注册表单
                dom.regEmail.value = '';
                dom.regPassword.value = '';
                dom.regUsername.value = '';
                dom.regFullname.value = '';
                updateStrengthMeter('');
                // 切换到登录页
                switchTab('login');
            }
            updateStatus('注册请求已发送', true);
        } catch (err) {
            let errMsg = err.message;
            if (errMsg.includes('User already registered')) errMsg = '该邮箱已被注册';
            showMessage(errMsg, 'error');
            updateStatus('注册失败', false);
        } finally {
            setLoading(false);
        }
    }

    async function handleLogout() {
        if (currentLoading) return;
        setLoading(true);
        try {
            await supabase.auth.signOut();
            showMessage('已安全退出', 'info');
            updateStatus('已退出', true);
            // UI 自动切换由 onAuthStateChange 负责
        } catch (err) {
            showMessage(`退出异常: ${err.message}`, 'error');
        } finally {
            setLoading(false);
        }
    }

    async function handleForgotPassword() {
        const email = prompt('请输入注册邮箱用于接收重置链接：');
        if (!email) return;
        if (!isValidEmail(email)) return showMessage('邮箱格式无效', 'error');
        setLoading(true);
        try {
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + window.location.pathname,
            });
            if (error) throw error;
            showMessage('重置邮件已发送，请查收邮箱（包括垃圾箱）', 'success');
        } catch (err) {
            showMessage(`发送失败: ${err.message}`, 'error');
        } finally {
            setLoading(false);
        }
    }

    // ======================= 监听认证状态 =======================
    function initAuthListener() {
        if (authListener) return;
        const { data: listener } = supabase.auth.onAuthStateChange(async (event, session) => {
            const user = session?.user || null;
            // 更新UI
            toggleUIBySession(user);
            if (event === 'SIGNED_IN') {
                updateStatus(`已登录: ${user?.email}`, true);
                // 可选：额外加载用户元数据展示
                if (user) displayUserInfo(user);
            }
            if (event === 'SIGNED_OUT') {
                updateStatus('未登录', false);
            }
            if (event === 'USER_UPDATED') {
                if (user) displayUserInfo(user);
                showMessage('账户信息已更新', 'info');
            }
            if (event === 'PASSWORD_RECOVERY') {
                showMessage('请设置新密码（请根据邮件引导操作）', 'info');
            }
        });
        authListener = listener;
    }

    // 检查当前会话 (页面加载后)
    async function checkExistingSession() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
                toggleUIBySession(session.user);
                updateStatus(`已登录: ${session.user.email}`, true);
            } else {
                toggleUIBySession(null);
                updateStatus('未登录', false);
            }
        } catch (e) {
            toggleUIBySession(null);
            updateStatus('会话读取失败', false);
        }
    }

    // 初始化 Supabase 客户端
    function initSupabaseClient() {
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: {
                    persistSession: true,     // 默认持久化，但登录时可动态调整
                    autoRefreshToken: true,
                    detectSessionInUrl: true
                }
            });
            updateStatus('就绪 ✅', true);
            return true;
        } catch (e) {
            updateStatus('SDK错误', false);
            showMessage('客户端初始化失败，请刷新重试', 'error');
            return false;
        }
    }

    // ======================= 事件绑定 =======================
    function bindEvents() {
        // 标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const tabId = tab.getAttribute('data-tab');
                if (tabId) switchTab(tabId);
            });
        });
        // 按钮
        if (dom.loginBtn) dom.loginBtn.addEventListener('click', handleLogin);
        if (dom.registerBtn) dom.registerBtn.addEventListener('click', handleRegister);
        if (dom.logoutBtn) dom.logoutBtn.addEventListener('click', handleLogout);
        if (dom.forgotLink) dom.forgotLink.addEventListener('click', (e) => { e.preventDefault(); handleForgotPassword(); });
        
        // 注册密码强度实时检测
        if (dom.regPassword) {
            dom.regPassword.addEventListener('input', (e) => updateStrengthMeter(e.target.value));
        }
        // Enter快捷登录/注册
        const loginEnter = () => { if (document.getElementById('loginPanel').classList.contains('active-panel')) handleLogin(); };
        const regEnter = () => { if (document.getElementById('registerPanel').classList.contains('active-panel')) handleRegister(); };
        dom.loginPassword?.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginEnter(); });
        dom.loginEmail?.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginEnter(); });
        dom.regPassword?.addEventListener('keypress', (e) => { if (e.key === 'Enter') regEnter(); });
        dom.regEmail?.addEventListener('keypress', (e) => { if (e.key === 'Enter') regEnter(); });
        
        setupPasswordToggles();
    }

    // ======================= 启动应用 =======================
    async function bootstrap() {
        if (!initSupabaseClient()) return;
        await checkExistingSession();
        initAuthListener();
        bindEvents();
        // 默认隐藏加载
        setLoading(false);
        // 额外的UI清洁：如果url包含#access_token自动处理，Supabase detectSessionInUrl自动捕获
        if (window.location.hash.includes('access_token')) {
            showMessage('正在处理登录凭证...', 'info');
        }
    }

    document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
