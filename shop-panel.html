<div class="shop-panel">
    <style>
        /* 样式保持不变（同前） */
        .balance-row { display: flex; gap: 20px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .balance-item { background: rgba(0,0,0,0.3); border-radius: 40px; padding: 8px 20px; font-size: 1.2rem; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.2s; }
        .balance-item:hover { transform: scale(1.05); background: rgba(0,0,0,0.5); }
        .balance-item img { width: 28px; height: 28px; border-radius: 6px; }
        .shop-section { margin-top: 25px; }
        .shop-section h3 { font-size: 1.3rem; color: #81c784; margin-bottom: 15px; border-left: 4px solid #81c784; padding-left: 12px; }
        .frame-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .frame-info { flex: 1; }
        .frame-name { font-size: 1.1rem; font-weight: bold; color: #81c784; display: flex; align-items: center; gap: 10px; }
        .frame-desc { font-size: 0.85rem; color: #b0c4d0; margin-top: 5px; }
        .frame-price { font-size: 0.9rem; margin-top: 5px; }
        .price-icon { margin-right: 5px; }
        .btn-equip { background: #3b82f6; color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .btn-equip:hover { background: #2563eb; }
        .btn-owned { background: #4b5563; color: #9ca3af; border: none; padding: 6px 14px; border-radius: 20px; cursor: default; }
        .btn-buy { background: #81c784; color: #121212; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-buy:hover { background: #6ab56f; }
        .error-message { color: #f87171; text-align: center; padding: 20px; }
        .retry-btn { background: #81c784; border: none; color: #121212; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
    </style>

    <div style="text-align: center; margin-bottom: 20px;">
        <div class="balance-row">
            <div class="balance-item" data-currency="candy">
                <img src="https://xiaochen1235789.github.io/images/Crushed_sugar.webp" alt="糖果碎">
                糖果碎: <span id="shopCandyBalance">0</span>
            </div>
            <div class="balance-item" data-currency="rainbow">
                <img src="https://xiaochen1235789.github.io/images/Super_Sweet.webp" alt="超级棒糖">
                超级棒糖: <span id="shopRainbowBalance">0</span>
            </div>
        </div>
        <div style="font-size: 0.8rem; color: #b0c4d0;">点击货币查看介绍</div>
    </div>

    <div class="shop-section">
        <h3><i class="fas fa-image"></i> 个性头像框</h3>
        <div id="framesList">⏳ 加载中...</div>
    </div>
</div>

<script>
    (function() {
        let currentUserId = null, userStats = null, ownedFrames = [], equippedFrame = null;

        async function refreshUserData() {
            if (!currentUserId) return;
            try {
                const { data: stats } = await parent.supabaseClient
                    .from('user_stats')
                    .select('candy_crumbles, rainbow_lollipops')
                    .eq('user_id', currentUserId)
                    .single();
                if (stats) {
                    userStats = stats;
                    document.getElementById('shopCandyBalance').innerText = userStats.candy_crumbles;
                    document.getElementById('shopRainbowBalance').innerText = userStats.rainbow_lollipops;
                }
                const frameData = await parent.FrameSystem.loadUserFrames(currentUserId);
                ownedFrames = frameData.owned;
                equippedFrame = frameData.equipped;
                renderFramesList();
            } catch (err) {
                console.error(err);
                document.getElementById('framesList').innerHTML = `<div class="error-message">数据加载失败: ${err.message}<br><button class="retry-btn" onclick="location.reload()">重试</button></div>`;
            }
        }

        function renderFramesList() {
            const container = document.getElementById('framesList');
            const frames = parent.FrameSystem.FRAMES;
            if (!frames || frames.length === 0) {
                container.innerHTML = '<div class="error-message">未找到头像框商品</div>';
                return;
            }
            let html = '';
            for (const frame of frames) {
                const isOwned = ownedFrames.includes(frame.id);
                const isEquipped = (equippedFrame === frame.id);
                const priceHtml = (frame.price_candy > 0 || frame.price_rainbow > 0) ?
                    `<span class="frame-price">
                        <span class="price-icon"><img src="https://xiaochen1235789.github.io/images/Crushed_sugar.webp" width="16" style="vertical-align: middle;"></span> ${frame.price_candy}
                        ${frame.price_rainbow > 0 ? `<span class="price-icon"><img src="https://xiaochen1235789.github.io/images/Super_Sweet.webp" width="16" style="vertical-align: middle;"></span> ${frame.price_rainbow}` : ''}
                    </span>` : '免费';
                let action = '';
                if (isOwned) {
                    action = isEquipped ? '<button class="btn-owned" disabled>已装备</button>' : `<button class="btn-equip" data-id="${frame.id}">装备</button>`;
                } else {
                    action = `<button class="btn-buy" data-id="${frame.id}">购买</button>`;
                }
                html += `
                    <div class="frame-item">
                        <div class="frame-info">
                            <div class="frame-name">${frame.name}</div>
                            <div class="frame-desc">${frame.description}</div>
                            ${priceHtml}
                        </div>
                        ${action}
                    </div>
                `;
            }
            container.innerHTML = html;

            // 绑定事件
            document.querySelectorAll('.btn-buy').forEach(btn => {
                btn.onclick = async () => {
                    const frameId = btn.dataset.id;
                    try {
                        await parent.FrameSystem.purchaseFrame(frameId, userStats, (nc, nr) => {
                            if (userStats) { userStats.candy_crumbles = nc; userStats.rainbow_lollipops = nr; }
                            refreshUserData();
                            parent.updateUserStatsAfterPurchase?.(nc, nr);
                            parent.showNotification(`购买成功: ${parent.FrameSystem.getFrameById(frameId).name}`, 'success');
                        });
                    } catch (e) { parent.showNotification(e.message, 'error'); }
                };
            });
            document.querySelectorAll('.btn-equip').forEach(btn => {
                btn.onclick = async () => {
                    const frameId = btn.dataset.id;
                    try {
                        await parent.FrameSystem.equipFrame(frameId);
                        equippedFrame = frameId;
                        renderFramesList();
                        parent.showNotification('已装备头像框', 'success');
                    } catch (e) { parent.showNotification(e.message, 'error'); }
                };
            });
        }

        function showCurrencyInfo(type) {
            parent.showNotification(type === 'candy' ? '糖果碎：通用货币，签到获取' : '超级棒糖：稀有货币，连续签到获取', 'info');
        }

        async function init() {
            // 等待 FrameSystem 就绪
            if (parent.FrameSystem?.ready) await parent.FrameSystem.ready;
            if (!parent.FrameSystem?.FRAMES) {
                document.getElementById('framesList').innerHTML = '<div class="error-message">头像框系统未加载，请刷新页面</div>';
                return;
            }
            let retries = 0;
            while (!parent.getCurrentUserId || !parent.getUserStats) {
                if (retries++ > 30) return;
                await new Promise(r => setTimeout(r, 100));
            }
            currentUserId = parent.getCurrentUserId();
            userStats = parent.getUserStats();
            if (!currentUserId || !userStats) {
                setTimeout(init, 200);
                return;
            }
            await refreshUserData();
            document.querySelectorAll('.balance-item').forEach(el => {
                el.onclick = () => showCurrencyInfo(el.dataset.currency);
            });
        }
        init();
    })();
</script>
