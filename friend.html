<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好友系统 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/friend.css">
    <style>
        .tab-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px auto 0;
            max-width: 1000px;
            padding: 0 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: var(--card-bg, #1e3a2f);
            border: 1px solid var(--border-color, #3d725f);
            color: var(--text-main, #e0e0e0);
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--text-highlight, #81c784);
            color: var(--bg, #121212);
            border-color: var(--text-highlight, #81c784);
        }
        .tab-btn:hover:not(.active) {
            background: var(--card-bg-hover, #284a3c);
        }
        .friends-card.hide-card {
            display: none;
        }
    </style>

<body>

<nav class="top-nav">
    <div class="nav-title">六哥荣耀WIKI</div>
    <div class="user-nav-section" id="userNavSection">
        <a href="login-real.html" class="nav-link" style="color:var(--text-highlight);text-decoration:none;">登录/注册</a>
    </div>
</nav>

<div class="user-dropdown" id="userDropdown">
    <a href="profile.html" class="user-dropdown-item" target="_blank"><i class="fas fa-user"></i> 个人主页</a>
    <div class="user-dropdown-item" id="dailySigninItem"><i class="fas fa-calendar-check"></i> 每日签到</div>
    <div class="user-dropdown-item" id="logoutItem"><i class="fas fa-sign-out-alt"></i> 退出登录</div>
</div>

<div class="modal-mask" id="signinModal">
    <div class="modal-container">
        <i class="fas fa-calendar-check" style="font-size:2rem;color:var(--text-highlight);"></i>
        <h3 style="margin:12px 0;">每日签到</h3>
        <p id="signinRewardPreview">确定要签到吗？</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" id="cancelSigninBtn">取消</button>
            <button class="modal-btn modal-btn-confirm" id="confirmSigninBtn">签到</button>
        </div>
    </div>
</div>

<div class="modal-mask" id="logoutModal">
    <div class="modal-container">
        <i class="fas fa-question-circle" style="font-size:2rem;color:#f87171;"></i>
        <h3 style="margin:12px 0;">确定退出登录吗？</h3>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" id="cancelLogoutBtn">取消</button>
            <button class="modal-btn modal-btn-danger" id="confirmLogoutBtn">退出</button>
        </div>
    </div>
</div>

<div id="notification" class="notification"></div>

<div class="tab-buttons">
    <button class="tab-btn active" data-tab="friends">我的好友</button>
    <button class="tab-btn" data-tab="requests">好友请求</button>
    <button class="tab-btn" data-tab="sent">我发出的请求</button>
    <button class="tab-btn" data-tab="search">添加好友</button>
</div>

<div class="friends-dashboard" id="dashboard">
    <div class="friends-card" data-card="friends">
        <div class="card-header"><i class="fas fa-users"></i> 我的好友 <span id="friendCountBadge" class="badge">0</span></div>
        <div class="card-content" id="friendsList">加载中...</div>
    </div>
    <div class="friends-card" data-card="requests">
        <div class="card-header"><i class="fas fa-user-plus"></i> 好友请求 <span id="requestBadge" class="badge">0</span></div>
        <div class="card-content" id="pendingRequests">加载中...</div>
    </div>
    <div class="friends-card" data-card="sent">
        <div class="card-header"><i class="fas fa-paper-plane"></i> 我发出的请求</div>
        <div class="card-content" id="sentRequests">加载中...</div>
    </div>
    <div class="friends-card" data-card="search">
        <div class="card-header"><i class="fas fa-search"></i> 添加好友</div>
        <div class="card-content">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入用户名搜索...">
                <button id="searchBtn" class="btn-success"><i class="fas fa-search"></i> 搜索</button>
            </div>
            <div id="searchResults"></div>
        </div>
    </div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    let currentUserId = null;
    let userStats = null;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showNotification(msg, type='info') {
        const n = document.getElementById('notification');
        if(!n) return;
        n.textContent = msg;
        n.style.background = type==='error'?'#f87171':type==='success'?'#10b981':'#3b82f6';
        n.classList.add('show');
        setTimeout(()=>n.classList.remove('show'), 3000);
    }
    function openModal(id) { const m = document.getElementById(id); if(m) m.classList.add('active'); }
    function closeModal(id) { const m = document.getElementById(id); if(m) m.classList.remove('active'); }

    function formatLastSeen(lastSeen) {
        if(!lastSeen) return '<span class="offline">从未上线</span>';
        const last = new Date(lastSeen);
        const now = new Date();
        const diffSec = Math.floor((now - last) / 1000);
        if(diffSec < 300) return '<span class="online">在线</span>';
        const diffMin = Math.floor(diffSec / 60);
        if(diffMin < 60) return `<span class="offline">${diffMin}分钟前在线</span>`;
        const diffHour = Math.floor(diffMin / 60);
        if(diffHour < 24) return `<span class="offline">${diffHour}小时前在线</span>`;
        const diffDay = Math.floor(diffHour / 24);
        return `<span class="offline">${diffDay}天前在线</span>`;
    }

    async function getUserProfile(userId) {
        try {
            const { data, error } = await supabase.from('user_profiles').select('username, avatar_url, last_seen_at').eq('id', userId).single();
            if(error) throw error;
            return { username: data.username || '用户', avatar_url: data.avatar_url, last_seen_at: data.last_seen_at };
        } catch(e) {
            return { username: '未知用户', avatar_url: null, last_seen_at: null };
        }
    }

    // 纯 DOM 构建函数
    function createAvatarElement(avatarUrl, username) {
        const div = document.createElement('div');
        div.className = 'friend-avatar';
        if (avatarUrl) {
            const img = document.createElement('img');
            img.src = avatarUrl;
            img.alt = '';
            img.onerror = function() {
                div.innerHTML = '';
                const firstChar = username.charAt(0).toUpperCase();
                div.textContent = firstChar;
            };
            div.appendChild(img);
        } else {
            const firstChar = username.charAt(0).toUpperCase();
            div.textContent = firstChar;
        }
        return div;
    }

    // 创建好友/请求条目（好友类型增加聊天按钮）
    function createFriendItem(friend, type = 'friend') {
        const div = document.createElement('div');
        div.className = 'friend-item';
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'friend-info';
        
        const avatarDiv = createAvatarElement(friend.avatar_url, friend.username);
        infoDiv.appendChild(avatarDiv);
        
        const detailsDiv = document.createElement('div');
        detailsDiv.className = 'friend-details';
        const nameSpan = document.createElement('div');
        nameSpan.className = 'friend-name';
        nameSpan.textContent = friend.username;
        detailsDiv.appendChild(nameSpan);
        
        if (type === 'friend') {
            const statusSpan = document.createElement('div');
            statusSpan.className = 'online-status';
            statusSpan.innerHTML = formatLastSeen(friend.last_seen_at);
            detailsDiv.appendChild(statusSpan);
        }
        infoDiv.appendChild(detailsDiv);
        div.appendChild(infoDiv);
        
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'card-actions';
        
        if (type === 'friend') {
            // 聊天按钮
            const chatBtn = document.createElement('button');
            chatBtn.innerHTML = '<i class="fas fa-comment"></i> 聊天';
            chatBtn.style.marginRight = '8px';
            chatBtn.addEventListener('click', () => {
                const encodedName = encodeURIComponent(friend.username);
                window.open(`chat.html?friend_id=${friend.id}&friend_name=${encodedName}`, '_blank');
            });
            actionsDiv.appendChild(chatBtn);
            
            // 删除按钮
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '<i class="fas fa-user-minus"></i> 删除';
            delBtn.addEventListener('click', () => removeFriend(friend.id));
            actionsDiv.appendChild(delBtn);
        } else if (type === 'request') {
            const acceptBtn = document.createElement('button');
            acceptBtn.className = 'btn-success';
            acceptBtn.innerHTML = '<i class="fas fa-check"></i> 接受';
            acceptBtn.addEventListener('click', () => respondRequest(friend.id, 'accept'));
            const rejectBtn = document.createElement('button');
            rejectBtn.className = 'btn-outline';
            rejectBtn.innerHTML = '<i class="fas fa-times"></i> 拒绝';
            rejectBtn.addEventListener('click', () => respondRequest(friend.id, 'reject'));
            actionsDiv.appendChild(acceptBtn);
            actionsDiv.appendChild(rejectBtn);
        } else if (type === 'sent') {
            const cancelBtn = document.createElement('button');
            cancelBtn.innerHTML = '<i class="fas fa-trash-alt"></i> 撤销';
            cancelBtn.addEventListener('click', () => cancelSentRequest(friend.id));
            actionsDiv.appendChild(cancelBtn);
        }
        div.appendChild(actionsDiv);
        return div;
    }

    async function loadFriendsData() {
        if(!currentUserId) return;
        try {
            const { data: relations, error } = await supabase
                .from('friends')
                .select('*')
                .or(`requester_id.eq.${currentUserId},addressee_id.eq.${currentUserId}`);
            if(error) throw error;

            const accepted = relations.filter(r => r.status === 'accepted');
            const friendIds = accepted.map(r => r.requester_id === currentUserId ? r.addressee_id : r.requester_id);
            const friendsData = await Promise.all(friendIds.map(async id => {
                const profile = await getUserProfile(id);
                return { id, ...profile };
            }));
            friendsData.sort((a,b) => {
                const aOnline = a.last_seen_at && (Date.now() - new Date(a.last_seen_at) < 300000);
                const bOnline = b.last_seen_at && (Date.now() - new Date(b.last_seen_at) < 300000);
                if(aOnline && !bOnline) return -1;
                if(!aOnline && bOnline) return 1;
                return 0;
            });
            const friendsContainer = document.getElementById('friendsList');
            friendsContainer.innerHTML = '';
            if (friendsData.length === 0) {
                friendsContainer.innerHTML = '<div class="empty-tip">暂无好友，去添加吧~</div>';
            } else {
                friendsData.forEach(f => friendsContainer.appendChild(createFriendItem(f, 'friend')));
            }
            document.getElementById('friendCountBadge').innerText = friendsData.length;

            const incoming = relations.filter(r => r.addressee_id === currentUserId && r.status === 'pending');
            const incomingWithUser = await Promise.all(incoming.map(async r => {
                const profile = await getUserProfile(r.requester_id);
                return { id: r.id, username: profile.username, avatar_url: profile.avatar_url };
            }));
            const pendingContainer = document.getElementById('pendingRequests');
            pendingContainer.innerHTML = '';
            if (incomingWithUser.length === 0) {
                pendingContainer.innerHTML = '<div class="empty-tip">暂无好友请求</div>';
            } else {
                incomingWithUser.forEach(req => pendingContainer.appendChild(createFriendItem(req, 'request')));
            }
            document.getElementById('requestBadge').innerText = incomingWithUser.length;

            const sent = relations.filter(r => r.requester_id === currentUserId && r.status === 'pending');
            const sentWithUser = await Promise.all(sent.map(async r => {
                const profile = await getUserProfile(r.addressee_id);
                return { id: r.id, username: profile.username, avatar_url: profile.avatar_url };
            }));
            const sentContainer = document.getElementById('sentRequests');
            sentContainer.innerHTML = '';
            if (sentWithUser.length === 0) {
                sentContainer.innerHTML = '<div class="empty-tip">未发出任何请求</div>';
            } else {
                sentWithUser.forEach(req => sentContainer.appendChild(createFriendItem(req, 'sent')));
            }
        } catch(err) {
            console.error(err);
            showNotification(err.message, 'error');
        }
    }

    async function removeFriend(friendId) {
        if(!confirm('确定删除这位好友吗？')) return;
        try {
            await supabase.from('friends').delete()
                .or(`(requester_id.eq.${currentUserId} AND addressee_id.eq.${friendId}),(requester_id.eq.${friendId} AND addressee_id.eq.${currentUserId})`)
                .eq('status', 'accepted');
            showNotification('已删除好友', 'success');
            loadFriendsData();
        } catch(err) { showNotification('删除失败', 'error'); }
    }
    async function respondRequest(reqId, action) {
        try {
            if(action === 'accept') {
                await supabase.from('friends').update({ status: 'accepted', updated_at: new Date() }).eq('id', reqId);
                showNotification('已添加好友', 'success');
            } else {
                await supabase.from('friends').delete().eq('id', reqId);
                showNotification('已拒绝请求', 'success');
            }
            loadFriendsData();
        } catch(err) { showNotification('操作失败', 'error'); }
    }
    async function cancelSentRequest(reqId) {
        try {
            await supabase.from('friends').delete().eq('id', reqId);
            showNotification('已撤销请求', 'success');
            loadFriendsData();
        } catch(err) { showNotification('撤销失败', 'error'); }
    }

    let searchTimeout;
    async function performSearch() {
        const keyword = document.getElementById('searchInput').value.trim();
        const resultsDiv = document.getElementById('searchResults');
        if(!keyword) { resultsDiv.innerHTML = ''; return; }
        try {
            const { data: users, error } = await supabase
                .from('user_profiles')
                .select('id, username, avatar_url')
                .ilike('username', `%${keyword}%`)
                .limit(10);
            if(error) throw error;
            const filtered = users.filter(u => u.id !== currentUserId);
            if(filtered.length === 0) { resultsDiv.innerHTML = '<div class="empty-tip">未找到其他用户</div>'; return; }
            const { data: existing } = await supabase.from('friends').select('requester_id, addressee_id, status')
                .or(`requester_id.eq.${currentUserId},addressee_id.eq.${currentUserId}`);
            const existingMap = new Map();
            existing?.forEach(rel => {
                const otherId = rel.requester_id === currentUserId ? rel.addressee_id : rel.requester_id;
                existingMap.set(otherId, rel.status);
            });
            resultsDiv.innerHTML = '';
            for (const u of filtered) {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'friend-item';
                const infoDiv = document.createElement('div');
                infoDiv.className = 'friend-info';
                const avatarDiv = createAvatarElement(u.avatar_url, u.username);
                infoDiv.appendChild(avatarDiv);
                const nameDiv = document.createElement('div');
                nameDiv.className = 'friend-name';
                nameDiv.textContent = u.username;
                infoDiv.appendChild(nameDiv);
                itemDiv.appendChild(infoDiv);
                const actionDiv = document.createElement('div');
                const status = existingMap.get(u.id);
                if (!status) {
                    const addBtn = document.createElement('button');
                    addBtn.className = 'btn-success';
                    addBtn.innerHTML = '<i class="fas fa-user-plus"></i> 添加';
                    addBtn.addEventListener('click', () => sendFriendRequest(u.id));
                    actionDiv.appendChild(addBtn);
                } else if (status === 'pending') {
                    const isSentByMe = existing?.find(r => r.requester_id === currentUserId && r.addressee_id === u.id);
                    const span = document.createElement('span');
                    span.textContent = isSentByMe ? '等待验证' : '请求已发送给您';
                    actionDiv.appendChild(span);
                } else {
                    const span = document.createElement('span');
                    span.textContent = '已是好友';
                    actionDiv.appendChild(span);
                }
                itemDiv.appendChild(actionDiv);
                resultsDiv.appendChild(itemDiv);
            }
        } catch(err) { showNotification('搜索失败', 'error'); }
    }
    async function sendFriendRequest(targetId) {
        try {
            await supabase.from('friends').insert({ requester_id: currentUserId, addressee_id: targetId, status: 'pending' });
            showNotification('好友请求已发送', 'success');
            performSearch();
            loadFriendsData();
        } catch(err) { showNotification('发送失败', 'error'); }
    }

    document.getElementById('searchBtn').onclick = performSearch;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performSearch, 400);
    });

    // 签到
    async function loadUserStats() {
        const { data, error } = await supabase.from('user_stats').select('*').eq('user_id', currentUserId).single();
        if(error && error.code === 'PGRST116') {
            await supabase.from('user_stats').insert({ user_id: currentUserId, candy_crumbles:100, rainbow_lollipops:5, active_points:0 });
            return loadUserStats();
        }
        userStats = data;
    }
    function getCheckinRewards(streak) {
        if(streak===1) return { candy:3, rainbow:0, active:2 };
        if(streak===2) return { candy:5, rainbow:0, active:2 };
        if(streak===3) return { candy:7, rainbow:0, active:2 };
        if(streak===4) return { candy:9, rainbow:0, active:2 };
        if(streak===5) return { candy:10, rainbow:0, active:2 };
        if(streak===6) return { candy:12, rainbow:0, active:2 };
        if(streak===7) return { candy:15, rainbow:1, active:5 };
        if(streak>=8 && streak<=14) return { candy:10+Math.floor((streak-8)*2), rainbow:2, active:8 };
        if(streak===15) return { candy:30, rainbow:5, active:15 };
        if(streak>=16 && streak<=29) return { candy:50, rainbow:10, active:10 };
        if(streak===30) return { candy:100, rainbow:20, active:50 };
        return { candy:80, rainbow:15, active:20 };
    }
    async function performCheckin() {
        if(!currentUser) { showNotification('请先登录', 'error'); return; }
        const today = new Date().toLocaleDateString('sv-SE');
        const last = userStats.last_checkin_date;
        if(last === today) { showNotification('您今天已经签到过了，明天再来吧ღ( ´･ᴗ･ )比心', 'warning'); return; }
        const newStreak = (last && new Date(last).getDate() === new Date(Date.now()-86400000).getDate()) ? (userStats.checkin_streak||0)+1 : 1;
        const rewards = getCheckinRewards(newStreak);
        const newCandy = (userStats.candy_crumbles||0) + rewards.candy;
        const newRainbow = (userStats.rainbow_lollipops||0) + rewards.rainbow;
        const newActive = (userStats.active_points||0) + rewards.active;
        const { error } = await supabase.from('user_stats').update({
            candy_crumbles: newCandy, rainbow_lollipops: newRainbow, active_points: newActive,
            last_checkin_date: today, checkin_streak: newStreak
        }).eq('user_id', currentUserId);
        if(error) { showNotification('签到失败', 'error'); return; }
        userStats = {...userStats, candy_crumbles:newCandy, rainbow_lollipops:newRainbow, active_points:newActive, last_checkin_date:today, checkin_streak:newStreak};
        showNotification(`签到成功！获得 ${rewards.candy}🍬 ${rewards.rainbow>0?`🌈+${rewards.rainbow} `:''}+${rewards.active}⚡`, 'success');
    }

    async function updateLastSeen() {
        if(!currentUserId) return;
        await supabase.from('user_profiles').update({ last_seen_at: new Date().toISOString() }).eq('id', currentUserId);
    }

    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        const cards = document.querySelectorAll('.friends-card');
        function showTab(tabId) {
            cards.forEach(card => {
                if (card.getAttribute('data-card') === tabId) {
                    card.classList.remove('hide-card');
                } else {
                    card.classList.add('hide-card');
                }
            });
            btns.forEach(btn => {
                if (btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        btns.forEach(btn => btn.addEventListener('click', () => showTab(btn.getAttribute('data-tab'))));
        showTab('friends');
    }

    // 纯 DOM 构建顶部用户区域
    function buildUserMenu(username, avatarUrl) {
        const container = document.getElementById('userNavSection');
        container.innerHTML = '';
        const trigger = document.createElement('div');
        trigger.className = 'user-menu-trigger';
        trigger.id = 'userMenuTrigger';
        const avatarDiv = document.createElement('div');
        avatarDiv.style.cssText = 'width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;';
        if (avatarUrl) {
            const img = document.createElement('img');
            img.src = avatarUrl;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            img.onerror = () => {
                avatarDiv.innerHTML = '';
                const firstChar = username.charAt(0).toUpperCase();
                avatarDiv.textContent = firstChar;
                avatarDiv.style.background = 'linear-gradient(135deg,#3ecf8e,#8a4baf)';
                avatarDiv.style.color = 'white';
                avatarDiv.style.fontWeight = '600';
            };
            avatarDiv.appendChild(img);
        } else {
            const firstChar = username.charAt(0).toUpperCase();
            avatarDiv.textContent = firstChar;
            avatarDiv.style.background = 'linear-gradient(135deg,#3ecf8e,#8a4baf)';
            avatarDiv.style.color = 'white';
            avatarDiv.style.fontWeight = '600';
        }
        trigger.appendChild(avatarDiv);
        const nameSpan = document.createElement('span');
        nameSpan.textContent = username;
        trigger.appendChild(nameSpan);
        const arrow = document.createElement('i');
        arrow.className = 'fas fa-chevron-down';
        arrow.style.fontSize = '0.8rem';
        trigger.appendChild(arrow);
        container.appendChild(trigger);
        const dropdown = document.getElementById('userDropdown');
        if (dropdown) {
            trigger.onclick = (e) => {
                e.stopPropagation();
                const rect = trigger.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
                dropdown.style.top = (rect.bottom + scrollTop + 8) + 'px';
                dropdown.style.right = (window.innerWidth - rect.right + scrollLeft) + 'px';
                dropdown.classList.toggle('show');
            };
            if (!window._closeMenuBound) {
                document.addEventListener('click', (e) => {
                    if (!trigger.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show');
                });
                window.addEventListener('scroll', () => dropdown.classList.remove('show'));
                window.addEventListener('resize', () => dropdown.classList.remove('show'));
                window._closeMenuBound = true;
            }
        }
    }

    async function init() {
        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            if(error || !user) {
                document.getElementById('userNavSection').innerHTML = '<a href="login-real.html" class="nav-link" style="color:var(--text-highlight);text-decoration:none;">登录/注册</a>';
                return;
            }
            currentUser = user;
            currentUserId = user.id;
            await updateLastSeen();
            await loadUserStats();
            
            let { data: profile, error: profileError } = await supabase.from('user_profiles').select('username, avatar_url').eq('id', currentUserId).single();
            if(profileError && profileError.code === 'PGRST116') {
                await supabase.from('user_profiles').insert({ id: currentUserId, username: currentUser.email.split('@')[0], bio: '', role: 'user' });
                profile = { username: currentUser.email.split('@')[0], avatar_url: null };
            }
            const rawUsername = profile.username || currentUser.email.split('@')[0];
            const avatarUrl = profile.avatar_url;
            buildUserMenu(rawUsername, avatarUrl);

            document.getElementById('dailySigninItem').onclick = () => {
                document.getElementById('userDropdown').classList.remove('show');
                openModal('signinModal');
                const rewardPreview = getCheckinRewards((userStats?.checkin_streak||0)+1);
                document.getElementById('signinRewardPreview').innerHTML = `签到可获得 🍬${rewardPreview.candy} ${rewardPreview.rainbow>0?`🌈+${rewardPreview.rainbow} `:''}⚡+${rewardPreview.active}`;
            };
            document.getElementById('logoutItem').onclick = () => {
                document.getElementById('userDropdown').classList.remove('show');
                openModal('logoutModal');
            };
            document.getElementById('confirmSigninBtn').onclick = async () => { closeModal('signinModal'); await performCheckin(); };
            document.getElementById('cancelSigninBtn').onclick = () => closeModal('signinModal');
            document.getElementById('confirmLogoutBtn').onclick = async () => {
                closeModal('logoutModal');
                await supabase.auth.signOut();
                window.location.href = 'index.html';
            };
            document.getElementById('cancelLogoutBtn').onclick = () => closeModal('logoutModal');
            
            await loadFriendsData();
            initTabs();
        } catch(err) {
            console.error('初始化失败:', err);
            document.getElementById('userNavSection').innerHTML = '<a href="login-real.html" class="nav-link" style="color:var(--text-highlight);text-decoration:none;">登录/注册</a>';
            showNotification('页面初始化失败: '+err.message, 'error');
        }
    }
    
    init();
})();
</script>
</body>
</html>
