<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好友系统 - 六哥荣耀WIKI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 尝试加载 main.css，若 404 不影响核心功能 -->
    <link rel="stylesheet" href="https://xiaochen1235789.github.io/styles/main.css" onerror="this.onerror=null;this.removeAttribute('href');">
    <style>
        /* 完整样式（与您现有风格一致） */
        :root {
            --bg: #121212;
            --card-bg: #1e3a2f;
            --card-bg-hover: #284a3c;
            --text-main: #e0e0e0;
            --text-highlight: #81c784;
            --text-secondary: #99aabb;
            --radius: 12px;
            --border-color: #3d725f;
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
            --danger: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        body { background: var(--bg); color: var(--text-main); line-height: 1.6; }
        .friends-container { max-width: 1400px; margin: 0 auto; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .top-nav {
            background: var(--card-bg); padding: 15px 20px; display: flex; align-items: center; gap: 20px;
            border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 1000;
        }
        .nav-title { font-size: 1.5rem; font-weight: bold; color: var(--text-highlight); margin-right: auto; }
        .nav-link { color: var(--text-main); text-decoration: none; padding: 8px 16px; border-radius: var(--radius); transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--text-highlight); color: var(--bg); }
        .badge {
            background: var(--danger); color: white; border-radius: 30px; padding: 2px 8px;
            font-size: 0.7rem; font-weight: bold; margin-left: 8px;
        }
        .two-columns {
            display: grid; grid-template-columns: 1fr 380px; gap: 25px; margin-top: 30px;
        }
        .friends-list, .requests-panel, .search-panel {
            background: var(--card-bg); border-radius: var(--radius); padding: 20px;
            border: 1px solid var(--border-color); transition: 0.2s;
        }
        .section-title {
            font-size: 1.4rem; color: var(--text-highlight); margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--text-highlight); padding-left: 15px;
        }
        .friend-card, .request-card {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); padding: 12px 15px; border-radius: var(--radius);
            margin-bottom: 12px; transition: 0.2s;
        }
        .friend-card:hover, .request-card:hover { background: var(--card-bg-hover); transform: translateX(5px); }
        .friend-info { display: flex; align-items: center; gap: 15px; }
        .friend-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #3ecf8e, #8a4baf);
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;
            overflow: hidden; flex-shrink: 0;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-name { font-weight: 600; color: var(--text-highlight); }
        .btn-icon {
            background: transparent; border: none; color: var(--text-secondary); cursor: pointer;
            padding: 8px 12px; border-radius: 30px; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-icon:hover { background: rgba(129,199,132,0.2); color: var(--text-highlight); }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: rgba(248,113,113,0.2); }
        .btn-success { background: var(--text-highlight); color: var(--bg); border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 30px; cursor: pointer; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 10px 15px; background: #2d3748; border: 1px solid var(--border-color);
            border-radius: 40px; color: white; outline: none;
        }
        .search-box input:focus { border-color: var(--text-highlight); }
        .empty-tip { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .loading-spinner-small {
            width: 24px; height: 24px; border: 3px solid rgba(129,199,132,0.2); border-top-color: var(--text-highlight);
            border-radius: 50%; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 900px) { .two-columns { grid-template-columns: 1fr; } }
        .sync-notice {
            position: fixed; bottom: 100px; right: 20px; background: var(--text-highlight); color: var(--bg);
            padding: 10px 16px; border-radius: var(--radius); opacity: 0; transition: 0.3s; z-index: 1001;
        }
        .sync-notice.show { opacity: 1; transform: translateY(-10px); }
        #notification {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px;
            z-index: 10001; transform: translateX(120%); transition: 0.3s; backdrop-filter: blur(10px);
        }
        .error-box {
            background: rgba(248,113,113,0.1); border: 1px solid #f87171; border-radius: var(--radius);
            padding: 20px; text-align: center; color: #f87171; margin: 20px;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-title">六哥荣耀WIKI</div>
        <a href="index.html" class="nav-link">首页</a>
        <a href="profile.html" class="nav-link">个人主页</a>
        <a href="friends.html" class="nav-link active">好友</a>
        <div id="userNavSection" style="display: flex; align-items: center; gap: 15px; margin-left: auto;"></div>
    </nav>
    <div class="sync-notice" id="syncNotice"><i class="fas fa-sync-alt"></i><span>已同步</span></div>
    <div class="friends-container">
        <div id="loadingView" style="text-align:center;padding:80px;">
            <div class="loading-spinner-small"></div>
            <p id="loadingMessage">加载好友系统...</p>
        </div>
        <div id="mainContent" style="display:none;">
            <div class="two-columns">
                <div class="friends-list">
                    <div class="section-title"><i class="fas fa-users"></i> 我的好友 <span id="friendCount" class="badge" style="background:var(--text-highlight);">0</span></div>
                    <div id="friendsListContainer">加载中...</div>
                </div>
                <div>
                    <div class="requests-panel" style="margin-bottom: 25px;">
                        <div class="section-title"><i class="fas fa-user-plus"></i> 好友请求 <span id="requestBadge" class="badge">0</span></div>
                        <div id="pendingRequestsContainer">暂无请求</div>
                    </div>
                    <div class="requests-panel">
                        <div class="section-title"><i class="fas fa-paper-plane"></i> 我发出的请求</div>
                        <div id="sentRequestsContainer">暂无发出请求</div>
                    </div>
                    <div class="search-panel" style="margin-top: 25px;">
                        <div class="section-title"><i class="fas fa-search"></i> 添加好友</div>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="输入用户名搜索...">
                            <button id="searchBtn" class="btn-success"><i class="fas fa-search"></i> 搜索</button>
                        </div>
                        <div id="searchResults"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="notification"></div>

    <script>
        // ---------- 初始化 Supabase（使用 supabaseClient 避免重复声明）----------
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
        let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUserId = null;

        function $(id) { return document.getElementById(id); }
        function showNotification(msg, type='info') {
            let n = $('notification');
            n.textContent = msg;
            n.style.background = type==='error'?'#f87171':type==='success'?'#10b981':'#3b82f6';
            n.style.transform = 'translateX(0)';
            setTimeout(() => n.style.transform = 'translateX(120%)', 3000);
        }
        function showSyncNotice() { let sn=$('syncNotice'); sn.classList.add('show'); setTimeout(()=>sn.classList.remove('show'),2000); }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function getUserProfile(userId) {
            try {
                const { data, error } = await supabaseClient.from('user_profiles').select('username, avatar_url').eq('id', userId).single();
                if (error) throw error;
                return { username: data.username || '用户', avatar_url: data.avatar_url };
            } catch (err) {
                console.warn(`获取用户 ${userId} 资料失败:`, err);
                return { username: '未知用户', avatar_url: null };
            }
        }

        async function updateNavbar() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if(!user) return;
            const profile = await getUserProfile(user.id);
            const avatarHtml = profile.avatar_url ? `<img src="${profile.avatar_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">` : `<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3ecf8e,#8a4baf);display:flex;align-items:center;justify-content:center;font-weight:600;">${(profile.username.charAt(0)||'U').toUpperCase()}</div>`;
            $('userNavSection').innerHTML = `${avatarHtml}<span style="color:var(--text-highlight);">${escapeHtml(profile.username)}</span><button id="logoutBtn" style="background:transparent;color:#f87171;border:1px solid rgba(248,113,113,0.3);padding:4px 12px;border-radius:30px;cursor:pointer;"><i class="fas fa-sign-out-alt"></i> 退出</button>`;
            $('logoutBtn')?.addEventListener('click', async()=>{ await supabaseClient.auth.signOut(); window.location.href='index.html'; });
        }

        async function loadAllFriendsData() {
            if (!currentUserId) return;
            try {
                // 检查 friends 表是否存在
                const { error: checkError } = await supabaseClient.from('friends').select('id').limit(1);
                if (checkError && checkError.message && checkError.message.includes('relation') && checkError.message.includes('does not exist')) {
                    throw new Error('friends 表不存在，请在 Supabase 中执行建表 SQL');
                }

                const { data: relations, error } = await supabaseClient
                    .from('friends')
                    .select('*')
                    .or(`requester_id.eq.${currentUserId},addressee_id.eq.${currentUserId}`);
                if (error) throw new Error(`查询好友关系失败: ${error.message}`);

                // 好友列表
                const accepted = relations.filter(r => r.status === 'accepted');
                const friendIds = accepted.map(r => r.requester_id === currentUserId ? r.addressee_id : r.requester_id);
                const friendsWithDetails = await Promise.all(friendIds.map(async id => {
                    const profile = await getUserProfile(id);
                    return { id, username: profile.username, avatar_url: profile.avatar_url };
                }));
                const friendHtml = friendsWithDetails.length ? friendsWithDetails.map(f => `
                    <div class="friend-card">
                        <div class="friend-info">
                            <div class="friend-avatar">${f.avatar_url ? `<img src="${f.avatar_url}">` : escapeHtml(f.username.charAt(0).toUpperCase())}</div>
                            <div class="friend-name">${escapeHtml(f.username)}</div>
                        </div>
                        <button class="btn-icon btn-danger" onclick="removeFriend('${f.id}')"><i class="fas fa-user-minus"></i> 删除</button>
                    </div>
                `).join('') : '<div class="empty-tip"><i class="fas fa-user-friends"></i> 暂无好友，去添加吧~</div>';
                $('friendsListContainer').innerHTML = friendHtml;
                $('friendCount').innerText = friendsWithDetails.length;

                // 待接收请求
                const incoming = relations.filter(r => r.addressee_id === currentUserId && r.status === 'pending');
                const incomingWithUser = await Promise.all(incoming.map(async r => {
                    const profile = await getUserProfile(r.requester_id);
                    return { id: r.id, username: profile.username, avatar_url: profile.avatar_url };
                }));
                $('pendingRequestsContainer').innerHTML = incomingWithUser.length ? incomingWithUser.map(req => `
                    <div class="request-card">
                        <div class="friend-info">
                            <div class="friend-avatar">${req.avatar_url ? `<img src="${req.avatar_url}">` : escapeHtml(req.username.charAt(0).toUpperCase())}</div>
                            <div class="friend-name">${escapeHtml(req.username)}</div>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn-success" onclick="respondRequest('${req.id}', 'accept')"><i class="fas fa-check"></i> 接受</button>
                            <button class="btn-outline" onclick="respondRequest('${req.id}', 'reject')"><i class="fas fa-times"></i> 拒绝</button>
                        </div>
                    </div>
                `).join('') : '<div class="empty-tip">暂无好友请求</div>';
                $('requestBadge').innerText = incoming.length;

                // 我发出的请求
                const sent = relations.filter(r => r.requester_id === currentUserId && r.status === 'pending');
                const sentWithUser = await Promise.all(sent.map(async r => {
                    const profile = await getUserProfile(r.addressee_id);
                    return { id: r.id, username: profile.username, avatar_url: profile.avatar_url };
                }));
                $('sentRequestsContainer').innerHTML = sentWithUser.length ? sentWithUser.map(req => `
                    <div class="request-card">
                        <div class="friend-info">
                            <div class="friend-avatar">${req.avatar_url ? `<img src="${req.avatar_url}">` : escapeHtml(req.username.charAt(0).toUpperCase())}</div>
                            <div class="friend-name">${escapeHtml(req.username)}</div>
                        </div>
                        <button class="btn-icon btn-danger" onclick="cancelSentRequest('${req.id}')"><i class="fas fa-trash-alt"></i> 撤销</button>
                    </div>
                `).join('') : '<div class="empty-tip">未发出任何请求</div>';
            } catch (err) {
                console.error('loadAllFriendsData 错误:', err);
                $('friendsListContainer').innerHTML = `<div class="empty-tip" style="color:#f87171;">❌ 错误：${escapeHtml(err.message)}</div>`;
                showNotification(err.message, 'error');
                throw err;
            }
        }

        window.removeFriend = async (friendId) => {
            if(!confirm('确定要删除这位好友吗？')) return;
            try {
                const { error } = await supabaseClient
                    .from('friends')
                    .delete()
                    .or(`(requester_id.eq.${currentUserId} AND addressee_id.eq.${friendId}),(requester_id.eq.${friendId} AND addressee_id.eq.${currentUserId})`)
                    .eq('status', 'accepted');
                if (error) throw error;
                showNotification('已删除好友', 'success');
                await loadAllFriendsData();
                showSyncNotice();
            } catch(err) {
                showNotification('删除失败: '+err.message, 'error');
            }
        };

        window.respondRequest = async (requestId, action) => {
            try {
                if(action === 'accept') {
                    const { error } = await supabaseClient.from('friends').update({ status: 'accepted', updated_at: new Date() }).eq('id', requestId);
                    if (error) throw error;
                    showNotification('已添加好友', 'success');
                } else {
                    const { error } = await supabaseClient.from('friends').delete().eq('id', requestId);
                    if (error) throw error;
                    showNotification('已拒绝请求', 'success');
                }
                await loadAllFriendsData();
                showSyncNotice();
            } catch(err) {
                showNotification('操作失败: '+err.message, 'error');
            }
        };

        window.cancelSentRequest = async (requestId) => {
            try {
                const { error } = await supabaseClient.from('friends').delete().eq('id', requestId);
                if (error) throw error;
                showNotification('已撤销请求', 'success');
                await loadAllFriendsData();
                showSyncNotice();
            } catch(err) {
                showNotification('撤销失败: '+err.message, 'error');
            }
        };

        let searchTimeout;
        $('searchBtn').onclick = () => performSearch();
        $('searchInput').addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(performSearch, 400); });
        
        async function performSearch() {
            const keyword = $('searchInput').value.trim();
            if(!keyword) { $('searchResults').innerHTML = ''; return; }
            try {
                const { data: users, error } = await supabaseClient
                    .from('user_profiles')
                    .select('id, username, avatar_url')
                    .ilike('username', `%${keyword}%`)
                    .limit(10);
                if (error) throw error;
                const filtered = users.filter(u => u.id !== currentUserId);
                if(filtered.length === 0) { $('searchResults').innerHTML = '<div class="empty-tip">未找到其他用户</div>'; return; }
                
                const { data: existing } = await supabaseClient
                    .from('friends')
                    .select('requester_id, addressee_id, status')
                    .or(`requester_id.eq.${currentUserId},addressee_id.eq.${currentUserId}`);
                const existingMap = new Map();
                existing?.forEach(rel => {
                    const otherId = rel.requester_id === currentUserId ? rel.addressee_id : rel.requester_id;
                    existingMap.set(otherId, rel.status);
                });
                
                $('searchResults').innerHTML = filtered.map(u => {
                    let actionHtml = '';
                    const status = existingMap.get(u.id);
                    if(!status) actionHtml = `<button class="btn-success" onclick="sendFriendRequest('${u.id}')"><i class="fas fa-user-plus"></i> 添加</button>`;
                    else if(status === 'pending') {
                        const isSentByMe = existing?.find(r => r.requester_id === currentUserId && r.addressee_id === u.id);
                        actionHtml = isSentByMe ? '<span style="color:#ffd966;">等待验证</span>' : '<span style="color:#aaa;">请求已发送给您</span>';
                    } else if(status === 'accepted') actionHtml = '<span style="color:var(--text-highlight);"><i class="fas fa-check-circle"></i> 已是好友</span>';
                    return `
                        <div class="friend-card">
                            <div class="friend-info">
                                <div class="friend-avatar">${u.avatar_url ? `<img src="${u.avatar_url}">` : escapeHtml(u.username.charAt(0).toUpperCase())}</div>
                                <div class="friend-name">${escapeHtml(u.username)}</div>
                            </div>
                            <div>${actionHtml}</div>
                        </div>
                    `;
                }).join('');
            } catch(err) {
                showNotification('搜索失败: '+err.message, 'error');
            }
        }

        window.sendFriendRequest = async (targetId) => {
            try {
                const { error } = await supabaseClient.from('friends').insert({
                    requester_id: currentUserId,
                    addressee_id: targetId,
                    status: 'pending'
                });
                if (error) {
                    if (error.code === '23505') showNotification('已经发送过请求或已是好友', 'error');
                    else throw error;
                } else {
                    showNotification('好友请求已发送', 'success');
                    await performSearch();
                    await loadAllFriendsData();
                    showSyncNotice();
                }
            } catch(err) {
                showNotification('发送失败: '+err.message, 'error');
            }
        };

        function subscribeToFriendsChanges() {
            if (!currentUserId) return;
            const channel = supabaseClient.channel('friends-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'friends', filter: `requester_id=eq.${currentUserId}` }, () => loadAllFriendsData())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'friends', filter: `addressee_id=eq.${currentUserId}` }, () => loadAllFriendsData())
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') console.log('已订阅好友实时更新');
                    if (status === 'CHANNEL_ERROR') console.warn('实时订阅出错，但不影响基本功能');
                });
        }

        async function init() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    throw new Error('请先登录');
                }
                currentUserId = user.id;
                $('loadingMessage').innerText = '已登录，正在加载个人资料...';
                await updateNavbar();
                $('loadingMessage').innerText = '正在加载好友列表...';
                await loadAllFriendsData();
                subscribeToFriendsChanges();
                $('loadingView').style.display = 'none';
                $('mainContent').style.display = 'block';
            } catch (err) {
                console.error('初始化失败:', err);
                let errorMsg = err.message;
                if (errorMsg.includes('user_profiles')) {
                    errorMsg = 'user_profiles 表不存在或当前用户无记录，请在 Supabase 执行补充 SQL';
                } else if (errorMsg.includes('friends')) {
                    errorMsg = 'friends 表不存在，请在 Supabase 执行建表 SQL';
                }
                $('loadingView').innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> 加载失败：${escapeHtml(errorMsg)}<br><br><button onclick="location.reload()" style="padding:8px 16px;background:var(--text-highlight);border:none;border-radius:8px;cursor:pointer;">重试</button></div>`;
                showNotification(errorMsg, 'error');
            }
        }
        init();
    </script>
</body>
</html>
