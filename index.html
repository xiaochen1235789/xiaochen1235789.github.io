        // ==================== 搜索功能 ====================
        function initializeSearch() {
            const searchInput = document.getElementById('search-input');
            const allCards = () => document.querySelectorAll('.content-card');
            const emptyResult = document.querySelector('.empty-result');
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const keyword = this.value.trim().toLowerCase();
                    let matchCount = 0;
                    allCards().forEach(card => {
                        const name = card.dataset.name?.toLowerCase() || '';
                        const desc = card.dataset.desc?.toLowerCase() || '';
                        const isMatch = !keyword || name.includes(keyword) || desc.includes(keyword);
                        card.style.display = isMatch ? 'block' : 'none';
                        if (isMatch) matchCount++;
                    });
                    emptyResult.style.display = matchCount === 0 && keyword ? 'block' : 'none';
                }, 200);
            });
        }

        // ==================== 导航 ====================
        function initializeNavigation() {
            const backToTopBtn = document.querySelector('.back-to-top');
            const navLinks = document.querySelectorAll('.nav-link');
            window.addEventListener('scroll', function() {
                backToTopBtn.classList.toggle('show', window.scrollY > 300);
                let currentSection = '';
                document.querySelectorAll('.section-header').forEach(section => {
                    if (window.scrollY >= section.offsetTop - 150) currentSection = section.id;
                });
                navLinks.forEach(link => link.classList.toggle('active', link.dataset.target === currentSection));
            });
            navLinks.forEach(link => {
                if (link.getAttribute('href').startsWith('#')) {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        const target = document.getElementById(targetId);
                        if (target) window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
                        history.pushState(null, null, `#${targetId}`);
                    });
                }
            });
        }

        // ==================== 更新日志弹窗 ====================
        function openChangelogModal() {
            const modal = document.getElementById('changelog-modal');
            const iframe = document.getElementById('changelog-iframe');
            if (!modal || !iframe) return;
            if (modal.style.display === 'flex' && !modal.classList.contains('closing')) return;
            modal.classList.remove('closing');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
            showNotification('正在加载更新日志...', 'info');
            iframe.src = 'changelog.html?t=' + Date.now();
            iframe.onload = function() { showNotification('更新日志已加载', 'success'); };
            iframe.onerror = function() { showNotification('加载更新日志失败', 'error'); };
        }
        function closeChangelogModal() {
            const modal = document.getElementById('changelog-modal');
            if (!modal) return;
            modal.classList.add('closing');
            setTimeout(() => {
                modal.style.display = 'none';
                modal.classList.remove('closing');
                document.body.classList.remove('modal-open');
                const iframe = document.getElementById('changelog-iframe');
                if (iframe) iframe.src = 'about:blank';
            }, 300);
        }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeChangelogModal(); });
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'closeModal') closeChangelogModal();
        });

        // ==================== 用户认证和头像 ====================
        async function initializeUserProfile() {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data: { user }, error } = await supabaseClient.auth.getUser();
                if (error || !user) {
                    updateNavbarFromCache();
                    return;
                }
                currentUser = user;
                const { data: profile } = await supabaseClient.from('user_profiles').select('username, avatar_url, avatar_frame').eq('id', user.id).single();
                if (profile) {
                    const username = profile.username || user.email.split('@')[0];
                    localStorage.setItem('cachedUsername', username);
                    if (profile.avatar_url) localStorage.setItem('cachedAvatar', profile.avatar_url);
                    if (profile.avatar_frame) localStorage.setItem('avatarFrame', profile.avatar_frame);
                    updateNavbar(username, profile.avatar_url, profile.avatar_frame);
                } else {
                    updateNavbarFromCache();
                }
            } catch (error) {
                console.error('用户初始化失败:', error);
                updateNavbarFromCache();
            }
        }
        function updateNavbarFromCache() {
            const cachedUsername = localStorage.getItem('cachedUsername');
            const cachedAvatar = localStorage.getItem('cachedAvatar');
            const avatarFrame = localStorage.getItem('avatarFrame') || 'default';
            if (cachedUsername) updateNavbar(cachedUsername, cachedAvatar, avatarFrame);
        }
        function updateNavbar(username, avatarUrl, avatarFrame = 'default') {
            const userNavSection = document.getElementById('userNavSection');
            if (!userNavSection) return;
            if (username) {
                const avatarLetter = username.charAt(0).toUpperCase();
                let avatarHtml = `<div class="user-avatar-with-frame" onclick="window.location.href='profile.html'" title="前往个人主页">
                    <div class="user-avatar-frame ${avatarFrame === 'horse' ? 'horse-frame' : 'default-frame'}"></div>
                    <div class="user-avatar-img">`;
                if (avatarUrl) {
                    avatarHtml += `<img src="${avatarUrl}" alt="${username}" onerror="this.onerror=null; this.style.display='none'; this.parentNode.innerHTML='<div class=\\'avatar-placeholder\\'>${avatarLetter}</div>';">`;
                } else {
                    avatarHtml += `<div class="avatar-placeholder">${avatarLetter}</div>`;
                }
                avatarHtml += `</div></div>`;
                userNavSection.innerHTML = `<div class="user-info-container">${avatarHtml}<span class="username">${username}</span><button class="logout-btn" onclick="logout()" title="退出登录"><i class="fas fa-sign-out-alt"></i> 退出</button></div>`;
            } else {
                userNavSection.innerHTML = `<a href="login-real.html" class="nav-link">登录/注册</a>`;
            }
        }
        async function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            if (supabaseClient) await supabaseClient.auth.signOut();
            localStorage.removeItem('cachedUsername');
            localStorage.removeItem('cachedAvatar');
            localStorage.removeItem('avatarFrame');
            updateNavbar(null, null);
            showNotification('已退出登录', 'success');
        }

        // ==================== 动态渲染函数 ====================
        async function loadAndRenderAll() {
            if (!supabaseClient) {
                console.warn('Supabase 客户端未初始化');
                return;
            }
            const [charRes, lcRes, matRes] = await Promise.all([
                supabaseClient.from('characters').select('*').order('display_order', { ascending: true }),
                supabaseClient.from('light_cones').select('*').order('display_order', { ascending: true }),
                supabaseClient.from('materials').select('*').order('display_order', { ascending: true })
            ]);
            if (!charRes.error && charRes.data) {
                renderCards(charRes.data, 'character-container', '角色');
            } else {
                console.error('角色加载失败', charRes.error);
                showNotification('角色数据加载失败', 'error');
            }
            if (!lcRes.error && lcRes.data) {
                renderCards(lcRes.data, 'lightcone-container', '光锥', 'lightcone-card');
            } else {
                console.error('光锥加载失败', lcRes.error);
            }
            if (!matRes.error && matRes.data) {
                renderCards(matRes.data, 'material-container', '材料', null, true);
            } else {
                console.error('材料加载失败', matRes.error);
            }
        }
        function renderCards(items, containerId, typeLabel, extraClass = '', isMaterial = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                let classNames = 'content-card';
                if (extraClass) classNames += ' ' + extraClass;
                if (isMaterial && item.rarity) {
                    classNames += ` material-${item.rarity}`;
                }
                card.className = classNames;
                card.setAttribute('data-type', typeLabel);
                card.setAttribute('data-name', item.name);
                card.setAttribute('data-desc', item.description || '');
                const detailUrl = item.detail_url || '#';
                card.onclick = () => jumpToDetail(detailUrl, item.name);
                const imgSrc = item.image_url || '';
                const imgHtml = `<div class="card-img skeleton"><img src="${imgSrc}" alt="${escapeHtml(item.name)}" loading="lazy" onload="imageLoaded(this)" onerror="imageError(this)"></div>`;
                const nameHtml = `<div class="card-name">${escapeHtml(item.name)}</div>`;
                const descHtml = `<div class="card-desc">${escapeHtml(item.description || '')}</div>`;
                card.innerHTML = imgHtml + nameHtml + descHtml;
                container.appendChild(card);
            });
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== 面包屑导航（完整配置，所有角色统一为“角色详情”） ====================
        (function() {
            // 配置：页面路径 -> 面包屑数组（从“首页”之后开始）
            const breadcrumbConfig = {
                // 根目录下的角色详情页
                '/yunli-detail.html':          ['角色详情', '云璃'],
                '/luguan-detail.html':         ['角色详情', '鹿将军'],
                '/pige-detail.html':           ['角色详情', '皮哥'],
                '/jiazijie-detail.html':       ['角色详情', '夹子姐'],
                '/han-detail.html':            ['角色详情', '涵'],
                '/yuzhiboyan-detail.html':     ['角色详情', '宇智波言'],
                '/banxierencheng-detail.html': ['角色详情', '半械人成'],
                '/meng-detail.html':           ['角色详情', '梦'],
                '/shenshengpige-detail.html':  ['角色详情', '神圣·皮哥'],
                '/tianmingrenhouge-detail.html':['角色详情', '天命人·猴哥'],
                // 子文件夹 2.0下~2.0终末
                '/2.0下~2.0终末/ying.html':    ['角色详情', '萤'],
                '/2.0下~2.0终末/goudan.html':  ['角色详情', '瑜哥'],
                '/2.0下~2.0终末/xiaomi.html':  ['角色详情', '小咪'],
                // 子文件夹 4.0~4.0终末
                '/4.0~4.0终末/maolaoda.html':  ['角色详情', '猫老大'],
                // 光锥详情页
                '/Light cone data/changjinglu.html': ['光锥列表', '快乐的路一天'],
                '/Light cone data/xiaomi.html':      ['光锥列表', '幻灵猫魅'],
                // 材料详情页
                '/materials_html/清风碎片.html':  ['养成材料', '清风碎片'],
                '/materials_html/御风晶片.html':  ['养成材料', '御风晶片'],
                '/materials_html/万风核心.html':  ['养成材料', '万风核心'],
                '/materials_html/纯白祈愿结晶.html': ['养成材料', '纯白祈愿结晶']
            };

            function getCurrentPath() {
                let path = window.location.pathname;
                path = decodeURIComponent(path);
                if (!path.startsWith('/')) path = '/' + path;
                return path;
            }

            function generateBreadcrumb() {
                const breadcrumbUl = document.getElementById('breadcrumb-list');
                if (!breadcrumbUl) return;

                const currentPath = getCurrentPath();
                const crumbs = breadcrumbConfig[currentPath];

                // 清空并重新构建
                breadcrumbUl.innerHTML = '';
                const homeLi = document.createElement('li');
                homeLi.innerHTML = '<a href="/">首页</a>';
                breadcrumbUl.appendChild(homeLi);

                if (!crumbs) {
                    // 未配置的页面只显示首页，可选最后一个元素显示文件名
                    const fileName = currentPath.split('/').pop() || '当前页面';
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="current">${escapeHtml(fileName)}</span>`;
                    breadcrumbUl.appendChild(li);
                    return;
                }

                for (let i = 0; i < crumbs.length; i++) {
                    const crumb = crumbs[i];
                    const li = document.createElement('li');
                    if (i === crumbs.length - 1) {
                        li.innerHTML = `<span class="current">${escapeHtml(crumb)}</span>`;
                    } else {
                        // 中间层暂时指向 #，如果有对应列表页可以修改该链接
                        li.innerHTML = `<a href="#">${escapeHtml(crumb)}</a>`;
                    }
                    breadcrumbUl.appendChild(li);
                }
            }

            document.addEventListener('DOMContentLoaded', generateBreadcrumb);
        })();

        // ==================== 页面初始化 ====================
        async function initializePage() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('login') === 'success') {
                const cleanUrl = window.location.href.split('?')[0];
                history.replaceState(null, '', cleanUrl);
                setTimeout(async () => {
                    if (supabaseClient) {
                        const { data: { session } } = await supabaseClient.auth.getSession();
                        if (session?.user) {
                            await initializeUserProfile();
                            showNotification('登录成功！', 'success');
                        } else {
                            setTimeout(async () => {
                                await initializeUserProfile();
                                showNotification('登录成功！', 'success');
                            }, 500);
                        }
                    } else {
                        try {
                            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                            await initializeUserProfile();
                            showNotification('登录成功！', 'success');
                        } catch(e) {}
                    }
                }, 200);
            }
            document.getElementById('year').textContent = new Date().getFullYear();
            initializeSiteAge();
            initializeSearch();
            initializeNavigation();
            updateNavbarFromCache();
            if (!supabaseClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
            await loadAndRenderAll();
            setTimeout(() => { document.getElementById('global-loading').style.display = 'none'; }, 800);
        }
        document.addEventListener('DOMContentLoaded', function() {
            updateNavbarFromCache();
            initializePage();
        });
    </script>
</body>
