                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;

        // ==================== 搜索功能 ====================
        function initializeSearch() {
            const searchInput = document.getElementById('search-input');
            const emptyResult = document.querySelector('.empty-result');
            const searchContainer = document.querySelector('.search-container');
            if (searchContainer && !document.querySelector('.search-clear')) {
                const clearBtn = document.createElement('span');
                clearBtn.className = 'search-clear';
                clearBtn.innerHTML = '✕';
                clearBtn.style.cssText = 'position:absolute; right:40px; top:50%; transform:translateY(-50%); cursor:pointer; color:#999; display:none; font-size:1.2rem;';
                clearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    searchInput.dispatchEvent(new Event('input'));
                    clearBtn.style.display = 'none';
                    searchInput.focus();
                });
                searchContainer.style.position = 'relative';
                searchContainer.appendChild(clearBtn);
                searchInput.addEventListener('input', () => {
                    clearBtn.style.display = searchInput.value ? 'block' : 'none';
                });
            }
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const keyword = this.value.trim().toLowerCase();
                    const activeSection = document.querySelector('.content-section.active');
                    if (!activeSection) return;
                    const cards = activeSection.querySelectorAll('.content-card');
                    let matchCount = 0;
                    cards.forEach(card => {
                        const name = card.dataset.name?.toLowerCase() || '';
                        const desc = card.dataset.desc?.toLowerCase() || '';
                        const isMatch = !keyword || name.includes(keyword) || desc.includes(keyword);
                        card.style.display = isMatch ? 'block' : 'none';
                        if (isMatch) matchCount++;
                    });
                    emptyResult.style.display = matchCount === 0 && keyword ? 'block' : 'none';
                }, 200);
            });
        }

            if (modal.style.display === 'flex' && !modal.classList.contains('closing')) return;
            modal.classList.remove('closing');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
            showNotification('正在加载更新日志...', 'info');
            iframe.src = 'changelog.html?t=' + Date.now();
            iframe.onload = function() { showNotification('更新日志已加载', 'success'); };
            iframe.onerror = function() { showNotification('加载更新日志失败', 'error'); };
        }
        function closeChangelogModal() {
            const modal = document.getElementById('changelog-modal');
            if (!modal) return;
            modal.classList.add('closing');
            setTimeout(() => {
                modal.style.display = 'none';
                modal.classList.remove('closing');
                document.body.classList.remove('modal-open');
                const iframe = document.getElementById('changelog-iframe');
                if (iframe) iframe.src = 'about:blank';
            }, 300);
        }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeChangelogModal(); });
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'closeModal') closeChangelogModal();
        });

        // ==================== 每日签到逻辑 ====================
        function getLocalDateString(date = new Date()) {
            return date.toLocaleDateString('sv-SE');
        }
        function getCheckinRewards(streak) {
            if(streak === 1) return { candy:3, rainbow:0, active:2 };
            if(streak === 2) return { candy:5, rainbow:0, active:2 };
            if(streak === 3) return { candy:7, rainbow:0, active:2 };
            if(streak === 4) return { candy:9, rainbow:0, active:2 };
            if(streak === 5) return { candy:10, rainbow:0, active:2 };
            if(streak === 6) return { candy:12, rainbow:0, active:2 };
            if(streak === 7) return { candy:15, rainbow:1, active:5 };
            if(streak >=8 && streak <=14) return { candy:10+Math.floor((streak-8)*2), rainbow:2, active:8 };
            if(streak === 15) return { candy:30, rainbow:5, active:15 };
            if(streak >=16 && streak <=29) return { candy:50, rainbow:10, active:10 };
            if(streak === 30) return { candy:100, rainbow:20, active:50 };
            return { candy:80, rainbow:15, active:20 };
        }

        async function performCheckin() {
            if (!currentUser) {
                showNotification('请先登录', 'error');
                return false;
            }
            let { data: stats, error: statsErr } = await supabaseClient
                .from('user_stats')
                .select('candy_crumbles, rainbow_lollipops, active_points, last_checkin_date, checkin_streak')
                .eq('user_id', currentUser.id)
                .single();
            if (statsErr && statsErr.code === 'PGRST116') {
                const { data: newStats } = await supabaseClient
                    .from('user_stats')
                    .insert({ user_id: currentUser.id, candy_crumbles: 100, rainbow_lollipops: 5, active_points: 0, last_checkin_date: null, checkin_streak: 0 })
                    .select()
                    .single();
                stats = newStats;
            } else if (statsErr) {
                showNotification('签到失败', 'error');
                return false;
            }
            let today = getLocalDateString();
            let last = stats.last_checkin_date;
            let newStreak = 1;
            if (last) {
                let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
                let yesterdayStr = getLocalDateString(yesterday);
                if (last === yesterdayStr) newStreak = (stats.checkin_streak || 0) + 1;
                else if (last !== today) newStreak = 1;
                else {
                    showNotification('今日已签到', 'warning');
                    return false;
                }
            }
            let rewards = getCheckinRewards(newStreak);
            let newCandy = (stats.candy_crumbles || 0) + rewards.candy;
            let newRainbow = (stats.rainbow_lollipops || 0) + rewards.rainbow;
            let newActive = (stats.active_points || 0) + rewards.active;
            let { error: updateErr } = await supabaseClient
                .from('user_stats')
                .update({
                    candy_crumbles: newCandy,
                    rainbow_lollipops: newRainbow,
                    active_points: newActive,
                    last_checkin_date: today,
                    checkin_streak: newStreak
                })
                .eq('user_id', currentUser.id);
            if (updateErr) {
                showNotification('签到失败', 'error');
                return false;
            }
            if (userStats) {
                userStats.candy_crumbles = newCandy;
                userStats.rainbow_lollipops = newRainbow;
                userStats.active_points = newActive;
                userStats.last_checkin_date = today;
                userStats.checkin_streak = newStreak;
                localStorage.setItem('cachedUserStats', JSON.stringify(userStats));
            }
            showNotification(`签到成功！获得 ${rewards.candy}🍬 ${rewards.rainbow>0?`+${rewards.rainbow}🌈 `:''}+${rewards.active}⚡`, 'success');
            return true;
        }

        // ==================== 用户认证和下拉菜单（固定定位 + 动态位置） ====================
        async function refreshUserState() {
            if (!supabaseClient) return;
            try {
                const { data: { user }, error } = await supabaseClient.auth.getUser();
                if (error || !user) {
                    currentUser = null;
                    userStats = null;
                    updateNavbar(null);
                    updateMenuUserInfo(null);
                    return;
                }
                currentUser = user;
                const { data: profile } = await supabaseClient.from('user_profiles').select('username, avatar_url').eq('id', user.id).single();
                if (profile) {
                    const username = profile.username || user.email.split('@')[0];
                    localStorage.setItem('cachedUsername', username);
                    if (profile.avatar_url) localStorage.setItem('cachedAvatar', profile.avatar_url);
                    updateNavbar(username, profile.avatar_url);
                    updateMenuUserInfo(username, profile.avatar_url, user.email);
                    const { data: stats } = await supabaseClient.from('user_stats').select('*').eq('user_id', user.id).single();
                    if (stats) {
                        userStats = stats;
                        localStorage.setItem('cachedUserStats', JSON.stringify(stats));
                    }
                } else {
                    updateNavbar(user.email.split('@')[0], null);
                    updateMenuUserInfo(user.email.split('@')[0], null, user.email);
                }
            } catch (err) {
                console.warn('refreshUserState error:', err);
                currentUser = null;
                userStats = null;
                updateNavbar(null);
                updateMenuUserInfo(null);
            }
        }

        async function initializeUserProfile() {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                await refreshUserState();
            } catch (error) {
                console.error('用户初始化失败:', error);
                currentUser = null;
                userStats = null;
                updateNavbar(null);
                updateMenuUserInfo(null);
            }
        }

        // 核心修复：动态计算下拉菜单位置并显示
        function showDropdownMenu(triggerElement, dropdown) {
            if (!triggerElement || !dropdown) return;
            const rect = triggerElement.getBoundingClientRect();
            const menuHeight = dropdown.offsetHeight;
            const viewportHeight = window.innerHeight;
            let top = rect.bottom + 8;  // 默认在触发器下方8px
            // 如果下方空间不足，则显示在上方
            if (top + menuHeight > viewportHeight && rect.top > menuHeight + 8) {
                top = rect.top - menuHeight - 8;
            }
            dropdown.style.top = top + 'px';
            dropdown.style.right = (window.innerWidth - rect.right) + 'px';
            dropdown.style.left = 'auto';
            dropdown.classList.add('show');
        }

        function updateNavbar(username, avatarUrl) {
            const userNavSection = document.getElementById('userNavSection');
            if (!userNavSection) return;
            const dropdown = document.getElementById('userDropdown');
            
            if (username) {
                const safeUsername = escapeHtml(username);
                const avatarLetter = safeUsername.charAt(0).toUpperCase();
                let avatarHtml = '';
                if (avatarUrl) {
                    avatarHtml = `<img src="${escapeHtml(avatarUrl)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" onerror="this.onerror=null; this.parentNode.innerHTML='<div style=\\'width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3ecf8e,#8a4baf);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;\\'>${avatarLetter}</div>';">`;
                } else {
                    avatarHtml = `<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3ecf8e,#8a4baf);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;">${avatarLetter}</div>`;
                }
                userNavSection.innerHTML = `
                    <div class="user-menu-trigger" id="userMenuTrigger">
                        ${avatarHtml}
                        <span>${safeUsername}</span>
                        <i class="fas fa-chevron-down" style="font-size: 0.8rem;"></i>
                    </div>
                `;
                
                if (dropdown) {
                    dropdown.style.display = '';
                    dropdown.classList.remove('show');
                }
                
                const trigger = document.getElementById('userMenuTrigger');
                if (trigger && !trigger._listenerAdded) {
                    trigger.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (!dropdown) return;
                        if (dropdown.classList.contains('show')) {
                            dropdown.classList.remove('show');
                        } else {
                            // 关闭其他可能打开的菜单
                            document.querySelectorAll('.user-dropdown.show').forEach(d => d.classList.remove('show'));
                            showDropdownMenu(trigger, dropdown);
                        }
                    });
                    trigger._listenerAdded = true;
                }
                
                // 全局关闭菜单（点击其他地方、滚动、窗口调整）
                if (!window._closeMenuBound) {
                    const closeMenuHandler = function(e) {
                        const trigger = document.getElementById('userMenuTrigger');
                        if (dropdown && trigger && !trigger.contains(e.target) && !dropdown.contains(e.target)) {
                            dropdown.classList.remove('show');
                        }
                    };
                    document.addEventListener('click', closeMenuHandler);
                    window.addEventListener('scroll', () => {
                        if (dropdown) dropdown.classList.remove('show');
                    });
                    window.addEventListener('resize', () => {
                        if (dropdown) dropdown.classList.remove('show');
                    });
                    window._closeMenuBound = true;
                }
            } else {
                userNavSection.innerHTML = `<a href="login-real.html" class="nav-link" id="loginLink">登录/注册</a>`;
                if (dropdown) {
                    dropdown.classList.remove('show');
                    dropdown.style.display = 'none';
                }
            }
        }

        function updateMenuUserInfo(username, avatarUrl, email) {
            const menuAvatar = document.getElementById('menuAvatar');
            const menuUsername = document.getElementById('menuUsername');
            const menuEmail = document.getElementById('menuEmail');
            if (!menuAvatar || !menuUsername || !menuEmail) return;
            if (username) {
                const avatarLetter = username.charAt(0).toUpperCase();
                if (avatarUrl) {
                    menuAvatar.innerHTML = `<img src="${escapeHtml(avatarUrl)}" alt="avatar" style="width:100%;height:100%;object-fit:cover;">`;
                } else {
                    menuAvatar.innerHTML = `<div class="avatar-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${avatarLetter}</div>`;
                }
                menuUsername.textContent = username;
                menuEmail.textContent = email || '';
                menuAvatar.style.cursor = 'pointer';
                menuAvatar.onclick = () => window.open('profile.html', '_blank');
            } else {
                menuAvatar.innerHTML = `<div class="avatar-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">U</div>`;
                menuUsername.textContent = '未登录';
                menuEmail.textContent = '点击登录';
                menuAvatar.onclick = () => window.location.href = 'login-real.html';
            }
        }

        function bindUserMenuActions() {
            const signinItem = document.getElementById('dailySigninItem');
            const logoutItem = document.getElementById('logoutItem');
            const signinModal = document.getElementById('signinModal');
            const logoutModal = document.getElementById('logoutModal');
            const confirmSignin = document.getElementById('confirmSigninBtn');
            const cancelSignin = document.getElementById('cancelSigninBtn');
            const confirmLogout = document.getElementById('confirmLogoutBtn');
            const cancelLogout = document.getElementById('cancelLogoutBtn');

            if (signinItem) {
                signinItem.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('userDropdown').classList.remove('show');
                    if (!currentUser) {
                        showNotification('请先登录', 'error');
                        return;
                    }
                    const rewardPreview = getCheckinRewards((userStats?.checkin_streak || 0) + 1);
                    const previewText = `签到可获得 🍬${rewardPreview.candy} ${rewardPreview.rainbow>0?`🌈+${rewardPreview.rainbow} `:''}⚡+${rewardPreview.active}`;
                    document.getElementById('signinRewardPreview').innerHTML = previewText;
                    signinModal.classList.add('active');
                };
            }
            if (confirmSignin) {
                confirmSignin.onclick = async () => {
                    signinModal.classList.remove('active');
                    await performCheckin();
                };
            }
            if (cancelSignin) {
                cancelSignin.onclick = () => signinModal.classList.remove('active');
            }
            if (logoutItem) {
                logoutItem.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('userDropdown').classList.remove('show');
                    if (!currentUser) {
                        showNotification('未登录', 'error');
                        return;
                    }
                    logoutModal.classList.add('active');
                };
            }
            if (confirmLogout) {
                confirmLogout.onclick = async () => {
                    logoutModal.classList.remove('active');
                    if (supabaseClient) await supabaseClient.auth.signOut();
                    localStorage.removeItem('cachedUsername');
                    localStorage.removeItem('cachedAvatar');
                    localStorage.removeItem('cachedUserProfile');
                    localStorage.removeItem('cachedUserStats');
                    currentUser = null;
                    userStats = null;
                    updateNavbar(null);
                    updateMenuUserInfo(null);
                    showNotification('已退出登录', 'success');
                    setTimeout(() => window.location.reload(), 500);
                };
            }
            if (cancelLogout) {
                cancelLogout.onclick = () => logoutModal.classList.remove('active');
            }
            document.querySelectorAll('.modal-mask').forEach(mask => {
                mask.addEventListener('click', (e) => {
                    if (e.target === mask) mask.classList.remove('active');
                });
            });
        }

        function setupLoginMessageListener() {
            window.addEventListener('message', (event) => {
                if (event.data === 'login_success') {
                    refreshUserState();
                    showNotification('登录成功', 'success');
                }
            });
        }

        // ==================== 动态渲染函数 ====================
        async function loadAndRenderAll() {
            if (!supabaseClient) {
                console.warn('Supabase 客户端未初始化');
                return;
            }
            const [charRes, lcRes, matRes] = await Promise.all([
                supabaseClient.from('characters').select('*').order('display_order', { ascending: true }),
                supabaseClient.from('light_cones').select('*').order('display_order', { ascending: true }),
                supabaseClient.from('materials').select('*').order('display_order', { ascending: true })
            ]);
            if (!charRes.error && charRes.data) {
                renderCards(charRes.data, 'character-container', '角色');
            } else {
                console.error('角色加载失败', charRes.error);
                showNotification('角色数据加载失败', 'error');
            }
            if (!lcRes.error && lcRes.data) {
                renderCards(lcRes.data, 'lightcone-container', '光锥', 'lightcone-card');
            } else {
                console.error('光锥加载失败', lcRes.error);
            }
            if (!matRes.error && matRes.data) {
                renderCards(matRes.data, 'material-container', '材料', null, true);
            } else {
                console.error('材料加载失败', matRes.error);
            }
        }
        function renderCards(items, containerId, typeLabel, extraClass = '', isMaterial = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                let classNames = 'content-card';
                if (extraClass) classNames += ' ' + extraClass;
                if (isMaterial && item.rarity) {
                    classNames += ` material-${item.rarity}`;
                }
                card.className = classNames;
                card.setAttribute('data-type', typeLabel);
                card.setAttribute('data-name', item.name);
                card.setAttribute('data-desc', item.description || '');
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
                const detailUrl = item.detail_url || '#';
                card.onclick = () => jumpToDetail(detailUrl, item.name);
                const imgSrc = item.image_url || '';
                const imgHtml = `<div class="card-img skeleton"><img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(item.name)}" loading="lazy" onload="imageLoaded(this)" onerror="imageError(this)"></div>`;
                const nameHtml = `<div class="card-name">${escapeHtml(item.name)}</div>`;
                const descHtml = `<div class="card-desc">${escapeHtml(item.description || '')}</div>`;
                card.innerHTML = imgHtml + nameHtml + descHtml;
                container.appendChild(card);
            });
        }

        // ==================== 侧滑菜单控制 ====================
        let isMenuOpen = false;
        function openMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            sideMenu.classList.add('open');
            overlay.classList.add('active');
            isMenuOpen = true;
            document.body.style.overflow = 'hidden';
        }
        function closeMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            sideMenu.classList.remove('open');
            overlay.classList.remove('active');
            isMenuOpen = false;
            document.body.style.overflow = '';
        }

        function switchContent(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId + 'Section').classList.add('active');
            document.querySelectorAll('.menu-item[data-section]').forEach(item => {
                if (item.dataset.section === sectionId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            closeMenu();
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
            }
            const emptyResult = document.querySelector('.empty-result');
            if (emptyResult) emptyResult.style.display = 'none';
        }

        // ==================== 跨页签同步 ====================
        function setupCrossTabSync() {
            window.addEventListener('storage', (e) => {
                if (e.key === 'cachedUsername' || e.key === 'cachedAvatar') {
                    refreshUserState();
                }
                if (e.key === 'forceRefreshUserState') {
                    refreshUserState();
                }
            });
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) refreshUserState();
            });
            window.addEventListener('pageshow', (event) => {
                if (event.persisted) refreshUserState();
            });
        }

        // ==================== 页面初始化 ====================
        async function initializePage() {
            document.getElementById('year').textContent = new Date().getFullYear();
            initializeSiteAge();
            initializeSearch();
            initializeNavigation();
            await initializeUserProfile();
            await loadAndRenderAll();
            setupCrossTabSync();
            setupLoginMessageListener();
            bindUserMenuActions();

            const menuToggle = document.getElementById('menuToggleBtn');
            const menuOverlay = document.getElementById('menuOverlay');
            menuToggle.addEventListener('click', openMenu);
            menuOverlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.menu-item[data-section]').forEach(item => {
                item.addEventListener('click', () => {
                    const section = item.dataset.section;
                    if (section) switchContent(section);
                });
            });
            const gachaItem = document.getElementById('menuGacha');
            if (gachaItem) {
                gachaItem.addEventListener('click', () => {
                    closeMenu();
                    window.open('chouka.html', '_blank');
                });
            }
            const changelogItem = document.getElementById('menuChangelog');
            if (changelogItem) {
                changelogItem.addEventListener('click', () => {
                    closeMenu();
                    openChangelogModal();
                });
            }
            const defaultMenuItem = document.querySelector('.menu-item[data-section="character"]');
            if (defaultMenuItem) defaultMenuItem.classList.add('active');

            setTimeout(() => { document.getElementById('global-loading').style.display = 'none'; }, 800);
        }
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
        });
    </script>
