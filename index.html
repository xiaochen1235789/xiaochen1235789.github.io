        // ==================== 签到奖励计算（与 profile.html 完全一致） ====================
        function getCheckinRewards(streak) {
            if (streak === 1) return { candy: 3, rainbow: 0, active: 2 };
            if (streak === 2) return { candy: 5, rainbow: 0, active: 2 };
            if (streak === 3) return { candy: 7, rainbow: 0, active: 2 };
            if (streak === 4) return { candy: 9, rainbow: 0, active: 2 };
            if (streak === 5) return { candy: 10, rainbow: 0, active: 2 };
            if (streak === 6) return { candy: 12, rainbow: 0, active: 2 };
            if (streak === 7) return { candy: 15, rainbow: 1, active: 5 };
            if (streak >= 8 && streak <= 14) return { candy: 10 + Math.floor((streak-8)*2), rainbow: 2, active: 8 };
            if (streak === 15) return { candy: 30, rainbow: 5, active: 15 };
            if (streak >= 16 && streak <= 29) return { candy: 50, rainbow: 10, active: 10 };
            if (streak === 30) return { candy: 100, rainbow: 20, active: 50 };
            if (streak >= 31) return { candy: 80, rainbow: 15, active: 20 };
            return { candy: 5, rainbow: 0, active: 1 };
        }

        async function performCheckin() {
            if (!currentUser) { showNotification('请先登录', 'error'); return; }
            if (!userStats) { showNotification('数据加载中，请稍后', 'warning'); return; }
            const today = new Date().toISOString().slice(0,10);
            if (userStats.last_checkin_date === today) {
                showNotification('今天已经签到过了！', 'warning');
                return;
            }
            // 计算连续签到天数
            let newStreak = 1;
            if (userStats.last_checkin_date) {
                const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().slice(0,10);
                if (userStats.last_checkin_date === yesterdayStr) {
                    newStreak = (userStats.checkin_streak || 0) + 1;
                }
            }
            const rewards = getCheckinRewards(newStreak);
            const newCandy = (userStats.candy_crumbles || 0) + rewards.candy;
            const newRainbow = (userStats.rainbow_lollipops || 0) + rewards.rainbow;
            const newActive = (userStats.active_points || 0) + rewards.active;

            try {
                const { error } = await supabaseClient.from('user_stats').update({
                    candy_crumbles: newCandy,
                    rainbow_lollipops: newRainbow,
                    active_points: newActive,
                    last_checkin_date: today,
                    checkin_streak: newStreak
                }).eq('user_id', currentUser.id);
                if (error) throw error;
                // 更新本地数据
                userStats.candy_crumbles = newCandy;
                userStats.rainbow_lollipops = newRainbow;
                userStats.active_points = newActive;
                userStats.last_checkin_date = today;
                userStats.checkin_streak = newStreak;
                // 显示签到结果
                let msg = `签到成功！获得 🍬${rewards.candy} 糖果碎`;
                if (rewards.rainbow > 0) msg += `，🌈+${rewards.rainbow} 超级棒糖`;
                msg += `，⚡+${rewards.active} 活跃度。连续签到 ${newStreak} 天！`;
                showNotification(msg, 'success');
                // 重新渲染菜单（更新签到按钮状态）
                closeMenu();
            } catch (err) {
                console.error(err);
                showNotification('签到失败：' + err.message, 'error');
            }
        }

        // ==================== 搜索功能 ====================
        function initializeSearch() {
            const searchInput = document.getElementById('search-input');
            const allCards = () => document.querySelectorAll('.content-card');
            const emptyResult = document.querySelector('.empty-result');
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const keyword = this.value.trim().toLowerCase();
                    let matchCount = 0;
                    allCards().forEach(card => {
                        const name = card.dataset.name?.toLowerCase() || '';
                        const desc = card.dataset.desc?.toLowerCase() || '';
                        const isMatch = !keyword || name.includes(keyword) || desc.includes(keyword);
                        card.style.display = isMatch ? 'block' : 'none';
                        if (isMatch) matchCount++;
                    });
                    emptyResult.style.display = matchCount === 0 && keyword ? 'block' : 'none';
                }, 200);
            });
        }

        // ==================== 导航 ====================
        function initializeNavigation() {
            const backToTopBtn = document.querySelector('.back-to-top');
            const navLinks = document.querySelectorAll('.nav-link');
            window.addEventListener('scroll', function() {
                backToTopBtn.classList.toggle('show', window.scrollY > 300);
                let currentSection = '';
                document.querySelectorAll('.section-header').forEach(section => {
                    if (window.scrollY >= section.offsetTop - 150) currentSection = section.id;
                });
                navLinks.forEach(link => link.classList.toggle('active', link.dataset.target === currentSection));
            });
            navLinks.forEach(link => {
                if (link.getAttribute('href').startsWith('#')) {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        const target = document.getElementById(targetId);
                        if (target) window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
                        history.pushState(null, null, `#${targetId}`);
                    });
                }
            });
        }

            const modal = document.getElementById('changelog-modal');
            const iframe = document.getElementById('changelog-iframe');
            if (!modal || !iframe) return;
            if (modal.style.display === 'flex' && !modal.classList.contains('closing')) return;
            modal.classList.remove('closing');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
            showNotification('正在加载更新日志...', 'info');
            iframe.src = 'changelog.html?t=' + Date.now();
            iframe.onload = function() { showNotification('更新日志已加载', 'success'); };
            iframe.onerror = function() { showNotification('加载更新日志失败', 'error'); };
        }
        function closeChangelogModal() {
            const modal = document.getElementById('changelog-modal');
            if (!modal) return;
            modal.classList.add('closing');
            setTimeout(() => {
                modal.style.display = 'none';
                modal.classList.remove('closing');
                document.body.classList.remove('modal-open');
                const iframe = document.getElementById('changelog-iframe');
                if (iframe) iframe.src = 'about:blank';
            }, 300);
        }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeChangelogModal(); });
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'closeModal') closeChangelogModal();
        });

        async function loadUserProfileAndStats() {
            if (!currentUser) return;
            // 获取 profile
            const { data: profile } = await supabaseClient.from('user_profiles').select('*').eq('id', currentUser.id).single();
            if (profile) currentProfile = profile;
            // 获取 stats
            let { data: stats } = await supabaseClient.from('user_stats').select('candy_crumbles, rainbow_lollipops, active_points, last_checkin_date, checkin_streak').eq('user_id', currentUser.id).single();
            if (!stats) {
                // 初始化 stats
                await supabaseClient.from('user_stats').upsert({ user_id: currentUser.id, candy_crumbles: 100, rainbow_lollipops: 5, active_points: 0, last_checkin_date: null, checkin_streak: 0 });
                stats = { candy_crumbles: 100, rainbow_lollipops: 5, active_points: 0, last_checkin_date: null, checkin_streak: 0 };
            }
            userStats = stats;
            localStorage.setItem('cachedUserStats', JSON.stringify(userStats));
        }

        async function initializeUserProfile() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if (error || !user) {
                updateNavbar(false);
                return;
            }
            currentUser = user;
            await loadUserProfileAndStats();
            updateNavbar(true);
        }

        function updateNavbar(isLoggedIn) {
            const userNavSection = document.getElementById('userNavSection');
            if (!userNavSection) return;
            if (!isLoggedIn || !currentUser) {
                userNavSection.innerHTML = `<a href="login-real.html" class="nav-link">登录/注册</a>`;
                return;
            }
            const username = currentProfile?.username || currentUser.email.split('@')[0];
            const avatarUrl = currentProfile?.avatar_url || localStorage.getItem('userAvatar');
            const avatarLetter = username.charAt(0).toUpperCase();
            let avatarHtml = '';
            if (avatarUrl) {
                avatarHtml = `<img src="${avatarUrl}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">`;
                avatarHtml += `<div class="avatar-placeholder" style="position:absolute;top:0;left:0;width:36px;height:36px;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#3ecf8e,#8a4baf);border-radius:50%;font-size:1rem;font-weight:600;">${avatarLetter}</div>`;
            } else {
                avatarHtml = `<div class="avatar-placeholder" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3ecf8e,#8a4baf);border-radius:50%;font-size:1rem;font-weight:600;">${avatarLetter}</div>`;
            }
            // 构建可点击区域（无退出按钮）
            userNavSection.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius);" id="userMenuTrigger">
                    <div style="position: relative; width: 36px; height: 36px;">
                        ${avatarHtml}
                    </div>
                    <span class="username" style="color: var(--text-highlight); font-weight: 600;">${username}</span>
                </div>
            `;
            const trigger = document.getElementById('userMenuTrigger');
            if (trigger) trigger.addEventListener('click', openUserMenu);
        }

        function updateNavbarFromCache() {
            const cachedUsername = localStorage.getItem('cachedUsername');
            if (cachedUsername) {
                // 如果有缓存，显示占位，但实际需要重新登录才真实有效
                const userNavSection = document.getElementById('userNavSection');
                if (userNavSection) {
                    userNavSection.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius);" id="userMenuTrigger">
                            <div class="avatar-placeholder" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3ecf8e,#8a4baf);border-radius:50%;font-size:1rem;font-weight:600;">${cachedUsername.charAt(0).toUpperCase()}</div>
                            <span class="username" style="color: var(--text-highlight); font-weight: 600;">${cachedUsername}</span>
                        </div>
                    `;
                    const trigger = document.getElementById('userMenuTrigger');
                    if (trigger) trigger.addEventListener('click', openUserMenu);
                }
            }
        }

        // ==================== 动态渲染函数（保持不变） ====================
        async function loadAndRenderAll() {
            if (!supabaseClient) {
                console.warn('Supabase 客户端未初始化');
                return;
            }
            const [charRes, lcRes, matRes] = await Promise.all([
                supabaseClient.from('characters').select('*').order('display_order', { ascending: true }),
                supabaseClient.from('light_cones').select('*').order('display_order', { ascending: true }),
                supabaseClient.from('materials').select('*').order('display_order', { ascending: true })
            ]);
            if (!charRes.error && charRes.data) {
                renderCards(charRes.data, 'character-container', '角色');
            } else {
                console.error('角色加载失败', charRes.error);
                showNotification('角色数据加载失败', 'error');
            }
            if (!lcRes.error && lcRes.data) {
                renderCards(lcRes.data, 'lightcone-container', '光锥', 'lightcone-card');
            } else {
                console.error('光锥加载失败', lcRes.error);
            }
            if (!matRes.error && matRes.data) {
                renderCards(matRes.data, 'material-container', '材料', null, true);
            } else {
                console.error('材料加载失败', matRes.error);
            }
        }
        function renderCards(items, containerId, typeLabel, extraClass = '', isMaterial = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                let classNames = 'content-card';
                if (extraClass) classNames += ' ' + extraClass;
                if (isMaterial && item.rarity) {
                    classNames += ` material-${item.rarity}`;
                }
                card.className = classNames;
                card.setAttribute('data-type', typeLabel);
                card.setAttribute('data-name', item.name);
                card.setAttribute('data-desc', item.description || '');
                const detailUrl = item.detail_url || '#';
                card.onclick = () => jumpToDetail(detailUrl, item.name);
                const imgSrc = item.image_url || '';
                const imgHtml = `<div class="card-img skeleton"><img src="${imgSrc}" alt="${escapeHtml(item.name)}" loading="lazy" onload="imageLoaded(this)" onerror="imageError(this)"></div>`;
                const nameHtml = `<div class="card-name">${escapeHtml(item.name)}</div>`;
                const descHtml = `<div class="card-desc">${escapeHtml(item.description || '')}</div>`;
                card.innerHTML = imgHtml + nameHtml + descHtml;
                container.appendChild(card);
            });
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== 页面初始化 ====================
        async function initializePage() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('login') === 'success') {
                const cleanUrl = window.location.href.split('?')[0];
                history.replaceState(null, '', cleanUrl);
                setTimeout(async () => {
                    await initializeUserProfile();
                    showNotification('登录成功！', 'success');
                }, 200);
            }
            document.getElementById('year').textContent = new Date().getFullYear();
            initializeSiteAge();
            initializeSearch();
            initializeNavigation();
            updateNavbarFromCache();
            await initializeUserProfile();
            await loadAndRenderAll();
            setTimeout(() => { document.getElementById('global-loading').style.display = 'none'; }, 800);
        }
        document.addEventListener('DOMContentLoaded', () => {
            updateNavbarFromCache();
            initializePage();
        });
    </script>
</body>
</html>
