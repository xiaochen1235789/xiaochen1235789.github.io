            <div class="attr-icon"><img src="https://xiaochen1235789.github.io/attribute_image/HP.webp" alt="生命"><div class="attr-value" id="base-hp">${C.baseStats.hp}</div><div class="attr-label">生命</div></div>
            <div class="attr-icon"><img src="https://xiaochen1235789.github.io/attribute_image/ATK.webp" alt="攻击"><div class="attr-value" id="base-atk">${C.baseStats.atk}</div><div class="attr-label">攻击</div></div>
            <div class="attr-icon"><img src="https://xiaochen1235789.github.io/attribute_image/DEF.webp" alt="防御"><div class="attr-value" id="base-def">${C.baseStats.def}</div><div class="attr-label">防御</div></div>
            <div class="attr-icon"><img src="https://xiaochen1235789.github.io/attribute_image/SPD.webp" alt="速度"><div class="attr-value" id="base-spd">${C.baseStats.spd}</div><div class="attr-label">速度</div></div>
            <div class="attr-icon"><img src="https://xiaochen1235789.github.io/attribute_image/ENERGY.webp" alt="能量"><div class="attr-value" id="base-energy">${C.baseStats.energy}</div><div class="attr-label">能量</div></div>
        `;

        // 行迹加成
        document.getElementById('trace-stats').innerHTML = C.traceStats.map(s => `
            <div class="attr-icon"><img src="https://xiaochen1235789.github.io/attribute_image/${s.icon}" alt="${s.label}"><div class="attr-value">${s.value}</div><div class="attr-label">${s.label}</div></div>
        `).join('');

        // 额外能力
        document.getElementById('extra-abilities-list').innerHTML = C.extraAbilities.map(a => `
            <div class="ability-item"><div class="ability-name">${a.name}</div><div class="ability-desc">${a.desc}</div></div>
        `).join('');

        // 星魂
        document.getElementById('constellation-body').innerHTML = C.constellations.map(c => `
            <tr><td>${c.level}</td><td>${c.name}</td><td>${c.effect}</td></tr>
        `).join('');

        // 技能
        const skillKeys = ['normal', 'skill', 'ultimate', 'talent'];
        skillKeys.forEach(key => {
            const skill = C.skills[key];
            if (!skill) return;
            document.getElementById(`${key}-name`).textContent = skill.name;
            document.getElementById(`${key}-desc`).innerHTML = skill.desc;
            document.getElementById(`${key}-level`).textContent = `1/${skill.maxLevel}`;
            const tbody = document.getElementById(`${key}-details`);
            if (tbody) {
                tbody.innerHTML = skill.details.map(d => `<tr><td>${d.label}</td><td>${d.value}</td></tr>`).join('');
            }
        });

        // 配队
        const tabsContainer = document.getElementById('teamTabs');
        const panelsContainer = document.getElementById('teamPanels');
        tabsContainer.innerHTML = C.teams.map((t, i) => `
            <button class="tab-btn ${i === 0 ? 'active' : ''}" data-team="${t.id}">${t.icon} ${t.name}</button>
        `).join('');
        panelsContainer.innerHTML = C.teams.map((t, i) => `
            <div class="team-panel ${i === 0 ? 'active' : ''}" data-team="${t.id}">
                <div class="team-roles">
                    ${t.roles.map(r => `
                        <div class="team-role">
                            <div class="team-avatar" data-role="${r.char}">
                                <span class="avatar-char">${r.initial}</span>
                                <span class="avatar-label">占位</span>
                            </div>
                            <div class="role-name">${r.char} · ${r.role}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="team-desc">
                    <strong>${t.icon} ${t.name}</strong> — ${t.desc}<br>
                    <span class="tag">核心</span> ${t.core}<br>
                    <span class="tag">生存</span> ${t.survival}
                </div>
                <div class="team-gear">
                    <span><span class="gear-label">🎯 推荐光锥：</span>${t.lightcone}</span>
                    <span><span class="gear-label">⚙️ 推荐遗器：</span>${t.relic}</span>
                </div>
            </div>
        `).join('');

        // ===== 材料系统 =====
        const MATERIALS = C.materials;
        const promotionStages = C.promotionStages;
        const baseStatsMap = C.baseStatsMap;
        const baseLevelPresets = C.baseLevelPresets;
        const storageKey = C.storageKey;

        // 技能状态
        const skillConfig = {};
        skillKeys.forEach(key => {
            const skill = C.skills[key];
            if (!skill) return;
            skillConfig[key] = {
                level: 1,
                maxLevel: skill.maxLevel,
                values: skill.values || []
            };
        });

        const state = {
            skills: JSON.parse(JSON.stringify(skillConfig)),
            baseLevel: 90
        };

        // 插值函数
        function interpolateStats(level) {
            if (level <= 1) return { ...baseStatsMap[1] };
            if (level >= 90) return { ...baseStatsMap[90] };
            let lower = 1, upper = 90;
            for (let i = 0; i < baseLevelPresets.length - 1; i++) {
                if (level >= baseLevelPresets[i] && level <= baseLevelPresets[i + 1]) {
                    lower = baseLevelPresets[i];
                    upper = baseLevelPresets[i + 1];
                    break;
                }
            }
            const lowStats = baseStatsMap[lower];
            const highStats = baseStatsMap[upper];
            const t = (level - lower) / (upper - lower);
            return {
                hp: Math.round(lowStats.hp + t * (highStats.hp - lowStats.hp)),
                atk: Math.round(lowStats.atk + t * (highStats.atk - lowStats.atk)),
                def: Math.round(lowStats.def + t * (highStats.def - lowStats.def))
            };
        }

        function getSkillValue(base, step, level) { return base + step * (level - 1); }

        function applyLevelColor(element, level, max) {
            if (level === max) {
                element.classList.add('legend-text');
                element.classList.remove('skill-val');
            } else {
                element.classList.remove('legend-text');
                element.classList.add('skill-val');
            }
        }

        function getMaterialByKey(key) {
            return MATERIALS[key] || { name: key, img: '' };
        }

        function getNextPromotionStage(currentLevel) {
            for (let stage of promotionStages) {
                if (currentLevel < stage.targetLevel) return stage;
            }
            return null;
        }

        function getConsumedStages(currentLevel) {
            return promotionStages.filter(stage => stage.targetLevel <= currentLevel);
        }

        // =============================================================
        // ★ 技能更新（suffix 方案）
        // =============================================================
        function updateSkillDisplay(skillType) {
            const skill = state.skills[skillType];
            const levelElement = document.getElementById(`${skillType}-level`);
            if (!levelElement) return;
            levelElement.textContent = `${skill.level}/${skill.maxLevel}`;
            applyLevelColor(levelElement, skill.level, skill.maxLevel);
            if (skill.values) {
                skill.values.forEach(valueData => {
                    const element = document.getElementById(valueData.id);
                    if (!element) return;
                    const newVal = getSkillValue(valueData.base, valueData.step, skill.level);
                    const suffix = valueData.suffix || '';
                    let displayVal;
                    if (suffix === '%') {
                        let numStr = Number.isInteger(newVal) ? newVal.toString() : newVal.toFixed(1);
                        if (numStr.endsWith('.0')) numStr = numStr.slice(0, -2);
                        displayVal = numStr + '%';
                    } else {
                        displayVal = Math.round(newVal).toString();
                    }
                    element.textContent = displayVal;
                    applyLevelColor(element, skill.level, skill.maxLevel);
                });
            }
        }

        function updateButtonState(skillType) {
            const skill = state.skills[skillType];
            const downBtn = document.getElementById(`${skillType}-down`);
            const upBtn = document.getElementById(`${skillType}-up`);
            if (downBtn) downBtn.disabled = skill.level <= 1;
            if (upBtn) upBtn.disabled = skill.level >= skill.maxLevel;
        }

        function initSkills() {
            Object.keys(state.skills).forEach(skillType => {
                updateSkillDisplay(skillType);
                updateButtonState(skillType);
            });
        }

        window.changeSkillLevel = function(skillType, change) {
            const skill = state.skills[skillType];
            if (!skill) return;
            const newLevel = skill.level + change;
            if (newLevel < 1 || newLevel > skill.maxLevel) return;
            skill.level = newLevel;
            updateSkillDisplay(skillType);
            updateButtonState(skillType);
            saveState();
        };

        // 材料更新
        function updatePromotionMaterials(currentLevel) {
            const container = document.getElementById('promotion-materials');
            const nextText = document.getElementById('promotion-next');
            if (!container) return;
            const nextStage = getNextPromotionStage(currentLevel);
            if (!nextStage) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">✨ 所有晋级已完成 ✨</div>';
                nextText.innerHTML = '';
            } else {
                let materialsHtml = '';
                for (let mat of nextStage.materials) {
                    const material = getMaterialByKey(mat.key);
                    let imgHtml = material.img ? `<img src="${material.img}" alt="${material.name}" onerror="this.parentNode.innerHTML='❓'">` : '<span style="font-size:28px;">💎</span>';
                    materialsHtml += `
                        <div class="material-item">
                            <div class="material-img">${imgHtml}</div>
                            <div class="material-name">${material.name}</div>
                            <div class="material-count">× ${mat.count}</div>
                        </div>
                    `;
                }
                container.innerHTML = materialsHtml;
                nextText.innerHTML = `⬆ 等级上限提高至 Lv.${nextStage.targetLevel + 10} 所需材料`;
            }
        }

        function updateConsumedMaterials(currentLevel) {
            const container = document.getElementById('consumed-materials');
            const titleEl = document.getElementById('consumed-title');
            if (!container) return;
            const consumedStages = getConsumedStages(currentLevel);
            if (currentLevel === 1 || consumedStages.length === 0) {
                if (titleEl) titleEl.textContent = '📜 已消耗材料（Lv.1）';
                container.innerHTML = '<div style="text-align:center; padding:20px;">暂无消耗</div>';
                return;
            }
            if (titleEl) titleEl.textContent = `📜 已消耗材料（Lv.1 → Lv.${currentLevel}）`;
            const total = {};
            for (let stage of consumedStages) {
                for (let mat of stage.materials) {
                    if (!total[mat.key]) total[mat.key] = { count: 0, key: mat.key };
                    total[mat.key].count += mat.count;
                }
            }
            let materialsHtml = '';
            for (let [key, info] of Object.entries(total)) {
                const material = getMaterialByKey(key);
                let imgHtml = material.img ? `<img src="${material.img}" alt="${material.name}" onerror="this.parentNode.innerHTML='❓'">` : '<span style="font-size:28px;">💎</span>';
                materialsHtml += `
                    <div class="material-item">
                        <div class="material-img">${imgHtml}</div>
                        <div class="material-name">${material.name}</div>
                        <div class="material-count">× ${info.count}</div>
                    </div>
                `;
            }
            container.innerHTML = materialsHtml;
        }

        // 基础属性更新
        function updateBaseAttributes(level) {
            state.baseLevel = level;
            document.getElementById('base-level-label').innerText = `基础属性 Lv.${level}`;
            document.getElementById('base-level-display').textContent = level;
            const slider = document.getElementById('base-level-slider');
            if (slider && slider.value != level) slider.value = level;
            const stats = interpolateStats(level);
            document.getElementById('base-hp').textContent = stats.hp;
            document.getElementById('base-atk').textContent = stats.atk;
            document.getElementById('base-def').textContent = stats.def;
            document.getElementById('base-spd').textContent = C.baseStats.spd;
            document.getElementById('base-energy').textContent = C.baseStats.energy;
            const downBtn = document.getElementById('base-level-down');
            const upBtn = document.getElementById('base-level-up');
            if (downBtn) downBtn.disabled = level <= 1;
            if (upBtn) upBtn.disabled = level >= 90;
            updatePromotionMaterials(level);
            updateConsumedMaterials(level);
        }

        function changeBaseLevel(direction) {
            let newLevel = state.baseLevel + direction;
            newLevel = Math.min(90, Math.max(1, newLevel));
            if (newLevel === state.baseLevel) return;
            updateBaseAttributes(newLevel);
            saveState();
        }

        // 本地存储
        function saveState() {
            try {
                const saveData = {
                    normal: state.skills.normal?.level || 1,
                    skill: state.skills.skill?.level || 1,
                    ultimate: state.skills.ultimate?.level || 1,
                    talent: state.skills.talent?.level || 1,
                    baseLevel: state.baseLevel
                };
                localStorage.setItem(storageKey, JSON.stringify(saveData));
            } catch (e) { console.warn('保存失败', e); }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(storageKey);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    ['normal', 'skill', 'ultimate', 'talent'].forEach(key => {
                        if (parsed[key] && state.skills[key]) {
                            state.skills[key].level = Math.min(parsed[key], state.skills[key].maxLevel);
                        }
                    });
                    if (parsed.baseLevel && parsed.baseLevel >= 1 && parsed.baseLevel <= 90) {
                        state.baseLevel = parsed.baseLevel;
                    }
                }
            } catch (e) {}
        }

        // 控件绑定
        function initBaseLevelControls() {
            const slider = document.getElementById('base-level-slider');
            const downBtn = document.getElementById('base-level-down');
            const upBtn = document.getElementById('base-level-up');
            if (slider) {
                slider.addEventListener('input', function(e) {
                    const val = parseInt(e.target.value, 10);
                    if (state.baseLevel !== val) {
                        updateBaseAttributes(val);
                        saveState();
                    }
                });
            }
            if (downBtn) downBtn.addEventListener('click', () => { changeBaseLevel(-1); saveState(); });
            if (upBtn) upBtn.addEventListener('click', () => { changeBaseLevel(1); saveState(); });
        }

        // 选项卡切换
        function setupGroupTabs() {
            const navItems = document.querySelectorAll('.sticky-nav .nav-item');
            const allCards = document.querySelectorAll('section.card[data-group]');

            function showGroup(group) {
                allCards.forEach(card => {
                    const cardGroup = card.getAttribute('data-group');
                    card.style.display = (cardGroup === group) ? '' : 'none';
                });
                navItems.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-group') === group);
                });
            }

            navItems.forEach(btn => {
                btn.addEventListener('click', function() {
                    const group = this.getAttribute('data-group');
                    if (!group) return;
                    showGroup(group);
                    const firstCard = document.querySelector(`section.card[data-group="${group}"]`);
                    if (firstCard) {
                        const navHeight = document.getElementById('stickyNav').offsetHeight || 60;
                        const top = firstCard.getBoundingClientRect().top + window.pageYOffset - navHeight - 12;
                        window.scrollTo({ top, behavior: 'smooth' });
                    }
                });
            });

            showGroup('base');
        }

        function setupTeamTabs() {
            const tabBtns = document.querySelectorAll('#teamTabs .tab-btn');
            const panels = document.querySelectorAll('#teamPanels .team-panel');
            if (!tabBtns.length || !panels.length) return;

            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const teamIndex = this.getAttribute('data-team');
                    if (teamIndex === null) return;
                    tabBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    panels.forEach(p => p.classList.remove('active'));
                    const targetPanel = document.querySelector(`#teamPanels .team-panel[data-team="${teamIndex}"]`);
                    if (targetPanel) targetPanel.classList.add('active');
                });
            });
        }

        // 辅助功能
        function setupBackTop() {
            const backTop = document.getElementById('backTop');
            if (!backTop) return;
            window.addEventListener('scroll', function() {
                backTop.classList.toggle('visible', window.pageYOffset > 400);
            });
            backTop.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function setupNavShadow() {
            const nav = document.getElementById('stickyNav');
            if (!nav) return;
            window.addEventListener('scroll', function() {
                nav.classList.toggle('scrolled', window.pageYOffset > 20);
            });
        }

        // 初始化
        function initPage() {
            loadState();
            initSkills();
            updateBaseAttributes(state.baseLevel);
            initBaseLevelControls();
            document.getElementById('year').textContent = new Date().getFullYear();

            setupGroupTabs();
            setupTeamTabs();
            setupBackTop();
            setupNavShadow();
        }

        document.addEventListener('DOMContentLoaded', initPage);
    })();
</script>
</body>
</html>
