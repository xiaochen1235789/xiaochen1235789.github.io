<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>六哥荣耀WIKI · 管理后台</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        /* 原有样式 + 新增杂项样式 */
        .log-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .log-filters input, .log-filters select {
            background: #2d3748;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: var(--radius);
        }
        .log-table {
            max-height: 500px;
            overflow-y: auto;
        }
        .log-table .data-table th {
            position: sticky;
            top: 0;
            background: #2a3a35;
        }
        .clear-logs-btn {
            background: #c41e3a;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            margin-left: 10px;
        }
        .clear-logs-btn:hover {
            background: #a01830;
        }
        .asset-item img {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            margin-right: 6px;
            border-radius: 4px;
        }
        .frame-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 8px 12px;
        }
        .frame-checkbox-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        .misc-section {
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 16px;
        }
        .misc-title {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: var(--text-highlight);
            border-left: 4px solid var(--special-color);
            padding-left: 12px;
        }
        .asset-control {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
        }
        .save-asset-btn, .save-frames-btn {
            background: var(--special-color);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #1a132e;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        .frames-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1 class="admin-title"><i class="fas fa-cog"></i> 六哥荣耀 · 管理后台</h1>
        <div>
            <span id="adminUserEmail" class="admin-email"></span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
        </div>
    </div>

    <div class="table-tabs">
        <button class="tab-btn active" data-tab="user">👥 用户管理</button>
        <button class="tab-btn" data-tab="characters">📖 角色管理</button>
        <button class="tab-btn" data-tab="light_cones">✨ 光锥管理</button>
        <button class="tab-btn" data-tab="materials">🧪 材料管理</button>
        <button class="tab-btn" data-tab="misc">📦 杂项管理</button>
        <button class="tab-btn" data-tab="gacha">🎲 抽卡配置</button>
        <button class="tab-btn" data-tab="logs">📜 使用日志</button>
    </div>

    <!-- 用户管理面板 -->
    <div id="user-panel" class="panel active-panel">
        <div class="toolbar">
            <input type="text" id="searchUsers" class="search-input" placeholder="搜索用户名...">
            <span style="color: var(--text-secondary);">总用户数: <span id="totalUsers">0</span></span>
        </div>
        <div id="usersListArea" class="table-container"><div class="loading">加载中...</div></div>
    </div>

    <!-- 角色管理面板 -->
    <div id="characters-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-characters" class="search-input" placeholder="搜索角色名...">
            <button class="add-btn" id="addCharacterBtn"><i class="fas fa-plus"></i> 添加角色</button>
        </div>
        <div id="characters-table-container" class="table-container"></div>
    </div>

    <!-- 光锥管理面板 -->
    <div id="light_cones-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-light_cones" class="search-input" placeholder="搜索光锥名...">
            <button class="add-btn" id="addLightconeBtn"><i class="fas fa-plus"></i> 添加光锥</button>

    <!-- 材料管理面板 -->

    <!-- 杂项管理面板 -->

        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-coins"></i> 用户资产调整</div>
            <div class="user-selector">
                <div class="form-field">
                    <label>选择用户</label>
                    <select id="miscUserSelect" class="form-select"></select>

            <div id="assetControlArea" class="asset-control"></div>

        <div class="misc-section">

            <div id="framesManagementArea"></div>
        </div>
        <!-- 称号管理会动态添加到此面板 -->
        <!-- 自动签到卡管理会动态添加到此面板 -->
    </div>

    <!-- 抽卡配置面板 -->
    <div id="gacha-panel" class="panel">
        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-calendar-alt"></i> 卡池管理</div>
            <div class="toolbar">
                <button class="add-btn" id="addBannerBtn"><i class="fas fa-plus"></i> 添加卡池</button>
            </div>
            <div id="bannersListArea" class="table-container"></div>
        </div>
        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-database"></i> 常驻五星角色池</div>
            <div class="toolbar">
                <button class="add-btn" id="addPermFiveBtn"><i class="fas fa-plus"></i> 添加角色</button>
            </div>
            <div id="permFiveListArea" class="table-container"></div>
        </div>
        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-star"></i> 四星角色池</div>
            <div class="toolbar">
                <button class="add-btn" id="addFourStarBtn"><i class="fas fa-plus"></i> 添加角色</button>
            </div>
            <div id="fourStarListArea" class="table-container"></div>
        </div>
        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-cube"></i> 三星物品池</div>
            <div class="toolbar">
                <button class="add-btn" id="addThreeStarBtn"><i class="fas fa-plus"></i> 添加物品</button>
            </div>
            <div id="threeStarListArea" class="table-container"></div>
        </div>
        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-sliders-h"></i> 全局概率配置</div>
            <div id="configArea" class="asset-control"></div>
            <button class="save-asset-btn" id="saveConfigBtn"><i class="fas fa-save"></i> 保存配置</button>

    <!-- 日志面板 -->
    <div id="logs-panel" class="panel">
        <div class="toolbar">
            <div class="log-filters">
                <input type="text" id="logSearch" placeholder="搜索操作人/目标/详情..." class="search-input" style="width:200px;">
                <select id="logActionFilter">
                    <option value="">所有操作类型</option>
                    <option value="修改用户角色">修改用户角色</option>
                    <option value="删除用户">删除用户</option>
                    <option value="添加角色">添加角色</option>
                    <option value="编辑角色">编辑角色</option>
                    <option value="删除角色">删除角色</option>
                    <option value="添加光锥">添加光锥</option>
                    <option value="编辑光锥">编辑光锥</option>
                    <option value="删除光锥">删除光锥</option>
                    <option value="添加材料">添加材料</option>
                    <option value="编辑材料">编辑材料</option>
                    <option value="删除材料">删除材料</option>
                    <option value="资产调整">资产调整</option>
                    <option value="头像框调整">头像框调整</option>
                    <option value="徽章调整">徽章调整</option>
                    <option value="自动签到卡调整">自动签到卡调整</option>
                    <option value="编辑卡池">编辑卡池</option>
                    <option value="添加卡池">添加卡池</option>
                    <option value="删除卡池">删除卡池</option>
                    <option value="修改抽卡全局配置">修改抽卡全局配置</option>
                    <option value="添加抽卡池项目">添加抽卡池项目</option>
                    <option value="编辑抽卡池项目">编辑抽卡池项目</option>
                    <option value="删除抽卡池项目">删除抽卡池项目</option>
                </select>
                <button class="clear-logs-btn" id="clearLogsBtn" style="background:#c41e3a;">清空日志(站长)</button>
            </div>
            <span style="color: var(--text-secondary);">共 <span id="totalLogs">0</span> 条记录</span>
        </div>
        <div id="logsListArea" class="table-container log-table"><div class="loading">加载日志中...</div></div>
    </div>
</div>

<!-- 共用模态框 -->
<div id="genericModal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">标题</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="modalForm" onsubmit="return false;">
                <div id="modalFields"></div>
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="save-btn" id="modalSubmitBtn">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const OWNER_ID = '2e617135-daa2-4619-a7df-dacd425da881';

    // 头像框列表
    const FRAMES_LIST = [
        { id: 'frame_default', name: '默认头像框' },
        { id: 'frame_gold', name: '黄金边框' },
        { id: 'frame_rainbow', name: '彩虹炫光' },
        { id: 'frame_diamond', name: '钻石星辰' },
        { id: 'frame_legend', name: '传奇霸主' }
    ];

    let supabaseAdmin = null;
    let currentUser = null;
    let currentUserRole = null;
    let allUsers = [];
    let currentDataCache = { characters: [], light_cones: [], materials: [] };
    let currentContentTable = null;
    let editingContentId = null;
    let editingUserId = null;

    let selectedMiscUserId = null;
    let currentUserFrames = [];

    // 抽卡配置相关变量
    let currentBanners = [];
    let currentPermFive = [];
    let currentFourStar = [];
    let currentThreeStar = [];

    const roleConfig = {
        owner: { name: '站长', class: 'role-owner' },
        admin: { name: '管理员', class: 'role-admin' },
        user:  { name: '普通用户', class: 'role-user' }
    };

    const TABLE_SCHEMA = {
        characters: { fields: [
            { name: 'name', label: '角色名', type: 'text', required: true },
            { name: 'description', label: '描述', type: 'text' },
            { name: 'element', label: '属性', type: 'text' },
            { name: 'path', label: '命途', type: 'text' },
            { name: 'rarity', label: '星级', type: 'number', default: 5 },
            { name: 'version', label: '版本', type: 'text' },
            { name: 'image_url', label: '图片URL', type: 'text' },
            { name: 'detail_url', label: '详情页URL', type: 'text' },
            { name: 'is_limited', label: '限定', type: 'checkbox', default: true },
            { name: 'display_order', label: '排序', type: 'number', default: 0 }
        ] },
        light_cones: { fields: [
            { name: 'name', label: '光锥名', type: 'text', required: true },
            { name: 'description', label: '描述', type: 'text' },
            { name: 'path', label: '命途', type: 'text' },
            { name: 'character_id', label: '关联角色ID', type: 'number' },
            { name: 'image_url', label: '图片URL', type: 'text' },
            { name: 'detail_url', label: '详情页URL', type: 'text' },
            { name: 'display_order', label: '排序', type: 'number', default: 0 }
        ] },
        materials: { fields: [
            { name: 'name', label: '材料名', type: 'text', required: true },
            { name: 'description', label: '描述', type: 'text' },
            { name: 'rarity', label: '稀有度(green/blue/purple/gold)', type: 'text' },
            { name: 'image_url', label: '图片URL', type: 'text' },
            { name: 'detail_url', label: '详情页URL', type: 'text' },
            { name: 'display_order', label: '排序', type: 'number', default: 0 }
        ] }
    };

    // ==================== 日志记录 ====================
    async function logAction(actionType, targetType, targetId, targetName, details) {
        if (!currentUser) return;
        try {
            await supabaseAdmin.from('admin_logs').insert({
                admin_id: currentUser.id,
                admin_email: currentUser.email,
                admin_role: currentUserRole,
                action_type: actionType,
                target_type: targetType,
                target_id: targetId,
                target_name: targetName,
                details: details
            });
        } catch(e) { console.warn('日志记录失败', e); }
        if (document.getElementById('logs-panel').classList.contains('active-panel')) refreshLogs();
    }

    async function refreshLogs() {
        if (!supabaseAdmin) return;
        let query = supabaseAdmin.from('admin_logs').select('*', { count: 'exact' }).order('created_at', { ascending: false });
        const searchVal = document.getElementById('logSearch')?.value.trim().toLowerCase();
        const actionFilter = document.getElementById('logActionFilter')?.value;
        if (searchVal) {
            query = query.or(`admin_email.ilike.%${searchVal}%,target_name.ilike.%${searchVal}%,details.ilike.%${searchVal}%`);
        }
        if (actionFilter) {
            query = query.eq('action_type', actionFilter);
        }
        const { data, error, count } = await query.range(0, 499);
        if (error) { console.error(error); return; }
        document.getElementById('totalLogs').innerText = count || 0;
        const logsContainer = document.getElementById('logsListArea');
        if (!data || data.length === 0) {
            logsContainer.innerHTML = '<div class="empty-data">暂无日志</div>';
            return;
        }
        let html = '<table class="data-table"><thead><tr><th>时间</th><th>操作人(角色)</th><th>操作类型</th><th>目标</th><th>详情</th></tr></thead><tbody>';
        for (const log of data) {
            const time = new Date(log.created_at).toLocaleString('zh-CN');
            const roleDisplay = log.admin_role === 'owner' ? '站长' : (log.admin_role === 'admin' ? '管理员' : '用户');
            html += `<tr>
                <td>${time}</td>
                <td>${escapeHtml(log.admin_email)}<br><span style="font-size:0.7rem;">(${roleDisplay})</span></td>
                <td>${escapeHtml(log.action_type)}</span></td>
                <td>${escapeHtml(log.target_name || log.target_type || '')}</td>
                <td>${escapeHtml(log.details || '')}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        logsContainer.innerHTML = html;
    }

    async function clearAllLogs() {
        if (currentUserRole !== 'owner') { showNotification('只有站长可以清空日志', 'error'); return; }
        if (!confirm('确定清空所有操作日志吗？此操作不可恢复。')) return;
        const { error } = await supabaseAdmin.from('admin_logs').delete().neq('id', 0);
        if (error) showNotification('清空失败', 'error');
        else { showNotification('日志已清空', 'success'); refreshLogs(); }
    }

    // ==================== 通用函数 ====================
    function showNotification(msg, type = 'info') {
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${escapeHtml(msg)}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.classList.add('show'), 10);
        setTimeout(() => { notif.classList.remove('show'); setTimeout(() => notif.remove(), 300); }, 3000);
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    function closeModal() {
        document.getElementById('genericModal').style.display = 'none';
        document.body.classList.remove('modal-open');
        editingContentId = null; editingUserId = null; currentContentTable = null;
    }
    function openModal(title, fieldsHtml) {
        const modal = document.getElementById('genericModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalFields').innerHTML = fieldsHtml;
        modal.style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    // 权限校验
    async function checkAuthAndRole() {
        supabaseAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data: { user }, error } = await supabaseAdmin.auth.getUser();
        if (error || !user) { showNotification('请先登录', 'error'); setTimeout(() => window.location.href = 'login-real.html', 1500); return false; }
        currentUser = user;
        if (currentUser.id === OWNER_ID) {
            await supabaseAdmin.from('user_profiles').update({ role: 'owner' }).eq('id', OWNER_ID);
            currentUserRole = 'owner';
        } else {
            const { data: profile } = await supabaseAdmin.from('user_profiles').select('role').eq('id', user.id).single();
            currentUserRole = profile?.role || 'user';
        }
        if (currentUserRole !== 'owner' && currentUserRole !== 'admin') { showNotification('无权限', 'error'); setTimeout(() => window.location.href = 'index.html', 1500); return false; }
        document.getElementById('adminUserEmail').innerText = user.email;
        return true;
    }

    // ==================== 用户管理 ====================
    async function fetchAllUsers() {
        const { data: profiles } = await supabaseAdmin.from('user_profiles').select('id, username, role, created_at').order('created_at', { ascending: false });
        const { data: stats } = await supabaseAdmin.from('user_stats').select('user_id, candy_crumbles, rainbow_lollipops, active_points, checkin_streak');
        const statsMap = new Map(stats?.map(s => [s.user_id, { candy: s.candy_crumbles ?? 100, rainbow: s.rainbow_lollipops ?? 5, active: s.active_points ?? 0, streak: s.checkin_streak ?? 0 }]));
        return profiles.map(p => ({ ...p, role: p.id === OWNER_ID ? 'owner' : p.role, candy_crumbles: statsMap.get(p.id)?.candy ?? 100, rainbow_lollipops: statsMap.get(p.id)?.rainbow ?? 5, active_points: statsMap.get(p.id)?.active ?? 0, streak: statsMap.get(p.id)?.streak ?? 0 }));
    }
    function renderUsersTable(users) {
        const container = document.getElementById('usersListArea');
        if (!users.length) { container.innerHTML = '<div class="empty-data">暂无用户</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>用户名</th><th>角色</th><th>糖果碎</th><th>超级棒糖</th><th>活跃度</th><th>连续签到</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
        users.forEach(u => {
            const roleInfo = roleConfig[u.role] || roleConfig.user;
            const createdDate = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '未知';
            const canEditRole = (currentUserRole === 'owner' && u.id !== OWNER_ID) || (currentUserRole === 'admin' && u.id !== OWNER_ID && u.id !== currentUser.id);
            const canDelete = (currentUserRole === 'owner' && u.id !== OWNER_ID && u.id !== currentUser.id);
            html += `<tr>
                <td><strong>${escapeHtml(u.username)}</strong><br><span style="font-size:0.7rem;">${u.id.slice(0,8)}...</span></td>
                <td><span class="role-badge ${roleInfo.class}">${roleInfo.name}</span></td>
                <td>🍬 ${u.candy_crumbles}</td>
                <td>🌈 ${u.rainbow_lollipops}</td>
                <td>⚡ ${u.active_points}</td>
                <td>🔥 ${u.streak}天</td>
                <td>${createdDate}</td>
                <td class="action-buttons">
                    ${canEditRole ? `<button class="edit-btn" onclick="openUserRoleModal('${u.id}', '${escapeHtml(u.username)}', '${u.role}')"><i class="fas fa-user-tag"></i> 改角色</button>` : ''}
                    ${canDelete ? `<button class="delete-btn" onclick="deleteUserById('${u.id}', '${escapeHtml(u.username)}')"><i class="fas fa-trash"></i> 删除</button>` : ''}
                </td>
            </tr>`;
        });
        html += '</tbody><table>';
        container.innerHTML = html;

    // ==================== 内容管理 ====================
    async function loadContentTable(table) {
        try {
            const { data, error } = await supabaseAdmin.from(table).select('*').order('display_order', { ascending: true });
            if (error) throw error;
            currentDataCache[table] = data || [];
            renderContentTable(table, currentDataCache[table]);
        } catch (err) { showNotification(`加载${table}失败`, 'error'); }
    }
    function renderContentTable(table, data) {
        const container = document.getElementById(`${table}-table-container`);
        if (!container) return;
        if (!data.length) { container.innerHTML = '<div class="empty-data">暂无数据，点击添加</div>'; return; }
        let headers = [];
        if (table === 'characters') headers = ['name', 'description', 'element', 'path', 'rarity', 'version', 'image_url', 'detail_url', 'is_limited', 'display_order'];
        else if (table === 'light_cones') headers = ['name', 'description', 'path', 'character_id', 'image_url', 'detail_url', 'display_order'];
        else headers = ['name', 'description', 'rarity', 'image_url', 'detail_url', 'display_order'];
        
        let html = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '<th>操作</th></tr></thead><tbody>';
        for (const row of data) {
            html += '<tr>';
            for (const h of headers) {
                let val = row[h];
                if (val === undefined || val === null) val = '';
                if (h === 'image_url' && val) val = `<img src="${escapeHtml(String(val))}" class="table-img" onerror="this.style.display='none'">`;
                else if (h === 'is_limited') val = val ? '是' : '否';
                else val = escapeHtml(String(val));
                html += `<td title="${val}">${val}</td>`;
            }
            html += `<td class="action-buttons">
                <button class="edit-btn" onclick="editContentItem('${table}', ${row.id})"><i class="fas fa-edit"></i> 编辑</button>
                <button class="delete-btn" onclick="deleteContentItem('${table}', ${row.id})"><i class="fas fa-trash"></i> 删除</button>
            </td></tr>`;
        }
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }
    function filterContentTable(table) {
        const input = document.getElementById(`search-${table}`);
        if (!input) return;
        const keyword = input.value.trim().toLowerCase();
        const data = currentDataCache[table] || [];
        if (!keyword) renderContentTable(table, data);
        else renderContentTable(table, data.filter(item => item.name && item.name.toLowerCase().includes(keyword)));
    }
    function showContentForm(table, existingData = null) {
        currentContentTable = table; editingContentId = existingData ? existingData.id : null;
        const schema = TABLE_SCHEMA[table];
        let fieldsHtml = '';
        schema.fields.forEach(f => {
            let value = existingData ? existingData[f.name] : (f.default !== undefined ? f.default : '');
            if (f.type === 'checkbox') value = value === true || value === 1;
            fieldsHtml += `<div class="form-field"><label>${f.label}</label>${f.type === 'checkbox' ? `<input type="checkbox" name="${f.name}" ${value ? 'checked' : ''}>` : `<input type="${f.type}" name="${f.name}" value="${escapeHtml(String(value ?? ''))}" ${f.required ? 'required' : ''}>`}</div>`;
        });
        openModal(existingData ? '编辑' + getTableChinese(table) : '添加' + getTableChinese(table), fieldsHtml);
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            for (let f of schema.fields) {
                if (f.type === 'checkbox') data[f.name] = formData.get(f.name) === 'on';
                else { let val = formData.get(f.name); if (f.type === 'number') val = val ? Number(val) : 0; data[f.name] = val ?? ''; }
            }
            try {
                let result;
                if (editingContentId) result = await supabaseAdmin.from(table).update(data).eq('id', editingContentId);
                else result = await supabaseAdmin.from(table).insert([data]);
                if (result.error) throw result.error;
                const actionType = editingContentId ? `编辑${getTableChinese(table)}` : `添加${getTableChinese(table)}`;
                const targetName = data.name || (existingData?.name || '');
                await logAction(actionType, table, editingContentId || '', targetName, JSON.stringify(data));
                showNotification(editingContentId ? '更新成功' : '添加成功', 'success');
                closeModal();
                await loadContentTable(table);
                filterContentTable(table);
            } catch (err) { showNotification('操作失败: ' + err.message, 'error'); }
        };
    }
    window.editContentItem = async (table, id) => {
        const { data, error } = await supabaseAdmin.from(table).select('*').eq('id', id).single();
        if (error) { showNotification('加载失败', 'error'); return; }
        showContentForm(table, data);
    };
    window.deleteContentItem = async (table, id) => {
        if (!confirm('确定删除？')) return;
        const { data: item } = await supabaseAdmin.from(table).select('name').eq('id', id).single();
        const targetName = item?.name || '未知';
        const { error } = await supabaseAdmin.from(table).delete().eq('id', id);
        if (error) showNotification('删除失败', 'error');
        else {
            showNotification('删除成功', 'success');
            await loadContentTable(table);
            filterContentTable(table);
            await logAction(`删除${getTableChinese(table)}`, table, id, targetName, `删除了 ${targetName}`);
        }
    };
    function getTableChinese(table) { const map = { characters: '角色', light_cones: '光锥', materials: '材料' }; return map[table] || table; }

    // ==================== 杂项管理 ====================
    async function loadUserFrames(userId) {
        if (!userId) return [];
        const { data, error } = await supabaseAdmin.from('user_frames').select('frame_id').eq('user_id', userId);
        if (error) return [];
        return data.map(d => d.frame_id);
    }
    async function updateUserFrames(userId, ownedFrameIds) {
        const existing = await loadUserFrames(userId);
        const toAdd = ownedFrameIds.filter(id => !existing.includes(id));
        const toRemove = existing.filter(id => !ownedFrameIds.includes(id) && id !== 'frame_default');
        for (const frameId of toAdd) {
            await supabaseAdmin.from('user_frames').upsert({ user_id: userId, frame_id: frameId, equipped: false, purchased_at: new Date().toISOString() }, { onConflict: 'user_id, frame_id', ignoreDuplicates: true });
        }
        for (const frameId of toRemove) {
            await supabaseAdmin.from('user_frames').delete().eq('user_id', userId).eq('frame_id', frameId);
        }
    }
    async function updateUserAssets(userId, candy, rainbow) {
        await supabaseAdmin.from('user_stats').upsert({ user_id: userId, candy_crumbles: candy, rainbow_lollipops: rainbow }, { onConflict: 'user_id' });
    }
    async function updateUserTitles(userId, titleIds) {
        const { data: current } = await supabaseAdmin.from('user_titles').select('title_id').eq('user_id', userId);
        const currentIds = new Set((current || []).map(t => t.title_id));
        const newIds = new Set(titleIds);
        const toAdd = titleIds.filter(id => !currentIds.has(id));
        const toRemove = (current || []).filter(t => !newIds.has(t.title_id)).map(t => t.title_id);
        for (const tid of toAdd) {
            await supabaseAdmin.from('user_titles').insert({ user_id: userId, title_id: tid });
        }
        if (toRemove.length) {
            await supabaseAdmin.from('user_titles').delete().eq('user_id', userId).in('title_id', toRemove);
        }
    }
    async function updateAutoSignCard(userId, hasCard) {
        if (hasCard) {
            await supabaseAdmin.from('user_auto_sign_card').upsert({ user_id: userId, owned: true }, { onConflict: 'user_id' });
        } else {
            await supabaseAdmin.from('user_auto_sign_card').delete().eq('user_id', userId);
        }
    }

        if (canEdit) {

                await updateUserFrames(userId, newOwned);

                splash_url: formData.get('splash_url'),
                caption: formData.get('caption'),
                start_time: new Date(formData.get('start_time')).toISOString(),
                end_time: new Date(formData.get('end_time')).toISOString(),
                display_order: parseInt(formData.get('display_order')) || 0
            };
            await supabaseAdmin.from('gacha_banners').update(data).eq('id', id);
            showNotification('卡池已更新', 'success');
            closeModal();
            loadBanners();
            await logAction('编辑卡池', 'gacha_banners', id, data.name, JSON.stringify(data));
        };
    };
    window.deleteBanner = async function(id) {
        if (!confirm('确定删除该卡池吗？')) return;
        await supabaseAdmin.from('gacha_banners').delete().eq('id', id);
        loadBanners();
        await logAction('删除卡池', 'gacha_banners', id, '', '');
    };
    async function addBanner() {
        const fieldsHtml = `
            <div class="form-field"><label>标识(banner_key)</label><input type="text" name="banner_key" required></div>
            <div class="form-field"><label>名称</label><input type="text" name="name" required></div>
            <div class="form-field"><label>副标题</label><input type="text" name="sub_name"></div>
            <div class="form-field"><label>UP五星角色名</label><input type="text" name="up_five_star" required></div>
            <div class="form-field"><label>立绘URL</label><input type="text" name="splash_url"></div>
            <div class="form-field"><label>说明文字</label><input type="text" name="caption"></div>
            <div class="form-field"><label>开始时间</label><input type="datetime-local" name="start_time" required></div>
            <div class="form-field"><label>结束时间</label><input type="datetime-local" name="end_time" required></div>
            <div class="form-field"><label>排序</label><input type="number" name="display_order" value="0"></div>
        `;
        openModal('添加卡池', fieldsHtml);
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = {
                banner_key: fd.get('banner_key'),
                name: fd.get('name'),
                sub_name: fd.get('sub_name'),
                up_five_star: fd.get('up_five_star'),
                splash_url: fd.get('splash_url'),
                caption: fd.get('caption'),
                start_time: new Date(fd.get('start_time')).toISOString(),
                end_time: new Date(fd.get('end_time')).toISOString(),
                display_order: parseInt(fd.get('display_order')) || 0,
                is_active: false
            };
            await supabaseAdmin.from('gacha_banners').insert([data]);
            showNotification('卡池已添加', 'success');
            closeModal();
            loadBanners();
            await logAction('添加卡池', 'gacha_banners', '', data.name, JSON.stringify(data));
        };
    }

    async function loadSimpleTable(tableName, nameField, containerId, sortField = 'sort_order') {
        const { data } = await supabaseAdmin.from(tableName).select('*').order(sortField);
        renderSimpleTable(containerId, data || [], nameField, tableName);
        return data || [];
    }
    function renderSimpleTable(containerId, data, nameField, tableName) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (!data.length) {
            container.innerHTML = '<div class="empty-data">暂无数据，点击添加</div>';
            return;
        }
        let html = '<table class="data-table"><thead><tr><th>名称</th><th>排序</th><th>操作</th></tr></thead><tbody>';
        for (const item of data) {
            html += `<tr>
                <td>${escapeHtml(item[nameField])}</td>
                <td>${item.sort_order}</td>
                <td class="action-buttons">
                    <button class="edit-btn" onclick="editSimpleItem('${tableName}', ${item.id}, '${nameField}', '${escapeHtml(item[nameField])}', ${item.sort_order})">编辑</button>
                    <button class="delete-btn" onclick="deleteSimpleItem('${tableName}', ${item.id})">删除</button>
                </td>
             </tr>`;
        }
        html += '</tbody></table><button class="add-btn btn-sm" onclick="addSimpleItem(\''+tableName+'\', \''+nameField+'\')" style="margin-top:10px;"><i class="fas fa-plus"></i> 添加</button>';
        container.innerHTML = html;
    }
    window.editSimpleItem = async function(tableName, id, nameField, currentName, currentOrder) {
        const fieldsHtml = `
            <div class="form-field"><label>名称</label><input type="text" name="name" value="${escapeHtml(currentName)}" required></div>
            <div class="form-field"><label>排序</label><input type="number" name="sort_order" value="${currentOrder}"></div>
        `;
        openModal('编辑项目', fieldsHtml);
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = { [nameField]: fd.get('name'), sort_order: parseInt(fd.get('sort_order')) || 0 };
            await supabaseAdmin.from(tableName).update(data).eq('id', id);
            showNotification('更新成功', 'success');
            closeModal();
            if (tableName === 'gacha_permanent_five') loadPermFive();
            else if (tableName === 'gacha_four_star') loadFourStar();
            else if (tableName === 'gacha_three_star') loadThreeStar();
            await logAction('编辑抽卡池项目', tableName, id, data[nameField], JSON.stringify(data));
        };
    };
    window.deleteSimpleItem = async function(tableName, id) {
        if (!confirm('确定删除吗？')) return;
        await supabaseAdmin.from(tableName).delete().eq('id', id);
        showNotification('删除成功', 'success');
        if (tableName === 'gacha_permanent_five') loadPermFive();
        else if (tableName === 'gacha_four_star') loadFourStar();
        else if (tableName === 'gacha_three_star') loadThreeStar();
        await logAction('删除抽卡池项目', tableName, id, '', '');
    };
    window.addSimpleItem = async function(tableName, nameField) {
        const fieldsHtml = `
            <div class="form-field"><label>名称</label><input type="text" name="name" required></div>
            <div class="form-field"><label>排序</label><input type="number" name="sort_order" value="0"></div>
        `;
        openModal('添加项目', fieldsHtml);
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = { [nameField]: fd.get('name'), sort_order: parseInt(fd.get('sort_order')) || 0 };
            await supabaseAdmin.from(tableName).insert([data]);
            showNotification('添加成功', 'success');
            closeModal();
            if (tableName === 'gacha_permanent_five') loadPermFive();
            else if (tableName === 'gacha_four_star') loadFourStar();
            else if (tableName === 'gacha_three_star') loadThreeStar();
            await logAction('添加抽卡池项目', tableName, '', data[nameField], JSON.stringify(data));
        };
    };
    async function loadPermFive() {
        const data = await loadSimpleTable('gacha_permanent_five', 'character_name', 'permFiveListArea');
        currentPermFive = data;
    }
    async function loadFourStar() {
        const data = await loadSimpleTable('gacha_four_star', 'character_name', 'fourStarListArea');
        currentFourStar = data;
    }
    async function loadThreeStar() {
        const data = await loadSimpleTable('gacha_three_star', 'item_name', 'threeStarListArea');
        currentThreeStar = data;
    }
    async function loadGachaConfig() {
        const { data } = await supabaseAdmin.from('gacha_config').select('*').single();
        if (!data) return;
        const configHtml = `
            <div class="asset-item">基础四星概率: <input type="number" id="cfg_base_rate" step="0.001" value="${data.base_rate_4}"></div>
            <div class="asset-item">五星保底: <input type="number" id="cfg_pity5" value="${data.pity_5_max}"></div>
            <div class="asset-item">四星保底: <input type="number" id="cfg_pity4" value="${data.pity_4_max}"></div>
            <div class="asset-item">软保底起始: <input type="number" id="cfg_soft" value="${data.soft_pity_start}"></div>
            <div class="asset-item">满命五星补偿: <input type="number" id="cfg_comp5" value="${data.compensation_5_overflow}"></div>
            <div class="asset-item">满命四星补偿: <input type="number" id="cfg_comp4" value="${data.compensation_4_overflow}"></div>
            <div class="asset-item">兑换比例: <input type="number" id="cfg_exchange" value="${data.exchange_rate}"></div>
        `;
        document.getElementById('configArea').innerHTML = configHtml;
    }
    async function saveGachaConfig() {
        const updates = {
            base_rate_4: parseFloat(document.getElementById('cfg_base_rate').value),
            pity_5_max: parseInt(document.getElementById('cfg_pity5').value),
            pity_4_max: parseInt(document.getElementById('cfg_pity4').value),
            soft_pity_start: parseInt(document.getElementById('cfg_soft').value),
            compensation_5_overflow: parseInt(document.getElementById('cfg_comp5').value),
            compensation_4_overflow: parseInt(document.getElementById('cfg_comp4').value),
            exchange_rate: parseInt(document.getElementById('cfg_exchange').value),
            updated_at: new Date().toISOString()
        };
        await supabaseAdmin.from('gacha_config').update(updates).eq('id', 1);
        showNotification('全局配置已保存', 'success');
        await logAction('修改抽卡全局配置', 'gacha_config', '1', 'system', JSON.stringify(updates));
    }

    // ==================== 标签页切换 ====================
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
        document.getElementById(`${tabId}-panel`).classList.add('active-panel');
        if (tabId === 'user') refreshUserList();
        else if (tabId === 'characters') loadContentTable('characters');
        else if (tabId === 'light_cones') loadContentTable('light_cones');
        else if (tabId === 'materials') loadContentTable('materials');
        else if (tabId === 'misc') { refreshMiscPanel(); initMiscPanel(); }
        else if (tabId === 'gacha') {
            loadBanners();
            loadPermFive();
            loadFourStar();
            loadThreeStar();
            loadGachaConfig();
            document.getElementById('saveConfigBtn').onclick = saveGachaConfig;
            document.getElementById('addBannerBtn').onclick = addBanner;
            document.getElementById('addPermFiveBtn').onclick = () => addSimpleItem('gacha_permanent_five', 'character_name');
            document.getElementById('addFourStarBtn').onclick = () => addSimpleItem('gacha_four_star', 'character_name');
            document.getElementById('addThreeStarBtn').onclick = () => addSimpleItem('gacha_three_star', 'item_name');
        }
        else if (tabId === 'logs') { refreshLogs(); }
    }

    function bindEvents() {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        document.getElementById('searchUsers').addEventListener('input', () => {
            const kw = document.getElementById('searchUsers').value.trim().toLowerCase();
            if (!kw) renderUsersTable(allUsers);
            else renderUsersTable(allUsers.filter(u => u.username.toLowerCase().includes(kw)));
        });
        ['characters', 'light_cones', 'materials'].forEach(t => {
            const input = document.getElementById(`search-${t}`);
            if (input) input.addEventListener('input', () => filterContentTable(t));
        });
        document.getElementById('addCharacterBtn').onclick = () => showContentForm('characters');
        document.getElementById('addLightconeBtn').onclick = () => showContentForm('light_cones');
        document.getElementById('addMaterialBtn').onclick = () => showContentForm('materials');
        document.getElementById('logoutBtn').onclick = async () => { await supabaseAdmin.auth.signOut(); window.location.href = 'index.html'; };
        document.getElementById('clearLogsBtn').onclick = () => clearAllLogs();
        document.getElementById('logSearch').addEventListener('input', () => refreshLogs());
        document.getElementById('logActionFilter').addEventListener('change', () => refreshLogs());
    }

    async function init() { 
        if (await checkAuthAndRole()) { 
            bindEvents(); 
            await refreshUserList(); 
        } 
    }
    init();
</script>
</body>
</html>
