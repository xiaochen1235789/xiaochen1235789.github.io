<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>六哥荣耀WIKI · 管理后台</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        /* 额外样式 */
        .table-container {
            overflow-x: auto;
            margin-top: 10px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
            background: var(--card-bg);
        }
        .data-table th, .data-table td {
            border: 1px solid var(--border-color);
            padding: 8px 10px;
            text-align: left;
            vertical-align: middle;
        }
        .data-table th {
            background: #2a3a35;
            color: var(--text-highlight);
            font-weight: 600;
        }
        .data-table tr:hover {
            background: rgba(129, 199, 132, 0.1);
        }
        .table-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }
        .empty-data {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        /* 杂项管理样式 */
        .misc-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .misc-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-highlight);
            margin-bottom: 15px;
            border-left: 4px solid #81c784;
            padding-left: 12px;
        }
        .user-selector {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .user-selector .form-field {
            flex: 1;
            min-width: 200px;
        }
        .asset-control {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .asset-item {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .asset-item img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .frame-checkbox-item {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .frame-checkbox-item:hover {
            background: rgba(129,199,132,0.2);
        }
        .frame-checkbox-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .frame-checkbox-item .frame-name {
            flex: 1;
            font-size: 0.9rem;
        }
        .save-asset-btn, .save-frames-btn {
            background: #81c784;
            color: #121212;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .save-asset-btn:hover, .save-frames-btn:hover {
            background: #6ab56f;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1 class="admin-title"><i class="fas fa-cog"></i> 六哥荣耀 · 管理后台</h1>
        <div>
            <span id="adminUserEmail" class="admin-email"></span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
        </div>
    </div>

    <div class="table-tabs">
        <button class="tab-btn active" data-tab="user">👥 用户管理</button>
        <button class="tab-btn" data-tab="characters">📖 角色管理</button>
        <button class="tab-btn" data-tab="light_cones">✨ 光锥管理</button>
        <button class="tab-btn" data-tab="materials">🧪 材料管理</button>
        <button class="tab-btn" data-tab="misc">📦 杂项管理</button>
    </div>

    <!-- 用户管理面板 -->
    <div id="user-panel" class="panel active-panel">
        <div class="toolbar">
            <input type="text" id="searchUsers" class="search-input" placeholder="搜索用户名...">
            <span style="color: var(--text-secondary);">总用户数: <span id="totalUsers">0</span></span>
        </div>
        <div id="usersListArea" class="table-container"><div class="loading">加载中...</div></div>
    </div>

    <!-- 角色管理面板 -->
    <div id="characters-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-characters" class="search-input" placeholder="搜索角色名...">
            <button class="add-btn" id="addCharacterBtn"><i class="fas fa-plus"></i> 添加角色</button>
        </div>
        <div id="characters-table-container" class="table-container"></div>
    </div>

    <!-- 光锥管理面板 -->
    <div id="light_cones-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-light_cones" class="search-input" placeholder="搜索光锥名...">
            <button class="add-btn" id="addLightconeBtn"><i class="fas fa-plus"></i> 添加光锥</button>
        </div>
        <div id="light_cones-table-container" class="table-container"></div>
    </div>

    <!-- 材料管理面板 -->
    <div id="materials-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-materials" class="search-input" placeholder="搜索材料名...">
            <button class="add-btn" id="addMaterialBtn"><i class="fas fa-plus"></i> 添加材料</button>
        </div>
        <div id="materials-table-container" class="table-container"></div>
    </div>

    <!-- 杂项管理面板 -->
    <div id="misc-panel" class="panel">
        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-coins"></i> 用户资产调整</div>
            <div class="user-selector">
                <div class="form-field">
                    <label>选择用户</label>
                    <select id="miscUserSelect" class="form-select"></select>
                </div>
            </div>
            <div id="assetControlArea" class="asset-control">
                <!-- 动态显示资产调整控件 -->
            </div>
        </div>

        <div class="misc-section">
            <div class="misc-title"><i class="fas fa-image"></i> 头像框拥有管理</div>
            <div id="framesManagementArea">
                <p style="color: var(--text-secondary);">请先选择一个用户</p>
            </div>
        </div>
    </div>
</div>

<!-- 模态框（共用） -->
<div id="genericModal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">标题</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="modalForm" onsubmit="return false;">
                <div id="modalFields"></div>
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="save-btn" id="modalSubmitBtn">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const OWNER_ID = '2e617135-daa2-4619-a7df-dacd425da881';

    // 头像框列表（与前台保持一致）
    const FRAMES_LIST = [
        { id: 'frame_default', name: '默认头像框', description: '初始边框', price_candy: 0, price_rainbow: 0 },
        { id: 'frame_gold', name: '黄金边框', description: '闪耀金色质感', price_candy: 50, price_rainbow: 0 },
        { id: 'frame_rainbow', name: '彩虹炫光', description: '七彩流光特效', price_candy: 30, price_rainbow: 3 },
        { id: 'frame_diamond', name: '钻石星辰', description: '璀璨钻石光环', price_candy: 100, price_rainbow: 5 },
        { id: 'frame_legend', name: '传奇霸主', description: '至尊传说之框', price_candy: 200, price_rainbow: 10 }
    ];

    let supabaseAdmin = null;
    let currentUser = null;
    let currentUserRole = null;
    let allUsers = [];
    let currentDataCache = { characters: [], light_cones: [], materials: [] };
    let currentContentTable = null;
    let editingContentId = null;
    let editingUserId = null;

    // 杂项管理相关
    let selectedMiscUserId = null;
    let currentUserFrames = [];

    const roleConfig = {
        owner: { name: '站长', class: 'role-owner' },
        admin: { name: '管理员', class: 'role-admin' },
        user:  { name: '普通用户', class: 'role-user' }
    };

    const TABLE_SCHEMA = {
        characters: { fields: [
            { name: 'name', label: '角色名', type: 'text', required: true },
            { name: 'description', label: '描述', type: 'text' },
            { name: 'element', label: '属性', type: 'text' },
            { name: 'path', label: '命途', type: 'text' },
            { name: 'rarity', label: '星级', type: 'number', default: 5 },
            { name: 'version', label: '版本', type: 'text' },
            { name: 'image_url', label: '图片URL', type: 'text' },
            { name: 'detail_url', label: '详情页URL', type: 'text' },
            { name: 'is_limited', label: '限定', type: 'checkbox', default: true },
            { name: 'display_order', label: '排序', type: 'number', default: 0 }
        ] },
        light_cones: { fields: [
            { name: 'name', label: '光锥名', type: 'text', required: true },
            { name: 'description', label: '描述', type: 'text' },
            { name: 'path', label: '命途', type: 'text' },
            { name: 'character_id', label: '关联角色ID', type: 'number' },
            { name: 'image_url', label: '图片URL', type: 'text' },
            { name: 'detail_url', label: '详情页URL', type: 'text' },
            { name: 'display_order', label: '排序', type: 'number', default: 0 }
        ] },
        materials: { fields: [
            { name: 'name', label: '材料名', type: 'text', required: true },
            { name: 'description', label: '描述', type: 'text' },
            { name: 'rarity', label: '稀有度(green/blue/purple/gold)', type: 'text' },
            { name: 'image_url', label: '图片URL', type: 'text' },
            { name: 'detail_url', label: '详情页URL', type: 'text' },
            { name: 'display_order', label: '排序', type: 'number', default: 0 }
        ] }
    };

    // ==================== 通用函数 ====================
    function showNotification(msg, type = 'info') {
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${escapeHtml(msg)}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.classList.add('show'), 10);
        setTimeout(() => { notif.classList.remove('show'); setTimeout(() => notif.remove(), 300); }, 3000);
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    function closeModal() {
        document.getElementById('genericModal').style.display = 'none';
        document.body.classList.remove('modal-open');
        editingContentId = null; editingUserId = null; currentContentTable = null;
    }
    function openModal(title, fieldsHtml) {
        const modal = document.getElementById('genericModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalFields').innerHTML = fieldsHtml;
        modal.style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    // 权限校验
    async function checkAuthAndRole() {
        supabaseAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data: { user }, error } = await supabaseAdmin.auth.getUser();
        if (error || !user) { showNotification('请先登录', 'error'); setTimeout(() => window.location.href = 'login-real.html', 1500); return false; }
        currentUser = user;
        if (currentUser.id === OWNER_ID) {
            await supabaseAdmin.from('user_profiles').update({ role: 'owner' }).eq('id', OWNER_ID);
            currentUserRole = 'owner';
        } else {
            const { data: profile } = await supabaseAdmin.from('user_profiles').select('role').eq('id', user.id).single();
            currentUserRole = profile?.role || 'user';
        }
        if (currentUserRole !== 'owner' && currentUserRole !== 'admin') { showNotification('无权限', 'error'); setTimeout(() => window.location.href = 'index.html', 1500); return false; }
        document.getElementById('adminUserEmail').innerText = user.email;
        return true;
    }

    // ==================== 用户管理 ====================
    async function fetchAllUsers() {
        const { data: profiles } = await supabaseAdmin.from('user_profiles').select('id, username, role, created_at').order('created_at', { ascending: false });
        const { data: stats } = await supabaseAdmin.from('user_stats').select('user_id, candy_crumbles, rainbow_lollipops, active_points, checkin_streak');
        const statsMap = new Map(stats?.map(s => [s.user_id, { candy: s.candy_crumbles ?? 100, rainbow: s.rainbow_lollipops ?? 5, active: s.active_points ?? 0, streak: s.checkin_streak ?? 0 }]));
        return profiles.map(p => ({ ...p, role: p.id === OWNER_ID ? 'owner' : p.role, candy_crumbles: statsMap.get(p.id)?.candy ?? 100, rainbow_lollipops: statsMap.get(p.id)?.rainbow ?? 5, active_points: statsMap.get(p.id)?.active ?? 0, streak: statsMap.get(p.id)?.streak ?? 0 }));
    }
    function renderUsersTable(users) {
        const container = document.getElementById('usersListArea');
        if (!users.length) { container.innerHTML = '<div class="empty-data">暂无用户</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>用户名</th><th>角色</th><th>糖果碎</th><th>超级棒糖</th><th>活跃度</th><th>连续签到</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
        users.forEach(u => {
            const roleInfo = roleConfig[u.role] || roleConfig.user;
            const createdDate = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '未知';
            const canEditRole = (currentUserRole === 'owner' && u.id !== OWNER_ID) || (currentUserRole === 'admin' && u.id !== OWNER_ID && u.id !== currentUser.id);
            const canDelete = (currentUserRole === 'owner' && u.id !== OWNER_ID && u.id !== currentUser.id);
            html += `<tr>
                <td><strong>${escapeHtml(u.username)}</strong><br><span style="font-size:0.7rem;">${u.id.slice(0,8)}...</span></td>
                <td><span class="role-badge ${roleInfo.class}">${roleInfo.name}</span></td>
                <td>🍬 ${u.candy_crumbles}</td>
                <td>🌈 ${u.rainbow_lollipops}</td>
                <td>⚡ ${u.active_points}</td>
                <td>🔥 ${u.streak}天</td>
                <td>${createdDate}</td>
                <td class="action-buttons">
                    ${canEditRole ? `<button class="edit-btn" onclick="openUserRoleModal('${u.id}', '${escapeHtml(u.username)}', '${u.role}')"><i class="fas fa-user-tag"></i> 改角色</button>` : ''}
                    ${canDelete ? `<button class="delete-btn" onclick="deleteUserById('${u.id}', '${escapeHtml(u.username)}')"><i class="fas fa-trash"></i> 删除</button>` : ''}
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
        document.getElementById('totalUsers').innerText = users.length;
    }
    async function refreshUserList() { try { allUsers = await fetchAllUsers(); renderUsersTable(allUsers); } catch(e) { showNotification('刷新失败', 'error'); } }
    window.openUserRoleModal = async (userId, username, currentRole) => {
        if (userId === OWNER_ID || userId === currentUser.id) { showNotification('无法修改此用户角色', 'error'); return; }
        editingUserId = userId;
        let selectOptions = `<option value="user" ${currentRole === 'user' ? 'selected' : ''}>普通用户</option><option value="admin" ${currentRole === 'admin' ? 'selected' : ''}>管理员</option>`;
        if (currentUserRole === 'owner') selectOptions += `<option value="owner" ${currentRole === 'owner' ? 'selected' : ''}>站长</option>`;
        openModal('修改用户角色', `<div class="form-field"><label>用户：${escapeHtml(username)}</label><select id="newRoleSelect" class="form-select">${selectOptions}</select></div>`);
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            const newRole = document.getElementById('newRoleSelect').value;
            if (newRole === currentRole) { closeModal(); return; }
            const { error } = await supabaseAdmin.from('user_profiles').update({ role: newRole }).eq('id', userId);
            if (error) showNotification('修改失败', 'error');
            else { showNotification('角色已更新', 'success'); await refreshUserList(); closeModal(); }
        };
    };
    window.deleteUserById = async (userId, username) => {
        if (userId === OWNER_ID || userId === currentUser.id) { showNotification('无法删除此用户', 'error'); return; }
        if (!confirm(`确定永久删除「${username}」吗？`)) return;
        await supabaseAdmin.from('user_stats').delete().eq('user_id', userId);
        await supabaseAdmin.from('user_profiles').delete().eq('id', userId);
        await supabaseAdmin.from('user_frames').delete().eq('user_id', userId);
        showNotification('已删除用户', 'success'); await refreshUserList(); 
        if (selectedMiscUserId === userId) refreshMiscPanel();
    };

    // ==================== 内容管理（角色/光锥/材料）====================
    async function loadContentTable(table) {
        try {
            const { data, error } = await supabaseAdmin.from(table).select('*').order('display_order', { ascending: true });
            if (error) throw error;
            currentDataCache[table] = data || [];
            renderContentTable(table, currentDataCache[table]);
        } catch (err) { showNotification(`加载${table}失败`, 'error'); }
    }
    function renderContentTable(table, data) {
        const container = document.getElementById(`${table}-table-container`);
        if (!container) return;
        if (!data.length) { container.innerHTML = '<div class="empty-data">暂无数据，点击添加</div>'; return; }
        let headers = [];
        if (table === 'characters') headers = ['name', 'description', 'element', 'path', 'rarity', 'version', 'image_url', 'detail_url', 'is_limited', 'display_order'];
        else if (table === 'light_cones') headers = ['name', 'description', 'path', 'character_id', 'image_url', 'detail_url', 'display_order'];
        else headers = ['name', 'description', 'rarity', 'image_url', 'detail_url', 'display_order'];
        
        let html = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '<th>操作</th></tr></thead><tbody>';
        for (const row of data) {
            html += '<tr>';
            for (const h of headers) {
                let val = row[h];
                if (val === undefined || val === null) val = '';
                if (h === 'image_url' && val) val = `<img src="${escapeHtml(String(val))}" class="table-img" onerror="this.style.display='none'">`;
                else if (h === 'is_limited') val = val ? '是' : '否';
                else val = escapeHtml(String(val));
                html += `<td title="${val}">${val}</td>`;
            }
            html += `<td class="action-buttons">
                <button class="edit-btn" onclick="editContentItem('${table}', ${row.id})"><i class="fas fa-edit"></i> 编辑</button>
                <button class="delete-btn" onclick="deleteContentItem('${table}', ${row.id})"><i class="fas fa-trash"></i> 删除</button>
            </td></tr>`;
        }
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }
    function filterContentTable(table) {
        const input = document.getElementById(`search-${table}`);
        if (!input) return;
        const keyword = input.value.trim().toLowerCase();
        const data = currentDataCache[table] || [];
        if (!keyword) renderContentTable(table, data);
        else renderContentTable(table, data.filter(item => item.name && item.name.toLowerCase().includes(keyword)));
    }
    function showContentForm(table, existingData = null) {
        currentContentTable = table; editingContentId = existingData ? existingData.id : null;
        const schema = TABLE_SCHEMA[table];
        let fieldsHtml = '';
        schema.fields.forEach(f => {
            let value = existingData ? existingData[f.name] : (f.default !== undefined ? f.default : '');
            if (f.type === 'checkbox') value = value === true || value === 1;
            fieldsHtml += `<div class="form-field"><label>${f.label}</label>${f.type === 'checkbox' ? `<input type="checkbox" name="${f.name}" ${value ? 'checked' : ''}>` : `<input type="${f.type}" name="${f.name}" value="${escapeHtml(String(value ?? ''))}" ${f.required ? 'required' : ''}>`}</div>`;
        });
        openModal(existingData ? '编辑' + getTableChinese(table) : '添加' + getTableChinese(table), fieldsHtml);
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            for (let f of schema.fields) {
                if (f.type === 'checkbox') data[f.name] = formData.get(f.name) === 'on';
                else { let val = formData.get(f.name); if (f.type === 'number') val = val ? Number(val) : 0; data[f.name] = val ?? ''; }
            }
            try {
                let result;
                if (editingContentId) result = await supabaseAdmin.from(table).update(data).eq('id', editingContentId);
                else result = await supabaseAdmin.from(table).insert([data]);
                if (result.error) throw result.error;
                showNotification(editingContentId ? '更新成功' : '添加成功', 'success');
                closeModal();
                await loadContentTable(table);
                filterContentTable(table);
            } catch (err) { showNotification('操作失败: ' + err.message, 'error'); }
        };
    }
    window.editContentItem = async (table, id) => {
        const { data, error } = await supabaseAdmin.from(table).select('*').eq('id', id).single();
        if (error) { showNotification('加载失败', 'error'); return; }
        showContentForm(table, data);
    };
    window.deleteContentItem = async (table, id) => {
        if (!confirm('确定删除？')) return;
        const { error } = await supabaseAdmin.from(table).delete().eq('id', id);
        if (error) showNotification('删除失败', 'error');
        else { showNotification('删除成功', 'success'); await loadContentTable(table); filterContentTable(table); }
    };
    function getTableChinese(table) { const map = { characters: '角色', light_cones: '光锥', materials: '材料' }; return map[table] || table; }

    // ==================== 杂项管理 ====================
    async function loadUserFrames(userId) {
        if (!userId) return [];
        const { data, error } = await supabaseAdmin.from('user_frames').select('frame_id').eq('user_id', userId);
        if (error) return [];
        return data.map(d => d.frame_id);
    }

    async function updateUserFrames(userId, ownedFrameIds) {
        // 获取现有记录
        const existing = await loadUserFrames(userId);
        // 需要添加的：在 ownedFrameIds 中但不在 existing 中
        const toAdd = ownedFrameIds.filter(id => !existing.includes(id));
        // 需要删除的：在 existing 中但不在 ownedFrameIds 中（注意，不能删除默认框）
        const toRemove = existing.filter(id => !ownedFrameIds.includes(id) && id !== 'frame_default');
        
        // 逐个添加（使用 upsert 避免重复）
        for (const frameId of toAdd) {
            await supabaseAdmin.from('user_frames').upsert({
                user_id: userId,
                frame_id: frameId,
                equipped: false,
                purchased_at: new Date().toISOString()
            }, { onConflict: 'user_id, frame_id', ignoreDuplicates: true });
        }
        // 删除移除的项（但跳过默认框）
        for (const frameId of toRemove) {
            await supabaseAdmin.from('user_frames').delete().eq('user_id', userId).eq('frame_id', frameId);
        }
    }

    async function updateUserAssets(userId, candy, rainbow) {
        await supabaseAdmin.from('user_stats').upsert({
            user_id: userId,
            candy_crumbles: candy,
            rainbow_lollipops: rainbow
        }, { onConflict: 'user_id' });
    }

    async function refreshMiscPanel() {
        const selectEl = document.getElementById('miscUserSelect');
        if (!selectEl) return;
        const users = allUsers.length ? allUsers : await fetchAllUsers();
        if (!allUsers.length) allUsers = users;
        selectEl.innerHTML = '<option value="">-- 选择用户 --</option>' + users.map(u => `<option value="${u.id}" ${selectedMiscUserId === u.id ? 'selected' : ''}>${escapeHtml(u.username)} (${u.id.slice(0,8)})</option>`).join('');
        if (selectedMiscUserId) {
            await loadMiscUserData(selectedMiscUserId);
        } else {
            document.getElementById('assetControlArea').innerHTML = '<p style="color: var(--text-secondary);">请选择用户</p>';
            document.getElementById('framesManagementArea').innerHTML = '<p style="color: var(--text-secondary);">请选择用户</p>';
        }
    }

    async function loadMiscUserData(userId) {
        if (!userId) return;
        // 获取用户资产
        const { data: stats } = await supabaseAdmin.from('user_stats').select('candy_crumbles, rainbow_lollipops').eq('user_id', userId).single();
        const candy = stats?.candy_crumbles ?? 100;
        const rainbow = stats?.rainbow_lollipops ?? 5;
        // 获取用户拥有的头像框
        currentUserFrames = await loadUserFrames(userId);
        if (!currentUserFrames.includes('frame_default')) currentUserFrames.push('frame_default');
        
        // 渲染资产调整控件
        const assetHtml = `
            <div class="asset-item"><img src="https://xiaochen1235789.github.io/images/Crushed_sugar.webp" alt="糖果碎">糖果碎: <input type="number" id="miscCandy" value="${candy}" min="0" style="width:100px; background:#1e2a2a; border:1px solid #3e5a5a; border-radius:8px; padding:4px 8px; color:#fff;"></div>
            <div class="asset-item"><img src="https://xiaochen1235789.github.io/images/Super_Sweet.webp" alt="超级棒糖">超级棒糖: <input type="number" id="miscRainbow" value="${rainbow}" min="0" style="width:100px; background:#1e2a2a; border:1px solid #3e5a5a; border-radius:8px; padding:4px 8px; color:#fff;"></div>
            <button class="save-asset-btn" id="saveAssetBtn"><i class="fas fa-save"></i> 保存资产修改</button>
        `;
        document.getElementById('assetControlArea').innerHTML = assetHtml;
        document.getElementById('saveAssetBtn')?.addEventListener('click', async () => {
            const newCandy = parseInt(document.getElementById('miscCandy').value, 10);
            const newRainbow = parseInt(document.getElementById('miscRainbow').value, 10);
            if (isNaN(newCandy) || isNaN(newRainbow) || newCandy < 0 || newRainbow < 0) {
                showNotification('请输入非负整数', 'error');
                return;
            }
            await updateUserAssets(userId, newCandy, newRainbow);
            showNotification('资产已更新', 'success');
            await refreshUserList();
            await loadMiscUserData(userId);
        });
        
        // 渲染头像框管理
        let framesHtml = '<div class="frames-grid">';
        for (const frame of FRAMES_LIST) {
            const isOwned = currentUserFrames.includes(frame.id);
            const disabledAttr = (frame.id === 'frame_default') ? 'disabled ' : '';
            framesHtml += `
                <label class="frame-checkbox-item">
                    <input type="checkbox" class="frame-checkbox" data-frame-id="${frame.id}" ${isOwned ? 'checked' : ''} ${disabledAttr}>
                    <div class="frame-name">${escapeHtml(frame.name)}</div>
                    ${frame.id === 'frame_default' ? '<span style="font-size:0.7rem;">(默认，不可取消)</span>' : ''}
                </label>
            `;
        }
        framesHtml += '</div><button class="save-frames-btn" id="saveFramesBtn"><i class="fas fa-save"></i> 保存头像框修改</button>';
        document.getElementById('framesManagementArea').innerHTML = framesHtml;
        
        document.getElementById('saveFramesBtn')?.addEventListener('click', async () => {
            const checkboxes = document.querySelectorAll('.frame-checkbox');
            const newOwned = [];
            checkboxes.forEach(cb => {
                if (cb.checked) newOwned.push(cb.dataset.frameId);
            });
            await updateUserFrames(userId, newOwned);
            showNotification('头像框拥有状态已更新', 'success');
            await loadMiscUserData(userId);
        });
    }

    function initMiscPanel() {
        const selectEl = document.getElementById('miscUserSelect');
        if (selectEl) {
            selectEl.addEventListener('change', async (e) => {
                selectedMiscUserId = e.target.value;
                if (selectedMiscUserId) {
                    await loadMiscUserData(selectedMiscUserId);
                } else {
                    document.getElementById('assetControlArea').innerHTML = '<p style="color: var(--text-secondary);">请选择用户</p>';
                    document.getElementById('framesManagementArea').innerHTML = '<p style="color: var(--text-secondary);">请选择用户</p>';
                }
            });
        }
        refreshMiscPanel();
    }

    // ==================== 标签页切换 ====================
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
        document.getElementById(`${tabId}-panel`).classList.add('active-panel');
        if (tabId === 'user') refreshUserList();
        else if (tabId === 'characters') loadContentTable('characters');
        else if (tabId === 'light_cones') loadContentTable('light_cones');
        else if (tabId === 'materials') loadContentTable('materials');
        else if (tabId === 'misc') { 
            refreshMiscPanel(); 
            initMiscPanel(); 
        }
    }

    function bindEvents() {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        document.getElementById('searchUsers').addEventListener('input', () => {
            const kw = document.getElementById('searchUsers').value.trim().toLowerCase();
            if (!kw) renderUsersTable(allUsers);
            else renderUsersTable(allUsers.filter(u => u.username.toLowerCase().includes(kw)));
        });
        ['characters', 'light_cones', 'materials'].forEach(t => {
            const input = document.getElementById(`search-${t}`);
            if (input) input.addEventListener('input', () => filterContentTable(t));
        });
        document.getElementById('addCharacterBtn').onclick = () => showContentForm('characters');
        document.getElementById('addLightconeBtn').onclick = () => showContentForm('light_cones');
        document.getElementById('addMaterialBtn').onclick = () => showContentForm('materials');
        document.getElementById('logoutBtn').onclick = async () => { await supabaseAdmin.auth.signOut(); window.location.href = 'index.html'; };
    }

    async function init() { 
        if (await checkAuthAndRole()) { 
            bindEvents(); 
            await refreshUserList(); 
        } 
    }
    init();
</script>
