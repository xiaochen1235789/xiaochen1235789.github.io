<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>六哥荣耀WIKI · 管理后台</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1 class="admin-title"><i class="fas fa-cog"></i> 六哥荣耀 · 管理后台</h1>
        <div>
            <span id="adminUserEmail" class="admin-email"></span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
        </div>
    </div>

    <div class="table-tabs">
        <button class="tab-btn active" data-tab="user">👥 用户管理</button>
        <button class="tab-btn" data-tab="characters">📖 角色管理</button>
        <button class="tab-btn" data-tab="lightcones">✨ 光锥管理</button>
        <button class="tab-btn" data-tab="materials">🧪 材料管理</button>
    </div>

    <div id="user-panel" class="panel active-panel">
        <div class="toolbar">
            <input type="text" id="searchUsers" class="search-input" placeholder="搜索用户名...">
            <span style="color: var(--text-secondary);">总用户数: <span id="totalUsers">0</span></span>
        </div>
        <div id="usersListArea" class="table-container"><div class="loading">加载中...</div></div>
    </div>

    <div id="characters-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-characters" class="search-input" placeholder="搜索角色名...">
            <button class="add-btn" id="addCharacterBtn"><i class="fas fa-plus"></i> 添加角色</button>
        </div>
        <div id="characters-table-container" class="table-container"></div>
    </div>

    <div id="lightcones-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-lightcones" class="search-input" placeholder="搜索光锥名...">
            <button class="add-btn" id="addLightconeBtn"><i class="fas fa-plus"></i> 添加光锥</button>
        </div>
        <div id="lightcones-table-container" class="table-container"></div>
    </div>

    <div id="materials-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-materials" class="search-input" placeholder="搜索材料名...">
            <button class="add-btn" id="addMaterialBtn"><i class="fas fa-plus"></i> 添加材料</button>
        </div>
        <div id="materials-table-container" class="table-container"></div>
    </div>
</div>

<div id="genericModal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">标题</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="modalForm" onsubmit="return false;">
                <div id="modalFields"></div>
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="save-btn" id="modalSubmitBtn">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ==================== Supabase 配置 ====================
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    
    let supabase;
    let currentUser = null;
    let currentUserRole = null;     // 'owner', 'admin', 'user'
    let allUsers = [];
    let currentDataCache = { characters: [], light_cones: [], materials: [] };
    
    let currentContentTable = null;
    let editingContentId = null;
    let editingUserId = null;
    
    const roleConfig = {
        owner: { name: '站长', class: 'role-owner' },
        admin: { name: '管理员', class: 'role-admin' },
        user:  { name: '普通用户', class: 'role-user' }
    };
    
    const TABLE_SCHEMA = {
        characters: {
            fields: [
                { name: 'name', label: '角色名', type: 'text', required: true },
                { name: 'description', label: '描述', type: 'text' },
                { name: 'element', label: '属性', type: 'text' },
                { name: 'path', label: '命途', type: 'text' },
                { name: 'rarity', label: '星级', type: 'number', default: 5 },
                { name: 'version', label: '版本', type: 'text' },
                { name: 'image_url', label: '图片URL', type: 'text' },
                { name: 'detail_url', label: '详情页URL', type: 'text' },
                { name: 'is_limited', label: '限定', type: 'checkbox', default: true },
                { name: 'display_order', label: '排序', type: 'number', default: 0 }
            ]
        },
        light_cones: {
            fields: [
                { name: 'name', label: '光锥名', type: 'text', required: true },
                { name: 'description', label: '描述', type: 'text' },
                { name: 'path', label: '命途', type: 'text' },
                { name: 'character_id', label: '关联角色ID', type: 'number' },
                { name: 'image_url', label: '图片URL', type: 'text' },
                { name: 'detail_url', label: '详情页URL', type: 'text' },
                { name: 'display_order', label: '排序', type: 'number', default: 0 }
            ]
        },
        materials: {
            fields: [
                { name: 'name', label: '材料名', type: 'text', required: true },
                { name: 'description', label: '描述', type: 'text' },
                { name: 'rarity', label: '稀有度(green/blue/purple/gold)', type: 'text' },
                { name: 'image_url', label: '图片URL', type: 'text' },
                { name: 'detail_url', label: '详情页URL', type: 'text' },
                { name: 'display_order', label: '排序', type: 'number', default: 0 }
            ]
        }
    };
    
    function showNotification(msg, type = 'info') {
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${escapeHtml(msg)}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.classList.add('show'), 10);
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    function closeModal() {
        document.getElementById('genericModal').style.display = 'none';
        document.body.classList.remove('modal-open');
        editingContentId = null;
        editingUserId = null;
        currentContentTable = null;
    }
    
    function openModal(title, fieldsHtml) {
        const modal = document.getElementById('genericModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalFields').innerHTML = fieldsHtml;
        modal.style.display = 'flex';
        document.body.classList.add('modal-open');
    }
    
    async function checkAuthAndRole() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data: { user }, error } = await supabase.auth.getUser();
        if (error || !user) {
            showNotification('请先登录', 'error');
            setTimeout(() => window.location.href = 'login-real.html', 1500);
            return false;
        }
        currentUser = user;
        const { data: profile } = await supabase.from('user_profiles').select('role').eq('id', user.id).single();
        currentUserRole = profile?.role || 'user';
        if (currentUserRole !== 'owner' && currentUserRole !== 'admin') {
            showNotification('无权限访问管理后台', 'error');
            setTimeout(() => window.location.href = 'index.html', 1500);
            return false;
        }
        document.getElementById('adminUserEmail').innerText = user.email;
        return true;
    }
    
    async function fetchAllUsers() {
        const { data: profiles, error } = await supabase
            .from('user_profiles')
            .select('id, username, role, avatar_url, created_at')
            .order('created_at', { ascending: false });
        if (error) throw error;
        const { data: stats } = await supabase.from('user_stats').select('user_id, candy_crumbles, rainbow_lollipops, active_points, checkin_streak');
        const statsMap = new Map();
        if (stats) stats.forEach(s => statsMap.set(s.user_id, { candy: s.candy_crumbles ?? 100, rainbow: s.rainbow_lollipops ?? 5, active: s.active_points ?? 0, streak: s.checkin_streak ?? 0 }));
        return profiles.map(p => ({
            ...p,
            candy_crumbles: statsMap.get(p.id)?.candy ?? 100,
            rainbow_lollipops: statsMap.get(p.id)?.rainbow ?? 5,
            active_points: statsMap.get(p.id)?.active ?? 0,
            streak: statsMap.get(p.id)?.streak ?? 0
        }));
    }
    
    function renderUsersTable(users) {
        const container = document.getElementById('usersListArea');
        if (!users.length) { container.innerHTML = '<div class="empty-data">暂无用户</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>用户名</th><th>角色</th><th>糖果碎 🍬</th><th>超级棒糖 🌈</th><th>活跃度</th><th>签到</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
        users.forEach(u => {
            const roleInfo = roleConfig[u.role] || roleConfig.user;
            const createdDate = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '未知';
            html += `<tr>
                <td><strong>${escapeHtml(u.username)}</strong><br><span style="font-size:0.7rem;">${u.id.slice(0,8)}...</span></td>
                <td><span class="role-badge ${roleInfo.class}">${roleInfo.name}</span></td>
                <td>🍬 ${u.candy_crumbles}</td>
                <td>🌈 ${u.rainbow_lollipops}</td>
                <td>⚡ ${u.active_points}</td>
                <td>🔥 ${u.streak}天</td>
                <td>${createdDate}</td>
                <td class="action-buttons">
                    <button class="edit-btn" onclick="openUserRoleModal('${u.id}', '${escapeHtml(u.username)}', '${u.role}')"><i class="fas fa-user-tag"></i> 改角色</button>
                    <button class="edit-btn" onclick="openUserResourceModal('${u.id}', '${escapeHtml(u.username)}', ${u.candy_crumbles}, ${u.rainbow_lollipops})"><i class="fas fa-coins"></i> 调资产</button>
                    ${currentUserRole === 'owner' && u.id !== currentUser.id ? `<button class="delete-btn" onclick="deleteUserById('${u.id}', '${escapeHtml(u.username)}')"><i class="fas fa-trash"></i> 删除</button>` : ''}
                </td>
            </tr>`;
        });
        html += '</tbody></td>';
        container.innerHTML = html;
        document.getElementById('totalUsers').innerText = users.length;
    }
    
    async function refreshUserList() {
        try {
            allUsers = await fetchAllUsers();
            renderUsersTable(allUsers);
        } catch (err) { showNotification('刷新用户列表失败', 'error'); }
    }
    
    window.openUserRoleModal = (userId, username, currentRole) => {
        editingUserId = userId;
        const selectOptions = `<option value="user" ${currentRole === 'user' ? 'selected' : ''}>普通用户</option>
                               <option value="admin" ${currentRole === 'admin' ? 'selected' : ''}>管理员</option>
                               ${currentUserRole === 'owner' ? `<option value="owner" ${currentRole === 'owner' ? 'selected' : ''}>站长</option>` : ''}`;
        const fields = `<div class="form-field"><label>用户：${escapeHtml(username)}</label>
                        <select id="newRoleSelect" class="form-select">${selectOptions}</select></div>`;
        openModal('修改用户角色', fields);
        const form = document.getElementById('modalForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const newRole = document.getElementById('newRoleSelect').value;
            if (newRole === currentRole) { closeModal(); return; }
            const { error } = await supabase.from('user_profiles').update({ role: newRole }).eq('id', userId);
            if (error) showNotification('修改失败', 'error');
            else { showNotification('角色已更新', 'success'); refreshUserList(); closeModal(); }
        };
    };
    
    window.openUserResourceModal = (userId, username, candy, rainbow) => {
        editingUserId = userId;
        const fields = `<div class="form-field"><label>用户：${escapeHtml(username)}</label></div>
                        <div class="form-field"><label>🍬 糖果碎</label><input type="number" id="candyVal" class="form-input-number" value="${candy}" min="0"></div>
                        <div class="form-field"><label>🌈 超级棒糖</label><input type="number" id="rainbowVal" class="form-input-number" value="${rainbow}" min="0"></div>`;
        openModal('调整用户资产', fields);
        const form = document.getElementById('modalForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const newCandy = parseInt(document.getElementById('candyVal').value, 10);
            const newRainbow = parseInt(document.getElementById('rainbowVal').value, 10);
            if (isNaN(newCandy) || isNaN(newRainbow) || newCandy < 0 || newRainbow < 0) {
                showNotification('请输入非负整数', 'error');
                return;
            }
            const { error } = await supabase.from('user_stats').upsert({ user_id: userId, candy_crumbles: newCandy, rainbow_lollipops: newRainbow }, { onConflict: 'user_id' });
            if (error) showNotification('更新失败', 'error');
            else { showNotification('资产已更新', 'success'); refreshUserList(); closeModal(); }
        };
    };
    
    window.deleteUserById = async (userId, username) => {
        if (!confirm(`确定要永久删除用户「${username}」吗？此操作不可恢复。`)) return;
        await supabase.from('user_stats').delete().eq('user_id', userId);
        const { error } = await supabase.from('user_profiles').delete().eq('id', userId);
        if (error) showNotification('删除失败', 'error');
        else { showNotification(`已删除用户 ${username}`, 'success'); refreshUserList(); }
    };
    
    async function loadContentTable(table) {
        try {
            const { data, error } = await supabase.from(table).select('*').order('display_order', { ascending: true });
            if (error) throw error;
            currentDataCache[table] = data || [];
            renderContentTable(table, currentDataCache[table]);
        } catch (err) {
            showNotification(`加载${table}失败`, 'error');
        }
    }
    
    function renderContentTable(table, data) {
        const container = document.getElementById(`${table}-table-container`);
        if (!container) return;
        if (!data.length) { container.innerHTML = '<div class="empty-data">暂无数据，点击添加</div>'; return; }
        let headers = [];
        if (table === 'characters') headers = ['name', 'description', 'element', 'path', 'rarity', 'version', 'image_url', 'detail_url', 'is_limited', 'display_order'];
        else if (table === 'light_cones') headers = ['name', 'description', 'path', 'character_id', 'image_url', 'detail_url', 'display_order'];
        else headers = ['name', 'description', 'rarity', 'image_url', 'detail_url', 'display_order'];
        
        let html = '<table class="data-table"><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '<th>操作</th></tr></thead><tbody>';
        for (const row of data) {
            html += '<tr>';
            for (const h of headers) {
                let val = row[h];
                if (val === undefined || val === null) val = '';
                if (h === 'image_url' && val) val = `<img src="${escapeHtml(String(val))}" class="table-img" onerror="this.style.display='none'">`;
                else if (h === 'is_limited') val = val ? '是' : '否';
                else val = escapeHtml(String(val));
                html += `<td>${val}</td>`;
            }
            html += `<td class="action-buttons">
                <button class="edit-btn" onclick="editContentItem('${table}', ${row.id})"><i class="fas fa-edit"></i> 编辑</button>
                <button class="delete-btn" onclick="deleteContentItem('${table}', ${row.id})"><i class="fas fa-trash"></i> 删除</button>
            </td>`;
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function filterContentTable(table) {
        const keyword = document.getElementById(`search-${table}`).value.trim().toLowerCase();
        const data = currentDataCache[table] || [];
        if (!keyword) renderContentTable(table, data);
        else renderContentTable(table, data.filter(item => item.name && item.name.toLowerCase().includes(keyword)));
    }
    
    function showContentForm(table, existingData = null) {
        currentContentTable = table;
        editingContentId = existingData ? existingData.id : null;
        const schema = TABLE_SCHEMA[table];
        if (!schema) return;
        let fieldsHtml = '';
        schema.fields.forEach(field => {
            let value = existingData ? existingData[field.name] : (field.default !== undefined ? field.default : '');
            if (field.type === 'checkbox') value = value === true || value === 1;
            const checkedAttr = (field.type === 'checkbox' && value) ? 'checked' : '';
            const inputHtml = field.type === 'checkbox' 
                ? `<input type="checkbox" name="${field.name}" ${checkedAttr}>`
                : `<input type="${field.type}" name="${field.name}" value="${escapeHtml(String(value ?? ''))}" ${field.required ? 'required' : ''}>`;
            fieldsHtml += `<div class="form-field"><label>${field.label}</label>${inputHtml}</div>`;
        });
        openModal(existingData ? '编辑' + getTableChinese(table) : '添加' + getTableChinese(table), fieldsHtml);
        const form = document.getElementById('modalForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = {};
            for (let field of schema.fields) {
                if (field.type === 'checkbox') data[field.name] = formData.get(field.name) === 'on';
                else {
                    let val = formData.get(field.name);
                    if (field.type === 'number') val = val ? Number(val) : 0;
                    data[field.name] = val === undefined ? '' : val;
                }
            }
            try {
                let result;
                if (editingContentId) result = await supabase.from(table).update(data).eq('id', editingContentId);
                else result = await supabase.from(table).insert([data]);
                if (result.error) throw result.error;
                showNotification(editingContentId ? '更新成功' : '添加成功', 'success');
                closeModal();
                await loadContentTable(table);
                filterContentTable(table);
            } catch (err) {
                showNotification('操作失败: ' + err.message, 'error');
            }
        };
    }
    
    window.editContentItem = async (table, id) => {
        const { data, error } = await supabase.from(table).select('*').eq('id', id).single();
        if (error) { showNotification('加载数据失败', 'error'); return; }
        showContentForm(table, data);
    };
    
    window.deleteContentItem = async (table, id) => {
        if (!confirm('确定删除吗？不可恢复')) return;
        const { error } = await supabase.from(table).delete().eq('id', id);
        if (error) showNotification('删除失败', 'error');
        else {
            showNotification('删除成功', 'success');
            await loadContentTable(table);
            filterContentTable(table);
        }
    };
    
    function getTableChinese(table) {
        const map = { characters: '角色', light_cones: '光锥', materials: '材料' };
        return map[table] || table;
    }
    
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
        document.getElementById(`${tabId}-panel`).classList.add('active-panel');
        if (tabId === 'user') refreshUserList();
        else if (tabId === 'characters') loadContentTable('characters');
        else if (tabId === 'lightcones') loadContentTable('light_cones');
        else if (tabId === 'materials') loadContentTable('materials');
    }
    
    function bindEvents() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        document.getElementById('searchUsers').addEventListener('input', () => {
            const kw = document.getElementById('searchUsers').value.trim().toLowerCase();
            if (!kw) renderUsersTable(allUsers);
            else renderUsersTable(allUsers.filter(u => u.username.toLowerCase().includes(kw)));
        });
        document.getElementById('search-characters').addEventListener('input', () => filterContentTable('characters'));
        document.getElementById('search-lightcones').addEventListener('input', () => filterContentTable('light_cones'));
        document.getElementById('search-materials').addEventListener('input', () => filterContentTable('materials'));
        document.getElementById('addCharacterBtn').onclick = () => showContentForm('characters');
        document.getElementById('addLightconeBtn').onclick = () => showContentForm('light_cones');
        document.getElementById('addMaterialBtn').onclick = () => showContentForm('materials');
        document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };
    }
    
    async function init() {
        if (!await checkAuthAndRole()) return;
        bindEvents();
        await refreshUserList();
    }
    init();
</script>
</body>
</html>
