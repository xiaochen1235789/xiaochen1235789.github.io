<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>管理后台 - 六哥荣耀WIKI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <!-- 后台专用样式（独立文件） -->
    <link rel="stylesheet" href="/css/admin.css">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1 class="admin-title"><i class="fas fa-cog"></i> 内容管理后台</h1>
        <div>
            <span id="adminUserEmail" class="admin-email"></span>
            <button class="logout-btn" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
        </div>
    </div>

    <div class="table-tabs">
        <button class="tab-btn active" data-table="characters">角色管理</button>
        <button class="tab-btn" data-table="light_cones">光锥管理</button>
        <button class="tab-btn" data-table="materials">材料管理</button>
    </div>

    <div id="characters-panel" class="panel active-panel">
        <div class="toolbar">
            <input type="text" id="search-characters" class="search-input" placeholder="搜索角色名...">
            <button class="add-btn" onclick="showAddForm('characters')"><i class="fas fa-plus"></i> 添加角色</button>
        </div>
        <div id="characters-table-container" class="table-container"></div>
    </div>

    <div id="light_cones-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-light_cones" class="search-input" placeholder="搜索光锥名...">
            <button class="add-btn" onclick="showAddForm('light_cones')"><i class="fas fa-plus"></i> 添加光锥</button>
        </div>
        <div id="light_cones-table-container" class="table-container"></div>
    </div>

    <div id="materials-panel" class="panel">
        <div class="toolbar">
            <input type="text" id="search-materials" class="search-input" placeholder="搜索材料名...">
            <button class="add-btn" onclick="showAddForm('materials')"><i class="fas fa-plus"></i> 添加材料</button>
        </div>
        <div id="materials-table-container" class="table-container"></div>
    </div>
</div>

<!-- 添加/编辑模态框 -->
<div id="form-modal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="closeFormModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="form-title">添加记录</h3>
            <button class="modal-close" onclick="closeFormModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="data-form" onsubmit="submitForm(event)">
                <div id="form-fields"></div>
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="closeFormModal()">取消</button>
                    <button type="submit" class="save-btn">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const ADMIN_EMAILS = ['1714400176@qq.com'];  // 管理员邮箱

    let supabaseAdmin = null;
    let currentAdminUser = null;
    let currentTable = 'characters';
    let editingId = null;
    let editingTable = null;
    let currentDataCache = {};

    // 表字段配置（不变）
    const TABLE_SCHEMA = {
        characters: {
            fields: [
                { name: 'name', label: '角色名', type: 'text', required: true },
                { name: 'description', label: '描述', type: 'text' },
                { name: 'element', label: '属性', type: 'text' },
                { name: 'path', label: '命途', type: 'text' },
                { name: 'rarity', label: '星级', type: 'number', default: 5 },
                { name: 'version', label: '版本', type: 'text' },
                { name: 'image_url', label: '图片URL', type: 'text' },
                { name: 'detail_url', label: '详情页URL', type: 'text' },
                { name: 'is_limited', label: '限定', type: 'checkbox', default: true },
                { name: 'display_order', label: '排序', type: 'number', default: 0 }
            ]
        },
        light_cones: {
            fields: [
                { name: 'name', label: '光锥名', type: 'text', required: true },
                { name: 'description', label: '描述', type: 'text' },
                { name: 'path', label: '命途', type: 'text' },
                { name: 'character_id', label: '关联角色ID', type: 'number' },
                { name: 'image_url', label: '图片URL', type: 'text' },
                { name: 'detail_url', label: '详情页URL', type: 'text' },
                { name: 'display_order', label: '排序', type: 'number', default: 0 }
            ]
        },
        materials: {
            fields: [
                { name: 'name', label: '材料名', type: 'text', required: true },
                { name: 'description', label: '描述', type: 'text' },
                { name: 'rarity', label: '稀有度(green/blue/purple/gold)', type: 'text' },
                { name: 'image_url', label: '图片URL', type: 'text' },
                { name: 'detail_url', label: '详情页URL', type: 'text' },
                { name: 'display_order', label: '排序', type: 'number', default: 0 }
            ]
        }
    };

    // ==================== 初始化 ====================
    async function initAdmin() {
        supabaseAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data: { user }, error } = await supabaseAdmin.auth.getUser();
        if (error || !user) {
            alert('请先登录');
            window.location.href = 'login-real.html';
            return;
        }
        currentAdminUser = user;
        if (!ADMIN_EMAILS.includes(user.email)) {
            alert('您没有管理员权限，请使用管理员账号登录');
            window.location.href = 'index.html';
            return;
        }
        document.getElementById('adminUserEmail').innerText = user.email;
        await loadTableData('characters');
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const table = btn.dataset.table;
                switchTable(table);
            });
        });
        document.getElementById('search-characters').addEventListener('input', () => filterTable('characters'));
        document.getElementById('search-light_cones').addEventListener('input', () => filterTable('light_cones'));
        document.getElementById('search-materials').addEventListener('input', () => filterTable('materials'));
    }

    async function switchTable(table) {
        currentTable = table;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.table === table);
        });
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
        document.getElementById(`${table}-panel`).classList.add('active-panel');
        await loadTableData(table);
    }

    async function loadTableData(table) {
        try {
            const { data, error } = await supabaseAdmin.from(table).select('*').order('display_order', { ascending: true });
            if (error) throw error;
            currentDataCache[table] = data || [];
            renderTable(table, currentDataCache[table]);
        } catch (err) {
            console.error(`加载${table}数据失败:`, err);
            showNotification(`加载${getTableChinese(table)}数据失败`, 'error');
        }
    }

    // 安全的渲染函数，避免任何因数据格式导致的崩溃
    function renderTable(table, data) {
        const container = document.getElementById(`${table}-table-container`);
        if (!container) return;
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-data">暂无数据，点击右上角添加</div>';
            return;
        }
        // 定义表头
        let headers = [];
        if (table === 'characters') headers = ['name', 'description', 'element', 'path', 'rarity', 'version', 'image_url', 'detail_url', 'is_limited', 'display_order'];
        else if (table === 'light_cones') headers = ['name', 'description', 'path', 'character_id', 'image_url', 'detail_url', 'display_order'];
        else headers = ['name', 'description', 'rarity', 'image_url', 'detail_url', 'display_order'];
        
        let html = '<table class="data-table"><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '<th>操作</th></tr></thead><tbody>';
        
        for (const row of data) {
            html += '<tr>';
            for (const h of headers) {
                let val = row[h];
                if (val === undefined || val === null) val = '';
                // 特殊处理图片和布尔值
                if (h === 'image_url' && val) {
                    val = `<img src="${escapeHtml(String(val))}" class="table-img" onerror="this.style.display='none'" alt="img">`;
                } else if (h === 'is_limited') {
                    val = val ? '是' : '否';
                } else {
                    val = escapeHtml(String(val));
                }
                html += `<td title="${val}">${val}</td>`;
            }
            html += `<td class="action-buttons">
                <button class="edit-btn" onclick="showEditForm('${table}', ${row.id})"><i class="fas fa-edit"></i> 编辑</button>
                <button class="delete-btn" onclick="deleteRecord('${table}', ${row.id})"><i class="fas fa-trash"></i> 删除</button>
            </td>`;
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // 辅助函数：转义HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function filterTable(table) {
        const keyword = document.getElementById(`search-${table}`).value.trim().toLowerCase();
        const data = currentDataCache[table] || [];
        if (!keyword) {
            renderTable(table, data);
        } else {
            const filtered = data.filter(item => item.name && item.name.toLowerCase().includes(keyword));
            renderTable(table, filtered);
        }
    }

    function showAddForm(table) {
        editingTable = table;
        editingId = null;
        document.getElementById('form-title').innerText = `添加${getTableChinese(table)}`;
        generateFormFields(table, null);
        document.getElementById('form-modal').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    async function showEditForm(table, id) {
        editingTable = table;
        editingId = id;
        const { data, error } = await supabaseAdmin.from(table).select('*').eq('id', id).single();
        if (error) {
            showNotification('加载数据失败', 'error');
            return;
        }
        document.getElementById('form-title').innerText = `编辑${getTableChinese(table)}`;
        generateFormFields(table, data);
        document.getElementById('form-modal').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function generateFormFields(table, existingData) {
        const schema = TABLE_SCHEMA[table];
        if (!schema) return;
        const container = document.getElementById('form-fields');
        container.innerHTML = '';
        schema.fields.forEach(field => {
            let value = existingData ? existingData[field.name] : (field.default !== undefined ? field.default : '');
            if (field.type === 'checkbox') value = value === true || value === 'on' || value === 1;
            const div = document.createElement('div');
            div.className = 'form-field';
            div.innerHTML = `
                <label>${escapeHtml(field.label)}</label>
                ${field.type === 'checkbox' 
                    ? `<input type="checkbox" name="${escapeHtml(field.name)}" ${value ? 'checked' : ''}>`
                    : `<input type="${field.type}" name="${escapeHtml(field.name)}" value="${escapeHtml(String(value ?? ''))}" ${field.required ? 'required' : ''}>`
                }
            `;
            container.appendChild(div);
        });
    }

    // 修复的核心：拆分成功提示与刷新操作，避免刷新时的异常覆盖成功提示
    async function submitForm(e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const data = {};
        const schema = TABLE_SCHEMA[editingTable];
        for (let field of schema.fields) {
            if (field.type === 'checkbox') {
                data[field.name] = formData.get(field.name) === 'on';
            } else {
                let val = formData.get(field.name);
                if (field.type === 'number') val = val ? Number(val) : 0;
                data[field.name] = val === undefined ? '' : val;
            }
        }
        
        try {
            let result;
            if (editingId) {
                result = await supabaseAdmin.from(editingTable).update(data).eq('id', editingId);
            } else {
                result = await supabaseAdmin.from(editingTable).insert([data]);
            }
            if (result.error) throw result.error;
            
            // 操作成功，先关闭模态框并显示成功通知
            closeFormModal();
            showNotification(editingId ? '更新成功' : '添加成功', 'success');
            
            // 然后尝试刷新表格（即使刷新过程中出错也不影响用户对成功的感知）
            try {
                await loadTableData(editingTable);
                filterTable(editingTable);
            } catch (refreshErr) {
                console.error('刷新表格数据时出错:', refreshErr);
                // 不覆盖成功通知，仅控制台记录
            }
        } catch (err) {
            console.error(err);
            showNotification('操作失败: ' + (err.message || '未知错误'), 'error');
        }
    }

    async function deleteRecord(table, id) {
        if (!confirm('确定要删除吗？此操作不可恢复。')) return;
        const { error } = await supabaseAdmin.from(table).delete().eq('id', id);
        if (error) {
            showNotification('删除失败', 'error');
        } else {
            showNotification('删除成功', 'success');
            try {
                await loadTableData(table);
                filterTable(table);
            } catch (refreshErr) {
                console.error('刷新数据失败:', refreshErr);
            }
        }
    }

    function closeFormModal() {
        document.getElementById('form-modal').style.display = 'none';
        document.body.classList.remove('modal-open');
        editingId = null;
        editingTable = null;
    }

    function getTableChinese(table) {
        const map = { characters: '角色', light_cones: '光锥', materials: '材料' };
        return map[table] || table;
    }

    function showNotification(msg, type) {
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${escapeHtml(msg)}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.classList.add('show'), 10);
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    }

    async function logoutAndRedirect() {
        await supabaseAdmin.auth.signOut();
        window.location.href = 'index.html';
    }

    // 启动
    initAdmin();
</script>
</body>
</html>
