<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>管理后台 - 六哥荣耀WIKI</title>
    <!-- 共用主站样式 -->
    <link rel="stylesheet" href="zhuye0.css">
    <!-- 后台专用样式 -->
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title"><i class="fas fa-cog"></i> 内容管理后台</h1>
            <div>
                <span id="adminUserEmail" style="margin-right: 15px; color: var(--text-highlight);"></span>
                <button class="logout-admin-btn" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
            </div>
        </div>

        <!-- 表切换标签 -->
        <div class="table-tabs">
            <button class="tab-btn active" data-table="characters">角色管理</button>
            <button class="tab-btn" data-table="light_cones">光锥管理</button>
            <button class="tab-btn" data-table="materials">材料管理</button>
        </div>

        <!-- 角色管理面板 -->
        <div id="characters-panel" class="panel active-panel">
            <div class="toolbar">
                <input type="text" id="search-characters" class="search-admin" placeholder="搜索角色名...">
                <button class="add-btn" onclick="showAddForm('characters')"><i class="fas fa-plus"></i> 添加角色</button>
            </div>
            <div id="characters-table-container" class="table-container">
                <!-- 动态表格 -->
            </div>
        </div>

        <!-- 光锥管理面板 -->
        <div id="light_cones-panel" class="panel">
            <div class="toolbar">
                <input type="text" id="search-light_cones" class="search-admin" placeholder="搜索光锥名...">
                <button class="add-btn" onclick="showAddForm('light_cones')"><i class="fas fa-plus"></i> 添加光锥</button>
            </div>
            <div id="light_cones-table-container" class="table-container"></div>
        </div>

        <!-- 材料管理面板 -->
        <div id="materials-panel" class="panel">
            <div class="toolbar">
                <input type="text" id="search-materials" class="search-admin" placeholder="搜索材料名...">
                <button class="add-btn" onclick="showAddForm('materials')"><i class="fas fa-plus"></i> 添加材料</button>
            </div>
            <div id="materials-table-container" class="table-container"></div>
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div id="form-modal" class="modal" style="display: none;">
        <div class="modal-overlay" onclick="closeFormModal()"></div>
        <div class="modal-content" style="max-width: 600px; height: auto;">
            <div class="modal-header">
                <h3 id="form-title">添加记录</h3>
                <button class="modal-close" onclick="closeFormModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding: 20px; overflow-y: auto;">
                <form id="data-form" onsubmit="submitForm(event)">
                    <!-- 动态生成表单字段 -->
                    <div id="form-fields"></div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                        <button type="button" class="logout-btn" onclick="closeFormModal()" style="background: transparent;">取消</button>
                        <button type="submit" style="background: var(--text-highlight); color: var(--bg); border: none; padding: 8px 20px; border-radius: var(--radius); cursor: pointer;">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
        // 管理员邮箱列表（请替换为你的邮箱）
        const ADMIN_EMAILS = ['1714400176@qq.com'];  // ⚠️ 请修改为你的邮箱

        let supabase = null;
        let currentUser = null;
        let currentTable = 'characters';
        let editingId = null;
        let editingTable = null;

        // 表字段配置（用于动态生成表单）
        const TABLE_SCHEMA = {
            characters: {
                fields: [
                    { name: 'name', label: '角色名', type: 'text', required: true },
                    { name: 'description', label: '描述', type: 'text', required: false },
                    { name: 'element', label: '属性', type: 'text', required: false },
                    { name: 'path', label: '命途', type: 'text', required: false },
                    { name: 'rarity', label: '星级', type: 'number', default: 5 },
                    { name: 'version', label: '版本', type: 'text' },
                    { name: 'image_url', label: '图片URL', type: 'text' },
                    { name: 'detail_url', label: '详情页URL', type: 'text' },
                    { name: 'is_limited', label: '限定', type: 'checkbox', default: true },
                    { name: 'display_order', label: '排序', type: 'number', default: 0 }
                ]
            },
            light_cones: {
                fields: [
                    { name: 'name', label: '光锥名', type: 'text', required: true },
                    { name: 'description', label: '描述', type: 'text' },
                    { name: 'path', label: '命途', type: 'text' },
                    { name: 'character_id', label: '关联角色ID', type: 'number' },
                    { name: 'image_url', label: '图片URL', type: 'text' },
                    { name: 'detail_url', label: '详情页URL', type: 'text' },
                    { name: 'display_order', label: '排序', type: 'number', default: 0 }
                ]
            },
            materials: {
                fields: [
                    { name: 'name', label: '材料名', type: 'text', required: true },
                    { name: 'description', label: '描述', type: 'text' },
                    { name: 'rarity', label: '稀有度(green/blue/purple/gold)', type: 'text' },
                    { name: 'image_url', label: '图片URL', type: 'text' },
                    { name: 'detail_url', label: '详情页URL', type: 'text' },
                    { name: 'display_order', label: '排序', type: 'number', default: 0 }
                ]
            }
        };

        // ==================== 初始化 ====================
        async function init() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) {
                alert('请先登录');
                window.location.href = 'login-real.html';
                return;
            }
            currentUser = user;
            // 检查管理员权限
            if (!ADMIN_EMAILS.includes(user.email)) {
                alert('您没有管理员权限，请使用管理员账号登录');
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminUserEmail').innerText = user.email;
            // 加载默认表
            loadTableData('characters');
            // 绑定标签切换事件
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const table = btn.dataset.table;
                    switchTable(table);
                });
            });
            // 绑定搜索输入
            document.getElementById('search-characters').addEventListener('input', () => filterTable('characters'));
            document.getElementById('search-light_cones').addEventListener('input', () => filterTable('light_cones'));
            document.getElementById('search-materials').addEventListener('input', () => filterTable('materials'));
        }

        async function switchTable(table) {
            currentTable = table;
            // 更新tab样式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.table === table) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
            document.getElementById(`${table}-panel`).classList.add('active-panel');
            await loadTableData(table);
        }

        async function loadTableData(table) {
            const { data, error } = await supabase.from(table).select('*').order('display_order', { ascending: true });
            if (error) {
                console.error(error);
                showNotification('加载数据失败', 'error');
                return;
            }
            window.currentData = data;
            renderTable(table, data);
        }

        function renderTable(table, data) {
            const container = document.getElementById(`${table}-table-container`);
            if (!container) return;
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">暂无数据，点击右上角添加</div>';
                return;
            }
            // 获取表头字段（排除id, created_at）
            const first = data[0];
            let headers = Object.keys(first).filter(k => !['id', 'created_at'].includes(k));
            // 特定表微调
            if (table === 'characters') headers = ['name', 'description', 'element', 'path', 'rarity', 'version', 'image_url', 'detail_url', 'is_limited', 'display_order'];
            if (table === 'light_cones') headers = ['name', 'description', 'path', 'character_id', 'image_url', 'detail_url', 'display_order'];
            if (table === 'materials') headers = ['name', 'description', 'rarity', 'image_url', 'detail_url', 'display_order'];
            
            let html = '<table class="data-table"><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '<th>操作</th></tr></thead><tbody>';
            data.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h];
                    if (val === undefined) val = '';
                    if (h === 'image_url' && val) val = `<img src="${val}" style="width:40px;height:40px;object-fit:cover;" onerror="this.style.display='none'">`;
                    if (h === 'is_limited') val = val ? '是' : '否';
                    html += `<td>${val}</td>`;
                });
                html += `<td>
                    <button class="edit-btn" onclick="showEditForm('${table}', ${row.id})"><i class="fas fa-edit"></i> 编辑</button>
                    <button class="delete-btn" onclick="deleteRecord('${table}', ${row.id})"><i class="fas fa-trash"></i> 删除</button>
                </td>`;
                html += '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function filterTable(table) {
            const searchInput = document.getElementById(`search-${table}`);
            const keyword = searchInput.value.trim().toLowerCase();
            if (!window.currentData) return;
            const filtered = window.currentData.filter(item => item.name && item.name.toLowerCase().includes(keyword));
            renderTable(table, filtered);
        }

        // 显示添加表单
        function showAddForm(table) {
            editingTable = table;
            editingId = null;
            document.getElementById('form-title').innerText = `添加${getTableChinese(table)}`;
            generateFormFields(table, null);
            document.getElementById('form-modal').style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        // 显示编辑表单
        async function showEditForm(table, id) {
            editingTable = table;
            editingId = id;
            const { data, error } = await supabase.from(table).select('*').eq('id', id).single();
            if (error) {
                showNotification('加载数据失败', 'error');
                return;
            }
            document.getElementById('form-title').innerText = `编辑${getTableChinese(table)}`;
            generateFormFields(table, data);
            document.getElementById('form-modal').style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        function generateFormFields(table, existingData) {
            const schema = TABLE_SCHEMA[table];
            if (!schema) return;
            const container = document.getElementById('form-fields');
            container.innerHTML = '';
            schema.fields.forEach(field => {
                const value = existingData ? existingData[field.name] : (field.default !== undefined ? field.default : '');
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                div.innerHTML = `
                    <label style="display:block; margin-bottom:5px; color:var(--text-highlight);">${field.label}</label>
                    ${field.type === 'checkbox' ? 
                        `<input type="checkbox" name="${field.name}" ${value ? 'checked' : ''} style="width:20px;height:20px;">` :
                        `<input type="${field.type}" name="${field.name}" value="${value || ''}" style="width:100%; padding:8px; background:#2d3748; border:1px solid var(--border-color); border-radius:var(--radius); color:var(--text-main);" ${field.required ? 'required' : ''}>
                    `}
                `;
                container.appendChild(div);
            });
        }

        async function submitForm(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = {};
            const schema = TABLE_SCHEMA[editingTable];
            for (let field of schema.fields) {
                if (field.type === 'checkbox') {
                    data[field.name] = formData.get(field.name) === 'on';
                } else {
                    let val = formData.get(field.name);
                    if (field.type === 'number') val = val ? Number(val) : 0;
                    data[field.name] = val;
                }
            }
            try {
                if (editingId) {
                    const { error } = await supabase.from(editingTable).update(data).eq('id', editingId);
                    if (error) throw error;
                    showNotification('更新成功', 'success');
                } else {
                    const { error } = await supabase.from(editingTable).insert([data]);
                    if (error) throw error;
                    showNotification('添加成功', 'success');
                }
                closeFormModal();
                await loadTableData(editingTable);
            } catch (err) {
                console.error(err);
                showNotification('操作失败: ' + err.message, 'error');
            }
        }

        async function deleteRecord(table, id) {
            if (!confirm('确定要删除吗？此操作不可恢复。')) return;
            const { error } = await supabase.from(table).delete().eq('id', id);
            if (error) {
                showNotification('删除失败', 'error');
            } else {
                showNotification('删除成功', 'success');
                await loadTableData(table);
            }
        }

        function closeFormModal() {
            document.getElementById('form-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
            editingId = null;
            editingTable = null;
        }

        function getTableChinese(table) {
            const map = { characters: '角色', light_cones: '光锥', materials: '材料' };
            return map[table] || table;
        }

        function showNotification(msg, type) {
            // 复用主站通知样式
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        async function logoutAndRedirect() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
