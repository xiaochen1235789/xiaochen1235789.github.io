<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好友聊天 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== 全局风格，延续暗色质感 ========== */
        :root {
            --bg: #121212;
            --card-bg: #1e3a2f;
            --card-bg-hover: #284a3c;
            --text-main: #e0e0e0;
            --text-highlight: #81c784;
            --text-secondary: #99aabb;
            --radius: 12px;
            --border-color: #3d725f;
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
            --danger: #f87171;
            --own-msg: #2b5a42;
            --friend-msg: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 顶部导航 */
        .chat-header {
            background: var(--card-bg); padding: 12px 20px; display: flex; align-items: center; gap: 16px;
            border-bottom: 2px solid var(--border-color); flex-shrink: 0;
        }
        .back-btn {
            background: rgba(129,199,132,0.2); border: none; color: var(--text-highlight);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { background: var(--text-highlight); color: var(--bg); }
        .friend-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #3ecf8e, #8a4baf);
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4rem;
            overflow: hidden; flex-shrink: 0;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-info h2 { font-size: 1.2rem; color: var(--text-highlight); }
        .friend-info p { font-size: 0.75rem; color: var(--text-secondary); }
        
        /* 聊天记录区域 */
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .message {
            display: flex; max-width: 80%; animation: fadeInMsg 0.2s ease;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message.friend { align-self: flex-start; }
        .message-bubble {
            background: var(--friend-msg); padding: 10px 14px; border-radius: 20px;
            word-wrap: break-word; line-height: 1.4; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .message.own .message-bubble { background: var(--own-msg); border-bottom-right-radius: 4px; }
        .message.friend .message-bubble { border-bottom-left-radius: 4px; }
        .message-time {
            font-size: 0.65rem; color: var(--text-secondary); margin-top: 4px; padding: 0 6px;
        }
        .message.own .message-time { text-align: right; }
        .chat-emoji-img {
            max-width: 32px; max-height: 32px; vertical-align: middle; margin: 0 2px;
            display: inline-block;
        }
        /* 输入区域 */
        .input-area {
            background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 12px 20px;
            flex-shrink: 0;
        }
        .emoji-panel {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px dashed var(--border-color);
        }
        .emoji-item {
            cursor: pointer; transition: transform 0.1s; display: inline-flex;
            background: rgba(0,0,0,0.3); border-radius: 40px; padding: 4px 10px; align-items: center; gap: 6px;
        }
        .emoji-item:hover { transform: scale(1.05); background: var(--text-highlight); color: #121212; }
        .emoji-item img { width: 24px; height: 24px; object-fit: contain; }
        .emoji-text { font-size: 1.4rem; }
        .input-row {
            display: flex; gap: 12px; align-items: flex-end;
        }
        #messageInput {
            flex: 1; background: #2d3748; border: 1px solid var(--border-color); border-radius: 40px;
            padding: 12px 18px; color: white; font-size: 1rem; resize: none; outline: none;
            font-family: inherit;
        }
        #messageInput:focus { border-color: var(--text-highlight); }
        .send-btn {
            background: var(--text-highlight); border: none; width: 48px; height: 48px;
            border-radius: 50%; color: var(--bg); font-size: 1.3rem; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { background: #6abf70; transform: scale(1.02); }
        .loading-msg { text-align: center; padding: 20px; color: var(--text-secondary); }
        .error-box {
            background: rgba(248,113,113,0.1); border: 1px solid #f87171; border-radius: var(--radius);
            padding: 20px; text-align: center; margin: 20px;
        }
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 滚动条 */
        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: #2d2d2d; border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--text-highlight); border-radius: 10px; }
        
        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .emoji-panel { gap: 8px; }
        }
    </style>
</head>
<body>

<div class="chat-header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="friend-avatar" id="friendAvatar">👤</div>
    <div class="friend-info">
        <h2 id="friendName">加载中...</h2>
        <p id="friendStatus"><i class="fas fa-comment-dots"></i> 好友聊天</p>
    </div>
</div>

<div class="messages-area" id="messagesArea">
    <div class="loading-msg"><i class="fas fa-spinner fa-pulse"></i> 加载聊天记录...</div>
</div>

<div class="input-area">
    <div class="emoji-panel" id="emojiPanel">
        <!-- 动态表情包 + 静态表情 + emoji快捷按钮 会由js动态生成，也可静态写 -->
    </div>
    <div class="input-row">
        <textarea id="messageInput" rows="1" placeholder="输入消息... 支持文字、Emoji 😊 点击表情包添加图片表情"></textarea>
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // ---------- Supabase 配置 (与之前一致) ----------
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    let friendId = null;
    let friendName = '好友';
    let friendAvatarUrl = null;
    let messagesSubscription = null;
    
    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const backBtn = document.getElementById('backBtn');
    const friendNameSpan = document.getElementById('friendName');
    const friendAvatarDiv = document.getElementById('friendAvatar');
    
    // ---------- 辅助函数 ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showNotification(msg, isError = false) {
        // 简单顶部提示 (轻提示)
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = isError ? '#f87171' : '#10b981';
        toast.style.color = '#fff';
        toast.style.padding = '8px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '9999';
        toast.style.fontSize = '0.9rem';
        toast.style.boxShadow = '0 2px 12px rgba(0,0,0,0.3)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // 渲染消息：将文本中的表情包占位符 [emoji:key] 转换为 img 标签，同时转义文本内容
    function renderMessageContent(rawText) {
        if (!rawText) return '';
        // 先转义HTML，避免XSS
        let escaped = escapeHtml(rawText);
        // 替换自定义表情包占位符: [emoji:微笑] 格式 -> 对应的图片url
        // 表情包映射表 (静态/动态)
        const emojiMap = {
            '微笑': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f642.png',     // 静态png
            '大笑': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f606.png',
            '爱心': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2764.png',
            '哭': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f622.png',
            '动态猫猫': 'https://media1.tenor.com/m/-hxVXVN6bUMAAAAC/cat-cat-stare.gif',    // 动态gif示例
            '动态星星': 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXRmM2JxbzVkYnA5MTNheWZ6ZmQ0aWlxZjU0Y2NidTVneWVibzByOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26tP4Jq9z9nz0HPsA/giphy.gif', // 动态星星
            '狗头': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f436.png',
        };
        // 正则匹配 [emoji:xxx]
        escaped = escaped.replace(/\[emoji:([^\]]+)\]/g, (match, key) => {
            const imgUrl = emojiMap[key];
            if (imgUrl) {
                return `<img src="${imgUrl}" class="chat-emoji-img" alt="${key}" title="${key}">`;
            }
            return match; // 没匹配保留原样
        });
        // 处理换行
        escaped = escaped.replace(/\n/g, '<br>');
        return escaped;
    }
    
    // 将消息对象转为DOM
    function createMessageElement(msg) {
        const isOwn = msg.sender_id === currentUser?.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'friend'}`;
        const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const contentHtml = renderMessageContent(msg.content);
        div.innerHTML = `
            <div class="message-bubble">${contentHtml}</div>
            <div class="message-time">${time}</div>
        `;
        return div;
    }
    
    // 加载历史消息
    async function loadMessages() {
        if (!currentUser || !friendId) return;
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true })
            .limit(100);
        if (error) {
            console.error('加载消息失败:', error);
            showNotification('加载消息失败: ' + error.message, true);
            return;
        }
        messagesArea.innerHTML = '';
        if (!data || data.length === 0) {
            messagesArea.innerHTML = '<div class="loading-msg" style="color:var(--text-secondary);"><i class="far fa-comment-dots"></i> 暂无消息，打个招呼吧～</div>';
            return;
        }
        data.forEach(msg => {
            messagesArea.appendChild(createMessageElement(msg));
        });
        scrollToBottom();
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }, 100);
    }
    
    // 发送消息
    async function sendMessage() {
        let text = messageInput.value.trim();
        if (!text) {
            showNotification('消息不能为空~', false);
            return;
        }
        // 限制长度
        if (text.length > 1000) {
            showNotification('消息太长啦，最多1000字', true);
            return;
        }
        const { error } = await supabase.from('messages').insert({
            sender_id: currentUser.id,
            receiver_id: friendId,
            content: text,
            created_at: new Date().toISOString()
        });
        if (error) {
            console.error(error);
            showNotification('发送失败: ' + error.message, true);
        } else {
            messageInput.value = '';
            // 手动调整textarea高度
            messageInput.style.height = 'auto';
            // 乐观更新可以不手动，实时订阅会自己刷新，但为了立即感，也可以等待订阅更新，延迟较小
            // 直接清空输入框，等待实时更新即可
            scrollToBottom();
        }
    }
    
    // 订阅实时消息 (仅当前对话)
    function subscribeMessages() {
        if (messagesSubscription) {
            supabase.removeChannel(messagesSubscription);
        }
        const channel = supabase.channel('chat-realtime')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages',
                filter: `sender_id=eq.${friendId},receiver_id=eq.${currentUser.id}`
            }, (payload) => {
                // 收到对方发来的消息
                const newMsg = payload.new;
                if (newMsg.sender_id === friendId && newMsg.receiver_id === currentUser.id) {
                    messagesArea.appendChild(createMessageElement(newMsg));
                    scrollToBottom();
                }
            })
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages',
                filter: `sender_id=eq.${currentUser.id},receiver_id=eq.${friendId}`
            }, (payload) => {
                // 自己刚发的消息 (避免重复添加，但消息表插入后也会触发，可以正常添加)
                const newMsg = payload.new;
                if (newMsg.sender_id === currentUser.id && newMsg.receiver_id === friendId) {
                    // 检查是否已存在防止重复添加（由于load后订阅，新消息都会是新增）
                    // 简单去重: 查找最后一个消息是否id相同
                    const lastMsg = messagesArea.lastChild?.querySelector?.('.message-bubble');
                    if (!lastMsg) {
                        messagesArea.appendChild(createMessageElement(newMsg));
                    } else {
                        // 避免重复
                        const existing = Array.from(messagesArea.children).find(child => child.getAttribute?.('data-msg-id') === newMsg.id);
                        if (!existing) {
                            messagesArea.appendChild(createMessageElement(newMsg));
                        }
                    }
                    scrollToBottom();
                }
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') console.log('聊天实时订阅成功');
            });
        messagesSubscription = channel;
    }
    
    // 验证好友关系 (必须是accepted)
    async function validateFriendship() {
        if (!currentUser || !friendId) return false;
        const { data, error } = await supabase
            .from('friends')
            .select('status')
            .or(`and(requester_id.eq.${currentUser.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentUser.id})`)
            .single();
        if (error || !data) {
            console.warn('好友关系校验失败', error);
            return false;
        }
        return data.status === 'accepted';
    }
    
    // 获取好友资料(头像+用户名)
    async function loadFriendProfile() {
        if (!friendId) return;
        const { data, error } = await supabase
            .from('user_profiles')
            .select('username, avatar_url')
            .eq('id', friendId)
            .single();
        if (!error && data) {
            friendName = data.username || '好友';
            friendAvatarUrl = data.avatar_url;
            friendNameSpan.innerText = escapeHtml(friendName);
            if (friendAvatarUrl) {
                friendAvatarDiv.innerHTML = `<img src="${friendAvatarUrl}" style="width:100%;height:100%;object-fit:cover;">`;
            } else {
                friendAvatarDiv.innerHTML = friendName.charAt(0).toUpperCase();
            }
        } else {
            friendNameSpan.innerText = '好友';
        }
    }
    
    // 初始化表情包面板 (静态/动态表情包 + Emoji 快捷)
    function initEmojiPanel() {
        const panel = document.getElementById('emojiPanel');
        // 表情包数据: 显示文本 + 对应占位符 (也可以是纯文本emoji)
        const emojiItems = [
            { type: 'text', label: '😊', value: '😊' },
            { type: 'text', label: '😂', value: '😂' },
            { type: 'text', label: '❤️', value: '❤️' },
            { type: 'text', label: '🔥', value: '🔥' },
            { type: 'text', label: '🎉', value: '🎉' },
            { type: 'image', name: '微笑', imgUrl: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f642.png', placeholder: '[emoji:微笑]' },
            { type: 'image', name: '大笑', imgUrl: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f606.png', placeholder: '[emoji:大笑]' },
            { type: 'image', name: '动态猫猫', imgUrl: 'https://media1.tenor.com/m/-hxVXVN6bUMAAAAC/cat-cat-stare.gif', placeholder: '[emoji:动态猫猫]', dynamic: true },
            { type: 'image', name: '动态星星', imgUrl: 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXRmM2JxbzVkYnA5MTNheWZ6ZmQ0aWlxZjU0Y2NidTVneWVibzByOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26tP4Jq9z9nz0HPsA/giphy.gif', placeholder: '[emoji:动态星星]', dynamic: true },
            { type: 'image', name: '狗头', imgUrl: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f436.png', placeholder: '[emoji:狗头]' },
        ];
        panel.innerHTML = '';
        emojiItems.forEach(item => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            if (item.type === 'text') {
                span.innerHTML = `<span class="emoji-text">${item.label}</span>`;
                span.onclick = () => {
                    const input = messageInput;
                    const start = input.selectionStart;
                    const end = input.selectionEnd;
                    const text = input.value;
                    input.value = text.substring(0, start) + item.value + text.substring(end);
                    input.focus();
                    input.selectionStart = input.selectionEnd = start + item.value.length;
                    // 自动调整高度
                    input.style.height = 'auto';
                    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
                };
            } else {
                // 图片表情包
                const img = document.createElement('img');
                img.src = item.imgUrl;
                img.style.width = '28px';
                img.style.height = '28px';
                img.style.objectFit = 'contain';
                const labelSpan = document.createElement('span');
                labelSpan.textContent = item.name;
                labelSpan.style.fontSize = '0.7rem';
                span.appendChild(img);
                span.appendChild(labelSpan);
                span.onclick = () => {
                    const placeholder = item.placeholder;
                    const input = messageInput;
                    const start = input.selectionStart;
                    const text = input.value;
                    input.value = text.substring(0, start) + placeholder + text.substring(start);
                    input.focus();
                    input.selectionStart = input.selectionEnd = start + placeholder.length;
                    input.style.height = 'auto';
                    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
                };
            }
            panel.appendChild(span);
        });
        // 额外加一个“清除格式”或分割线不需要，足够
    }
    
    // 自动调整textarea高度
    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    }
    
    // 主要初始化流程
    async function initChat() {
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const fId = urlParams.get('friend_id');
        const fName = urlParams.get('friend_name');
        if (!fId) {
            messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> 缺少好友参数，请从好友列表进入</div>`;
            return;
        }
        friendId = fId;
        if (fName) friendName = fName;
        
        // 获取当前登录用户
        const { data: { user }, error: userErr } = await supabase.auth.getUser();
        if (userErr || !user) {
            messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-lock"></i> 请先登录 <a href="index.html" style="color:var(--text-highlight);">去登录</a></div>`;
            return;
        }
        currentUser = user;
        
        // 不能和自己聊天
        if (currentUser.id === friendId) {
            messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-ban"></i> 不能和自己聊天哦</div>`;
            return;
        }
        
        // 加载好友资料
        await loadFriendProfile();
        // 验证好友关系
        const isFriend = await validateFriendship();
        if (!isFriend) {
            messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-user-friends"></i> 你们还不是好友，无法聊天。请先添加好友。</div>`;
            document.querySelector('.input-area').style.display = 'none';
            return;
        }
        
        // 显示聊天区域
        document.querySelector('.input-area').style.display = 'block';
        // 初始化表情包面板
        initEmojiPanel();
        // 加载历史消息
        await loadMessages();
        // 订阅实时消息
        subscribeMessages();
        // 监听输入框高度
        messageInput.addEventListener('input', autoResizeTextarea);
        // 发送按钮
        sendBtn.onclick = sendMessage;
        // 回车发送 (ctrl+enter换行)
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        // 返回按钮
        backBtn.onclick = () => {
            window.location.href = './friends.html';
        };
        // 页面关闭前取消订阅可选
        window.addEventListener('beforeunload', () => {
            if (messagesSubscription) supabase.removeChannel(messagesSubscription);
        });
    }
    
    initChat().catch(err => {
        console.error(err);
        messagesArea.innerHTML = `<div class="error-box">初始化错误: ${escapeHtml(err.message)}</div>`;
    });
</script>
</body>
</html>
