<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>好友聊天 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e3a2f;
            --text-main: #e0e0e0;
            --text-highlight: #81c784;
            --text-secondary: #99aabb;
            --border-color: #3d725f;
            --own-msg: #2b5a42;
            --friend-msg: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body {
            background: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        /* 头部固定 */
        .chat-header {
            background: var(--card-bg);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 10;
        }
        .back-btn {
            background: rgba(129,199,132,0.2);
            border: none;
            color: var(--text-highlight);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3ecf8e, #8a4baf);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-info h2 { font-size: 1rem; color: var(--text-highlight); }
        .friend-info p { font-size: 0.65rem; color: var(--text-secondary); }
        
        /* 消息区域滚动 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
            min-height: 0;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message.friend { align-self: flex-start; }
        .message-bubble {
            background: var(--friend-msg);
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.35;
            font-size: 0.9rem;
        }
        .message.own .message-bubble { background: var(--own-msg); border-bottom-right-radius: 4px; }
        .message.friend .message-bubble { border-bottom-left-radius: 4px; }
        .message-time {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 3px;
            padding: 0 6px;
        }
        .message.own .message-time { text-align: right; }
        .chat-emoji-img {
            max-width: 28px;
            max-height: 28px;
            vertical-align: middle;
            margin: 0 2px;
        }
        .custom-emoji {
            width: 36px !important;
            height: 36px !important;
            cursor: pointer;
            border-radius: 8px;
        }
        
        /* 输入区域 */
        .input-area {
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .emoji-panel, .custom-emoji-panel {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            margin-bottom: 8px;
            padding-bottom: 4px;
        }
        .custom-emoji-panel {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed var(--border-color);
        }
        .emoji-item {
            cursor: pointer;
            display: inline-flex;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 4px 10px;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .emoji-item img { width: 24px; height: 24px; object-fit: contain; }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        #messageInput {
            flex: 1;
            background: #2d3748;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 8px 14px;
            color: white;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            max-height: 100px;
            line-height: 1.3;
            font-family: inherit;
        }
        #messageInput:focus {
            border-color: var(--text-highlight);
        }
        .send-btn {
            background: var(--text-highlight);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--bg);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-msg { text-align: center; padding: 20px; color: var(--text-secondary); }
        .error-box { background: rgba(248,113,113,0.1); border: 1px solid #f87171; border-radius: 10px; padding: 16px; text-align: center; margin: 16px; }
        .input-hint {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            .friend-avatar { width: 34px; height: 34px; }
            .message { max-width: 90%; }
            .message-bubble { padding: 6px 10px; font-size: 0.85rem; }
            .emoji-item { padding: 3px 8px; }
            .send-btn { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>
<div class="chat-header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="friend-avatar" id="friendAvatar">👤</div>
    <div class="friend-info">
        <h2 id="friendName">加载中...</h2>
        <p id="friendStatus"><i class="fas fa-comment-dots"></i> 好友聊天</p>
    </div>
</div>
<div class="messages-area" id="messagesArea">
    <div class="loading-msg"><i class="fas fa-spinner fa-pulse"></i> 加载聊天记录...</div>
</div>
<div class="input-area">
    <div class="emoji-panel" id="emojiPanel"></div>
    <div class="custom-emoji-panel" id="customEmojiPanel">
        <div class="emoji-item" id="addCustomEmojiBtn" style="background:rgba(129,199,132,0.2);">
            <i class="fas fa-plus"></i> <span>导入</span>
        </div>
        <div style="color:var(--text-secondary); font-size:0.65rem; margin-left:auto;"><i class="fas fa-cloud-upload-alt"></i> GIF/图片</div>
    </div>
    <div class="input-row">
        <textarea id="messageInput" rows="1" placeholder="点击输入消息... 😊"></textarea>
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div class="input-hint">
        <i class="fas fa-keyboard"></i> 点击输入框即可打字
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, friendId = null, friendName = '好友', friendAvatarUrl = null, messagesSubscription = null;
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const backBtn = document.getElementById('backBtn');
    const friendNameSpan = document.getElementById('friendName');
    const friendAvatarDiv = document.getElementById('friendAvatar');

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function showNotification(msg, isError = false) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background-color:${isError ? '#f87171' : '#10b981'}; color:#fff; padding:6px 16px; border-radius:40px; z-index:9999; font-size:0.8rem; box-shadow:0 2px 8px rgba(0,0,0,0.3); pointer-events:none;`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function showImagePreview(url) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; align-items:center; justify-content:center; cursor:pointer;';
        const img = document.createElement('img');
        img.src = url;
        img.style.maxWidth = '90%';
        img.style.maxHeight = '90%';
        overlay.appendChild(img);
        overlay.onclick = () => overlay.remove();
        document.body.appendChild(overlay);
    }
    function formatMessageTime(isoString) {
        const date = new Date(isoString);
        const now = new Date();
        if (date.toDateString() === now.toDateString()) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `${date.getMonth()+1}/${date.getDate()} ${date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}`;
    }
    function canRecall(createdAt) { return (Date.now() - new Date(createdAt).getTime()) <= 120000; }
    
    function renderMessageContent(msg) {
        if (msg.is_recalled) return `<span style="font-style:italic;">${msg.sender_id === currentUser?.id ? '你撤回了' : '对方撤回了'}</span>`;
        let rawText = msg.content;
        if (!rawText) return '';
        let escaped = escapeHtml(rawText);
        const emojiMap = {
            '微笑': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f642.png',
            '大笑': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f606.png',
            '爱心': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2764.png',
            '动态猫猫': 'https://media1.tenor.com/m/-hxVXVN6bUMAAAAC/cat-cat-stare.gif',
            '动态星星': 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXRmM2JxbzVkYnA5MTNheWZ6ZmQ0aWlxZjU0Y2NidTVneWVibzByOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26tP4Jq9z9nz0HPsA/giphy.gif',
            '狗头': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f436.png',
        };
        escaped = escaped.replace(/\[emoji:([^\]]+)\]/g, (match, key) => {
            const imgUrl = emojiMap[key];
            if (!imgUrl) return match;
            return `<img src="${imgUrl}" class="chat-emoji-img" alt="${key}" loading="lazy">`;
        });
        escaped = escaped.replace(/\[custom:([^\]]+)\]/g, (match, url) => {
            const safeUrl = url.replace(/['"]/g, '');
            return `<img src="${escapeHtml(safeUrl)}" class="chat-emoji-img custom-emoji" alt="表情" loading="lazy" onclick="event.stopPropagation(); window.showImagePreview('${escapeHtml(safeUrl)}')">`;
        });
        return escaped.replace(/\n/g, '<br>');
    }
    
    async function recallMessage(msgId) {
        const { error } = await supabaseClient.from('messages').update({ is_recalled: true }).eq('id', msgId).eq('sender_id', currentUser.id);
        if (error) showNotification('撤回失败', true);
        else showNotification('已撤回');
    }
    
    function createMessageElement(msg) {
        const isOwn = msg.sender_id === currentUser?.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'friend'}`;
        div.setAttribute('data-msg-id', msg.id);
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = renderMessageContent(msg);
        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.textContent = formatMessageTime(msg.created_at);
        div.appendChild(bubble);
        div.appendChild(timeDiv);
        if (isOwn && !msg.is_recalled && canRecall(msg.created_at)) {
            div.addEventListener('dblclick', (e) => {
                if (e.target.tagName === 'IMG' && e.target.classList.contains('custom-emoji')) return;
                if (confirm('撤回这条消息？')) recallMessage(msg.id);
            });
        }
        return div;
    }
    
    async function loadMessages() {
        if (!currentUser || !friendId) return;
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true })
            .limit(100);
        if (error) { messagesArea.innerHTML = `<div class="error-box">加载失败: ${escapeHtml(error.message)}</div>`; return; }
        messagesArea.innerHTML = '';
        if (!data || data.length === 0) { messagesArea.innerHTML = '<div class="loading-msg"><i class="far fa-comment-dots"></i> 暂无消息～</div>'; return; }
        data.forEach(msg => messagesArea.appendChild(createMessageElement(msg)));
        scrollToBottom();
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }, 100);
    }
    
    async function sendMessage() {
        let text = messageInput.value.trim();
        if (!text) return;
        if (text.length > 1000) { showNotification('消息太长', true); return; }
        const now = new Date().toISOString();
        const tempMsg = { id: `temp_${Date.now()}`, sender_id: currentUser.id, receiver_id: friendId, content: text, created_at: now, is_recalled: false };
        const tempElem = createMessageElement(tempMsg);
        messagesArea.appendChild(tempElem);
        scrollToBottom();
        messageInput.value = '';
        autoResizeTextarea();
        const { data, error } = await supabaseClient.from('messages').insert({
            sender_id: currentUser.id, receiver_id: friendId, content: text, created_at: now, is_recalled: false
        }).select().single();
        if (error) {
            tempElem.remove();
            showNotification('发送失败', true);
        } else {
            const newElem = createMessageElement(data);
            tempElem.replaceWith(newElem);
            scrollToBottom();
        }
    }
    
    function subscribeMessages() {
        if (messagesSubscription) supabaseClient.removeChannel(messagesSubscription);
        const channel = supabaseClient.channel('chat-realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${currentUser.id}` }, (payload) => {
                const newMsg = payload.new;
                if (newMsg.sender_id === currentUser.id) return;
                if (!document.querySelector(`.message[data-msg-id="${newMsg.id}"]`)) {
                    messagesArea.appendChild(createMessageElement(newMsg));
                    scrollToBottom();
                }
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages', filter: `receiver_id=eq.${currentUser.id}` }, (payload) => {
                const updated = payload.new;
                const target = document.querySelector(`.message[data-msg-id="${updated.id}"]`);
                if (target) target.replaceWith(createMessageElement(updated));
            })
            .subscribe();
        messagesSubscription = channel;
    }
    
    // 自定义表情
    async function loadCustomEmojis() {
        if (!currentUser) return;
        const { data, error } = await supabaseClient.from('user_emojis').select('id, file_url, emoji_name').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        if (!error && data) renderCustomEmojiPanel(data);
    }
    function renderCustomEmojiPanel(emojis) {
        const container = document.getElementById('customEmojiPanel');
        const addBtn = document.getElementById('addCustomEmojiBtn');
        const infoDiv = container.querySelector('div[style*="margin-left:auto"]');
        Array.from(container.children).forEach(child => {
            if (child !== addBtn && child !== infoDiv) container.removeChild(child);
        });
        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            const img = document.createElement('img');
            img.src = emoji.file_url;
            img.style.width = '24px'; img.style.height = '24px';
            span.appendChild(img);
            span.onclick = () => {
                const start = messageInput.selectionStart;
                const val = messageInput.value;
                const insert = `[custom:${emoji.file_url}]`;
                messageInput.value = val.slice(0, start) + insert + val.slice(start);
                messageInput.focus();
                messageInput.selectionStart = start + insert.length;
                autoResizeTextarea();
            };
            container.insertBefore(span, infoDiv);
        });
    }
    async function uploadCustomEmoji(file) {
        if (!currentUser) return showNotification('请先登录', true);
        if (!['image/jpeg','image/png','image/gif'].includes(file.type)) return showNotification('仅支持 JPG/PNG/GIF', true);
        if (file.size > 2*1024*1024) return showNotification('图片小于2MB', true);
        const ext = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${ext}`;
        const filePath = `user_emojis/${currentUser.id}/${fileName}`;
        const { error } = await supabaseClient.storage.from('custom-emojis').upload(filePath, file);
        if (error) return showNotification('上传失败', true);
        const { data: urlData } = supabaseClient.storage.from('custom-emojis').getPublicUrl(filePath);
        const publicUrl = urlData.publicUrl;
        const { error: insertErr } = await supabaseClient.from('user_emojis').insert({ user_id: currentUser.id, emoji_name: file.name.replace(/\.[^.]+$/,'').slice(0,20), file_url: publicUrl, file_type: file.type });
        if (insertErr) return showNotification('保存失败', true);
        showNotification('导入成功');
        await loadCustomEmojis();
    }
    function initCustomEmojiUploader() {
        document.getElementById('addCustomEmojiBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png,image/gif';
            input.onchange = e => e.target.files[0] && uploadCustomEmoji(e.target.files[0]);
            input.click();
        };
    }
    
    function initEmojiPanel() {
        const panel = document.getElementById('emojiPanel');
        const items = [
            { type: 'text', label: '😊', val: '😊' }, { type: 'text', label: '😂', val: '😂' }, { type: 'text', label: '❤️', val: '❤️' }, { type: 'text', label: '🔥', val: '🔥' }, { type: 'text', label: '🎉', val: '🎉' },
            { type: 'image', name: '微笑', img: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f642.png', placeholder: '[emoji:微笑]' },
            { type: 'image', name: '大笑', img: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f606.png', placeholder: '[emoji:大笑]' },
            { type: 'image', name: '动态猫猫', img: 'https://media1.tenor.com/m/-hxVXVN6bUMAAAAC/cat-cat-stare.gif', placeholder: '[emoji:动态猫猫]' },
            { type: 'image', name: '动态星星', img: 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXRmM2JxbzVkYnA5MTNheWZ6ZmQ0aWlxZjU0Y2NidTVneWVibzByOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26tP4Jq9z9nz0HPsA/giphy.gif', placeholder: '[emoji:动态星星]' },
            { type: 'image', name: '狗头', img: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f436.png', placeholder: '[emoji:狗头]' }
        ];
        panel.innerHTML = '';
        items.forEach(item => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            if (item.type === 'text') {
                span.innerHTML = `<span class="emoji-text">${item.label}</span>`;
                span.onclick = () => {
                    const start = messageInput.selectionStart;
                    const val = messageInput.value;
                    messageInput.value = val.slice(0, start) + item.val + val.slice(start);
                    messageInput.focus();
                    messageInput.selectionStart = start + item.val.length;
                    autoResizeTextarea();
                };
            } else {
                const img = document.createElement('img');
                img.src = item.img;
                img.style.width = '22px'; img.style.height = '22px';
                span.appendChild(img);
                span.appendChild(document.createTextNode(' ' + item.name));
                span.onclick = () => {
                    const start = messageInput.selectionStart;
                    const val = messageInput.value;
                    messageInput.value = val.slice(0, start) + item.placeholder + val.slice(start);
                    messageInput.focus();
                    messageInput.selectionStart = start + item.placeholder.length;
                    autoResizeTextarea();
                };
            }
            panel.appendChild(span);
        });
    }
    
    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
    }
    
    async function validateFriendship() {
        if (!currentUser || !friendId) return false;
        const { data } = await supabaseClient.from('friends').select('status').or(`and(requester_id.eq.${currentUser.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentUser.id})`).maybeSingle();
        return data?.status === 'accepted';
    }
    
    async function loadFriendProfile() {
        if (!friendId) return;
        const { data, error } = await supabaseClient.from('user_profiles').select('username, avatar_url').eq('id', friendId).single();
        if (!error && data) {
            friendName = data.username || '好友';
            friendAvatarUrl = data.avatar_url;
            friendNameSpan.innerText = friendName;
            if (friendAvatarUrl) {
                const img = document.createElement('img');
                img.src = friendAvatarUrl;
                friendAvatarDiv.innerHTML = '';
                friendAvatarDiv.appendChild(img);
            } else friendAvatarDiv.innerText = friendName.charAt(0).toUpperCase();
        } else friendNameSpan.innerText = '好友';
    }
    
    async function initChat() {
        const { data: { user }, error: userErr } = await supabaseClient.auth.getUser();
        if (userErr || !user) {
            messagesArea.innerHTML = `<div class="error-box">请先登录 <a href="index.html" style="color:var(--text-highlight);">去登录</a></div>`;
            document.querySelector('.input-area').style.display = 'none';
            return;
        }
        currentUser = user;
        const params = new URLSearchParams(window.location.search);
        const fId = params.get('friend_id'), fName = params.get('friend_name');
        if (!fId) { messagesArea.innerHTML = `<div class="error-box">缺少好友参数</div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        friendId = fId;
        if (fName) friendName = decodeURIComponent(fName);
        if (currentUser.id === friendId) { messagesArea.innerHTML = `<div class="error-box">不能和自己聊天</div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        await loadFriendProfile();
        const isFriend = await validateFriendship();
        if (!isFriend) { messagesArea.innerHTML = `<div class="error-box">你们还不是好友，请先添加好友。</div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        document.querySelector('.input-area').style.display = 'block';
        initEmojiPanel();
        initCustomEmojiUploader();
        await loadCustomEmojis();
        await loadMessages();
        subscribeMessages();
        messageInput.addEventListener('input', autoResizeTextarea);
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        backBtn.onclick = () => window.location.href = './friend.html';
        
        // 确保输入框可点击，且点击后不导致页面滚动过头
        messageInput.addEventListener('focus', () => {
            setTimeout(() => {
                scrollToBottom();
            }, 300);
        });
        window.addEventListener('resize', () => setTimeout(scrollToBottom, 100));
        window.addEventListener('beforeunload', () => { if (messagesSubscription) supabaseClient.removeChannel(messagesSubscription); });
    }
    initChat();
    window.showImagePreview = showImagePreview;
</script>
</body>
</html>
