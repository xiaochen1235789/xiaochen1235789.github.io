<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好友聊天 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png" type="image/png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
        /* ========== 全局风格 ========== */
        :root {
            --bg: #121212;
            --card-bg: #1e3a2f;
            --card-bg-hover: #284a3c;
            --text-main: #e0e0e0;
            --text-highlight: #81c784;
            --text-secondary: #99aabb;
            --radius: 12px;
            --border-color: #3d725f;
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
            --danger: #f87171;
            --own-msg: #2b5a42;
            --friend-msg: #2d3748;
            --recall-msg: #7f8c8d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .chat-header {
            background: var(--card-bg); padding: 12px 20px; display: flex; align-items: center; gap: 16px;
            border-bottom: 2px solid var(--border-color); flex-shrink: 0;
        }
        .back-btn {
            background: rgba(129,199,132,0.2); border: none; color: var(--text-highlight);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { background: var(--text-highlight); color: var(--bg); }
        .friend-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #3ecf8e, #8a4baf);
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4rem;
            overflow: hidden; flex-shrink: 0;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-info h2 { font-size: 1.2rem; color: var(--text-highlight); }
        .friend-info p { font-size: 0.75rem; color: var(--text-secondary); }
        
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .message {
            display: flex; max-width: 85%; animation: fadeInMsg 0.2s ease;
            position: relative;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message.friend { align-self: flex-start; }
        .message-bubble {
            background: var(--friend-msg); padding: 10px 14px; border-radius: 20px;
            word-wrap: break-word; word-break: break-word; line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            position: relative;
        }
        .message.own .message-bubble { background: var(--own-msg); border-bottom-right-radius: 4px; }
        .message.friend .message-bubble { border-bottom-left-radius: 4px; }
        .recalled .message-bubble {
            background: var(--card-bg);
            color: var(--recall-msg);
            font-style: italic;
        }
        .message-time {
            font-size: 0.65rem; color: var(--text-secondary); margin-top: 4px; padding: 0 6px;
        }
        .message.own .message-time { text-align: right; }
        .recall-btn {
            position: absolute;
            right: -32px;
            top: 8px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.2s;
        }
        .message:hover .recall-btn {
            opacity: 0.8;
        }
        .recall-btn:hover {
            color: var(--danger);
        }
        .chat-emoji-img {
            max-width: 32px;
            max-height: 32px;
            vertical-align: middle;
            margin: 0 2px;
            display: inline-block;
        }
        /* 放大动态动画表情（动态星星、动态猫猫等） */
        .animated-emoji-large {
            width: 64px !important;
            height: 64px !important;
            max-width: 64px !important;
            max-height: 64px !important;
            vertical-align: middle;
            margin: 4px 6px;
            display: inline-block;
        }
        /* 自定义表情放大 + 可点击 */
        .custom-emoji {
            width: 48px !important;
            height: 48px !important;
            max-width: 48px !important;
            max-height: 48px !important;
            vertical-align: middle;
            margin: 4px 6px;
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
            border-radius: 8px;
        }
        .custom-emoji:hover {
            transform: scale(1.05);
        }
        /* 图片预览模态框 */
        .image-preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-preview-overlay img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .input-area {
            background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 12px 20px;
            flex-shrink: 0;
        }
        .emoji-panel {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px dashed var(--border-color);
        }
        .custom-emoji-panel {
            display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; padding-top: 8px;
            border-top: 1px dashed var(--border-color);
        }
        .emoji-item {
            cursor: pointer; transition: transform 0.1s; display: inline-flex;
            background: rgba(0,0,0,0.3); border-radius: 40px; padding: 4px 10px; align-items: center; gap: 6px;
        }
        .emoji-item:hover { transform: scale(1.05); background: var(--text-highlight); color: #121212; }
        .emoji-item img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }
        .emoji-text { font-size: 1.4rem; }
        .input-row {
            display: flex; gap: 12px; align-items: flex-end;
        }
        #messageInput {
            flex: 1; background: #2d3748; border: 1px solid var(--border-color); border-radius: 40px;
            padding: 12px 18px; color: white; font-size: 1rem; resize: none; outline: none;
            font-family: inherit;
        }
        #messageInput:focus { border-color: var(--text-highlight); }
        .send-btn {
            background: var(--text-highlight); border: none; width: 48px; height: 48px;
            border-radius: 50%; color: var(--bg); font-size: 1.3rem; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { background: #6abf70; transform: scale(1.02); }
        .loading-msg { text-align: center; padding: 20px; color: var(--text-secondary); }
        .error-box {
            background: rgba(248,113,113,0.1); border: 1px solid #f87171; border-radius: var(--radius);
            padding: 20px; text-align: center; margin: 20px;
        }
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: #2d2d2d; border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--text-highlight); border-radius: 10px; }
        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .emoji-panel { gap: 8px; }
            .custom-emoji-panel { gap: 8px; }
            .message-bubble { font-size: 0.9rem; padding: 8px 12px; }
            .friend-avatar { width: 40px; height: 40px; font-size: 1.2rem; }
            .chat-header { padding: 8px 15px; gap: 10px; }
            .messages-area { padding: 15px; }
            .input-area { padding: 10px 15px; }
            .send-btn { width: 42px; height: 42px; }
            .animated-emoji-large {
                width: 56px !important;
                height: 56px !important;
                max-width: 56px !important;
                max-height: 56px !important;
            }
            .custom-emoji {
                width: 40px !important;
                height: 40px !important;
            }
            .recall-btn {
                right: -28px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="chat-header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <div class="friend-avatar" id="friendAvatar">👤</div>
    <div class="friend-info">
        <h2 id="friendName">加载中...</h2>
        <p id="friendStatus"><i class="fas fa-comment-dots"></i> 好友聊天</p>
    </div>
</div>
<div class="messages-area" id="messagesArea">
    <div class="loading-msg"><i class="fas fa-spinner fa-pulse"></i> 加载聊天记录...</div>
</div>
<div class="input-area">
    <div class="emoji-panel" id="emojiPanel"></div>
    <div class="custom-emoji-panel" id="customEmojiPanel">
        <div class="emoji-item" id="addCustomEmojiBtn" style="background:rgba(129,199,132,0.2);">
            <i class="fas fa-plus"></i> <span>导入表情</span>
        </div>
        <div style="color:var(--text-secondary); font-size:0.75rem; margin-left:auto; display:flex; align-items:center;">
            <i class="fas fa-cloud-upload-alt"></i> 支持 GIF/PNG/JPG
        </div>
    </div>
    <div class="input-row">
        <textarea id="messageInput" rows="1" placeholder="输入消息... 支持文字、Emoji 😊 点击表情包添加图片表情"></textarea>
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, friendId = null, friendName = '好友', friendAvatarUrl = null, messagesSubscription = null;
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const backBtn = document.getElementById('backBtn');
    const friendNameSpan = document.getElementById('friendName');
    const friendAvatarDiv = document.getElementById('friendAvatar');

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function showNotification(msg, isError = false) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background-color:${isError ? '#f87171' : '#10b981'}; color:#fff; padding:8px 20px; border-radius:40px; z-index:9999; font-size:0.9rem; box-shadow:0 2px 12px rgba(0,0,0,0.3);`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // 图片预览
    function showImagePreview(url) {
        const overlay = document.createElement('div');
        overlay.className = 'image-preview-overlay';
        const img = document.createElement('img');
        img.src = url;
        overlay.appendChild(img);
        overlay.onclick = () => overlay.remove();
        document.body.appendChild(overlay);
    }
    
    // 智能格式化消息时间
    function formatMessageTime(isoString) {
        const date = new Date(isoString);
        const now = new Date();
        const isToday = date.toDateString() === now.toDateString();
        const isThisYear = date.getFullYear() === now.getFullYear();
        const isThisMonth = isThisYear && date.getMonth() === now.getMonth();
        
        if (isToday) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else if (isThisMonth) {
            return `${date.getMonth()+1}.${date.getDate()} ${date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}`;
        } else {
            return `${date.getFullYear()}.${date.getMonth()+1}.${date.getDate()}`;
        }
    }
    
    // 检查消息是否可撤回（发送时间 <= 2分钟）
    function canRecall(createdAt) {
        const msgTime = new Date(createdAt).getTime();
        const now = Date.now();
        return (now - msgTime) <= 2 * 60 * 1000;
    }
    
    // 渲染消息内容（支持内置表情和自定义表情）
    function renderMessageContent(msg) {
        if (msg.is_recalled) {
            if (msg.sender_id === currentUser?.id) {
                return '<span style="font-style:italic;">你撤回了一条消息</span>';
            } else {
                return '<span style="font-style:italic;">对方撤回了一条消息</span>';
            }
        }
        let rawText = msg.content;
        if (!rawText) return '';
        let escaped = escapeHtml(rawText);
        const emojiMap = {
            '微笑': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f642.png',
            '大笑': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f606.png',
            '爱心': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2764.png',
            '哭': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f622.png',
            '动态猫猫': 'https://media1.tenor.com/m/-hxVXVN6bUMAAAAC/cat-cat-stare.gif',
            '动态星星': 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXRmM2JxbzVkYnA5MTNheWZ6ZmQ0aWlxZjU0Y2NidTVneWVibzByOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26tP4Jq9z9nz0HPsA/giphy.gif',
            '狗头': 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f436.png',
        };
        escaped = escaped.replace(/\[emoji:([^\]]+)\]/g, (match, key) => {
            const imgUrl = emojiMap[key];
            if (!imgUrl) return match;
            const extraClass = (key === '动态星星' || key === '动态猫猫') ? ' animated-emoji-large' : '';
            return `<img src="${imgUrl}" class="chat-emoji-img${extraClass}" alt="${key}" title="${key}">`;
        });
        // 自定义表情替换 [custom:URL]
        escaped = escaped.replace(/\[custom:([^\]]+)\]/g, (match, url) => {
            return `<img src="${escapeHtml(url)}" class="chat-emoji-img custom-emoji" alt="自定义表情" loading="lazy" onclick="event.stopPropagation(); showImagePreview('${escapeHtml(url)}')">`;
        });
        return escaped.replace(/\n/g, '<br>');
    }
    
    function createMessageElement(msg) {
        const isOwn = msg.sender_id === currentUser?.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'friend'}`;
        if (msg.is_recalled) div.classList.add('recalled');
        const timeStr = formatMessageTime(msg.created_at);
        const recallBtnHtml = (isOwn && !msg.is_recalled && canRecall(msg.created_at)) 
            ? `<button class="recall-btn" data-msg-id="${msg.id}" title="撤回消息"><i class="fas fa-undo-alt"></i></button>`
            : '';
        div.innerHTML = `
            <div class="message-bubble">${renderMessageContent(msg)}</div>
            <div class="message-time">${timeStr}</div>
            ${recallBtnHtml}
        `;
        // 绑定撤回按钮事件
        const recallBtn = div.querySelector('.recall-btn');
        if (recallBtn) {
            recallBtn.onclick = async (e) => {
                e.stopPropagation();
                const msgId = recallBtn.dataset.msgId;
                await recallMessage(msgId);
            };
        }
        return div;
    }
    
    async function recallMessage(msgId) {
        const { error } = await supabaseClient
            .from('messages')
            .update({ is_recalled: true })
            .eq('id', msgId)
            .eq('sender_id', currentUser.id);
        if (error) {
            console.error('撤回失败:', error);
            showNotification('撤回失败: ' + error.message, true);
        } else {
            showNotification('已撤回', false);
        }
    }
    
    async function loadMessages() {
        if (!currentUser || !friendId) return;
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true })
            .limit(100);
        if (error) { console.error(error); messagesArea.innerHTML = `<div class="error-box">加载消息失败: ${escapeHtml(error.message)}</div>`; return; }
        const wasAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop <= messagesArea.clientHeight + 50;
        messagesArea.innerHTML = '';
        if (!data || data.length === 0) { messagesArea.innerHTML = '<div class="loading-msg"><i class="far fa-comment-dots"></i> 暂无消息，打个招呼吧～</div>'; return; }
        data.forEach(msg => messagesArea.appendChild(createMessageElement(msg)));
        if (wasAtBottom) scrollToBottom();
    }
    function scrollToBottom() { setTimeout(() => messagesArea.scrollTop = messagesArea.scrollHeight, 100); }
    
    // 发送消息：乐观更新 + 存入数据库
    async function sendMessage() {
        let text = messageInput.value.trim();
        if (!text) { showNotification('消息不能为空~'); return; }
        if (text.length > 1000) { showNotification('消息太长啦，最多1000字', true); return; }

        const now = new Date().toISOString();
        const tempId = `temp_${Date.now()}_${Math.random()}`;
        const newMsg = {
            id: tempId,
            sender_id: currentUser.id,
            receiver_id: friendId,
            content: text,
            created_at: now,
            is_recalled: false
        };
        const tempElement = createMessageElement(newMsg);
        messagesArea.appendChild(tempElement);
        scrollToBottom();
        messageInput.value = '';
        messageInput.style.height = 'auto';

        const { data, error } = await supabaseClient.from('messages').insert({
            sender_id: currentUser.id,
            receiver_id: friendId,
            content: text,
            created_at: now,
            is_recalled: false
        }).select().single();
        if (error) {
            console.error(error);
            showNotification('发送失败: ' + error.message, true);
            tempElement.remove();
        } else {
            // 替换临时元素的id
            tempElement.querySelector('.recall-btn')?.setAttribute('data-msg-id', data.id);
        }
    }

    // 实时订阅：监听 INSERT 和 UPDATE (用于撤回)
    function subscribeMessages() {
        if (messagesSubscription) supabaseClient.removeChannel(messagesSubscription);
        const channel = supabaseClient.channel('chat-realtime')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages',
                filter: `receiver_id=eq.${currentUser.id}`
            }, (payload) => {
                const newMsg = payload.new;
                if (newMsg.sender_id === currentUser.id) return;
                // 避免重复添加
                const existing = Array.from(messagesArea.children).some(child => {
                    const timeSpan = child.querySelector('.message-time');
                    if (!timeSpan) return false;
                    return child.innerHTML.includes(escapeHtml(newMsg.content?.substring(0, 20) || '')) &&
                           timeSpan.textContent === formatMessageTime(newMsg.created_at);
                });
                if (!existing) {
                    messagesArea.appendChild(createMessageElement(newMsg));
                    scrollToBottom();
                }
            })
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'messages',
                filter: `receiver_id=eq.${currentUser.id}`
            }, (payload) => {
                const updated = payload.new;
                if (updated.sender_id === currentUser.id) return;
                // 找到对应的消息元素并更新
                const msgElements = Array.from(messagesArea.children).filter(el => el.classList.contains('message'));
                for (let el of msgElements) {
                    const timeSpan = el.querySelector('.message-time');
                    if (timeSpan && timeSpan.textContent === formatMessageTime(updated.created_at)) {
                        // 简单比较内容和时间不够准确，最好用id，但由于乐观更新没有id，这里用时间+内容前20字符判断
                        const oldContent = el.querySelector('.message-bubble')?.innerHTML;
                        if (oldContent && (oldContent.includes(escapeHtml(updated.content?.substring(0,20) || '') || oldContent.includes('撤回')))) {
                            const newEl = createMessageElement(updated);
                            el.replaceWith(newEl);
                            break;
                        }
                    }
                }
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') console.log('聊天实时订阅成功');
            });
        messagesSubscription = channel;
    }

    // ========== 自定义表情管理 ==========
    async function loadCustomEmojis() {
        if (!currentUser) return;
        const { data, error } = await supabaseClient
            .from('user_emojis')
            .select('id, file_url, emoji_name')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) {
            console.error('加载自定义表情失败:', error);
            return;
        }
        renderCustomEmojiPanel(data || []);
    }
    
    function renderCustomEmojiPanel(emojis) {
        const container = document.getElementById('customEmojiPanel');
        const addBtn = container.querySelector('#addCustomEmojiBtn');
        const infoDiv = container.querySelector('div[style*="margin-left:auto"]');
        const children = Array.from(container.children);
        children.forEach(child => {
            if (child.id !== 'addCustomEmojiBtn' && child !== infoDiv) {
                container.removeChild(child);
            }
        });
        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            span.style.padding = '2px 6px';
            const img = document.createElement('img');
            img.src = emoji.file_url;
            img.style.width = '32px';
            img.style.height = '32px';
            img.style.objectFit = 'contain';
            img.alt = emoji.emoji_name || '自定义表情';
            span.appendChild(img);
            span.onclick = () => {
                const start = messageInput.selectionStart;
                const end = messageInput.selectionEnd;
                const text = messageInput.value;
                const insertText = `[custom:${emoji.file_url}]`;
                messageInput.value = text.substring(0, start) + insertText + text.substring(end);
                messageInput.focus();
                messageInput.selectionStart = messageInput.selectionEnd = start + insertText.length;
                messageInput.style.height = 'auto';
                messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
            };
            container.insertBefore(span, infoDiv);
        });
    }
    
    async function uploadCustomEmoji(file) {
        if (!currentUser) {
            showNotification('请先登录', true);
            return;
        }
        const allowedTypes = ['image/jpeg', 'image/png', 'image/gif'];
        if (!allowedTypes.includes(file.type)) {
            showNotification('仅支持 JPG、PNG、GIF 格式', true);
            return;
        }
        const maxSize = 2 * 1024 * 1024;
        if (file.size > maxSize) {
            showNotification('图片大小不能超过 2MB', true);
            return;
        }
        const ext = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${ext}`;
        const filePath = `user_emojis/${currentUser.id}/${fileName}`;
        
        showNotification('上传中...', false);
        const { error } = await supabaseClient.storage
            .from('custom-emojis')
            .upload(filePath, file, { cacheControl: '3600', upsert: false });
        if (error) {
            console.error('上传失败:', error);
            showNotification('上传失败: ' + error.message, true);
            return;
        }
        const { data: urlData } = supabaseClient.storage.from('custom-emojis').getPublicUrl(filePath);
        const publicUrl = urlData.publicUrl;
        
        const { error: insertError } = await supabaseClient
            .from('user_emojis')
            .insert({
                user_id: currentUser.id,
                emoji_name: file.name.replace(/\.[^/.]+$/, '').substring(0, 30),
                file_url: publicUrl,
                file_type: file.type
            });
        if (insertError) {
            console.error('保存记录失败:', insertError);
            showNotification('保存记录失败', true);
            return;
        }
        showNotification('表情导入成功', false);
        await loadCustomEmojis();
    }
    
    function initCustomEmojiUploader() {
        const addBtn = document.getElementById('addCustomEmojiBtn');
        if (!addBtn) return;
        addBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png,image/gif';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    uploadCustomEmoji(e.target.files[0]);
                }
            };
            input.click();
        };
    }
    
    // 内置表情面板
    function initEmojiPanel() {
        const panel = document.getElementById('emojiPanel');
        const emojiItems = [
            { type: 'text', label: '😊', value: '😊' }, { type: 'text', label: '😂', value: '😂' }, { type: 'text', label: '❤️', value: '❤️' }, { type: 'text', label: '🔥', value: '🔥' }, { type: 'text', label: '🎉', value: '🎉' },
            { type: 'image', name: '微笑', imgUrl: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f642.png', placeholder: '[emoji:微笑]' },
            { type: 'image', name: '大笑', imgUrl: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f606.png', placeholder: '[emoji:大笑]' },
            { type: 'image', name: '动态猫猫', imgUrl: 'https://media1.tenor.com/m/-hxVXVN6bUMAAAAC/cat-cat-stare.gif', placeholder: '[emoji:动态猫猫]' },
            { type: 'image', name: '动态星星', imgUrl: 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXRmM2JxbzVkYnA5MTNheWZ6ZmQ0aWlxZjU0Y2NidTVneWVibzByOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26tP4Jq9z9nz0HPsA/giphy.gif', placeholder: '[emoji:动态星星]' },
            { type: 'image', name: '狗头', imgUrl: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f436.png', placeholder: '[emoji:狗头]' },
        ];
        panel.innerHTML = '';
        emojiItems.forEach(item => {
            const span = document.createElement('span'); span.className = 'emoji-item';
            if (item.type === 'text') {
                span.innerHTML = `<span class="emoji-text">${item.label}</span>`;
                span.onclick = () => {
                    const input = messageInput, start = input.selectionStart, end = input.selectionEnd, text = input.value;
                    input.value = text.substring(0, start) + item.value + text.substring(end);
                    input.focus(); input.selectionStart = input.selectionEnd = start + item.value.length;
                    input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px';
                };
            } else {
                const img = document.createElement('img'); img.src = item.imgUrl; img.style.width = '28px'; img.style.height = '28px'; img.style.objectFit = 'contain';
                const labelSpan = document.createElement('span'); labelSpan.textContent = item.name; labelSpan.style.fontSize = '0.7rem';
                span.appendChild(img); span.appendChild(labelSpan);
                span.onclick = () => {
                    const input = messageInput, start = input.selectionStart, text = input.value;
                    input.value = text.substring(0, start) + item.placeholder + text.substring(start);
                    input.focus(); input.selectionStart = input.selectionEnd = start + item.placeholder.length;
                    input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px';
                };
            }
            panel.appendChild(span);
        });
    }
    
    function autoResizeTextarea() { messageInput.style.height = 'auto'; messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px'; }
    
    async function validateFriendship() {
        if (!currentUser || !friendId) return false;
        const { data, error } = await supabaseClient.from('friends').select('status').or(`and(requester_id.eq.${currentUser.id},addressee_id.eq.${friendId}),and(requester_id.eq.${friendId},addressee_id.eq.${currentUser.id})`).maybeSingle();
        return data?.status === 'accepted';
    }
    async function loadFriendProfile() {
        if (!friendId) return;
        const { data, error } = await supabaseClient.from('user_profiles').select('username, avatar_url').eq('id', friendId).single();
        if (!error && data) {
            friendName = data.username || '好友';
            friendAvatarUrl = data.avatar_url;
            friendNameSpan.innerText = escapeHtml(friendName);
            friendAvatarDiv.innerHTML = friendAvatarUrl ? `<img src="${friendAvatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : friendName.charAt(0).toUpperCase();
        } else friendNameSpan.innerText = '好友';
    }
    
    async function initChat() {
        const { data: { user }, error: userErr } = await supabaseClient.auth.getUser();
        if (userErr || !user) { messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-lock"></i> 请先登录 <a href="index.html" style="color:var(--text-highlight);">去登录</a></div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        currentUser = user;
        const urlParams = new URLSearchParams(window.location.search);
        const fId = urlParams.get('friend_id'), fName = urlParams.get('friend_name');
        if (!fId) { messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> 缺少好友参数，请从好友列表进入</div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        friendId = fId; if (fName) friendName = decodeURIComponent(fName);
        if (currentUser.id === friendId) { messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-ban"></i> 不能和自己聊天哦</div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        await loadFriendProfile();
        const isFriend = await validateFriendship();
        if (!isFriend) { messagesArea.innerHTML = `<div class="error-box"><i class="fas fa-user-friends"></i> 你们还不是好友，无法聊天。请先添加好友。</div>`; document.querySelector('.input-area').style.display = 'none'; return; }
        document.querySelector('.input-area').style.display = 'block';
        initEmojiPanel();
        initCustomEmojiUploader();
        await loadCustomEmojis();
        await loadMessages();
        subscribeMessages();
        messageInput.addEventListener('input', autoResizeTextarea);
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        backBtn.onclick = () => { window.location.href = './friend.html'; };
        
        window.addEventListener('beforeunload', () => {
            if (messagesSubscription) supabaseClient.removeChannel(messagesSubscription);
        });
    }
    initChat().catch(err => { console.error(err); messagesArea.innerHTML = `<div class="error-box">初始化错误: ${escapeHtml(err.message)}</div>`; });
    // 全局函数供图片预览调用
    window.showImagePreview = showImagePreview;
</script>
