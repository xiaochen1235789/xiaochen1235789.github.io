<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱 - 极简调试版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #0a0f1e; color: #eee; font-family: monospace; padding: 20px;">
    <h2>我的邮箱</h2>
    <div id="log"></div>
    <div id="mailContainer"></div>

    <script>
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const logDiv = document.getElementById('log');
        const mailDiv = document.getElementById('mailContainer');
        
        function addLog(msg) {
            const p = document.createElement('div');
            p.textContent = msg;
            logDiv.appendChild(p);
            console.log(msg);
        }
        
        async function run() {
            addLog('初始化中...');
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) {
                addLog('未登录，跳转中...');
                window.location.href = 'login-real.html';
                return;
            }
            addLog('已登录: ' + user.email);
            
            const { data: mails, error: mailError } = await supabase
                .from('user_mails')
                .select('*')
                .eq('to_user_id', user.id)
                .order('created_at', { ascending: false });
            
            if (mailError) {
                addLog('查询失败: ' + mailError.message);
                return;
            }
            addLog('邮件数量: ' + mails.length);
            
            if (mails.length === 0) {
                mailDiv.innerHTML = '<p>暂无邮件</p>';
                return;
            }
            
            // 构建表格
            let html = '<table style="width:100%; border-collapse:collapse; margin-top:20px;">';
            html += '<tr style="background:#2d3748;"><th>标题</th><th>时间</th><th>内容</th></tr>';
            for (let mail of mails) {
                html += `<tr style="border-bottom:1px solid #334155;">
                            <td style="padding:12px;">${escapeHtml(mail.title)}</td>
                            <td style="padding:12px;">${new Date(mail.created_at).toLocaleString()}</td>
                            <td style="padding:12px;">${escapeHtml(mail.content || '')}</td>
                         </tr>`;
            }
            html += '</table>';
            mailDiv.innerHTML = html;
            addLog('渲染完成');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        run();
    </script>
</body>
</html>
