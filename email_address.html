<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的邮箱 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1e; font-family: 'Segoe UI', system-ui, sans-serif; color: #eef2ff; padding-bottom: 60px; }
        .top-nav { background: rgba(15,23,42,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-title { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #F0B90B, #FFD966); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .mail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .mail-header h1 { font-size: 1.6rem; }
        .back-btn { background: #334155; border: none; padding: 6px 16px; border-radius: 40px; color: white; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .mail-list { background: #1e293b; border-radius: 24px; overflow: hidden; }
        .mail-item { padding: 16px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.2s; }
        .mail-item:hover { background: #2d3a4e; }
        .mail-item.unread { background: #2a3f5e; }
        .mail-title { font-weight: bold; font-size: 1.05rem; margin-bottom: 6px; }
        .mail-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px; }
        .empty { text-align: center; padding: 60px 20px; color: #64748b; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border-radius: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 24px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-header h3 { font-size: 1.3rem; }
        .close-modal { background: none; border: none; color: #94a3b8; font-size: 28px; cursor: pointer; }
        .mail-detail-content { white-space: pre-wrap; line-height: 1.5; margin: 16px 0; }
        .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 8px 20px; border-radius: 40px; z-index: 1100; display: none; }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="nav-title">六哥荣耀WIKI</div>
    <div id="userInfo" style="font-size:0.9rem;"></div>
</nav>

<div class="container">
    <div class="mail-header">
        <h1><i class="fas fa-envelope"></i> 我的邮箱</h1>
        <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回个人主页</a>
    </div>
    <div id="mailList" class="mail-list">加载中...</div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="detailTitle"></h3>
            <button class="close-modal" onclick="closeDetailModal()">&times;</button>
        </div>
        <div id="detailMeta" style="font-size:0.8rem; color:#94a3b8; margin-bottom:12px;"></div>
        <div id="detailContent" class="mail-detail-content"></div>
    </div>
</div>

<div id="notification" class="notification"></div>

<script>
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentMails = [];

    function showNotification(msg, type = 'info') {
        const n = document.getElementById('notification');
        n.textContent = msg;
        n.style.background = type === 'error' ? '#f87171' : (type === 'success' ? '#10b981' : '#3b82f6');
        n.style.display = 'block';
        setTimeout(() => { n.style.display = 'none'; }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    async function loadMails() {
        if (!currentUser) return [];
        const { data, error } = await supabase
            .from('user_mails')
            .select('*')
            .eq('to_user_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) {
            console.error('加载邮件失败', error);
            showNotification('加载邮件失败: ' + error.message, 'error');
            return [];
        }
        return data || [];
    }

    async function markAsRead(mailId) {
        if (!currentUser) return;
        await supabase
            .from('user_mails')
            .update({ read_at: new Date().toISOString() })
            .eq('id', mailId)
            .eq('to_user_id', currentUser.id);
    }

    function renderMailList() {
        const container = document.getElementById('mailList');
        if (!currentMails.length) {
            container.innerHTML = '<div class="empty">📭 暂无邮件</div>';
            return;
        }
        let html = '';
        for (const mail of currentMails) {
            const unreadClass = !mail.read_at ? 'unread' : '';
            html += `
                <div class="mail-item ${unreadClass}" data-id="${mail.id}">
                    <div class="mail-title">${escapeHtml(mail.title)}</div>
                    <div class="mail-meta">
                        <span>${new Date(mail.created_at).toLocaleString()}</span>
                        ${!mail.read_at ? '<i class="fas fa-envelope" style="color:#facc15;"></i>' : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.querySelectorAll('.mail-item').forEach(el => {
            el.addEventListener('click', async () => {
                const id = parseInt(el.dataset.id);
                const mail = currentMails.find(m => m.id === id);
                if (!mail) return;
                if (!mail.read_at) {
                    await markAsRead(id);
                    mail.read_at = new Date().toISOString();
                    renderMailList();
                }
                openDetailModal(mail);
            });
        });
    }

    function openDetailModal(mail) {
        document.getElementById('detailTitle').innerText = mail.title;
        document.getElementById('detailMeta').innerHTML = `时间：${new Date(mail.created_at).toLocaleString()}`;
        document.getElementById('detailContent').innerText = mail.content || '(无内容)';
        document.getElementById('detailModal').classList.add('active');
    }

    function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('active');
    }

    async function init() {
        const container = document.getElementById('mailList');
        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) {
                container.innerHTML = '<div class="empty">请先登录</div>';
                showNotification('请先登录', 'error');
                setTimeout(() => {
                    window.location.href = 'login-real.html?redirect=' + encodeURIComponent(window.location.href);
                }, 1500);
                return;
            }
            currentUser = user;
            // 顶部显示邮箱前缀和退出按钮
            const username = user.email ? user.email.split('@')[0] : '用户';
            document.getElementById('userInfo').innerHTML = `<span style="color:#81c784;">${escapeHtml(username)}</span> <button id="logoutBtn" style="background:transparent;color:#f87171;border:1px solid rgba(248,113,113,0.3);padding:4px 12px;border-radius:20px;cursor:pointer;">退出</button>`;
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = 'index.html';
            });
            currentMails = await loadMails();
            renderMailList();
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="empty">初始化失败: ' + err.message + '</div>';
        }
    }

    init();
</script>
</body>
</html>
