<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>邮箱调试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="log" style="white-space:pre-wrap; font-family:monospace; padding:20px; background:#0a0f1e; color:#0f0;"></div>
    <script>
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
        
        const logDiv = document.getElementById('log');
        function addLog(msg) {
            const p = document.createElement('div');
            p.textContent = msg;
            logDiv.appendChild(p);
            console.log(msg);
        }
        
        async function run() {
            addLog('1. 开始初始化');
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            addLog('2. supabase 客户端创建完成');
            
            addLog('3. 开始调用 getUser()');
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                addLog('4. getUser() 返回');
                if (error) {
                    addLog('❌ getUser 错误: ' + error.message);
                    return;
                }
                if (!user) {
                    addLog('⚠️ 用户未登录，准备跳转登录页');
                    setTimeout(() => { window.location.href = 'login-real.html'; }, 2000);
                    return;
                }
                addLog('5. 用户已登录: ' + user.email);
                
                addLog('6. 开始查询邮件表');
                const { data: mails, error: mailError } = await supabase
                    .from('user_mails')
                    .select('*')
                    .eq('to_user_id', user.id)
                    .order('created_at', { ascending: false });
                
                addLog('7. 邮件查询返回');
                if (mailError) {
                    addLog('❌ 邮件查询失败: ' + mailError.message);
                    return;
                }
                addLog('8. 邮件数量: ' + (mails ? mails.length : 0));
                if (mails && mails.length > 0) {
                    addLog('9. 第一封邮件标题: ' + (mails[0].title || '无标题'));
                }
                addLog('✅ 完成，一切正常');
            } catch (err) {
                addLog('❌ 捕获异常: ' + err.message);
            }
        }
        
        run();
    </script>
</body>
</html>
