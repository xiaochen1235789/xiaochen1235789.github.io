<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>邮箱诊断</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<h3>邮箱诊断工具</h3>
<div id="log">初始化...</div>

<script>
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function run() {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = '1. 正在获取用户...<br>';

        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error) throw new Error(`获取用户出错: ${error.message}`);
            if (!user) throw new Error('未登录，请先登录');

            logDiv.innerHTML += `2. 已登录用户: ${user.email}<br>`;
            logDiv.innerHTML += `3. 正在查询邮件表...<br>`;

            const { data, error: queryError } = await supabase
                .from('user_mails')
                .select('*')
                .eq('to_user_id', user.id)
                .limit(3);

            if (queryError) throw new Error(`查询失败: ${queryError.message}`);

            if (!data || data.length === 0) {
                logDiv.innerHTML += `4. 结果: 暂无邮件。<br>`;
            } else {
                logDiv.innerHTML += `4. 成功! 找到 ${data.length} 封邮件。<br>`;
                data.forEach(m => {
                    logDiv.innerHTML += `- ${m.title} (${new Date(m.created_at).toLocaleString()})<br>`;
                });
            }
        } catch (err) {
            logDiv.innerHTML += `<span style="color:red;">❌ 错误: ${err.message}</span><br>`;
            console.error(err);
        }
    }

    run();
</script>
</body>
</html>
