<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的邮箱 - 六哥荣耀WIKI</title>
    <link rel="icon" href="https://xiaochen1235789.github.io/images/wangzhantupian.png">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef2ff;
            padding-bottom: 60px;
        }
        /* 顶部导航 */
        .top-nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #F0B90B, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 16px;
        }
        .user-nav-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .mail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .mail-header h1 {
            font-size: 1.6rem;
        }
        .back-btn {
            background: #334155;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .mail-list {
            background: #1e293b;
            border-radius: 24px;
            overflow: hidden;
        }
        .mail-item {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mail-item:hover {
            background: #2d3a4e;
        }
        .mail-item.unread {
            background: #2a3f5e;
        }
        .mail-title {
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 6px;
        }
        .mail-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .mail-preview {
            font-size: 0.85rem;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .claim-badge {
            background: #f59e0b;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #1e293b;
            font-weight: bold;
        }
        .claimed-badge {
            background: #10b981;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h3 {
            font-size: 1.3rem;
        }
        .close-modal {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 28px;
            cursor: pointer;
        }
        .mail-detail-content {
            white-space: pre-wrap;
            line-height: 1.5;
            margin: 16px 0;
        }
        .mail-detail-attachments {
            background: #0f172a;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
        }
        .claim-btn {
            background: #f59e0b;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #1e293b;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        .claim-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 1100;
            display: none;
        }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="nav-title">六哥荣耀WIKI</div>
    <div class="user-nav-section" id="userNavSection">
        <a href="login-real.html" class="nav-link" style="color:var(--text-highlight);">登录/注册</a>
    </div>
</nav>

<div class="container">
    <div class="mail-header">
        <h1><i class="fas fa-envelope"></i> 我的邮箱</h1>
        <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回个人主页</a>
    </div>
    <div id="mailList" class="mail-list">加载中...</div>
</div>

<!-- 邮件详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="detailTitle"></h3>
            <button class="close-modal" onclick="closeDetailModal()">&times;</button>
        </div>
        <div id="detailMeta" style="font-size:0.8rem; color:#94a3b8; margin-bottom:12px;"></div>
        <div id="detailContent" class="mail-detail-content"></div>
        <div id="detailAttachments" class="mail-detail-attachments"></div>
        <button id="detailClaimBtn" class="claim-btn">领取附件</button>
    </div>
</div>

<div id="notification" class="notification"></div>

<script>
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentMails = [];
    let currentDetailMail = null;

    function showNotification(msg, type = 'info') {
        const n = document.getElementById('notification');
        n.textContent = msg;
        n.style.background = type === 'error' ? '#f87171' : (type === 'success' ? '#10b981' : '#3b82f6');
        n.style.display = 'block';
        setTimeout(() => { n.style.display = 'none'; }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    async function loadMails() {
        const { data, error } = await supabase
            .from('user_mails')
            .select('*')
            .eq('to_user_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) {
            showNotification('加载失败', 'error');
            return [];
        }
        return data;
    }

    async function markAsRead(mailId) {
        await supabase
            .from('user_mails')
            .update({ read_at: new Date().toISOString() })
            .eq('id', mailId)
            .eq('to_user_id', currentUser.id);
    }

    async function claimAttachments(mail) {
        if (mail.claimed_at) {
            showNotification('奖励已领取过了', 'warning');
            return false;
        }
        const items = mail.claimable_items || [];
        if (items.length === 0) {
            showNotification('这封邮件没有附件', 'info');
            return false;
        }
        let candyDelta = 0, rainbowDelta = 0;
        let titleIds = [], frameIds = [];
        for (let item of items) {
            if (item.type === 'candy') candyDelta += item.amount;
            else if (item.type === 'rainbow') rainbowDelta += item.amount;
            else if (item.type === 'title') titleIds.push(item.title_id);
            else if (item.type === 'frame') frameIds.push(item.frame_id);
        }
        // 更新资产
        if (candyDelta !== 0 || rainbowDelta !== 0) {
            const { data: stats } = await supabase.from('user_stats').select('candy_crumbles, rainbow_lollipops').eq('user_id', currentUser.id).single();
            const newCandy = (stats?.candy_crumbles || 0) + candyDelta;
            const newRainbow = (stats?.rainbow_lollipops || 0) + rainbowDelta;
            await supabase.from('user_stats').update({ candy_crumbles: newCandy, rainbow_lollipops: newRainbow }).eq('user_id', currentUser.id);
        }
        for (let tid of titleIds) {
            await supabase.from('user_titles').upsert({ user_id: currentUser.id, title_id: tid }, { onConflict: 'user_id, title_id' });
        }
        for (let fid of frameIds) {
            await supabase.from('user_frames').upsert({ user_id: currentUser.id, frame_id: fid, equipped: false }, { onConflict: 'user_id, frame_id' });
        }
        // 标记已领取
        const { error } = await supabase
            .from('user_mails')
            .update({ claimed_items: items, claimed_at: new Date().toISOString() })
            .eq('id', mail.id)
            .eq('to_user_id', currentUser.id);
        if (error) {
            showNotification('领取失败', 'error');
            return false;
        }
        showNotification('奖励已领取！', 'success');
        return true;
    }

    function renderMailList() {
        const container = document.getElementById('mailList');
        if (!currentMails.length) {
            container.innerHTML = '<div class="empty">📭 暂无邮件，管理员可能会给你发送奖励哦~</div>';
            return;
        }
        let html = '';
        for (const mail of currentMails) {
            const unreadClass = !mail.read_at ? 'unread' : '';
            const hasAttach = (mail.claimable_items || []).length > 0;
            const isClaimed = !!mail.claimed_at;
            html += `
                <div class="mail-item ${unreadClass}" data-id="${mail.id}">
                    <div class="mail-title">${escapeHtml(mail.title)}</div>
                    <div class="mail-meta">
                        <span>${new Date(mail.created_at).toLocaleString()}</span>
                        ${hasAttach ? (isClaimed ? '<span class="claim-badge claimed-badge">已领取</span>' : '<span class="claim-badge">📎 有附件</span>') : ''}
                    </div>
                    <div class="mail-preview">
                        <span>${escapeHtml(mail.content.substring(0, 100))}${mail.content.length > 100 ? '…' : ''}</span>
                        ${!mail.read_at ? '<i class="fas fa-envelope" style="color:#facc15;"></i>' : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        // 绑定点击事件
        document.querySelectorAll('.mail-item').forEach(el => {
            el.addEventListener('click', async () => {
                const id = parseInt(el.dataset.id);
                const mail = currentMails.find(m => m.id === id);
                if (mail && !mail.read_at) {
                    await markAsRead(id);
                    mail.read_at = new Date().toISOString();
                    renderMailList();
                }
                openDetailModal(mail);
            });
        });
    }

    function openDetailModal(mail) {
        currentDetailMail = mail;
        document.getElementById('detailTitle').innerText = mail.title;
        document.getElementById('detailMeta').innerHTML = `时间：${new Date(mail.created_at).toLocaleString()}`;
        document.getElementById('detailContent').innerText = mail.content;
        const attachContainer = document.getElementById('detailAttachments');
        const items = mail.claimable_items || [];
        if (items.length === 0) {
            attachContainer.innerHTML = '<em>无附件</em>';
            document.getElementById('detailClaimBtn').style.display = 'none';
        } else {
            let attachHtml = '<strong>📦 附件：</strong><ul style="margin-top:8px; list-style:none;">';
            for (let item of items) {
                if (item.type === 'candy') attachHtml += `<li>🍬 糖果碎 x${item.amount}</li>`;
                else if (item.type === 'rainbow') attachHtml += `<li>🌈 彩虹棒糖 x${item.amount}</li>`;
                else if (item.type === 'title') attachHtml += `<li>🏅 称号 ID:${item.title_id}</li>`;
                else if (item.type === 'frame') attachHtml += `<li>🖼️ 头像框:${item.frame_id}</li>`;
            }
            attachHtml += '</ul>';
            attachContainer.innerHTML = attachHtml;
            const claimBtn = document.getElementById('detailClaimBtn');
            claimBtn.style.display = 'block';
            claimBtn.disabled = !!mail.claimed_at;
            claimBtn.innerText = mail.claimed_at ? '已领取' : '领取附件';
            claimBtn.onclick = async () => {
                if (mail.claimed_at) return;
                const success = await claimAttachments(mail);
                if (success) {
                    mail.claimed_at = new Date().toISOString();
                    mail.claimed_items = mail.claimable_items;
                    claimBtn.disabled = true;
                    claimBtn.innerText = '已领取';
                    renderMailList(); // 刷新列表中的标记
                }
            };
        }
        document.getElementById('detailModal').classList.add('active');
    }

    function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('active');
        currentDetailMail = null;
    }

    async function initUser() {
        const { data: { user }, error } = await supabase.auth.getUser();
        if (error || !user) {
            window.location.href = 'login-real.html';
            return;
        }
        currentUser = user;
        // 更新导航栏
        const navDiv = document.getElementById('userNavSection');
        let username = user.email.split('@')[0];
        navDiv.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">
            <span style="color:#81c784;">${escapeHtml(username)}</span>
            <button id="logoutBtn" style="background:transparent;color:#f87171;border:1px solid rgba(248,113,113,0.3);padding:4px 12px;border-radius:20px;cursor:pointer;">退出</button>
        </div>`;
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
        // 加载邮件
        currentMails = await loadMails();
        renderMailList();
    }

    initUser();
</script>
</body>
</html>
