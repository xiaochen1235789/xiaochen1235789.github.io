<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/profile_picture_frame/Green_cat_earsTXK.webp">
    <style>
        /* 完整样式（与之前完全相同，此处只展示核心，实际包含全部样式） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            color: #eef2ff;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        /* 横屏/宽屏时左右分栏 */
        .mail-layout {
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            gap: 20px;
        }
        @media (min-width: 768px) and (orientation: landscape) {
            .mail-layout {
                flex-direction: row;
                align-items: flex-start;
            }
            .mail-list-section {
                flex: 1.2;
                min-width: 280px;
                max-width: 400px;
            }
            .mail-detail-section {
                flex: 2;
                background: #1e293b;
                border-radius: 28px;
                padding: 20px;
                min-height: 70vh;
                position: sticky;
                top: 20px;
            }
            .modal:not(.reward-modal):not(.info-modal):not(.confirm-modal) {
                display: none !important;
            }
            .detail-panel-close {
                display: inline-flex !important;
            }
        }
        @media (max-width: 767px), (orientation: portrait) {
            .mail-detail-section {
                display: none;
            }
        }
        /* 公用样式 */
        .mail-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .mail-item {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border-left: 3px solid transparent;
        }
        .mail-item.selected {
            border-left-color: #facc15;
            background: #2a3f5e;
        }
        .mail-item.unread {
            border-left-color: #facc15;
            background: #2a3f5e;
        }
        .mail-item:active {
            transform: scale(0.99);
        }
        .mail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
        }
        .mail-title {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .mail-meta {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .mail-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .claim-btn {
            background: #f59e0b;
            border: none;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            color: #1e293b;
            transition: opacity 0.2s;
        }
        .claim-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .claimed-badge {
            font-size: 0.75rem;
            color: #10b981;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #f87171;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .delete-btn:active {
            background: rgba(248,113,113,0.2);
        }
        .delete-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .detail-panel {
            background: #1e293b;
            border-radius: 28px;
            padding: 20px;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .detail-title {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .detail-date {
            font-size: 0.75rem;
            color: #94a3b8;

        }
        .detail-from {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .detail-content {
            white-space: pre-wrap;
            margin: 16px 0;
            line-height: 1.5;
        }
        .detail-attach {
            background: #0f172a;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
        }
        .detail-claim-btn {
            background: #f59e0b;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 12px;
            transition: opacity 0.2s;
        }
        .detail-claim-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .title-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .unread-badge {
            background: #f87171;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .delete-all-btn {
            background: #f87171;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }
        .delete-all-btn:active {
            opacity: 0.8;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        /* 搜索和分页 */
        .mail-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #3b4b6e;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-size: 0.9rem;

        }
        .search-input:focus {
            border-color: #facc15;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .page-btn {
            background: #1e293b;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #cbd5e1;
            cursor: pointer;
        }
        .page-btn.active {
            background: #f59e0b;
            color: #1e293b;
            font-weight: bold;
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .retry-btn {
            background: #f59e0b;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 12px;
        }
        /* 模态框基础样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            max-width: 550px;
            width: 90%;
            border-radius: 28px;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .close-modal,
        .detail-panel-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #cbd5e1;
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            line-height: 1;
        }
        .close-modal:hover,
        .detail-panel-close:hover {
            background: rgba(248, 113, 113, 0.3);
            color: #f87171;
            transform: scale(1.05);
        }
        .close-modal:active,
        .detail-panel-close:active {
            transform: scale(0.95);
        }
        /* 奖励弹窗 - 带图片 */
        .reward-modal .modal-content {
            text-align: center;
            max-width: 280px;
            padding: 20px;
        }
        .reward-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #facc15;
        }
        .reward-icon-container {
            position: relative;
            display: inline-block;
            margin: 10px auto;
            cursor: pointer;
        }
        .reward-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
        }
        .reward-count-badge {
            position: absolute;
            bottom: -8px;
            right: -8px;
            background: #f59e0b;
            color: #1e293b;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 2px 8px;
            border-radius: 40px;
            border: 2px solid #1e293b;
        }
        .reward-confirm {
            background: #f59e0b;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 80%;
            margin-top: 24px;
        }
        .info-modal .modal-content {
            max-width: 280px;
            text-align: center;
            padding: 24px 20px;
        }
        .info-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .info-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #facc15;
        }
        .info-desc {
            font-size: 0.9rem;
            line-height: 1.4;
            margin: 12px 0;
            color: #cbd5e1;
        }
        .info-close {
            background: #f59e0b;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        .confirm-modal .modal-content {
            max-width: 300px;
            text-align: center;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .confirm-btn {
            padding: 6px 20px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .confirm-btn.cancel {
            background: #475569;
            color: white;
        }
        .confirm-btn.confirm {
            background: #f87171;
            color: white;
        }
        .error-tip {
            color: #f87171;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="mail-layout">
    <div class="mail-list-section">
        <h2>
            <div class="title-left">
                📬 我的邮箱
                <span id="unreadBadge" class="unread-badge" style="display:none;">0</span>
            </div>
            <button id="deleteAllBtn" class="delete-all-btn">全部删除</button>
        </h2>
        <div class="mail-controls">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索邮件标题或内容...">
        </div>
        <div id="mailList" class="mail-list">加载中...</div>
        <div id="pagination" class="pagination"></div>

    </div>
    <div class="mail-detail-section" id="detailPanel">
        <div class="detail-header">
            <span class="detail-title" id="panelTitle">邮件详情</span>
            <button class="detail-panel-close" id="closePanelBtn">&times;</button>
        </div>
        <div id="panelDate" class="detail-date"></div>
        <div id="panelFrom" class="detail-from"></div>
        <div id="panelContent" class="detail-content"></div>
        <div id="panelAttach" class="detail-attach"></div>
        <button id="panelClaimBtn" class="detail-claim-btn" style="display:none;">领取附件</button>

</div>

<!-- 竖屏详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center;">
            <span class="modal-title" id="modalTitle"></span>
            <button class="close-modal" onclick="closeDetailModal()">&times;</button>
        </div>
        <div id="modalDate" class="modal-date"></div>
        <div id="modalFrom" class="detail-from"></div>
        <div id="modalContent" class="modal-body"></div>
        <div id="modalAttach" class="modal-attach"></div>
        <button id="modalClaimBtn" class="detail-claim-btn" style="display:none;">领取附件</button>
        <button id="modalDeleteBtn" class="detail-claim-btn" style="display:none; background:#f87171; margin-top:8px;">删除邮件</button>
    </div>
</div>

<div id="rewardModal" class="modal reward-modal">
    <div class="modal-content">
        <div class="reward-title">🎉 获得奖励</div>
        <div class="reward-icon-container" id="rewardIconContainer">
            <img id="rewardImage" class="reward-image" src="" alt="奖励图标">
            <span id="rewardCountBadge" class="reward-count-badge"></span>
        </div>
        <button class="reward-confirm" id="rewardConfirmBtn">确定</button>

</div>

<div id="itemInfoModal" class="modal info-modal">

        <div class="info-icon" id="infoIcon">🍬</div>
        <div class="info-name" id="infoName">糖果碎</div>
        <div class="info-desc" id="infoDesc">可用于购买道具、兑换物品。</div>
        <button class="info-close" onclick="closeItemInfoModal()">知道了</button>
    </div>
</div>

<div id="confirmModal" class="modal confirm-modal">
    <div class="modal-content">
        <div id="confirmMessage" style="margin: 16px 0;">确定要删除吗？</div>
        <div class="confirm-buttons">
            <button class="confirm-btn cancel" id="confirmCancelBtn">取消</button>
            <button class="confirm-btn confirm" id="confirmOkBtn">确定</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';

    // 新增头像框ID和中文名的映射
    const FRAME_DISPLAY_MAP = {
        'nature': '默认头像框',
        'frame_gold': '黄金流光',
        'frame_rainbow': '彩虹炫光',
        'frame_neon_blue': '霓虹蓝光',
        'frame_pulse_purple': '紫色脉冲'
    };

    let currentMails = [];
    let filteredMails = [];
    let currentUserId = null;
    let pendingDeleteAction = null;
    let currentSelectedMail = null;
    let userNamesMap = new Map();
    let currentUserStats = { candy_crumbles: 0, rainbow_lollipops: 0 };
    let currentPage = 1;
    const PAGE_SIZE = 15;
    let searchKeyword = '';
    let loadingError = false;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function showNotification(msg, type = 'info') {
        alert(msg);
    }

    function formatDate(isoString) {
        if (!isoString) return '';
        return new Date(isoString).toLocaleString();
    }

    function getSenderDisplay(mail) {
        if (mail.sender_name) return mail.sender_name;
        const senderId = mail.created_by_admin;
        if (!senderId) return '系统';
        const username = userNamesMap.get(senderId);
        return username || '未知用户';
    }

    function isDeletable(mail) {
        const items = mail.claimable_items || [];
        const hasUnclaimed = items.length > 0 && !mail.claimed_at;
        return !hasUnclaimed;
    }

    function updateUnreadBadge() {
        const unreadCount = currentMails.filter(m => !m.read_at).length;
        const badge = document.getElementById('unreadBadge');
        if (unreadCount > 0) {
            badge.textContent = unreadCount;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
        document.title = unreadCount > 0 ? `(${unreadCount}) 我的邮箱 - 六哥荣耀` : '我的邮箱 - 六哥荣耀';
    }

    function applyFilter() {
        if (!searchKeyword.trim()) {
            filteredMails = [...currentMails];
        } else {
            const kw = searchKeyword.trim().toLowerCase();
            filteredMails = currentMails.filter(m => 
                m.title.toLowerCase().includes(kw) || 
                (m.content && m.content.toLowerCase().includes(kw))
            );
        }
        currentPage = 1;
        renderMailList();
        renderPagination();
    }

    function renderMailList() {
        const container = document.getElementById('mailList');
        if (!container) return;
        if (filteredMails.length === 0) {
            container.innerHTML = '<div class="empty-tip">📭 暂无邮件</div>';
            return;
        }
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageMails = filteredMails.slice(start, start + PAGE_SIZE);
        let html = '';
        for (const mail of pageMails) {
            const hasAttach = (mail.claimable_items && mail.claimable_items.length > 0);
            const isClaimed = !!mail.claimed_at;
            const unreadClass = !mail.read_at ? 'unread' : '';
            const selectedClass = (currentSelectedMail && currentSelectedMail.id === mail.id) ? 'selected' : '';
            const sender = escapeHtml(getSenderDisplay(mail));
            html += `
                <div class="mail-item ${unreadClass} ${selectedClass}" data-id="${mail.id}">
                    <div class="mail-header">
                        <div>
                            <div class="mail-title">${escapeHtml(mail.title)}</div>
                            <div class="mail-meta">来自：${sender} · ${formatDate(mail.created_at)}</div>
                        </div>
                        <div class="mail-actions">
                            ${hasAttach && !isClaimed ? `<button class="claim-btn" data-id="${mail.id}">🎁 领取</button>` : (isClaimed ? '<span class="claimed-badge">✅ 已领取</span>' : '')}
                            <button class="delete-btn" data-id="${mail.id}" title="删除邮件">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.claim-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const mailId = parseInt(btn.dataset.id);
                await claimMail(mailId);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const mailId = parseInt(btn.dataset.id);
                const mail = currentMails.find(m => m.id === mailId);
                if (!mail) return;
                if (!isDeletable(mail)) {
                    showNotification('该邮件有未领取的附件，请先领取后再删除', 'warning');
                    return;
                }
                showConfirm('确定要删除这封邮件吗？', async () => {
                    await deleteMail(mailId);
                    closeConfirmModal();
                    if (currentSelectedMail && currentSelectedMail.id === mailId) {
                        renderDetailPanel(null);
                        currentSelectedMail = null;
                    }
                });
            });
        });
        document.querySelectorAll('.mail-item').forEach(el => {
            el.addEventListener('click', async (e) => {
                if (e.target.classList.contains('claim-btn') || e.target.classList.contains('delete-btn')) return;
                const id = parseInt(el.dataset.id);
                const mail = currentMails.find(m => m.id === id);
                if (!mail) return;
                document.querySelectorAll('.mail-item').forEach(item => item.classList.remove('selected'));
                el.classList.add('selected');
                currentSelectedMail = mail;
                if (!mail.read_at) {
                    await markAsRead(mail.id);
                    mail.read_at = new Date().toISOString();
                    updateUnreadBadge();
                    renderMailList();
                }
                if (window.innerWidth >= 768 && window.matchMedia("(orientation: landscape)").matches) {
                    renderDetailPanel(mail);
                } else {
                    openDetailModal(mail);
                }
            });
        });
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredMails.length / PAGE_SIZE);
        const container = document.getElementById('pagination');
        if (!container || totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        let html = '';
        html += `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1 ? 'disabled' : ''}>‹</button>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages ? 'disabled' : ''}>›</button>`;
        container.innerHTML = html;
        document.querySelectorAll('.page-btn').forEach(btn => {
            const page = parseInt(btn.dataset.page);
            if (!isNaN(page)) {
                btn.addEventListener('click', () => {
                    if (page < 1 || page > totalPages) return;
                    currentPage = page;
                    renderMailList();
                    renderPagination();
                });
            }
        });
    }

    async function markAsRead(mailId) {
        const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
        if (!sessionStr) return;
        const session = JSON.parse(sessionStr);
        const token = session.access_token;
        await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=eq.${mailId}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ read_at: new Date().toISOString() })
        });
    }

    async function deleteMail(mailId) {
        const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
        if (!sessionStr) throw new Error('未登录');
        const session = JSON.parse(sessionStr);
        const token = session.access_token;
        const userId = session.user.id;
        const response = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=eq.${mailId}&to_user_id=eq.${userId}`, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('删除失败');
        currentMails = currentMails.filter(m => m.id !== mailId);
        applyFilter();
        if (currentSelectedMail && currentSelectedMail.id === mailId) {
            renderDetailPanel(null);
            currentSelectedMail = null;
        }
        updateUnreadBadge();
        showNotification('邮件已删除', 'success');
    }

    async function deleteAllMails() {
        const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
        if (!sessionStr) throw new Error('未登录');
        const session = JSON.parse(sessionStr);
        const token = session.access_token;
        const userId = session.user.id;
        const deletableIds = currentMails.filter(mail => {
            const hasUnclaimed = (mail.claimable_items?.length > 0 && !mail.claimed_at);
            return mail.read_at && !hasUnclaimed;
        }).map(mail => mail.id);
        if (deletableIds.length === 0) {
            showNotification('没有可删除的邮件（只有已读且无未领取附件的邮件才能批量删除）', 'info');
            return;
        }
        const idsParam = deletableIds.join(',');
        const response = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=in.(${idsParam})&to_user_id=eq.${userId}`, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('批量删除失败');
        currentMails = currentMails.filter(m => !deletableIds.includes(m.id));
        applyFilter();
        if (currentSelectedMail && deletableIds.includes(currentSelectedMail.id)) {
            renderDetailPanel(null);
            currentSelectedMail = null;
        }
        updateUnreadBadge();
        showNotification(`已删除 ${deletableIds.length} 封邮件`, 'success');
    }

    async function grantTitle(userId, titleId, token) {
        const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/user_titles?user_id=eq.${userId}&title_id=eq.${titleId}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
        });
        const existing = await checkRes.json();
        if (existing.length === 0) {
            await fetch(`${SUPABASE_URL}/rest/v1/user_titles`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, title_id: titleId })
            });
        }
    }

    // 【重要修改】废弃 user_frames 表，改为读写 user_profiles 的 owned_frames 数组
    async function grantFrame(userId, frameId, token) {
        // 1. 先读取用户当前的头像框拥有状态
        const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/user_profiles?id=eq.${userId}&select=owned_frames`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
        });
        const profiles = await profileRes.json();
        let ownedFrames = profiles[0]?.owned_frames || ['nature'];

        // 2. 检查是否已经拥有
        if (!ownedFrames.includes(frameId)) {
            ownedFrames.push(frameId);
            // 3. 去重并更新 user_profiles 表
            const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/user_profiles?id=eq.${userId}`, {
                method: 'PATCH',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ owned_frames: ownedFrames })
            });
            if (!patchRes.ok) throw new Error('头像框添加失败');
        }
    }

    async function claimMail(mailId) {
        const claimBtn = document.querySelector(`.claim-btn[data-id="${mailId}"]`);
        const panelClaimBtn = document.getElementById('panelClaimBtn');
        const modalClaimBtn = document.getElementById('modalClaimBtn');
        const setButtonsLoading = (loading) => {
            if (claimBtn) claimBtn.disabled = loading;
            if (panelClaimBtn) panelClaimBtn.disabled = loading;
            if (modalClaimBtn) modalClaimBtn.disabled = loading;
            if (panelClaimBtn) panelClaimBtn.innerText = loading ? '领取中...' : (mail => mail && mail.claimed_at ? '已领取' : '领取附件');
            if (modalClaimBtn) modalClaimBtn.innerText = loading ? '领取中...' : (mail => mail && mail.claimed_at ? '已领取' : '领取附件');
        };
        try {
            const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
            if (!sessionStr) throw new Error('未登录');
            const session = JSON.parse(sessionStr);
            const token = session.access_token;
            const userId = session.user.id;

            const res = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=eq.${mailId}&to_user_id=eq.${userId}&select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const mails = await res.json();
            const mail = mails[0];
            if (!mail) throw new Error('邮件不存在');
            if (mail.claimed_at) throw new Error('已经领取过了');
            const items = mail.claimable_items || [];
            if (items.length === 0) throw new Error('该邮件没有附件');

            setButtonsLoading(true);
            const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=eq.${mailId}&claimed_at=is.null`, {
                method: 'PATCH',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=headers'
                },
                body: JSON.stringify({ claimed_at: new Date().toISOString() })
            });
            if (!patchRes.ok) throw new Error('领取失败，可能已被抢先领取');

            let candyDelta = 0, rainbowDelta = 0;
            let rewardImgUrl = '';
            let rewardAmount = 0;
            let rewardItemType = '';
            let rewardName = '神秘物品';
            let claimedFrameId = null;

            for (const item of items) {
                if (item.type === 'candy') candyDelta += item.amount;
                else if (item.type === 'rainbow') rainbowDelta += item.amount;
                else if (item.type === 'title') {
                    await grantTitle(userId, item.title_id, token);
                } else if (item.type === 'frame') {
                    claimedFrameId = item.frame_id;
                    await grantFrame(userId, item.frame_id, token);
                }
            }

            if (candyDelta > 0) {
                rewardImgUrl = 'https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/props/Crushed_sugar.webp';
                rewardAmount = candyDelta;
                rewardItemType = 'candy';
                rewardName = '糖果碎';
            } else if (rainbowDelta > 0) {
                rewardImgUrl = 'https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/props/Super_Sweet.webp';
                rewardAmount = rainbowDelta;
                rewardItemType = 'rainbow';
                rewardName = '彩虹棒糖';
            } else if (claimedFrameId) {
                rewardImgUrl = 'https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/props/Crushed_sugar.webp'; // 占位图标
                rewardAmount = 0;
                rewardItemType = 'frame';
                rewardName = FRAME_DISPLAY_MAP[claimedFrameId] || '全新头像框';
            } else {
                rewardImgUrl = 'https://ysmijycsyzpjoieaknmb.supabase.co/storage/v1/object/public/items/props/Crushed_sugar.webp';
                rewardAmount = 0;
                rewardItemType = 'other';
                rewardName = '全新物品';
            }

            if (candyDelta > 0 || rainbowDelta > 0) {
                const newCandy = (currentUserStats.candy_crumbles || 0) + candyDelta;
                const newRainbow = (currentUserStats.rainbow_lollipops || 0) + rainbowDelta;
                await fetch(`${SUPABASE_URL}/rest/v1/user_stats?user_id=eq.${userId}`, {
                    method: 'PUT',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_id: userId, candy_crumbles: newCandy, rainbow_lollipops: newRainbow })
                });
                currentUserStats.candy_crumbles = newCandy;
                currentUserStats.rainbow_lollipops = newRainbow;
            }

            const targetMail = currentMails.find(m => m.id === mailId);
            if (targetMail) {
                targetMail.claimed_at = new Date().toISOString();
            }
            applyFilter();
            if (currentSelectedMail && currentSelectedMail.id === mailId) {
                currentSelectedMail.claimed_at = targetMail.claimed_at;
                renderDetailPanel(currentSelectedMail);
            }
            setButtonsLoading(false);

            // 显示奖励弹窗
            showRewardModal(rewardImgUrl, rewardAmount, rewardItemType, rewardName);
        } catch (err) {
            setButtonsLoading(false);
            alert('领取失败：' + err.message);
        }
    }

    // 【重要修改】增强奖励弹窗，给头像框类型增加特定点击显示的说明
    function showRewardModal(imgUrl, amount, itemType, rewardName) {
        const modal = document.getElementById('rewardModal');
        const img = document.getElementById('rewardImage');
        const badge = document.getElementById('rewardCountBadge');
        const container = document.getElementById('rewardIconContainer');
        img.src = imgUrl;
        if (amount > 0) {
            badge.textContent = `× ${amount}`;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
        // 重新绑定容器点击事件（用于显示物品详情）
        const newContainer = container.cloneNode(true);
        container.parentNode.replaceChild(newContainer, container);
        newContainer.id = 'rewardIconContainer';
        document.getElementById('rewardModal').querySelector('.modal-content').insertBefore(newContainer, document.querySelector('#rewardModal .reward-confirm'));
        const newImg = newContainer.querySelector('#rewardImage');
        const newBadge = newContainer.querySelector('#rewardCountBadge');
        newImg.id = 'rewardImage';
        newBadge.id = 'rewardCountBadge';
        
        let infoTitle = '神秘物品';
        let infoDesc = '';
        if (itemType === 'candy') {
            infoTitle = '🍬 糖果碎';
            infoDesc = '可用于购买道具、兑换物品。';
        } else if (itemType === 'rainbow') {
            infoTitle = '🌈 彩虹棒糖';
            infoDesc = '稀有货币，高级商品兑换。';
        } else if (itemType === 'frame') {
            infoTitle = `🖼️ ${rewardName}`;
            infoDesc = '已自动添加到你的头像框列表中，去商店装备它吧！';
        } else {
            infoTitle = '🎁 神秘物品';
            infoDesc = '未知奖励。';
        }
        newContainer.addEventListener('click', () => {
            showItemInfoModal(infoTitle, infoDesc);
        });
        modal.classList.add('show');
    }

    function closeRewardModal() {

    function showConfirm(message, onConfirm) {

        document.getElementById('confirmMessage').innerText = message;
        pendingDeleteAction = onConfirm;
        modal.classList.add('show');
    }

    function renderDetailPanel(mail) {
        const panel = document.getElementById('detailPanel');
        if (!mail) {
            document.getElementById('panelEmpty').style.display = 'block';
            document.getElementById('panelTitle').innerText = '邮件详情';
            document.getElementById('panelDate').innerHTML = '';
            document.getElementById('panelFrom').innerHTML = '';
            document.getElementById('panelContent').innerHTML = '';
            document.getElementById('panelAttach').innerHTML = '';
            document.getElementById('panelClaimBtn').style.display = 'none';
            document.getElementById('panelDeleteBtn').style.display = 'none';
            return;
        }
        document.getElementById('panelEmpty').style.display = 'none';
        document.getElementById('panelTitle').innerText = mail.title;
        document.getElementById('panelDate').innerHTML = formatDate(mail.created_at);
        document.getElementById('panelFrom').innerHTML = `来自：${escapeHtml(getSenderDisplay(mail))}`;
        document.getElementById('panelContent').innerHTML = escapeHtml(mail.content || '(无内容)').replace(/\n/g, '<br>');
        const items = mail.claimable_items || [];
        const attachDiv = document.getElementById('panelAttach');
        if (items.length === 0) {
            attachDiv.innerHTML = '<em>无附件</em>';
            document.getElementById('panelClaimBtn').style.display = 'none';
        } else {
            let attachHtml = '<strong>📦 附件：</strong><ul style="margin-top:6px; list-style:none;">';
            for (let item of items) {
                if (item.type === 'candy') attachHtml += `<li>🍬 糖果 x${item.amount}</li>`;
                else if (item.type === 'rainbow') attachHtml += `<li>🌈 彩虹棒糖 x${item.amount}</li>`;
                else if (item.type === 'title') attachHtml += `<li>🏅 称号 ID:${item.title_id}</li>`;
                else if (item.type === 'frame') {
                    const frameName = FRAME_DISPLAY_MAP[item.frame_id] || item.frame_id;
                    attachHtml += `<li>🖼️ 头像框: ${frameName}</li>`;
                }
            }
            attachHtml += '</ul>';
            attachDiv.innerHTML = attachHtml;
            const claimBtn = document.getElementById('panelClaimBtn');
            claimBtn.style.display = 'block';
            const isClaimed = !!mail.claimed_at;
            claimBtn.disabled = isClaimed;
            claimBtn.innerText = isClaimed ? '已领取' : '领取附件';
            claimBtn.onclick = async () => {
                if (claimBtn.disabled) return;
                await claimMail(mail.id);
            };
        }
        const delBtn = document.getElementById('panelDeleteBtn');
        delBtn.style.display = 'block';
        const deletable = isDeletable(mail);
        delBtn.disabled = !deletable;
        delBtn.style.opacity = deletable ? '1' : '0.6';
        delBtn.innerText = deletable ? '删除邮件' : '有未领取附件，不可删除';
        delBtn.onclick = () => {
            if (!deletable) {
                showNotification('该邮件有未领取的附件，请先领取后再删除', 'warning');
                return;
            }
            showConfirm('确定要删除这封邮件吗？', async () => {
                await deleteMail(mail.id);
                closeConfirmModal();
                if (currentSelectedMail && currentSelectedMail.id === mail.id) {
                    renderDetailPanel(null);
                    currentSelectedMail = null;
                }
            });
        };
    }

    async function fetchUserStats(userId, token) {
        const statsRes = await fetch(`${SUPABASE_URL}/rest/v1/user_stats?user_id=eq.${userId}&select=candy_crumbles,rainbow_lollipops`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
        });
        const statsArr = await statsRes.json();
        if (statsArr && statsArr[0]) {
            currentUserStats.candy_crumbles = statsArr[0].candy_crumbles || 0;
            currentUserStats.rainbow_lollipops = statsArr[0].rainbow_lollipops || 0;
        }
    }

    async function loadMailsWithRetry(retryCount = 2) {
        const container = document.getElementById('mailList');
        container.innerHTML = '加载中...';
        loadingError = false;
        try {
            const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
            if (!sessionStr) throw new Error('未登录，请先登录');
            const session = JSON.parse(sessionStr);
            const token = session.access_token;
            currentUserId = session.user.id;

            await fetchUserStats(currentUserId, token);

            const response = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?select=*&to_user_id=eq.${currentUserId}&order=created_at.desc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error(await response.text());
            const mails = await response.json();
            currentMails = mails;

            const adminIds = [...new Set(mails.filter(m => m.created_by_admin && !m.sender_name).map(m => m.created_by_admin))];
            if (adminIds.length) {
                const query = adminIds.map(id => `id=eq.${id}`).join(',');
                const userRes = await fetch(`${SUPABASE_URL}/rest/v1/user_profiles?select=id,username&${query}`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                if (userRes.ok) {
                    const users = await userRes.json();
                    users.forEach(u => userNamesMap.set(u.id, u.username));
                }
            }
            for (let mail of currentMails) {
                if (!mail.sender_name && mail.created_by_admin) {
                    mail.sender_name = userNamesMap.get(mail.created_by_admin) || '管理员';
                } else if (!mail.sender_name) {
                    mail.sender_name = '系统';
                }
            }
            applyFilter();
            updateUnreadBadge();
        } catch (err) {
            console.error(err);
            loadingError = true;
            container.innerHTML = `<div class="error-tip">❌ 加载失败：${err.message}<br><button class="retry-btn" onclick="location.reload()">重试</button></div>`;
        }
    }

    document.getElementById('confirmCancelBtn').onclick = closeConfirmModal;
    document.getElementById('confirmOkBtn').onclick = () => {
        if (pendingDeleteAction) pendingDeleteAction();
        closeConfirmModal();
    };
    document.getElementById('deleteAllBtn').onclick = () => {
        showConfirm('⚠️ 全部删除将删除所有已读且无未领取附件的邮件，不可恢复。确定继续吗？', async () => {
            await deleteAllMails();
            closeConfirmModal();
        });

    document.getElementById('closePanelBtn').onclick = () => {
        renderDetailPanel(null);
        currentSelectedMail = null;
    };
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
        searchKeyword = e.target.value;
        applyFilter();
    });
    window.addEventListener('resize', () => {
        if (window.innerWidth >= 768 && window.matchMedia("(orientation: landscape)").matches && currentSelectedMail) {
            renderDetailPanel(currentSelectedMail);
        }
    });
    document.getElementById('rewardConfirmBtn').onclick = () => {
        closeRewardModal();
    };
    loadMailsWithRetry();
