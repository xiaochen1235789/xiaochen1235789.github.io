<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>邮箱原始数据</title>
</head>
<body>
    <pre id="output" style="background:#1e1e2e; color:#eee; padding:20px; font-size:14px;"></pre>
    <script>
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';
        
        const output = document.getElementById('output');
        
        async function main() {
            try {
                // 1. 获取当前会话的 access_token（从 localStorage 中 Supabase 存储的键值提取）
                const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
                if (!sessionStr) throw new Error('未登录，请先登录');
                const session = JSON.parse(sessionStr);
                const token = session.access_token;
                
                // 2. 调用 REST API 获取邮件
                const response = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                const mails = await response.json();
                
                // 3. 显示结果
                output.textContent = JSON.stringify(mails, null, 2);
            } catch (err) {
                output.textContent = '错误：' + err.message + '\n\n请确保已经登录（先访问一次邮箱页面，保持登录状态）。';
            }
        }
        
        main();
    </script>
</body>
</html>
