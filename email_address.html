<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱 - 稳定版</title>
    <style>
        body { background: #0a0f1e; color: #eee; font-family: monospace; padding: 20px; }
        pre { background: #1e293b; padding: 12px; border-radius: 12px; overflow-x: auto; }
        button { background: #f59e0b; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; margin-left: 12px; }
        .mail-item { background: #1e293b; margin-bottom: 16px; padding: 12px; border-radius: 12px; }
        .mail-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h2>📬 我的邮箱</h2>
    <div id="mailsContainer">加载中...</div>

    <script>
        const SUPABASE_URL = 'https://ysmijycsyzpjoieaknmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbWlqeWNzeXpwam9pZWFrbm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNDgzNjMsImV4cCI6MjA4MjgyNDM2M30.H7dx2k_0099LVXprMrghHOFh16OoSSgtCUOib2otHPA';

        async function loadMails() {
            const container = document.getElementById('mailsContainer');
            try {
                // 获取 token 和用户信息
                const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
                if (!sessionStr) throw new Error('未登录，请先登录');
                const session = JSON.parse(sessionStr);
                const token = session.access_token;
                const userId = session.user.id;   // 当前登录用户ID

                // 查询只属于当前用户的邮件
                const res = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?select=*&to_user_id=eq.${userId}&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error(await res.text());
                const mails = await res.json();

                if (mails.length === 0) {
                    container.innerHTML = '<div>📭 暂无邮件</div>';
                    return;
                }

                // 生成简单的卡片列表
                let html = '';
                for (const mail of mails) {
                    const hasAttach = (mail.claimable_items && mail.claimable_items.length > 0);
                    const isClaimed = !!mail.claimed_at;
                    html += `
                        <div class="mail-item">
                            <div class="mail-header">
                                <strong>${escapeHtml(mail.title)}</strong>
                                <small>${new Date(mail.created_at).toLocaleString()}</small>
                                ${hasAttach && !isClaimed ? `<button data-id="${mail.id}" class="claim-btn">🎁 领取</button>` : ''}
                                ${isClaimed ? '<span>✅ 已领取</span>' : ''}
                            </div>
                            <div style="margin-top: 8px; white-space: pre-wrap;">${escapeHtml(mail.content || '(无内容)')}</div>
                        </div>
                    `;
                }
                container.innerHTML = html;

                // 绑定领取按钮
                document.querySelectorAll('.claim-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const mailId = parseInt(btn.dataset.id);
                        await claimMail(mailId);
                    });
                });
            } catch (err) {
                container.innerHTML = `<div>❌ 错误：${err.message}<br>请确保已登录（先访问一次邮箱登录页）</div>`;
            }
        }

        async function claimMail(mailId) {
            try {
                const sessionStr = localStorage.getItem('sb-ysmijycsyzpjoieaknmb-auth-token');
                if (!sessionStr) throw new Error('未登录');
                const session = JSON.parse(sessionStr);
                const token = session.access_token;
                const userId = session.user.id;

                // 1. 获取当前邮件（同时验证归属）
                const res = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=eq.${mailId}&to_user_id=eq.${userId}&select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                });
                const mails = await res.json();
                const mail = mails[0];
                if (!mail) throw new Error('邮件不存在或不属于你');
                if (mail.claimed_at) throw new Error('已领取过');
                const items = mail.claimable_items || [];
                if (items.length === 0) throw new Error('无附件');

                // 2. 原子更新 claimed_at（只更新未领取的）
                const updateRes = await fetch(`${SUPABASE_URL}/rest/v1/user_mails?id=eq.${mailId}&claimed_at=is.null`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=headers'
                    },
                    body: JSON.stringify({ claimed_at: new Date().toISOString() })
                });
                if (!updateRes.ok) throw new Error('领取失败，可能已被领取');

                // 3. 增加糖果
                let candyDelta = 0;
                for (const item of items) {
                    if (item.type === 'candy') candyDelta += item.amount;
                }
                if (candyDelta > 0) {
                    // 获取当前糖果
                    const statsRes = await fetch(`${SUPABASE_URL}/rest/v1/user_stats?user_id=eq.${userId}&select=candy_crumbles`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                    });
                    const stats = await statsRes.json();
                    const currentCandy = stats[0]?.candy_crumbles || 0;
                    const newCandy = currentCandy + candyDelta;
                    // 更新（upsert）
                    await fetch(`${SUPABASE_URL}/rest/v1/user_stats?user_id=eq.${userId}`, {
                        method: 'PUT',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ user_id: userId, candy_crumbles: newCandy })
                    });
                }

                alert('领取成功！');
                loadMails(); // 刷新列表
            } catch (err) {
                alert('领取失败：' + err.message);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        loadMails();
    </script>
</body>
</html>
